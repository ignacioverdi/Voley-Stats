<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Análisis de Partidos — CASLA VOLEY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="datos_historial.js" onerror="void 0"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);
  --red:#e8192c;--green:#22c55e;--amber:#f59e0b;
  --indigo:#818cf8;--orange:#f97316;--cyan:#06b6d4;
  --mut:#475569;--txt:#e2e8f0;
}
body{background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;}

.header{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.01);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;background:linear-gradient(120deg,#e8192c,#fff 50%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;}

.main{max-width:1400px;margin:0 auto;padding:24px 28px;}

/* SELECTOR PARTIDOS */
.partidos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px;}
.partido-btn{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;text-align:left;transition:all .15s;font-family:'Barlow Condensed',sans-serif;}
.partido-btn:hover{border-color:var(--border2);background:var(--card2);}
.partido-btn.activo{border-color:rgba(232,25,44,.4);background:rgba(232,25,44,.06);}
.partido-btn.acum{border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.06);}
.partido-btn.acum.activo{border-color:rgba(129,140,248,.6);background:rgba(129,140,248,.12);}
.pb-fecha{font-size:11px;color:var(--mut);letter-spacing:1px;margin-bottom:4px;}
.pb-rival{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;margin-bottom:6px;}
.pb-res{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;}
.pb-sets{font-size:10px;color:var(--mut);margin-top:4px;line-height:1.4;}
.res-win{color:var(--green);}
.res-loss{color:var(--red);}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.tab-btn.activo{background:var(--card2);color:var(--txt);border-color:var(--border2);}

/* TABLA */
.tabla-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:auto;margin-bottom:20px;}
.tabla{width:100%;border-collapse:collapse;font-size:14px;}
.tabla th{padding:9px 10px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--mut);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center;}
.tabla th.left{text-align:left;}
.tabla th.sec{font-size:10px;font-weight:800;letter-spacing:2px;}
.tabla td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.03);text-align:center;white-space:nowrap;font-size:14px;}
.tabla td.left{text-align:left;font-weight:700;}
.tabla tr:last-child td{border-bottom:none;}
.tabla tr.total-row td{background:rgba(255,255,255,.03);font-weight:700;border-top:1px solid var(--border);}
.tabla tr:hover td{background:rgba(255,255,255,.02);}

.eff-pos{color:var(--green);}
.eff-neu{color:var(--amber);}
.eff-neg{color:var(--red);}
.val-perf{color:#22c55e;}
.val-pos{color:#86efac;}
.val-adm{color:#fbbf24;}
.val-neg{color:#f97316;}
.val-vend{color:#fb923c;}
.val-err{color:#ef4444;}
.val-tot{color:var(--txt);}
.val-mut{color:var(--mut);}

.sec-label{font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

.empty{text-align:center;padding:60px;color:var(--mut);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}

@media(max-width:768px){
  .main{padding:14px 16px;}
  .header{padding:12px 16px;}
  .tabla{font-size:13px;}
  .tabla th,.tabla td{padding:7px 7px;}
}

/* ── Clases del historial para Individual y Comparar ── */
.player-select{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.ps-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.ps-btn.on{background:rgba(232,25,44,.08);border-color:rgba(232,25,44,.3);color:var(--txt)}
.ps-cam{width:22px;height:22px;border-radius:50%;background:rgba(232,25,44,.1);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--red);font-weight:700}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1rem;margin-bottom:1.5rem}
.ind-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-width:280px}
.ind-card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ind-fund-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px}
.stat-pills{display:flex;gap:1px;background:rgba(255,255,255,.04);flex-wrap:nowrap}
.stat-pill{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:var(--card);flex:1;min-width:0}
.stat-pill-val{font-family:'Bebas Neue',sans-serif;font-size:16px;font-weight:900;white-space:nowrap}
.stat-pill-lbl{font-size:7px;color:var(--mut);letter-spacing:.3px;text-transform:uppercase}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--mut);margin-bottom:12px;margin-top:20px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.empty-msg{text-align:center;padding:40px;color:var(--mut);font-size:13px}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.comp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.comp-bar-wrap{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
.comp-bar{height:100%;border-radius:4px;transition:width .4s}
.feedback-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:1rem}
.trend-up{color:#22c55e} .trend-dn{color:#ef4444} .trend-eq{color:var(--mut)}
.eff-val{font-family:'Bebas Neue',sans-serif;font-size:16px}
.rank-table table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table th{padding:8px 10px;font-size:9px;color:var(--mut);letter-spacing:1.5px;border-bottom:1px solid var(--border)}
.rank-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
.sparkline{display:inline-flex;align-items:flex-end;gap:2px;height:20px}
.spark-bar{width:4px;border-radius:2px;background:var(--indigo)}
.b{border:1px solid var(--border)}

.cancha-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);overflow-y:auto;padding:1.5rem 1rem}
.cancha-modal-hdr{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;margin-bottom:12px}
.cancha-modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#e2e8f0}
.cancha-modal-close{padding:6px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#94a3b8;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
.cancha-modal-legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.cml-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#64748b;letter-spacing:.8px;text-transform:uppercase}
.cml-dot{width:20px;height:3px;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="back-btn">← Inicio</a>
    <div>
      <div class="title">📊 Análisis de Partidos</div>
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;">CASLA VOLEY · División de Honor 2026</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- SELECTOR DE PARTIDOS -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="tab-btn activo" id="filtro-todos" onclick="setFiltroTipo('todos',this)">📋 TODOS</button>
    <button class="tab-btn" id="filtro-partidos" onclick="setFiltroTipo('P',this)">🏆 PARTIDOS</button>
    <button class="tab-btn" id="filtro-entrenamientos" onclick="setFiltroTipo('E',this)">🏋️ ENTRENAMIENTOS</button>
  </div>
  <div class="partidos-grid" id="partidos-grid">
    <div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">Cargando...</div></div>
  </div>

  <!-- VISTA TABS -->
  <div class="tabs" id="tabs-equipo" style="display:none;margin-bottom:8px">
    <button class="tab-btn" onclick="setVista('equipo',this)" style="background:rgba(232,25,44,.08);border-color:rgba(232,25,44,.3);color:var(--txt)">👥 EQUIPO</button>
    <button class="tab-btn" onclick="setVista('individual',this)">👤 INDIVIDUAL</button>
    <button class="tab-btn" onclick="setVista('comparar',this)">⚖️ COMPARAR</button>
  </div>

  <!-- SUBTABS EQUIPO -->
  <div class="tabs" id="tabs" style="display:none">
    <button class="tab-btn activo" onclick="setTab('saque',this)">⚡ SAQUE</button>
    <button class="tab-btn" onclick="setTab('recepcion',this)">🛡️ RECEPCIÓN</button>
    <button class="tab-btn" onclick="setTab('ataque',this)">💥 ATAQUE</button>
    <button class="tab-btn" onclick="setTab('bloqueo',this)">🧱 BLOQUEO</button>
    <button class="tab-btn" onclick="setTab('resumen',this)">📋 RESUMEN</button>
  </div>

  <!-- VISTA INDIVIDUAL -->
  <div id="vista-individual" style="display:none">
    <div class="player-select" id="player-select-new"></div>
    <div id="ind-content-new"><div class="empty-msg">Seleccioná un jugador</div></div>
  </div>

  <!-- VISTA COMPARAR -->
  <div id="vista-comparar" style="display:none">
    <div style="display:flex;gap:12px;margin-bottom:1rem;flex-wrap:wrap">
      <div>
        <div style="font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-bottom:6px">JUGADOR A</div>
        <select id="cmp-a" class="tab-btn" style="cursor:pointer" onchange="renderCompar()">
          <option value="">— Elegí —</option>
        </select>
      </div>
      <div>
        <div style="font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-bottom:6px">JUGADOR B</div>
        <select id="cmp-b" class="tab-btn" style="cursor:pointer" onchange="renderCompar()">
          <option value="">— Elegí —</option>
        </select>
      </div>
    </div>
    <div id="comp-content"><div class="empty-msg">Elegí dos jugadores para comparar</div></div>
  </div>

  <!-- CONTENIDO -->
  <div id="contenido">
    <div class="empty">
      <div class="empty-icon">👆</div>
      <div class="empty-txt">Elegí un partido arriba</div>
    </div>
  </div>

</div>

<script>
var DATA = null;
var PARTIDO_IDX = null;
var TAB_ACTIVO = 'saque';
var FILTRO_TIPO = 'todos';
var FILTRO_INDICES = null;


// ── Cargar datos ──────────────────────────────────────────────
window.addEventListener('load', function(){
  setTimeout(function(){
    DATA = window.HISTORIAL_DATA || null;
    if(!DATA || !DATA.entrenamientos || !DATA.entrenamientos.length){
      document.getElementById('partidos-grid').innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div><div class="empty-txt">Sin datos</div></div>';
      return;
    }
    renderPartidosGrid();
  }, 200);
});

// ── Grid de partidos ──────────────────────────────────────────
function setFiltroTipo(tipo, btn){
  FILTRO_TIPO = tipo;
  document.querySelectorAll('#filtro-todos,#filtro-partidos,#filtro-entrenamientos').forEach(function(b){
    b.classList.remove('activo');
  });
  btn.classList.add('activo');
  renderPartidosGrid();
}

function renderPartidosGrid(){
  var grid = document.getElementById('partidos-grid');
  grid.innerHTML = '';

  // Botón acumulado
  var filtrados = DATA.entrenamientos.filter(function(p){
    return FILTRO_TIPO==='todos' || (p.tipo||'P')===FILTRO_TIPO;
  });
  var tipoLabel = FILTRO_TIPO==='todos'?'sesiones':FILTRO_TIPO==='P'?'partidos':'entrenamientos';
  var btnAcum = document.createElement('button');
  btnAcum.className = 'partido-btn acum';
  btnAcum.innerHTML =
    '<div class="pb-fecha">TEMPORADA 2026</div>' +
    '<div class="pb-rival">ACUMULADO</div>' +
    '<div class="pb-res" style="color:var(--indigo)">' + filtrados.length + ' ' + tipoLabel.toUpperCase() + '</div>';
  btnAcum.onclick = function(){ selectPartidoFiltrado(-1, this); };
  grid.appendChild(btnAcum);

  // Un botón por partido/entrenamiento filtrado
  DATA.entrenamientos.forEach(function(p, i){
    var tipo = p.tipo || 'P';
    if(FILTRO_TIPO !== 'todos' && tipo !== FILTRO_TIPO) return;

    var res = p.resultado || {};
    var esPartido = tipo === 'P';
    var ganado = (res.casla||0) > (res.rival||0);
    var sets = (res.sets||[]).join(' · ');

    var btn = document.createElement('button');
    btn.className = 'partido-btn';

    if(esPartido){
      btn.innerHTML =
        '<div class="pb-fecha">🏆 ' + (p.fecha||'') + '</div>' +
        '<div class="pb-rival">vs ' + (p.rival||'RIVAL') + '</div>' +
        '<div class="pb-res ' + (ganado?'res-win':'res-loss') + '">' +
          'CASLA ' + (res.casla||0) + ' — ' + (res.rival||0) +
        '</div>' +
        '<div class="pb-sets">' + sets + '</div>';
    } else {
      btn.innerHTML =
        '<div class="pb-fecha">🏋️ ' + (p.fecha||'') + '</div>' +
        '<div class="pb-rival">' + (p.rival||'Entrenamiento') + '</div>' +
        '<div class="pb-res" style="color:var(--indigo)">ENTRENAMIENTO</div>';
    }
    btn.onclick = function(){ selectPartido(i, this); };
    grid.appendChild(btn);
  });

  // Si no hay resultados
  if(grid.children.length === 1){ // Solo el botón ACUMULADO
    var empty = document.createElement('div');
    empty.style.cssText = 'color:var(--mut);font-size:13px;padding:20px;';
    empty.textContent = 'No hay ' + (FILTRO_TIPO==='P'?'partidos':'entrenamientos') + ' cargados aún.';
    grid.appendChild(empty);
  }
}

// ── Seleccionar partido ───────────────────────────────────────
function selectPartidoFiltrado(idx, btn){
  // Acumula solo los partidos del tipo filtrado
  if(idx === -1 && FILTRO_TIPO !== 'todos'){
    // Crear índices filtrados
    var idxsFiltrados = [];
    DATA.entrenamientos.forEach(function(p, i){
      if((p.tipo||'P') === FILTRO_TIPO) idxsFiltrados.push(i);
    });
    // Guardar filtro para que getJugadores lo use
    FILTRO_INDICES = idxsFiltrados;
    PARTIDO_IDX = -2; // -2 = acumulado filtrado
  } else {
    FILTRO_INDICES = null;
    PARTIDO_IDX = idx;
  }
  document.querySelectorAll('.partido-btn').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
  document.getElementById('tabs-equipo').style.display = 'flex';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('contenido').style.display = 'block';
  document.getElementById('vista-individual').style.display = 'none';
  document.getElementById('vista-comparar').style.display = 'none';
  VISTA_ACTIVA = 'equipo';
  document.querySelectorAll('#tabs-equipo .tab-btn').forEach(function(b,i){
    b.style.background = i===0?'rgba(232,25,44,.08)':'var(--card)';
    b.style.borderColor = i===0?'rgba(232,25,44,.3)':'var(--border)';
    b.style.color = i===0?'var(--txt)':'var(--mut)';
  });
  renderTab(TAB_ACTIVO);
}

function selectPartido(idx, btn){
  PARTIDO_IDX = idx;
  // Resaltar botón
  document.querySelectorAll('.partido-btn').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
  // Mostrar tabs de vista y subtabs
  document.getElementById('tabs-equipo').style.display = 'flex';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('contenido').style.display = 'block';
  document.getElementById('vista-individual').style.display = 'none';
  document.getElementById('vista-comparar').style.display = 'none';
  VISTA_ACTIVA = 'equipo';
  // Reset tab equipo activo
  document.querySelectorAll('#tabs-equipo .tab-btn').forEach(function(b,i){
    b.style.background = i===0?'rgba(232,25,44,.08)':'var(--card)';
    b.style.borderColor = i===0?'rgba(232,25,44,.3)':'var(--border)';
    b.style.color = i===0?'var(--txt)':'var(--mut)';
  });
  // Renderizar tab activo
  renderTab(TAB_ACTIVO);
}

// ── Tabs ──────────────────────────────────────────────────────
function setTab(tab, btn){
  TAB_ACTIVO = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
  renderTab(tab);
}

function renderTab(tab){
  if(PARTIDO_IDX === null) return;
  var jugadores = getJugadores(PARTIDO_IDX);
  var cont = document.getElementById('contenido');
  if(tab === 'saque') cont.innerHTML = tablaSaque(jugadores);
  else if(tab === 'recepcion') cont.innerHTML = tablaRecepcion(jugadores);
  else if(tab === 'ataque') cont.innerHTML = tablaAtaque(jugadores);
  else if(tab === 'bloqueo') cont.innerHTML = tablaBloqueo(jugadores);
  else if(tab === 'resumen') cont.innerHTML = tablaResumen(jugadores);
}

// ── Obtener jugadores ─────────────────────────────────────────
function getJugadores(idx){
  if(idx === -1 || idx === -2){
    // Acumular — si idx=-2 usa solo los índices filtrados
    var acum = {};
    var partidos_fuente = idx===-2 && FILTRO_INDICES
      ? FILTRO_INDICES.map(function(i){ return DATA.entrenamientos[i]; })
      : DATA.entrenamientos;
    partidos_fuente.forEach(function(p){
      p.jugadores.forEach(function(j){
        if(j.n === 'TOTALES EQUIPO') return;
        if(!acum[j.c]) acum[j.c] = {c:j.c,n:j.n,PJ:0,
          sT:0,sPunto:0,sPos:0,sAdm:0,sNeg:0,sVend:0,sErr:0,
          rT:0,rPunto:0,rPos:0,rAdm:0,rNeg:0,rVend:0,rErr:0,
          aT:0,aPunto:0,aPos:0,aAdm:0,aNeg:0,aVend:0,aErr:0,
          bT:0,bPt:0,bPtPos:0};
        var s = acum[j.c];
        if(j.sT+j.rT+j.aT+j.bT > 0) s.PJ++;
        ['sT','sPunto','sPos','sAdm','sNeg','sVend','sErr',
         'rT','rPunto','rPos','rAdm','rNeg','rVend','rErr',
         'aT','aPunto','aPos','aAdm','aNeg','aVend','aErr',
         'bT','bPt','bPtPos'].forEach(function(k){ s[k]+=(j[k]||0); });
      });
    });
    return Object.values(acum).sort(function(a,b){return a.c-b.c;});
  } else {
    return DATA.entrenamientos[idx].jugadores
      .filter(function(j){ return j.n !== 'TOTALES EQUIPO'; })
      .sort(function(a,b){ return a.c-b.c; });
  }
}

// ── Helpers ───────────────────────────────────────────────────
function effColor(v){
  if(v===null||v===undefined||isNaN(v)) return 'var(--mut)';
  return v>20?'#22c55e':v>0?'#86efac':v===0?'var(--mut)':'#ef4444';
}
function sEff(j){ return j.sT>0?Math.round((j.sPunto*1+j.sVend*0.5+j.sPos*0.25-j.sErr*1)/j.sT*100):null; }
function rEff(j){ return j.rT>0?Math.round((j.rPunto*1+j.rPos*0.5-j.rVend*0.5-j.rErr*1)/j.rT*100):null; }
function aEff(j){ return j.aT>0?Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100):null; }
function bEff(j){ return j.bT>0?Math.round((j.bPt+j.bPtPos)/j.bT*100):null; }
function pct(n,tot){ return tot>0?Math.round(n/tot*100)+'%':'-'; }
function td(v,cls){ return '<td class="'+(cls||'')+'">'+(v!==undefined&&v!==null?v:'-')+'</td>'; }
function effTd(v){ var e=v!==null&&v!==undefined?v+'%':'--'; return '<td style="font-weight:800;color:'+effColor(v)+'">'+(v!==null?e:'--')+'</td>'; }

}

// ════════ FUNCIONES DE HISTORIAL ════════
var filtroActivo = {tipo:"all",periodo:"all",fecha:"all"};
const C={green:"#22c55e",lgreen:"#86efac",amber:"#fbbf24",orange:"#fb923c",red:"#ef4444",mut:"#475569",indigo:"#818cf8",purple:"#a855f7",cyan:"#06b6d4",blue:"#3b82f6"};

function filtrarHistorial(entrenamientos){
  var hoy = new Date();
  return entrenamientos.filter(function(e){
    // Filtro tipo
    if(filtroActivo.tipo !== 'all'){
      if((e.tipo||'E') !== filtroActivo.tipo) return false;
    }
    // Filtro período
    if(filtroActivo.periodo !== 'all'){
      var dias = parseInt(filtroActivo.periodo);
      var partes = e.fecha.split('/');
      var fechaE = new Date(partes[2], partes[1]-1, partes[0]);
      var diffDias = (hoy - fechaE) / (1000*60*60*24);
      if(diffDias > dias) return false;
    }
    // Filtro fecha específica
    if(filtroActivo.fecha !== 'all'){
      if(filtroActivo.fecha.indexOf('mes:')===0){
        // Filtro por mes completo
        var mesKey=filtroActivo.fecha.replace('mes:','');
        var partes=e.fecha.split('/');
        var eMesKey=partes[1]+'/'+partes[2];
        if(eMesKey !== mesKey) return false;
      } else {
        if(e.fecha !== filtroActivo.fecha) return false;
      }
    }
    return true;
  });
}

// Sobrescribir getPlayerHistory para aplicar filtros
var _getPlayerHistoryOrig = getPlayerHistory;

function getPlayerHistory(nom){
  var D = window.HISTORIAL_DATA;
  if(!D) return [];
  var entrenamientosFiltrados = filtrarHistorial(D.entrenamientos);
  return entrenamientosFiltrados.map(function(e){
    var j = e.jugadores.find(function(x){ return x.n === nom; });
    return j ? Object.assign({fecha: e.fecha, tipo: e.tipo||'E', rival: e.rival||'', resultado: e.resultado||null}, j) : null;
  }).filter(Boolean);
}

function getAllPlayers(){
  const D=window.HISTORIAL_DATA;
  if(!D)return[];
  const set=new Set();
  const arr=[];
  filtrarHistorial(D.entrenamientos).forEach(e=>e.jugadores.forEach(j=>{
    if(!set.has(j.n)){set.add(j.n);arr.push({c:j.c,n:j.n});}
  }));
  return arr.sort((a,b)=>a.c-b.c);
}

function renderSaqueBlock(hist, playerName){
  const origMap={}, destMap={};
  let totSaque=0, ptSaque=0, posS=0, admS=0, negS=0, vendSaque=0, errSaque=0;
  hist.forEach(function(s){
    const t=parseInt(s.sT)||0;
    totSaque  += t;
    ptSaque   += (parseInt(s.sPunto)||0);
    posS      += (parseInt(s.sPos)  ||0);
    admS      += (parseInt(s.sAdm)  ||0);
    negS      += (parseInt(s.sNeg)  ||0);
    vendSaque += (parseInt(s.sVend) ||0);
    errSaque  += (parseInt(s.sErr)  ||0);
    if(s.sOrig && String(s.sOrig).trim()!==''){
      String(s.sOrig).split(',').forEach(function(z){
        var zi=parseInt(z); if(!zi)return; origMap[zi]=(origMap[zi]||0)+1;
      });
    }
    if(s.sDest && String(s.sDest).trim()!==''){
      String(s.sDest).split(',').forEach(function(z){
        var zi=parseInt(z); if(!zi)return; destMap[zi]=(destMap[zi]||0)+1;
      });
    }
  });
  const totalDests=Object.values(destMap).reduce(function(a,b){return a+b;},0);
  const totalOrigs=Object.values(origMap).reduce(function(a,b){return a+b;},0);
  const topDests=Object.entries(destMap).sort(function(a,b){return b[1]-a[1];}).slice(0,2)
    .map(function(x){return {z:parseInt(x[0]),pct:totalDests>0?Math.round(x[1]/totalDests*100):0};});
  const topOrig=Object.entries(origMap).sort(function(a,b){return b[1]-a[1];})[0];
  const origZone=topOrig?parseInt(topOrig[0]):0;

  const SC='#f59e0b';
  const eff=totSaque>0?Math.round((ptSaque-vendSaque-errSaque)/totSaque*100):null;
  const effColor=eff===null?'#64748b':eff>=40?'#22c55e':eff>=20?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  const hasDests=topDests.length>0;
  const destsEncoded=hasDests?encodeURIComponent(JSON.stringify(topDests)):'';
  const statsEncoded=encodeURIComponent(JSON.stringify({

    pos  +=(parseInt(s.rPos)   ||0);

    neg  +=(parseInt(s.rNeg)   ||0);
    vend +=(parseInt(s.rVend)  ||0);
    err  +=(parseInt(s.rErr)   ||0);
  });
  if(tot===0){
    var d=document.createElement('div');
    d.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;padding:1.5rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px';
    d.textContent='Sin datos de recepción registrados';
    return d.outerHTML;
  }
  var eff=Math.round((pt*1+pos*0.5+adm*0.25-vend*0.5-err*1)/tot*100);
  var effColor=eff>=50?'#22c55e':eff>=30?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  var RC='#22c55e';
  return statBlock('RECEPCIÓN', RC, [
    {l:'EFF',v:eff+'%',c:effColor},
    {l:'TOT',v:tot,    c:RC},
    {l:'#',  v:pt,     c:'#22c55e'},
    {l:'+',  v:pos,    c:'#86efac'},
    {l:'!',  v:adm,    c:'#fbbf24'},
    {l:'-',  v:neg,    c:'#f97316'},
    {l:'/',  v:vend,   c:'#fb923c'},
    {l:'=',  v:err,    c:'#ef4444'},
  ], tot+' recepciones totales');
}


function renderAtaqueBlock(hist){
  let tot=0,pt=0,pos=0,adm=0,neg=0,vend=0,err=0,tcq=0;
  hist.forEach(function(s){
    tot  +=(parseInt(s.aT)     ||0);
    pt   +=(parseInt(s.aPunto) ||0);
    pos  +=(parseInt(s.aPos)   ||0);
    adm  +=(parseInt(s.aAdm)   ||0);
    neg  +=(parseInt(s.aNeg)   ||0);
    vend +=(parseInt(s.aVend)  ||0);
    err  +=(parseInt(s.aErr)   ||0);
    tcq  +=(parseInt(s.aTCQ)   ||0);
  });
  if(tot===0){
    var d=document.createElement('div');
    d.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;padding:1.5rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px';
    d.textContent='Sin datos de ataque registrados';
    return d.outerHTML;
  }
  var eff=Math.round((pt-vend-err)/tot*100);
  var effColor=eff>=50?'#22c55e':eff>=25?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  var AC='#818cf8';
  var extra=tot+' ataques totales'+(tcq>0?' · '+tcq+' toques':'');
  return statBlock('ATAQUE', AC, [
    {l:'EFF',v:eff+'%',c:effColor},
    {l:'TOT',v:tot,    c:AC},
    {l:'#',  v:pt,     c:'#22c55e'},
    {l:'+',  v:pos,    c:'#86efac'},
    {l:'!',  v:adm,    c:'#fbbf24'},
    {l:'-',  v:neg,    c:'#f97316'},
    {l:'/',  v:vend,   c:'#fb923c'},
    {l:'=',  v:err,    c:'#ef4444'},
  ], extra);
}

function renderDV4Block(hist) {
  // Acumular totales DV4 de todas las sesiones del jugador
  const totals = {}; // { cod: {tot, pt, err} }
  hist.forEach(h => {
    if (!h.dv4) return;
    Object.keys(h.dv4).forEach(cod => {
      if (!totals[cod]) totals[cod] = {tot:0, pt:0, err:0, vend:0};
      totals[cod].tot  += h.dv4[cod].tot  || 0;
      totals[cod].pt   += h.dv4[cod].pt   || 0;
      totals[cod].err  += h.dv4[cod].err  || 0;
      totals[cod].vend += h.dv4[cod].vend || 0;
    });
  });

  // Verificar si hay algún dato
  const hasDV4 = Object.values(totals).some(v => v.tot > 0);
  if (!hasDV4) {
    return `<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;
      padding:2rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px">
      Sin datos de combinaciones DV4 registrados aún
    </div>`;
  }

  // Construir secciones por grupo
  let html = `<div style="display:flex;flex-direction:column;gap:1rem">`;

  Object.entries(DV4_GRUPOS).forEach(([grupo, codigos]) => {
    // Filtrar solo los que tienen datos
    const conDatos = codigos.filter(c => totals[c] && totals[c].tot > 0)
      .sort((a,b) => totals[b].tot - totals[a].tot);
    if (!conDatos.length) return;

    const color = DV4_GRUPO_COLOR[grupo];
    const totalGrupo = conDatos.reduce((s,c) => s + totals[c].tot, 0);
    const ptGrupo    = conDatos.reduce((s,c) => s + totals[c].pt,  0);

    const filas = conDatos.map(cod => {
      const d = totals[cod];
      const pct = d.tot > 0 ? Math.round(d.pt / d.tot * 100) : 0;
      const barW = d.tot > 0 ? Math.round(d.pt / d.tot * 100) : 0;
      const errPct = d.tot > 0 ? Math.round(d.err / d.tot * 100) : 0;
      // Calcular destinos desde el historial para abrir la cancha
      const destMap = {};
      hist.forEach(s => {
        if(s.dv4 && s.dv4[cod] && s.dv4[cod].dest){
          String(s.dv4[cod].dest).split(',').forEach(z => {
            const zi=parseInt(z); if(!zi)return;
            destMap[zi]=(destMap[zi]||0)+1;
          });
        }
      });
      const totalDests=Object.values(destMap).reduce((a,b)=>a+b,0);
      const destsArr=Object.entries(destMap).sort((a,b)=>b[1]-a[1]).slice(0,2)
        .map(([z,n])=>({z:parseInt(z),pct:totalDests>0?Math.round(n/totalDests*100):0}));
      const hasDests=destsArr.length>0;
      // Codificar destinos como data attribute para evitar problemas con JSON en innerHTML
      const destsEncoded=hasDests?encodeURIComponent(JSON.stringify(destsArr)):'';
      return `
        <div style="display:grid;grid-template-columns:52px 1fr 50px 50px 50px;
          align-items:center;gap:10px;padding:8px 14px;
          border-bottom:1px solid rgba(255,255,255,.03)">
          <div ${hasDests?`data-dv4cod="${cod}" data-dv4dests="${destsEncoded}" data-dv4stats="${encodeURIComponent(JSON.stringify({tot:d.tot,pt:d.pt,err:d.err,vend:d.vend||0,pct:pct}))}" onclick="dv4ClickCancha(this)"`:''}
            style="font-family:'Barlow Condensed',sans-serif;font-size:15px;
            font-weight:900;color:${color};letter-spacing:1px;
            cursor:${hasDests?'pointer':'default'};padding:3px 8px;border-radius:5px;
            border:1px solid ${hasDests?color:'transparent'};transition:all .15s;
            display:inline-flex;align-items:center;gap:3px;white-space:nowrap;" title="${hasDests?'Ver en cancha táctica':''}">${cod}${hasDests?'<span style="font-size:9px;opacity:.7;line-height:1">📍</span>':''}</div>
          <div>
            <div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${barW}%;background:${color};
                border-radius:3px;transition:width .4s ease"></div>
            </div>
          </div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:14px;font-weight:800;color:var(--mut)">${d.tot}</div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:14px;font-weight:800;color:${color}">${d.pt}
            <span style="font-size:10px;font-weight:600">(${pct}%)</span>
          </div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:13px;font-weight:700;color:var(--red)">${d.err}</div>
        </div>`;
    }).join('');

    html += `
      <div style="background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden">
        <div style="padding:10px 14px;display:flex;align-items:center;gap:12px;
          background:linear-gradient(135deg,var(--sur),var(--card2));
          border-bottom:1px solid var(--b)">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;
            font-weight:800;letter-spacing:2px;text-transform:uppercase;
            color:${color}">${grupo}</div>
          <div style="margin-left:auto;display:flex;gap:16px;align-items:center">
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:var(--txt);line-height:1">${totalGrupo}</div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">TOTAL</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:${color};line-height:1">${ptGrupo}</div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">PUNTOS</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:${color};line-height:1">
                ${totalGrupo > 0 ? Math.round(ptGrupo/totalGrupo*100) : 0}%
              </div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">EFF</div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:52px 1fr 50px 50px 50px;
          gap:10px;padding:6px 14px;border-bottom:1px solid rgba(255,255,255,.05)">
          <div style="font-size:8px;color:var(--mut);letter-spacing:1px">COD</div>
          <div style="font-size:8px;color:var(--mut);letter-spacing:1px">DIST</div>
          <div style="text-align:center;font-size:8px;color:var(--mut);letter-spacing:1px">TOT</div>
          <div style="text-align:center;font-size:8px;color:${color};letter-spacing:1px">PTS</div>
          <div style="text-align:center;font-size:8px;color:var(--red);letter-spacing:1px">ERR</div>
        </div>
        ${filas}
      </div>`;
  });

  html += `</div>`;
  return html;
}

}

function acumPlayer(hist){
    var r={sT:0,sPunto:0,sPos:0,sAdm:0,sNeg:0,sVend:0,sErr:0,
           rT:0,rPunto:0,rPos:0,rAdm:0,rNeg:0,rVend:0,rErr:0,
           aT:0,aPunto:0,aPos:0,aAdm:0,aNeg:0,aVend:0,aErr:0,aTCQ:0,
           bT:0,bPt:0,sEffVals:[],rEffVals:[],aEffVals:[]};
    hist.forEach(function(s){
      r.sT+=(s.sT||0);r.sPunto+=(s.sPunto||0);r.sPos+=(s.sPos||0);
      r.sAdm+=(s.sAdm||0);r.sNeg+=(s.sNeg||0);r.sVend+=(s.sVend||0);r.sErr+=(s.sErr||0);
      if(s.sT>0)r.sEffVals.push(s.sEff);
      r.rT+=(s.rT||0);r.rPunto+=(s.rPunto||0);r.rPos+=(s.rPos||0);
      r.rAdm+=(s.rAdm||0);r.rNeg+=(s.rNeg||0);r.rVend+=(s.rVend||0);r.rErr+=(s.rErr||0);
      if(s.rT>0)r.rEffVals.push(s.rEff);
      r.aT+=(s.aT||0);r.aPunto+=(s.aPunto||0);r.aPos+=(s.aPos||0);
      r.aAdm+=(s.aAdm||0);r.aNeg+=(s.aNeg||0);r.aVend+=(s.aVend||0);r.aErr+=(s.aErr||0);
      r.aTCQ+=(s.aTCQ||0);if(s.aT>0)r.aEffVals.push(s.aEff);
      r.bT+=(s.bT||0);r.bPt+=(s.bPt||0);
    });
    r.sEff=r.sT>0?Math.round((r.sPunto-r.sVend-r.sErr)/r.sT*100):null;
    r.rEff=r.rT>0?Math.round((r.rPunto+r.rPos*0.5+r.rAdm*0.25-r.rVend*0.5-r.rErr)/r.rT*100):null;
    r.aEff=r.aT>0?Math.round((r.aPunto-r.aVend-r.aErr)/r.aT*100):null;
    return r;
  }
  const a1=acumPlayer(h1), a2=acumPlayer(h2);
  const avg1=a1.aEff, avg2=a2.aEff;

function sparkline(vals, color, w=260, h=70){
  if(!vals||vals.length===0)return '<text x="50%" y="50%" text-anchor="middle" fill="'+C.mut+'" font-size="10" font-family="Barlow Condensed">Sin datos</text>';
  if(vals.length===1){
    // Single bar
    const pct=Math.min(100,Math.max(0,(vals[0]+100)/2));
    const bh=pct/100*h;
    const id='g'+Math.random().toString(36).substr(2,6);
    return '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".6"/><stop offset="100%" stop-color="'+color+'" stop-opacity=".1"/></linearGradient></defs>'
      +'<rect x="'+(w/2-20)+'" y="'+(h-bh)+'" width="40" height="'+bh+'" fill="url(#'+id+')" rx="4"/>'
      +'<text x="'+(w/2)+'" y="'+(h-bh-6)+'" text-anchor="middle" fill="'+color+'" font-size="13" font-weight="bold" font-family="Barlow Condensed">'+vals[0]+'%</text>';
  }
  const mn=Math.min(...vals)-5, mx=Math.max(...vals)+5;
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=i/(vals.length-1)*w;
    const y=h-(v-mn)/range*h;
    return `${x},${y}`;
  });
  const area='M'+pts[0]+' '+pts.map(p=>'L'+p).join(' ')+` L${w},${h} L0,${h} Z`;
  const line='M'+pts[0]+' '+pts.map(p=>'L'+p).join(' ');
  const lastX=parseFloat(pts[pts.length-1].split(',')[0]);
  const lastY=parseFloat(pts[pts.length-1].split(',')[1]);
  const id='g'+Math.random().toString(36).substr(2,6);
  return `<defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="${area}" fill="url(#${id})"/>
  <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>`;
}

function trendArrow(vals){
  if(vals.length<2)return{sym:'—',c:C.mut,delta:0};
  const last=vals[vals.length-1],prev=vals[vals.length-2];
  const d=last-prev;
  if(d>3)return{sym:'▲',c:C.green,delta:d};
  if(d<-3)return{sym:'▼',c:C.red,delta:d};
  return{sym:'→',c:C.amber,delta:d};
}

function ec(v){if(v===null||v===undefined)return C.indigo;if(v>=60)return C.green;if(v>=30)return C.amber;if(v>=0)return C.orange;return C.red;}

function renderCompar(){
  var numA = parseInt(document.getElementById('cmp-a').value);
  var numB = parseInt(document.getElementById('cmp-b').value);
  if(!numA || !numB || numA===numB){
    document.getElementById('comp-content').innerHTML = '<div class="empty-msg">Elegí dos jugadores diferentes</div>';
    return;
  }

  function acumJug(num){
    var a = {c:num,n:'',sT:0,sPunto:0,sPos:0,sAdm:0,sNeg:0,sVend:0,sErr:0,
      rT:0,rPunto:0,rPos:0,rAdm:0,rNeg:0,rVend:0,rErr:0,
      aT:0,aPunto:0,aPos:0,aAdm:0,aNeg:0,aVend:0,aErr:0,bT:0,bPt:0,bPtPos:0};
    var partidos = (PARTIDO_IDX===-1||PARTIDO_IDX===-2) ? (FILTRO_INDICES ? FILTRO_INDICES.map(function(i){return DATA.entrenamientos[i];}) : DATA.entrenamientos) : [DATA.entrenamientos[PARTIDO_IDX]];
    partidos.forEach(function(p){
      var j = p.jugadores.find(function(x){ return x.c===num; });
      if(!j) return;
      a.n = j.n;
      ['sT','sPunto','sPos','sAdm','sNeg','sVend','sErr',
       'rT','rPunto','rPos','rAdm','rNeg','rVend','rErr',
       'aT','aPunto','aPos','aAdm','aNeg','aVend','aErr',
       'bT','bPt','bPtPos'].forEach(function(k){ a[k]+=(j[k]||0); });
    });
    return a;
  }

  var A = acumJug(numA);
  var B = acumJug(numB);

  var seA=A.sT>0?Math.round((A.sPunto*1+A.sVend*0.5+A.sPos*0.25-A.sErr*1)/A.sT*100):0;
  var seB=B.sT>0?Math.round((B.sPunto*1+B.sVend*0.5+B.sPos*0.25-B.sErr*1)/B.sT*100):0;
  var reA=A.rT>0?Math.round((A.rPunto*1+A.rPos*0.5-A.rVend*0.5-A.rErr*1)/A.rT*100):0;
  var reB=B.rT>0?Math.round((B.rPunto*1+B.rPos*0.5-B.rVend*0.5-B.rErr*1)/B.rT*100):0;
  var aeA=A.aT>0?Math.round((A.aPunto-A.aVend-A.aErr)/A.aT*100):0;
  var aeB=B.aT>0?Math.round((B.aPunto-B.aVend-B.aErr)/B.aT*100):0;
  var beA=A.bT>0?Math.round((A.bPt+A.bPtPos)/A.bT*100):0;
  var beB=B.bT>0?Math.round((B.bPt+B.bPtPos)/B.bT*100):0;

  function compRow(lbl, vA, vB, suffix){
    suffix = suffix||'';
    var max = Math.max(Math.abs(vA),Math.abs(vB),1);
    var pctA = Math.min(100,Math.round(Math.abs(vA)/max*100));
    var pctB = Math.min(100,Math.round(Math.abs(vB)/max*100));
    var cA = effColor(typeof vA==='number'&&lbl.indexOf('Eff')>-1?vA:null)||'#818cf8';
    var cB = effColor(typeof vB==='number'&&lbl.indexOf('Eff')>-1?vB:null)||'#818cf8';
    if(lbl.indexOf('Eff')<0){ cA='#818cf8'; cB='#818cf8'; }
    return '<div class="comp-row">'+
      '<div style="width:120px;text-align:right;font-size:13px;font-weight:700;color:'+cA+'">'+vA+suffix+'</div>'+
      '<div style="width:80px;text-align:center;font-size:10px;color:var(--mut);padding:0 8px">'+lbl+'</div>'+
      '<div style="flex:1"><div class="comp-bar-wrap"><div class="comp-bar" style="width:'+pctB+'%;background:'+cB+'"></div></div></div>'+
      '<div style="width:60px;font-size:13px;font-weight:700;color:'+cB+'">'+vB+suffix+'</div>'+
    '</div>';
  }

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;text-align:center">';
  html += '<div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px">#'+numA+' '+A.n+'</div>';
  html += '<div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px">#'+numB+' '+B.n+'</div>';
  html += '</div>';

  html += '<div class="feedback-block">';
  html += '<div class="section-title" style="margin-top:0">SAQUE</div>';
  html += compRow('Eff%', seA, seB, '%');
  html += compRow('Total', A.sT, B.sT);
  html += compRow('# Perfecta', A.sPunto, B.sPunto);
  html += compRow('+ Positiva', A.sPos, B.sPos);
  html += compRow('= Error', A.sErr, B.sErr);
  html += '</div>';

  html += '<div class="feedback-block">';
  html += '<div class="section-title" style="margin-top:0">RECEPCIÓN</div>';

  document.getElementById('comp-content').innerHTML = html;
}


// ════ CANCHA FUNCTIONS ════
function canchaRivalZone(z){
  const cv=document.getElementById('cancha-canvas');const W=cv?cv.width:380,H=cv?cv.height:560,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478,RIVAL_H=NET-CT;
  const xs={1:CL+CW/6,6:CL+CW/2,5:CL+CW*5/6,9:CL+CW/6,8:CL+CW/2,7:CL+CW*5/6,2:CL+CW/6,3:CL+CW/2,4:CL+CW*5/6};
  const ys={1:CT+RIVAL_H/6,6:CT+RIVAL_H/6,5:CT+RIVAL_H/6,9:CT+RIVAL_H/2,8:CT+RIVAL_H/2,7:CT+RIVAL_H/2,2:CT+RIVAL_H*5/6,3:CT+RIVAL_H*5/6,4:CT+RIVAL_H*5/6};
  return{x:xs[z],y:ys[z]};
}

function canchaOwnZone(z){
  const cv=document.getElementById('cancha-canvas');const W=cv?cv.width:380,H=cv?cv.height:560,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478,OWN_H=CB-NET;
  const xs={4:CL+CW/6,3:CL+CW/2,2:CL+CW*5/6,7:CL+CW/6,8:CL+CW/2,9:CL+CW*5/6,5:CL+CW/6,6:CL+CW/2,1:CL+CW*5/6};
  const ys={4:NET+OWN_H/6,3:NET+OWN_H/6,2:NET+OWN_H/6,7:NET+OWN_H/2,8:NET+OWN_H/2,9:NET+OWN_H/2,5:NET+OWN_H*5/6,6:NET+OWN_H*5/6,1:NET+OWN_H*5/6};
  return{x:xs[z],y:ys[z]};
}

function canchaDrawCourt(ctx){
  const W=ctx.canvas.width,H=ctx.canvas.height,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478;
  const RIVAL_H=NET-CT,OWN_H=CB-NET;
  const c1=CL+CW/3,c2=CL+CW*2/3;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#2563a8';ctx.fillRect(0,0,W,H);
  canchaDrawWood(ctx,CL,CT,CW,RIVAL_H,false);
  canchaDrawWood(ctx,CL,NET,CW,OWN_H,true);
  // Sombra red
  const shG=ctx.createLinearGradient(0,NET-6,0,NET+18);
  shG.addColorStop(0,'rgba(0,0,0,.35)');shG.addColorStop(1,'transparent');
  ctx.fillStyle=shG;ctx.fillRect(CL,NET-6,CW,24);
  // Malla
  ctx.save();ctx.globalAlpha=0.25;ctx.strokeStyle='#444';ctx.lineWidth=0.7;
  for(let x=CL;x<=CR;x+=5){ctx.beginPath();ctx.moveTo(x,NET-10);ctx.lineTo(x,NET+10);ctx.stroke();}
  for(let y=NET-9;y<=NET+9;y+=4){ctx.beginPath();ctx.moveTo(CL,y);ctx.lineTo(CR,y);ctx.stroke();}
  ctx.restore();
  // Barra red
  const netG=ctx.createLinearGradient(0,NET-8,0,NET+8);
  netG.addColorStop(0,'#2a2a3a');netG.addColorStop(0.15,'#8888a0');
  netG.addColorStop(0.42,'#e8e8f5');netG.addColorStop(0.58,'#c8c8e0');
  netG.addColorStop(0.85,'#7070a0');netG.addColorStop(1,'#2a2a3a');
  ctx.fillStyle=netG;ctx.beginPath();ctx.roundRect(CL-6,NET-8,CW+12,16,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.roundRect(CL-4,NET-7,CW+8,5,2);ctx.fill();
  ctx.fillStyle='#cc1515';ctx.beginPath();ctx.roundRect(CL-6,NET-11,CW+12,4,2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(CL-5,NET+9,CW+10,2);
  // Líneas cancha
  ctx.save();ctx.setLineDash([]);ctx.strokeStyle='#fff';ctx.lineWidth=3;
  ctx.shadowColor='rgba(255,255,255,.5)';ctx.shadowBlur=3;
  ctx.strokeRect(CL,CT,CW,RIVAL_H);ctx.strokeRect(CL,NET,CW,OWN_H);
  ctx.lineWidth=2.5;ctx.shadowBlur=2;
  ctx.beginPath();ctx.moveTo(CL,NET+OWN_H/3);ctx.lineTo(CR,NET+OWN_H/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CL,CT+RIVAL_H*2/3);ctx.lineTo(CR,CT+RIVAL_H*2/3);ctx.stroke();
  ctx.restore();
  ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.2;ctx.shadowBlur=0;
  [[c1,CT+2,c1,NET-2],[c2,CT+2,c2,NET-2],[CL+2,CT+RIVAL_H/3,CR-2,CT+RIVAL_H/3],
   [c1,NET+2,c1,CB-2],[c2,NET+2,c2,CB-2],[CL+2,NET+OWN_H*2/3,CR-2,NET+OWN_H*2/3]
  ].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.restore();
  // Postes
  [[CL-12],[CR+3]].forEach(([px])=>{
    const pg=ctx.createLinearGradient(px,0,px+10,0);
    pg.addColorStop(0,'#0a0a0a');pg.addColorStop(0.25,'#3a3a3a');pg.addColorStop(0.5,'#606060');pg.addColorStop(0.75,'#2a2a2a');pg.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(px,NET-44,10,88,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(px+2,NET-40,3,80,2);ctx.fill();
    const hg=ctx.createRadialGradient(px+5,NET-44,1,px+5,NET-44,7);
    hg.addColorStop(0,'#888');hg.addColorStop(1,'#333');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(px+5,NET-44,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc1515';ctx.fillRect(px+3,NET-70,4,14);
    ctx.fillStyle='#fff';ctx.fillRect(px+3,NET-56,4,8);
  });
}

function canchaDrawWood(ctx,x,y,w,h,brighter){
  const base=brighter?'#e8a95a':'#dfa04e';
  const light=brighter?'#f0b868':'#e8ac5c';
  const dark=brighter?'#d0944a':'#c88040';
  const bg=ctx.createLinearGradient(x,y,x+w,y+h);
  bg.addColorStop(0,dark);bg.addColorStop(0.25,light);bg.addColorStop(0.5,base);bg.addColorStop(0.75,light);bg.addColorStop(1,dark);
  ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);
  ctx.save();
  ctx.globalAlpha=0.1;ctx.strokeStyle='#7a4a10';ctx.lineWidth=0.8;
  for(let iy=y+7;iy<y+h;iy+=7){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.globalAlpha=0.17;ctx.lineWidth=1.5;
  for(let iy=y+14;iy<y+h;iy+=28){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.globalAlpha=0.04;ctx.strokeStyle='#5a3010';ctx.lineWidth=4;
  for(let ix=x-h;ix<x+w+h;ix+=20){ctx.beginPath();ctx.moveTo(ix,y);ctx.lineTo(ix+h*0.2,y+h);ctx.stroke();}
  const shine=ctx.createLinearGradient(x,y,x,y+h);
  shine.addColorStop(0,'transparent');shine.addColorStop(0.4,'rgba(255,255,255,.06)');
  shine.addColorStop(0.55,'rgba(255,255,255,.1)');shine.addColorStop(1,'transparent');
  ctx.globalAlpha=1;ctx.fillStyle=shine;ctx.fillRect(x,y,w,h);
  ctx.restore();
}

function canchaDrawAttack(ctx,cod,destinos,pct){
  const cat=DV4_CAT_MAP[cod]||'C';
  const origZone=DV4_ORIG_MAP[cod]||3;
  const arrowCol=CC_CAT_COLOR[cat];
  const orig=canchaRivalZone(origZone);
  pct=pct===undefined?1:pct;

  destinos.forEach((d,i)=>{
    const col=CC_CONE_COLS[i];
    const dest=canchaOwnZone(d.z);
    const baseW=i===0?64:48;
    const ex=orig.x+(dest.x-orig.x)*pct;
    const ey=orig.y+(dest.y-orig.y)*pct;
    const vx=dest.x-orig.x,vy=dest.y-orig.y;
    const len=Math.sqrt(vx*vx+vy*vy);
    const px=-vy/len,py=vx/len;
    const bw=baseW*pct;
    const b1x=ex+px*bw/2,b1y=ey+py*bw/2;
    const b2x=ex-px*bw/2,b2y=ey-py*bw/2;
    const cg=ctx.createLinearGradient(orig.x,orig.y,dest.x,dest.y);
    cg.addColorStop(0,col+'08');cg.addColorStop(0.4,col+'55');cg.addColorStop(1,col+'bb');
    ctx.save();
    ctx.beginPath();ctx.moveTo(orig.x,orig.y);ctx.lineTo(b1x,b1y);ctx.lineTo(b2x,b2y);ctx.closePath();
    ctx.fillStyle=cg;ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=i===0?2.5:1.8;ctx.globalAlpha=0.88;ctx.stroke();
    ctx.restore();
    if(pct>=0.88){
      const r=bw*0.38;
      ctx.save();
      ctx.beginPath();ctx.arc(dest.x,dest.y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.globalAlpha=0.14;ctx.fill();
      ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=2.5;
      ctx.shadowColor=col;ctx.shadowBlur=16;ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font="bold 15px 'Barlow Condensed',Arial";
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=6;
      ctx.fillText(d.pct+'%',dest.x,dest.y);
      ctx.restore();
    }
  });
  // Origen
  ctx.save();
  ctx.beginPath();ctx.arc(orig.x,orig.y,18,0,Math.PI*2);
  ctx.fillStyle=arrowCol;ctx.globalAlpha=0.18;ctx.fill();
  ctx.globalAlpha=1;ctx.strokeStyle=arrowCol;ctx.lineWidth=2.5;
  ctx.shadowColor=arrowCol;ctx.shadowBlur=16;ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle=arrowCol;ctx.fillStyle=arrowCol;ctx.lineWidth=3;
  ctx.shadowColor=arrowCol;ctx.shadowBlur=10;
  const ay1=orig.y+19,ay2=orig.y+35;
  ctx.beginPath();ctx.moveTo(orig.x,ay1);ctx.lineTo(orig.x,ay2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(orig.x-8,ay2-7);ctx.lineTo(orig.x,ay2+6);ctx.lineTo(orig.x+8,ay2-7);
  ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.font="bold 13px 'Barlow Condensed',Arial";
  ctx.fillStyle=arrowCol;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=5;
  ctx.fillText(cod,orig.x,orig.y);
  ctx.restore();
}

function statPill(label,value,color,title){
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;
    min-width:52px;flex:1;padding:7px 6px;background:rgba(255,255,255,.04);
    border-radius:7px;border:1px solid rgba(255,255,255,.07)" title="${title}">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;
      line-height:1;color:${color}">${value}</div>
    <div style="font-size:9px;color:#64748b;letter-spacing:1px;text-transform:uppercase">${label}</div>
  </div>`;
}

function dv4ClickCancha(el){
  const cod=el.dataset.dv4cod;
  const dests=JSON.parse(decodeURIComponent(el.dataset.dv4dests||'[]'));
  const stats=el.dataset.dv4stats?JSON.parse(decodeURIComponent(el.dataset.dv4stats)):{};
  if(cod) openCanchaModal(cod,dests,'',stats);
}

function openCanchaModal(cod, destinos, playerName, stats){
  document.getElementById('cancha-modal').classList.add('open');
  document.body.style.overflow='hidden';
  const cat=DV4_CAT_MAP[cod]||'C';
  const catNom={C:'Central',V:'Alta',X:'Rápida'}[cat];
  const origZ=DV4_ORIG_MAP[cod]||0;
  const arrowCol=CC_CAT_COLOR[cat]||'#ff8c00';
  document.getElementById('cancha-modal-title').textContent=cod+' — '+catNom;
  document.getElementById('cancha-modal-info').textContent=
    (playerName?playerName+' · ':'')+
    (origZ?'Origen zona '+origZ+' · ':'')+
    (destinos.length?'Top destinos: '+destinos.map(d=>'zona '+d.z+' ('+d.pct+'%)').join(' · '):'Sin datos de dirección');
  // Bloque de stats de la combinación
  const statsWrap=document.getElementById('cancha-stats-wrap');
  if(statsWrap && stats && stats.tot>0){
    const tot=stats.tot||0, pt=stats.pt||0, err=stats.err||0, vend=stats.vend||0;
    const pctPt=tot>0?Math.round(pt/tot*100):0;
    const eff=tot>0?Math.round((pt-vend-err)/tot*100):null;
    const effColor=eff===null?'#64748b':eff>=50?'#22c55e':eff>=25?'#fbbf24':eff>=0?'#f97316':'#ef4444';
    statsWrap.style.display='flex';
    statsWrap.innerHTML=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
        background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
        border-radius:10px;padding:10px 12px;width:100%;max-width:420px;display:flex;gap:8px">
        ${statPill('EFF',eff!==null?eff+'%':'--',effColor,'Eficiencia')}
        ${statPill('TOT',tot,arrowCol,'Total ataques')}
        ${statPill('#',pt,'#22c55e','Puntos')}
        ${statPill('#%',pctPt+'%','#22c55e','% Puntos')}
        ${statPill('/',vend,'#f97316','Vendidas')}
        ${statPill('=',err,'#ef4444','Errores')}
      </div>`;
  } else if(statsWrap){
    statsWrap.style.display='none';
  }
  const canvas=document.getElementById('cancha-canvas');
  const ctx=canvas.getContext('2d');
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  canchaAnimStart=null;
  function step(ts){
    if(!canchaAnimStart)canchaAnimStart=ts;
    const raw=Math.min((ts-canchaAnimStart)/520,1);
    const eased=1-Math.pow(1-raw,3);
    canchaDrawCourt(ctx);
    canchaDrawAttack(ctx,cod,destinos,eased);
    if(raw<1)canchaAnimFrame=requestAnimationFrame(step);
  }
  canchaAnimFrame=requestAnimationFrame(step);
}

function closeCanchaModal(){
  document.getElementById('cancha-modal').classList.remove('open');
  document.body.style.overflow='';
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  const sw=document.getElementById('cancha-stats-wrap');
  if(sw)sw.style.display='none';
}

function openSaqueCanchaModal(destinos,origZone,stats){
  document.getElementById('cancha-modal').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('cancha-modal-title').textContent='Dirección de Saque';
  let info=(origZone?'Origen zona '+origZone+' \u00b7 ':'');
  info+='Top destinos: '+destinos.map(d=>'zona '+d.z+' ('+d.pct+'%)').join(' \u00b7 ');
  document.getElementById('cancha-modal-info').textContent=info;
  const sw=document.getElementById('cancha-stats-wrap');
  const SC='#f59e0b';
  if(sw&&stats&&stats.tot>0){
    const eff=Math.round((stats.pt-(stats.vend||0)-stats.err)/stats.tot*100);
    const effColor=eff>=40?'#22c55e':eff>=20?'#fbbf24':eff>=0?'#f97316':'#ef4444';
    sw.style.display='flex'; sw.style.justifyContent='center';
    sw.innerHTML='<div style="display:flex;gap:8px;flex-wrap:nowrap;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;width:100%;max-width:420px">'
      +statPill('EFF',eff+'%',effColor,'Eficiencia')
      +statPill('TOT',stats.tot,SC,'Total saques')
      +statPill('#',stats.pt,'#22c55e','Puntos')
      +statPill('#%',(stats.pct||0)+'%','#22c55e','% Puntos')
      +statPill('/',stats.vend||0,'#f97316','Vendidas')
      +statPill('=',stats.err,'#ef4444','Errores')
      +'</div>';
  } else if(sw){ sw.style.display='none'; }
  const canvas=document.getElementById('cancha-canvas');
  const ctx=canvas.getContext('2d');
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  canchaAnimStart=null;
  function step(ts){
    if(!canchaAnimStart)canchaAnimStart=ts;
    const raw=Math.min((ts-canchaAnimStart)/520,1);
    const eased=1-Math.pow(1-raw,3);
    canchaDrawCourt(ctx);
    canchaDrawSaque(ctx,origZone,destinos,eased);
    if(raw<1)canchaAnimFrame=requestAnimationFrame(step);
  }
  canchaAnimFrame=requestAnimationFrame(step);
}

function canchaDrawSaque(ctx,origZone,destinos,pct){
  const SC='#f59e0b';
  const CONE_COLS=['#ff8c00','#a855f7'];
  pct=pct===undefined?1:pct;
  const orig=origZone>0?canchaRivalZone(origZone):canchaRivalZone(1);
  destinos.forEach(function(d,i){
    const col=CONE_COLS[i];
    const dest=canchaOwnZone(d.z);
    const baseW=i===0?64:48;
    const ex=orig.x+(dest.x-orig.x)*pct;
    const ey=orig.y+(dest.y-orig.y)*pct;
    const vx=dest.x-orig.x, vy=dest.y-orig.y;
    const len=Math.sqrt(vx*vx+vy*vy);
    const px=-vy/len, py=vx/len;
    const bw=baseW*pct;
    const b1x=ex+px*bw/2, b1y=ey+py*bw/2;
    const b2x=ex-px*bw/2, b2y=ey-py*bw/2;
    const cg=ctx.createLinearGradient(orig.x,orig.y,dest.x,dest.y);
    cg.addColorStop(0,col+'08'); cg.addColorStop(0.4,col+'55'); cg.addColorStop(1,col+'bb');
    ctx.save();
    ctx.beginPath(); ctx.moveTo(orig.x,orig.y); ctx.lineTo(b1x,b1y); ctx.lineTo(b2x,b2y); ctx.closePath();
    ctx.fillStyle=cg; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=i===0?2.5:1.8; ctx.globalAlpha=0.88; ctx.stroke();
    ctx.restore();
    if(pct>=0.88){
      const r=bw*0.38;
      ctx.save();
      ctx.beginPath(); ctx.arc(dest.x,dest.y,r,0,Math.PI*2);
      ctx.fillStyle=col; ctx.globalAlpha=0.14; ctx.fill();
      ctx.globalAlpha=1; ctx.strokeStyle=col; ctx.lineWidth=2.5;
      ctx.shadowColor=col; ctx.shadowBlur=16; ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font="bold 15px 'Barlow Condensed',Arial";
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=6;
      ctx.fillText(d.pct+'%',dest.x,dest.y);
      ctx.restore();
    }
  });
  ctx.save();
  ctx.beginPath(); ctx.arc(orig.x,orig.y,18,0,Math.PI*2);
  ctx.fillStyle=SC; ctx.globalAlpha=0.18; ctx.fill();
  ctx.globalAlpha=1; ctx.strokeStyle=SC; ctx.lineWidth=2.5;
  ctx.shadowColor=SC; ctx.shadowBlur=16; ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle=SC; ctx.fillStyle=SC; ctx.lineWidth=3; ctx.shadowColor=SC; ctx.shadowBlur=10;
  const ay1=orig.y+19, ay2=orig.y+35;
  ctx.beginPath(); ctx.moveTo(orig.x,ay1); ctx.lineTo(orig.x,ay2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(orig.x-8,ay2-7); ctx.lineTo(orig.x,ay2+6); ctx.lineTo(orig.x+8,ay2-7);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.font="bold 11px 'Barlow Condensed',Arial";
  ctx.fillStyle=SC; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=5;
  ctx.fillText('Z'+(origZone||'?'),orig.x,orig.y);
  ctx.restore();
}

function step(ts){
    if(!canchaAnimStart)canchaAnimStart=ts;
    const raw=Math.min((ts-canchaAnimStart)/520,1);
    const eased=1-Math.pow(1-raw,3);
    canchaDrawCourt(ctx);
    canchaDrawSaque(ctx,origZone,destinos,eased);
    if(raw<1)canchaAnimFrame=requestAnimationFrame(step);
  }
