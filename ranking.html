<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking — CASLA Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="datos_casla.js" onerror="void 0"></script>
<script src="datos_partidos.js" onerror="void 0"></script>
<script src="datos_historial.js" onerror="void 0"></script>
<script src="objetivos_config.js" onerror="void 0"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080F;--card:#0D0E1A;--b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);
  --red:#E8192C;--txt:#E2E8F0;--mut:#64748B;}
html,body{background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;min-height:100vh}
.hdr{background:rgba(7,8,15,.97);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;gap:12px;padding:10px 20px}
.back-btn{padding:5px 14px;border-radius:8px;border:1px solid var(--b2);background:rgba(255,255,255,.04);color:var(--mut);font-size:10px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase}
.main{max-width:1000px;margin:0 auto;padding:20px 16px}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.fbtn{padding:3px 12px;border-radius:20px;border:1px solid var(--b);background:transparent;color:var(--mut);font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;transition:all .15s}
.fbtn.on{background:rgba(232,25,44,.1);border-color:rgba(232,25,44,.35);color:#e8192c}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:14px 16px}
.ctitle{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:4px 6px;border-radius:6px}
.row.me{background:rgba(232,25,44,.06)}
.medal{width:22px;text-align:center;font-size:13px;flex-shrink:0}
.info{flex:1;min-width:0}
.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.nm{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.val{font-family:'Bebas Neue',sans-serif;font-size:22px;flex-shrink:0;margin-left:6px}
.bar-bg{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px}
.sub{font-size:9px;color:var(--mut);margin-top:3px}
.ver-mas{width:100%;margin-top:8px;padding:5px;border-radius:6px;border:1px solid var(--b);background:transparent;color:var(--mut);font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;transition:all .15s}
.ver-mas:hover{color:var(--txt);border-color:var(--b2)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <a id="back-link" href="dashboard.html" class="back-btn">← Dashboard</a>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px">🏆 RANKING</div>
  </div>
</div>
<div class="main">
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid">
    <div style="grid-column:span 3;text-align:center;padding:60px;color:var(--mut);font-size:11px;letter-spacing:2px">Cargando...</div>
  </div>
</div>

<script>
var CUR_NUM = 0;
var CUR_POS = null;
var EXPANDED = {};
var PC = {ARMADOR:'#F59E0B',OPUESTO:'#F97316',PUNTA:'#22C55E',CENTRAL:'#F97316',LIBERO:'#06B6D4'};
var SK = [
  {k:'sq',    l:'Saque',        i:'⚡', c:'#F59E0B', o:3,  cods:['SM','SQ'],          src:'saques'},
  {k:'rec',   l:'Recepción',    i:'🛡', c:'#22C55E', o:36, cods:[],                   src:'rec'},
  {k:'bqpos', l:'Blq #+',       i:'🧱', c:'#06B6D4', o:43, cods:[],                   src:'blq'},
  {k:'atqq',  l:'Atq Central',  i:'💥', c:'#F97316', o:48, cods:['X1','X7'],          src:'ataques'},
  {k:'atqhb', l:'Atq Alta',     i:'💥', c:'#818CF8', o:20, cods:['X8','V8','X5','V5'],src:'ataques'},
  {k:'atqx',  l:'Atq Rápida',   i:'💥', c:'#EC4899', o:42, cods:['XM','X2'],          src:'ataques'},
  {k:'atqtr', l:'Transición',   i:'💥', c:'#F59E0B', o:34, cods:['XP','VP'],          src:'ataques'},
];

function tryInit(n){
  if(typeof CASLA_JUGADORES!=='undefined' && typeof objCalcVals!=='undefined'){ init(); }
  else if(n>0){ setTimeout(function(){ tryInit(n-1); }, 300); }
  else { document.getElementById('grid').innerHTML='<div style="grid-column:span 3;text-align:center;padding:40px;color:#ef4444">Error: verificar objetivos_config.js y datos_partidos.js en GitHub.</div>'; }
}
document.fonts.ready.then(function(){ tryInit(30); }).catch(function(){ tryInit(30); });

function init(){
  var p = new URLSearchParams(window.location.search);
  CUR_NUM = parseInt(p.get('num')) || 0;
  if(CUR_NUM) document.getElementById('back-link').href = 'jugador.html?num=' + CUR_NUM;
  buildFilters();
  render();
}

function getActionCount(pjug, sk){
  // Returns {tot, pos} - total actions and positive actions
  if(!pjug) return null;
  if(sk.src==='saques'){
    var tot=0, pos=0;
    (pjug.saques||[]).forEach(function(s){
      if(sk.cods.indexOf(s.cod)>=0){
        tot += s.tot||0;
        pos += (s.pts||0) + (s.plus||0); // pts directos + positivos
      }
    });
    return tot ? {tot:tot, pos:pos} : null;
  }
  if(sk.src==='ataques'){
    var tot=0, pos=0;
    (pjug.ataques||[]).forEach(function(a){
      if(sk.cods.indexOf(a.cod)>=0){
        tot += a.tot||0;
        pos += a.pts||0; // puntos directos
      }
    });
    return tot ? {tot:tot, pos:pos} : null;
  }
  if(sk.src==='rec'){
    var rec=pjug.recepcion||{}, tot=0, pos=0;
    ['flotado','potencia'].forEach(function(tp){
      var r=rec[tp]||{};
      ['desde_z1','desde_z6','desde_z5'].forEach(function(z){
        if(r[z]&&r[z].total){
          tot += r[z].total.tot||0;
          pos += (r[z].total.eff||0) + (r[z].total.pos||0); // # y +
        }
      });
    });
    return tot ? {tot:tot, pos:pos} : null;
  }
  if(sk.src==='blq'){
    var D=window.HISTORIAL_DATA; if(!D) return null;
    var tot=0, pos=0;
    D.entrenamientos.filter(function(e){return e.tipo==='P';}).forEach(function(s){
      var jh=(s.jugadores||[]).find(function(x){return x.c===pjug.num;});
      if(jh){ tot+=jh.bT||0; pos+=jh.bPt||0; }
    });
    return tot ? {tot:tot, pos:pos} : null;
  }
  return null;
}

function getData(){
  var casla=typeof CASLA_JUGADORES!=='undefined'?CASLA_JUGADORES:[];
  var pjugs=typeof PARTIDOS_JUGADORES!=='undefined'?PARTIDOS_JUGADORES:[];
  return casla.filter(function(j){return j.num;}).map(function(j){
    var v=objCalcVals(j.nombre)||{};
    var pjug=pjugs.find(function(p){return p.num===j.num;})||j;
    return {num:j.num,nm:(j.nombre||'').replace(/^\d+\s*/,''),pos:j.pos||'',col:PC[j.pos]||'#64748b',pjug:pjug,
      sq:v.sq!=null?v.sq:null,rec:v.rec!=null?v.rec:null,bqpos:v.bqpos!=null?v.bqpos:null,
      atqq:v.atqq!=null?v.atqq:null,atqhb:v.atqhb!=null?v.atqhb:null,atqx:v.atqx!=null?v.atqx:null,atqtr:v.atqtr!=null?v.atqtr:null};
  });
}

function buildFilters(){
  var all=getData(); var positions=[];
  all.forEach(function(j){ if(j.pos&&positions.indexOf(j.pos)<0) positions.push(j.pos); });
  positions.sort();
  var fEl=document.getElementById('filters'); fEl.innerHTML='';
  function mkBtn(label,pos){
    var b=document.createElement('button');
    b.className='fbtn'+(CUR_POS===pos?' on':'');
    b.textContent=label;
    if(pos&&PC[pos]&&CUR_POS===pos) b.style.cssText='color:'+PC[pos]+';border-color:'+PC[pos]+'55;background:'+PC[pos]+'18';
    b.onclick=function(){
      CUR_POS=pos; EXPANDED={};
      document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('on');x.style.cssText='';});
      b.classList.add('on');
      if(pos&&PC[pos]) b.style.cssText='color:'+PC[pos]+';border-color:'+PC[pos]+'55;background:'+PC[pos]+'18';
      render();
    };
    return b;
  }
  fEl.appendChild(mkBtn('Todos',null));
  positions.forEach(function(pos){ fEl.appendChild(mkBtn(pos,pos)); });
}

function makeRow(j, i, sk, maxV){
  var v=j[sk.k];
  var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
  var barW=Math.max(3,Math.abs(v)/maxV*100);
  var isCur=CUR_NUM&&j.num===CUR_NUM;
  var valC=v>=sk.o?'#22c55e':v>=(sk.o-8)?'#fbbf24':'#ef4444';
  var acc=getActionCount(j.pjug,sk);
  var subTxt=(acc!==null?acc+' acc · ':'')+'obj '+sk.o+'%';

  var row=document.createElement('div');
  row.className='row'+(isCur?' me':'');
  var med=document.createElement('div'); med.className='medal';
  med.innerHTML=medal||'<span style="font-size:10px;color:#475569">'+(i+1)+'</span>';
  var info=document.createElement('div'); info.className='info';
  info.innerHTML='<div class="top"><span class="nm" style="color:'+(isCur?'#e8192c':j.col)+'">'+j.nm+(isCur?' ←':'')+'</span><span class="val" style="color:'+valC+'">'+v+'%</span></div>'
    +'<div class="bar-bg"><div class="bar" style="width:'+barW+'%;background:'+sk.c+'"></div></div>'
    +'<div class="sub">'+subTxt+'</div>';
  row.appendChild(med); row.appendChild(info);
  return row;
}

function render(){
  var all=getData();
  var data=CUR_POS?all.filter(function(j){return j.pos===CUR_POS;}):all;
  var grid=document.getElementById('grid'); grid.innerHTML='';

  SK.forEach(function(sk){
    var sorted=data.filter(function(j){return j[sk.k]!==null;}).sort(function(a,b){return b[sk.k]-a[sk.k];});
    if(!sorted.length) return;
    var maxV=Math.max(Math.abs(sorted[0][sk.k]),1);
    var card=document.createElement('div'); card.className='card';
    var title=document.createElement('div'); title.className='ctitle';
    title.style.color=sk.c; title.textContent=sk.i+' '+sk.l.toUpperCase();
    card.appendChild(title);

    var isExp=EXPANDED[sk.k];
    var show=isExp?sorted:sorted.slice(0,3);
    show.forEach(function(j,i){ card.appendChild(makeRow(j,sorted.indexOf(j),sk,maxV)); });

    if(sorted.length>3){
      var btn=document.createElement('button');
      btn.className='ver-mas';
      btn.textContent=isExp?'▲ Ver menos':'▼ Ver todos ('+sorted.length+')';
      btn.onclick=function(){
        EXPANDED[sk.k]=!EXPANDED[sk.k];
        render();
      };
      card.appendChild(btn);
    }
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
