<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recepción — CASLA Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);
  --amber:#f59e0b;--indigo:#818cf8;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;
}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 0% 0%,rgba(129,140,248,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(245,158,11,.06) 0%,transparent 50%);
  font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;
}
.page-header{
  padding:20px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.015);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.page-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;
  background:linear-gradient(120deg,#f59e0b,#fff 50%,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rival-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--amber);}
.match-info{font-size:10px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:4px 10px;
  background:rgba(245,158,11,.05);margin-top:3px;display:inline-block;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.nav-dot.on{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5);}
.main{max-width:1600px;margin:0 auto;padding:24px 32px;}

/* Jugador */
.jugador-section{margin-bottom:2px;border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:all .3s;}
.jugador-section:hover{border-color:rgba(255,255,255,.1);}
.jugador-header{
  display:grid;grid-template-columns:260px 1fr;
  background:var(--card);cursor:pointer;transition:background .2s;min-height:130px;
}
.jugador-header:hover{background:var(--card2);}
.jugador-identity{
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  border-right:1px solid var(--border);position:relative;overflow:hidden;
}
.jug-color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.jug-num-bg{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  opacity:.08;position:absolute;right:8px;bottom:-6px;letter-spacing:-2px;
}
.jug-foto{
  width:60px;height:60px;border-radius:50%;border:2px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  flex-shrink:0;position:relative;z-index:1;
  background:rgba(255,255,255,.04);
}
.jug-info{position:relative;z-index:1;}
.jug-num-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;opacity:.7;margin-bottom:1px;}
.jug-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.jug-pos{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.jugador-tactico{
  padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;align-content:start;
}
.tac-item{display:flex;align-items:flex-start;gap:7px;}
.tac-icon{
  width:16px;height:16px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;margin-top:2px;
}
.tac-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.tac-val{font-size:11px;font-weight:700;letter-spacing:.3px;line-height:1.3;}
.jug-footer{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;margin-top:4px;border-top:1px solid var(--border);
}
.tab-row{display:flex;gap:4px;}
.tab-btn{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);color:var(--mut);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.tab-btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0;}
.tab-btn.active-ataque{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:#818cf8;}
.tab-btn.active-saque{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#f59e0b;}
.toggle-arrow{color:var(--mut);font-size:11px;transition:transform .3s;}
.jugador-section.open .toggle-arrow{transform:rotate(180deg);}

/* Canchitas */
.canchitas-wrap{
  display:none;background:linear-gradient(180deg,var(--card2) 0%,rgba(7,8,15,.8) 100%);
  padding:16px 20px 20px;border-top:1px solid var(--border);
}
.jugador-section.open .canchitas-wrap{display:block;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.canchitas-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;
}
.canchita-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer;
}
.canchita-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.canchita-hdr{
  padding:7px 11px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.canchita-cod{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;}
.canchita-tipo{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.canchita-canvas-wrap{padding:6px;display:flex;justify-content:center;}
.canchita-stats{
  padding:7px 10px;display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;border-top:1px solid var(--border);
}
.cs-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.cs-val{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;}
.cs-lbl{font-size:7px;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;}
.no-data-msg{
  padding:28px;text-align:center;color:var(--mut);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  grid-column:1/-1;
}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px;max-width:480px;width:92%;
  box-shadow:0 32px 80px rgba(0,0,0,.8);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;}
.modal-close{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:var(--mut);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
}
.modal-stats-row{display:flex;gap:8px;margin-top:10px;}
.modal-stat{
  flex:1;padding:8px 6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.modal-stat-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.modal-info{font-size:10px;color:var(--mut);letter-spacing:.5px;text-align:center;margin-bottom:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.lg-dot{width:16px;height:3px;border-radius:2px;}

canvas { image-rendering: -webkit-optimize-contrast; }

/* ── MOBILE ─────────────────────────────────────────── */
@media (max-width: 768px) {

  .page-header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .page-title { font-size:18px; letter-spacing:3px; }
  .rival-name { font-size:15px; }
  .nav-dots { display:none; }

  .main { padding:12px 10px; }

  .jugador-header { grid-template-columns:1fr; min-height:unset; }
  .jugador-identity { border-right:none; border-bottom:1px solid var(--border); padding:12px 14px; }
  .jug-num-bg { font-size:40px; }
  .jug-foto { width:48px; height:48px; font-size:16px; }
  .jug-nombre { font-size:17px; }

  .jugador-tactico { grid-template-columns:1fr; padding:10px 14px; gap:6px; }

  .canchitas-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .canchitas-wrap { padding:10px 10px 14px; }

  .modal-box { width:96%; padding:16px; border-radius:12px; max-height:90vh; overflow-y:auto; }

  .tab-btn { padding:5px 10px; font-size:10px; }
}

@media (max-width: 400px) {
  .canchitas-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .page-title { font-size:15px; }
}


/* ── DROPDOWNS — texto siempre negro ── */
select, select option {
  color: #111111 !important;
  background-color: #ffffff !important;
}

.pdf-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid rgba(232,25,44,.4);
  background: rgba(232,25,44,.08);
  color: #e8192c;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.pdf-btn:hover { background: rgba(232,25,44,.18); border-color: rgba(232,25,44,.7); }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #07080f !important; color: #e2e8f0 !important; }
  .page-header { position: relative !important; }
  .back-btn, .pdf-btn, .lang-switcher, #lang-switcher, #nav-dots,
  [style*="position:fixed"], .modal-overlay { display: none !important; }
  .jugador-section { page-break-inside: avoid !important; }
  .jugador-section .canchitas-wrap { display: block !important; }
  .section-title { page-break-after: avoid !important; }
  canvas { display: block !important; }
  @page { margin: 1cm; size: A4 portrait; }
}

</style>

<div class="hdr">
  <a href="dashboard.html" class="back-btn">← Dashboard</a>
  <div class="hdr-title">RECEPCIÓN <span>CASLA</span></div>
  <div style="display:flex;gap:6px;margin-left:8px">
    <button id="rec-tbtn-p" onclick="setRecTipo('partido',this)" style="padding:5px 12px;border-radius:8px;border:1px solid rgba(232,25,44,.4);background:rgba(232,25,44,.12);color:#e8192c;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase">🏆 PARTIDO</button>
    <button id="rec-tbtn-e" onclick="setRecTipo('entrenamiento',this)" style="padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#475569;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase">🏋️ ENT</button>
  </div>
  <div class="jbtns" id="jbtns"></div>
  <div id="rec-subfiltro" style="display:none;gap:4px;flex-wrap:wrap;padding:6px 20px;border-top:1px solid rgba(255,255,255,.05)"></div>
</div>

<script>
// ================================================================
// CASLA VOLEY — Datos de recepción
// Estructura: jugador → tipo_saque → desde_zona → posicion_receptor
// Cargado por: recepcion.html, jugador.html
// ================================================================

// Datos cargados dinámicamente desde datos_casla.js
window.RECEPCION_DATA = {};

function cargarRecepcionCasla(){
  if(typeof CASLA_JUGADORES === 'undefined') return;
  CASLA_JUGADORES.forEach(function(j){
    if(!j.recepcion || !j.recepcion.flotado) return;
    var apellido = j.nombre.replace(/^\d+\s*/,'').split(' ')[0].toUpperCase();
    var rec = j.recepcion;
    // Convertir estructura desde_z1/z6/z5 → desde_z1/z6/z5 con p1/p6/p5
    function convZona(zd){
      if(!zd) return {p5:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p1:{tot:0,eff:0,pos:0,neg:0}};
      return {p1:zd.p1||{tot:0,eff:0,pos:0,neg:0}, p6:zd.p6||{tot:0,eff:0,pos:0,neg:0}, p5:zd.p5||{tot:0,eff:0,pos:0,neg:0}};
    }
    window.RECEPCION_DATA[apellido] = {
      flotado: {
        desde_z1: convZona(rec.flotado && rec.flotado.desde_z1),
        desde_z6: convZona(rec.flotado && rec.flotado.desde_z6),
        desde_z5: convZona(rec.flotado && rec.flotado.desde_z5),
      },
      potencia: {
        desde_z1: convZona(rec.potencia && rec.potencia.desde_z1),
        desde_z6: convZona(rec.potencia && rec.potencia.desde_z6),
        desde_z5: convZona(rec.potencia && rec.potencia.desde_z5),
      }
    };
  });
}




function calcEquipoData(){
  // Suma todos los jugadores para vista EQUIPO
  var eq = {
    flotado: { desde_z1:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}},
               desde_z6:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}},
               desde_z5:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}} },
    potencia: { desde_z1:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}},
                desde_z6:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}},
                desde_z5:{p1:{tot:0,eff:0,pos:0,neg:0},p6:{tot:0,eff:0,pos:0,neg:0},p5:{tot:0,eff:0,pos:0,neg:0}} }
  };
  Object.values(window.RECEPCION_DATA).forEach(function(jug){
    ['flotado','potencia'].forEach(function(tipo){
      ['desde_z1','desde_z6','desde_z5'].forEach(function(zona){
        ['p1','p6','p5'].forEach(function(pos){
          var src = jug[tipo] && jug[tipo][zona] && jug[tipo][zona][pos];
          var dst = eq[tipo][zona][pos];
          if(!src || !src.tot) return;
          // Weighted average for eff/pos/neg
          var newTot = dst.tot + src.tot;
          dst.eff = newTot > 0 ? Math.round((dst.eff*dst.tot + src.eff*src.tot) / newTot) : 0;
          dst.pos = newTot > 0 ? Math.round((dst.pos*dst.tot + src.pos*src.tot) / newTot) : 0;
          dst.neg = newTot > 0 ? Math.round((dst.neg*dst.tot + src.neg*src.tot) / newTot) : 0;
          dst.tot = newTot;
        });
      });
    });
  });
  return eq;
}

var currentRecTipo = 'partido';

var currentRecPartido = 'acumulado';

function setRecTipo(tipo, btn){
  currentRecTipo = tipo;
  currentRecPartido = 'acumulado';
  document.querySelectorAll('[id^="rec-tbtn"]').forEach(function(b){
    b.style.background = 'rgba(255,255,255,.04)';
    b.style.borderColor = 'rgba(255,255,255,.08)';
    b.style.color = '#475569';
  });
  if(tipo==='partido'){
    btn.style.background='rgba(232,25,44,.12)'; btn.style.borderColor='rgba(232,25,44,.4)'; btn.style.color='#e8192c';
  } else {
    btn.style.background='rgba(34,197,94,.12)'; btn.style.borderColor='rgba(34,197,94,.4)'; btn.style.color='#22c55e';
  }
  buildRecSubfiltro();
  initReceptores();
  render();
}

function buildRecSubfiltro(){
  var row = document.getElementById('rec-subfiltro');
  if(!row) return;
  row.innerHTML = '';
  var meta = currentRecTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_META!=='undefined' ? ENTRENAMIENTOS_META : [])
    : (typeof PARTIDOS_META!=='undefined' ? PARTIDOS_META : []);
  if(!meta.length){ row.style.display='none'; return; }
  row.style.display = 'flex';
  // Acumulado button
  var ba = document.createElement('button');
  ba.style.cssText = 'padding:3px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#e8192c;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:Barlow Condensed,sans-serif;text-transform:uppercase';
  ba.textContent = 'Acumulado';
  ba.onclick = function(){ currentRecPartido='acumulado'; initReceptores(); render(); };
  row.appendChild(ba);
  meta.forEach(function(m){
    var btn2 = document.createElement('button');
    btn2.style.cssText = 'padding:3px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#64748b;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:Barlow Condensed,sans-serif;text-transform:uppercase';
    btn2.textContent = currentRecTipo==='entrenamiento' ? (m.fecha||m.nombre) : (m.rival||m.nombre);
    btn2.onclick = function(){ currentRecPartido=m.nombre; initReceptores(); };
    row.appendChild(btn2);
  });
}

function cargarRecepcionFromSource(jugadores){
  if(!jugadores) return;
  jugadores.forEach(function(j){
    if(!j.recepcion || !j.recepcion.flotado) return;
    var apellido = j.nombre.replace(/^\d+\s*/,'').split(' ')[0].toUpperCase();
    var rec = j.recepcion;
    // Copy structure from CASLA_JUGADORES format
    if(typeof RECEPCION_DATA !== 'undefined'){
      // Use existing conversion
      var temp_CASLA = window.CASLA_JUGADORES;
      window.CASLA_JUGADORES = [j];
      cargarRecepcionCasla();
      window.CASLA_JUGADORES = temp_CASLA;
    }
  });
}

function getJugadoresForRec(){
  var tipo = typeof currentRecTipo!=='undefined' ? currentRecTipo : 'partido';
  var partido = typeof currentRecPartido!=='undefined' ? currentRecPartido : 'acumulado';
  // Per-session
  if(partido !== 'acumulado'){
    var INDIV = tipo==='entrenamiento'
      ? (typeof ENTRENAMIENTOS_INDIVIDUAL!=='undefined' ? ENTRENAMIENTOS_INDIVIDUAL : null)
      : (typeof PARTIDOS_INDIVIDUAL!=='undefined' ? PARTIDOS_INDIVIDUAL : null);
    if(INDIV){
      var pd = INDIV.find(function(p){ return p.nombre===partido; });
      if(pd && pd.jugadores) return pd.jugadores;
    }
  }
  // Acumulado
  if(tipo==='entrenamiento'){
    return typeof ENTRENAMIENTOS_JUGADORES!=='undefined' ? ENTRENAMIENTOS_JUGADORES : null;
  } else {
    return typeof PARTIDOS_JUGADORES!=='undefined' ? PARTIDOS_JUGADORES :
           typeof CASLA_JUGADORES!=='undefined' ? CASLA_JUGADORES : null;
  }
}

function initReceptores(){
  RECEPCION_DATA = {};
  var src = getJugadoresForRec();
  if(src){
    var origCasla = window.CASLA_JUGADORES;
    window.CASLA_JUGADORES = src;
    cargarRecepcionCasla();
    window.CASLA_JUGADORES = origCasla;
  }
  RECEPTORES = Object.keys(window.RECEPCION_DATA);
  if(RECEPTORES.length === 0){
    RECEPTORES = ['NIELSON','DURDOS','RAMOS','WINER','ACOSTA','ZANOTTI'];
  }
  // Save current CUR before rebuilding
  var prevCUR = typeof CUR !== 'undefined' ? CUR : 'EQUIPO';
  CUR = 'EQUIPO';
  // Build player buttons dynamically
  var jbtns=document.getElementById('jbtns');
  if(jbtns){
    jbtns.innerHTML='';
    // EQUIPO button first
    var bEq=document.createElement('button');
    bEq.className='jbtn on';
    bEq.textContent='EQUIPO';
    bEq.style.cssText='border-color:rgba(232,25,44,.5);background:rgba(232,25,44,.12);color:#e8192c';
    bEq.onclick=function(){
      document.querySelectorAll('.jbtn').forEach(function(x){
        x.classList.remove('on');
        x.style.cssText='';
      });
      bEq.classList.add('on');
      bEq.style.cssText='border-color:rgba(232,25,44,.5);background:rgba(232,25,44,.12);color:#e8192c';
      CUR='EQUIPO'; render();
    };
    jbtns.appendChild(bEq);
    // Individual players
    RECEPTORES.forEach(function(p){
      var b=document.createElement('button');
      b.className='jbtn';
      b.textContent=p;
      b.onclick=function(){
        document.querySelectorAll('.jbtn').forEach(function(x){
          x.classList.remove('on');
          x.style.cssText='';
        });
        b.classList.add('on'); CUR=p; render();
      };
      jbtns.appendChild(b);
    });
  }
}

function ec(v){return v>=25?'#22c55e':v>=5?'#86efac':v>=0?'#94a3b8':v>=-15?'#f97316':'#ef4444';}
function bgc(v){return v>=25?'rgba(34,197,94,.13)':v>=5?'rgba(134,239,172,.08)':v>=0?'rgba(148,163,184,.05)':v>=-15?'rgba(249,115,22,.15)':'rgba(239,68,68,.18)';}
function bdc(v){return v>=25?'rgba(34,197,94,.35)':v>=5?'rgba(134,239,172,.2)':v>=0?'rgba(148,163,184,.12)':v>=-15?'rgba(249,115,22,.35)':'rgba(239,68,68,.35)';}

function calcTot(desde){
  var t=0,we=0,wp=0,wn=0;
  ['p5','p6','p1'].forEach(function(p){var d=desde[p];t+=d.tot;we+=d.eff*d.tot;wp+=d.pos*d.tot;wn+=d.neg*d.tot;});
  return{tot:t,eff:t?Math.round(we/t):0,pos:t?Math.round(wp/t):0,neg:t?Math.round(wn/t):0};
}
function calcTypeTot(td){
  var t=0,we=0,wp=0,wn=0;
  ['desde_z5','desde_z6','desde_z1'].forEach(function(z){
    ['p5','p6','p1'].forEach(function(p){
      var d=td[z][p];t+=d.tot;we+=d.eff*d.tot;wp+=d.pos*d.tot;wn+=d.neg*d.tot;
    });
  });
  return{tot:t,eff:t?Math.round(we/t):0,pos:t?Math.round(wp/t):0,neg:t?Math.round(wn/t):0};
}

function zoneCard(d, label, maxTot, typeColor){
  var vol = maxTot>0 ? Math.round(d.tot/maxTot*100) : 0;
  return '<div class="zone-card" style="background:'+bgc(d.eff)+';border-color:'+bdc(d.eff)+'">'
    +'<div class="zc-lbl" style="color:'+ec(d.eff)+'">'+label+'</div>'
    +'<div class="zc-eff" style="color:'+ec(d.eff)+'">'+d.eff+'%</div>'
    +'<div class="zc-sub">efectividad</div>'
    +'<div class="zc-vol"><div class="zc-vol-fill" style="width:'+vol+'%;background:'+typeColor+'"></div></div>'
    +'<div class="zc-grid">'
    +'<div class="zc-stat"><div class="zc-stat-l">Total</div><div class="zc-stat-v" style="color:#e2e8f0">'+d.tot+'</div></div>'
    +'<div class="zc-stat"><div class="zc-stat-l"># +</div><div class="zc-stat-v" style="color:#22c55e">'+d.pos+'%</div></div>'
    +'<div class="zc-stat"><div class="zc-stat-l">/ =</div><div class="zc-stat-v" style="color:#ef4444">'+d.neg+'%</div></div>'
    +'</div></div>';
}

function makeZonePanel(desdeKey, desdeLabel, td, typeColor, typeLabel){
  var desde = td[desdeKey];
  var maxTot = Math.max(desde.p5.tot, desde.p6.tot, desde.p1.tot, 1);
  var tot = calcTot(desde);

  var el = document.createElement('div');
  el.className = 'panel';

  // Court bg canvas
  var courtH = 230;
  el.innerHTML =
    '<div class="panel-hdr" style="border-bottom-color:'+typeColor+'22">'
    +'<div class="panel-type" style="color:'+typeColor+'">'+desdeLabel+'</div>'
    +'</div>'
    +'<div class="panel-court-bg">'
    +'<canvas class="panel-court" id="court-'+desdeKey+'-'+typeColor.slice(1)+'"></canvas>'
    +'<div class="zone-cards">'
    + zoneCard(desde.p5,'Pos 5',maxTot,typeColor)
    + zoneCard(desde.p6,'Pos 6',maxTot,typeColor)
    + zoneCard(desde.p1,'Pos 1',maxTot,typeColor)
    +'</div></div>'
    +'<div class="t-strip">'
    +'<div class="ts"><div class="ts-v" style="color:#e2e8f0">'+tot.tot+'</div><div class="ts-l">saques</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:'+ec(tot.eff)+'">'+tot.eff+'%</div><div class="ts-l">EFF</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:#22c55e">'+tot.pos+'%</div><div class="ts-l"># +</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:#ef4444">'+tot.neg+'%</div><div class="ts-l">/ =</div></div>'
    +'</div>';

  // Draw court bg after appended
  requestAnimationFrame(function(){
    var c = el.querySelector('canvas.panel-court');
    if(!c) return;
    var dpr=window.devicePixelRatio||1;
    var W=c.parentElement.offsetWidth, H=courtH;
    c.width=W*dpr; c.height=H*dpr;
    c.style.width=W+'px'; c.style.height=H+'px';
    var ctx=c.getContext('2d');
    ctx.scale(dpr,dpr);
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#b87830');g.addColorStop(.5,'#d49040');g.addColorStop(1,'#b87830');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.save();ctx.globalAlpha=.05;ctx.strokeStyle='#3a1800';ctx.lineWidth=1;
    for(var i=0;i<H;i+=5){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
    ctx.restore();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.2;ctx.strokeRect(3,3,W-6,H-6);
    ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.7;
    [W/3,W*2/3].forEach(function(x){ctx.beginPath();ctx.moveTo(x,3);ctx.lineTo(x,H-3);ctx.stroke();});
  });

  return el;
}

function makeAcumPanel(td, typeColor, typeLabel){
  var tot = calcTypeTot(td);
  // Per-zone totals
  var zTots = {};
  ['desde_z5','desde_z6','desde_z1'].forEach(function(z){
    var t=0,we=0,wp=0,wn=0;
    ['p5','p6','p1'].forEach(function(p){var d=td[z][p];t+=d.tot;we+=d.eff*d.tot;wp+=d.pos*d.tot;wn+=d.neg*d.tot;});
    zTots[z]={tot:t,eff:t?Math.round(we/t):0,pos:t?Math.round(wp/t):0,neg:t?Math.round(wn/t):0};
  });
  var maxTot=Math.max(zTots.desde_z5.tot,zTots.desde_z6.tot,zTots.desde_z1.tot,1);

  var el=document.createElement('div');
  el.className='panel';
  el.style.borderColor=typeColor+'44';
  el.innerHTML=
    '<div class="panel-hdr" style="border-bottom-color:'+typeColor+'33">'
    +'<div class="panel-type" style="color:'+typeColor+'">Acumulado total</div>'
    +'</div>'
    +'<div class="zone-cards">'
    +zoneCard(zTots.desde_z5,'Desde Z5',maxTot,typeColor)
    +zoneCard(zTots.desde_z6,'Desde Z6',maxTot,typeColor)
    +zoneCard(zTots.desde_z1,'Desde Z1',maxTot,typeColor)
    +'</div>'
    +'<div class="t-strip" style="border-top-color:'+typeColor+'22">'
    +'<div class="ts"><div class="ts-v" style="color:#e2e8f0">'+tot.tot+'</div><div class="ts-l">saques</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:'+ec(tot.eff)+'">'+tot.eff+'%</div><div class="ts-l">EFF</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:#22c55e">'+tot.pos+'%</div><div class="ts-l"># +</div></div>'
    +'<div class="ts"><div class="ts-v" style="color:#ef4444">'+tot.neg+'%</div><div class="ts-l">/ =</div></div>'
    +'</div>';
  return el;
}

function render(){
  // Always reload RECEPCION_DATA from correct source before rendering
  initReceptores();
  var d = CUR === 'EQUIPO' ? calcEquipoData() : (window.RECEPCION_DATA && window.RECEPCION_DATA[CUR]);
  var cont = document.getElementById('content');
  cont.innerHTML = '';

  if(!d){
    cont.innerHTML='<div style="color:#475569;padding:40px;text-align:center;font-family:Barlow Condensed,sans-serif;letter-spacing:1px">SIN DATOS PARA ESTE JUGADOR</div>';
    return;
  }

  var types=[
    {key:'flotado', label:'Saque flotado',  color:'#818cf8'},
    {key:'potencia',label:'Saque potencia', color:'#f97316'}
  ];
  var zones=[
    {key:'desde_z5',label:'Saque desde Zona 5'},
    {key:'desde_z6',label:'Saque desde Zona 6'},
    {key:'desde_z1',label:'Saque desde Zona 1'}
  ];

  types.forEach(function(t,ti){
    // Section: 3 zone panels
    var hdr=document.createElement('div');
    hdr.className='sec-hdr';
    hdr.innerHTML='<div class="sec-pill" style="background:'+t.color+'18;color:'+t.color+';border:0.5px solid '+t.color+'44">'+t.label+' — por zona de origen</div><div class="sec-line"></div>';
    cont.appendChild(hdr);

    var row=document.createElement('div');
    row.className='zones-row';
    zones.forEach(function(z){
      row.appendChild(makeZonePanel(z.key, z.label, d[t.key], t.color, t.label));
    });
    cont.appendChild(row);

    // Acumulados after first type
    if(ti===0){
      var hdrAcum=document.createElement('div');
      hdrAcum.className='sec-hdr';
      hdrAcum.innerHTML='<div class="sec-pill" style="background:rgba(255,255,255,.04);color:#64748b;border:0.5px solid rgba(255,255,255,.1)">Acumulado total</div><div class="sec-line"></div>';
      cont.appendChild(hdrAcum);

      var rowAcum=document.createElement('div');
      rowAcum.className='acum-row';
      rowAcum.appendChild(makeAcumPanel(d.flotado, '#818cf8','Saque flotado'));
      rowAcum.appendChild(makeAcumPanel(d.potencia,'#f97316','Saque potencia'));
      cont.appendChild(rowAcum);
    }
  });
}

// Selector built in initReceptores()

// Read ?jug= param if coming from jugador.html
var urlParams = new URLSearchParams(window.location.search);
var jugParam  = urlParams.get('jug');
if(jugParam){
  var jugUpper = jugParam.toUpperCase();
  if(RECEPTORES.indexOf(jugUpper) >= 0){
    CUR = jugUpper;
    // Update button
    document.querySelectorAll('.jbtn').forEach(function(b){
      b.classList.toggle('on', b.textContent === jugUpper);
    });
  }
}
document.fonts.ready.then(function(){
    buildRecSubfiltro();
  initReceptores();
  // Read ?jug= param to preselect player
  var params = new URLSearchParams(window.location.search);
  var jugParam = params.get('jug');
  if(jugParam){
    var jugUpper = jugParam.toUpperCase();
    // Try exact match first, then partial
    var found = RECEPTORES.find(function(r){ return r === jugUpper; });
    if(!found) found = RECEPTORES.find(function(r){ return jugUpper.indexOf(r) >= 0 || r.indexOf(jugUpper.split(' ')[0]) >= 0; });
    if(found){
      CUR = found;
      document.querySelectorAll('.jbtn').forEach(function(b){
        b.classList.remove('on');
        b.style.cssText = '';
        if(b.textContent === found) b.classList.add('on');
      });
    }
  }
  setTimeout(render,100);
}).catch(function(){ setTimeout(render,400); });
