<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANALISIS DE DEFENSA — CASLA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080F;--card:#0D0E1A;--card2:#111220;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--red:#E8192C;--amber:#F59E0B;--green:#22C55E;--lime:#84CC16;--orange:#F97316;--indigo:#818CF8;--text:#E2E8F0;--muted:#64748B;--subtle:#475569}
html,body{background:var(--bg);color:var(--text);font-family:"Barlow Condensed",sans-serif;min-height:100vh}
.hdr{background:rgba(7,8,15,.97);border-bottom:1px solid var(--border);padding:11px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px}
.hdr a.back{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;font-weight:800;white-space:nowrap}
.hdr a.back:hover{color:var(--text)}
.hdr-t{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:3px}
.hdr-s{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 48px)}
.sidebar{background:rgba(13,14,26,.8);border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px)}
.content{padding:18px 20px;overflow-y:auto}
.flabel{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:14px}
.flabel:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:"Barlow Condensed",sans-serif;transition:all .12s;text-transform:uppercase}
.chip:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
.chip.on{background:rgba(232,25,44,.12);border-color:rgba(232,25,44,.4);color:var(--red)}
.psel{width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.psel option{background:#0D0E1A}
.vbtn{width:100%;margin-top:8px;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.45);color:var(--orange);padding:9px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;cursor:pointer}
.counter{margin-top:12px;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border);text-align:center}
.counter-n{font-family:"Bebas Neue",sans-serif;font-size:32px;line-height:1}
.counter-l{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.sec{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sec:first-child{margin-top:0}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;text-align:center}
.big{font-family:"Bebas Neue",sans-serif;font-size:36px;line-height:1}
.lbl{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:14px}
.court-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:800;text-align:center;color:#94a3b8}
.legend{display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.nodata{color:var(--muted);font-size:13px;padding:50px 20px;text-align:center}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.acc-group{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;margin-top:6px;overflow:hidden}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none;background:rgba(255,255,255,.02);transition:background .12s;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.acc-header:hover{background:rgba(255,255,255,.05);color:var(--text)}
.acc-header.active{color:var(--text)}
.acc-arrow{font-size:12px;transition:transform .2s;flex-shrink:0}
.acc-header.active .acc-arrow{transform:rotate(90deg)}
.acc-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;display:none;flex-shrink:0}
.acc-header.has-filter .acc-dot{display:inline-block}
.acc-body{display:none;padding:10px 10px 12px;background:rgba(0,0,0,.15)}
.acc-header.active+.acc-body{display:block}
.fsel{width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px}
.fsel:last-child{margin-bottom:0}
.fsel option{background:#0D0E1A}
.reset-btn{width:100%;margin-top:10px;background:rgba(232,25,44,.08);border:1px solid rgba(232,25,44,.3);color:var(--red);padding:9px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;cursor:pointer;text-transform:uppercase}
.reset-btn:hover{background:rgba(232,25,44,.14)}
@media(max-width:760px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto}.g4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hdr">
  <a href="index.html" class="back">← Inicio</a>
  <div><div class="hdr-t" id="hdr-t">ANALISIS DE DEFENSA</div><div class="hdr-s" id="hdr-s">EFF = (1x# + 0.5x+ − 0.5x− − 1x=) / total</div></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="flabel" style="margin-top:0">Jugador</div>
    <select class="psel" id="psel" onchange="onPlayer(this.value)"><option value="">Seleccionar…</option></select>
    <button id="ver-video-btn" class="vbtn" onclick="abrirVideo()">🎬 VER VIDEO DE ESTAS DEFENSAS</button>
    <div class="acc-group"><div class="acc-header" id="acc-hdr-partido" onclick="accToggle('partido')"><span>Partido</span><div style="display:flex;align-items:center;gap:6px"><div class="acc-dot"></div><span class="acc-arrow">▶</span></div></div>
    <div class="acc-body" id="acc-body-partido">
      <div class="flabel" style="margin-top:0">Rival</div>
      <select class="fsel" id="fsel-rival"><option value="all">Todos</option></select>
      <div class="flabel">Partido específico</div>
      <select class="fsel" id="fsel-gi"><option value="all">Todos</option></select>
    </div></div>
    <div class="acc-group"><div class="acc-header" id="acc-hdr-contexto" onclick="accToggle('contexto')"><span>Contexto</span><div style="display:flex;align-items:center;gap:6px"><div class="acc-dot"></div><span class="acc-arrow">▶</span></div></div>
    <div class="acc-body" id="acc-body-contexto">
      <div class="flabel" style="margin-top:0">Set</div>
      <select class="fsel" id="fsel-set"><option value="all">Todos</option></select>
      <div class="flabel">Valoración</div>
      <select class="fsel" id="fsel-res"><option value="all">Todas</option></select>
    </div></div>
    <div class="counter"><div class="counter-n" id="cnt">0</div><div class="counter-l">defensas mostradas</div></div>
    <button class="reset-btn" onclick="resetF()">Limpiar filtros</button>
  </div>
  <div class="content" id="content"><div class="nodata">Elegí un jugador para ver su defensa</div></div>
</div>

<script src="datos_video.js" onerror="void 0"></script>
<script>
(function(){
  var VD=(window.VIDEO_DATA&&window.VIDEO_DATA.matches)||{};
  var EQ=(new URLSearchParams(location.search).get('equipo')||'casla').toLowerCase();
  var RES_ORDER=['#','+','!','-','='];
  var RES_LABEL={'#':'Perfecta','+':'Buena','!':'Regular','-':'Mala','=':'Error'};
  var RES_HEX={'#':'#22C55E','+':'#84CC16','!':'#EAB308','-':'#F97316','=':'#EF4444'};

  function rivalOf(m){
    if(!m) return 'Rival';
    var home=m.home||'', away=m.away||'';
    if(home===EQ) return m.awayName||away||'Rival';
    if(away===EQ) return m.homeName||home||'Rival';
    return m.awayName||m.homeName||away||home||'Rival';
  }
  var ALL=[];
  Object.keys(VD).forEach(function(c){ var m=VD[c]; (m.actions||[]).forEach(function(a){ if(a.sk==='Defensa' && a.tm===EQ){ var o={}; for(var k in a)o[k]=a[k]; o.opp=rivalOf(m); o.code=c; o.date=m.date||''; ALL.push(o); } }); });
  var PLAYERS={};
  ALL.forEach(function(a){ if(!PLAYERS[a.num])PLAYERS[a.num]={num:a.num,name:a.name,acts:[]}; PLAYERS[a.num].acts.push(a); });
  var RIVALS=[]; ALL.forEach(function(a){ if(RIVALS.indexOf(a.opp)<0)RIVALS.push(a.opp); }); RIVALS.sort();
  var NAME=EQ.toUpperCase();
  (function(){ for(var _k in VD){ var _m=VD[_k]; if(_m.home===EQ){ NAME=_m.homeName||NAME; break; } if(_m.away===EQ){ NAME=_m.awayName||NAME; break; } } })();
  var _nm=0; (function(){ var seen={}; ALL.forEach(function(a){ if(!seen[a.code]){seen[a.code]=1;_nm++;} }); })();
  var _th=document.getElementById('hdr-t'); if(_th) _th.textContent=NAME+' — ANALISIS DE DEFENSA';
  var _ts=document.getElementById('hdr-s'); if(_ts) _ts.textContent=_nm+' partidos · EFF = (1x# + 0.5x+ − 0.5x− − 1x=) / total';

  var F={player:'',rival:'all',gi:'all',set:'all',res:'all'};
  var $=function(id){return document.getElementById(id);};

  var psel=$('psel');
  Object.values(PLAYERS).sort(function(a,b){return b.acts.length-a.acts.length;}).forEach(function(p){
    var o=document.createElement('option'); o.value=p.num; o.textContent='#'+parseInt(p.num,10)+' · '+p.name+' ('+p.acts.length+')'; psel.appendChild(o);
  });
  function accToggle(id){ var h=$('acc-hdr-'+id); if(!h) return; h.classList.toggle('active'); }
  window.accToggle=accToggle;
  function buildSelect(id,opts,key){
    var el=$(id); if(!el) return;
    var cur=String(F[key]);
    el.innerHTML=opts.map(function(o){return '<option value="'+o[0]+'"'+(String(o[0])===cur?' selected':'')+'>'+o[1]+'</option>';}).join('');
    el.onchange=function(){ F[key]=this.value; if(key==='rival'){ F.gi='all'; } buildFilters(); render(); };
  }
  var _MO=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  function gamesFor(){
    var src=(F.player&&PLAYERS[F.player])?PLAYERS[F.player].acts:ALL;
    if(F.rival!=='all') src=src.filter(function(a){return a.opp===F.rival;});
    var seen={},list=[];
    src.forEach(function(a){ if(!seen[a.code]){ seen[a.code]=1; list.push({code:a.code,date:a.date,opp:a.opp}); } });
    list.sort(function(x,y){return (x.date||'').localeCompare(y.date||'');});
    return list;
  }
  function gLabel(g){ var rs=(g.opp||'').split(' ').slice(-1)[0].substring(0,9); var dl=''; if(g.date){var p=g.date.split('-');try{dl=' ('+parseInt(p[2])+' '+_MO[parseInt(p[1])]+')';}catch(e){}} var rr=''; var m=VD[g.code]; if(m&&m.result){ var hs=m.result[0],as=m.result[1]; rr=' · '+(m.home===EQ?hs+'-'+as:as+'-'+hs); } return rs+dl+rr; }
  function buildFilters(){
    buildSelect('fsel-rival',[['all','Todos']].concat(RIVALS.map(function(r){return [r,r];})),'rival');
    buildSelect('fsel-gi',[['all','Todos']].concat(gamesFor().map(function(g){return [g.code,gLabel(g)];})),'gi');
    buildSelect('fsel-set',[['all','Todos'],['1','S1'],['2','S2'],['3','S3'],['4','S4'],['5','S5']],'set');
    buildSelect('fsel-res',[['all','Todas']].concat(RES_ORDER.map(function(r){return [r,RES_LABEL[r]];})),'res');
    var pd=$('acc-hdr-partido'); if(pd) pd.classList.toggle('has-filter', F.rival!=='all'||F.gi!=='all');
    var cd=$('acc-hdr-contexto'); if(cd) cd.classList.toggle('has-filter', F.set!=='all'||F.res!=='all');
  }
  window.resetF=function(){ F.rival='all';F.gi='all';F.set='all';F.res='all'; buildFilters(); render(); };
  buildFilters();

  window.onPlayer=function(v){ F.player=v; F.gi='all'; buildFilters(); render(); };
  function filtered(){
    if(!F.player||!PLAYERS[F.player])return [];
    return PLAYERS[F.player].acts.filter(function(a){
      if(F.rival!=='all'&&a.opp!==F.rival)return false;
      if(F.gi!=='all'&&a.code!==F.gi)return false;
      if(F.set!=='all'&&String(a.set)!==F.set)return false;
      if(F.res!=='all'&&a.ev!==F.res)return false;
      return true;
    });
  }
  function eff(acts){ if(!acts.length)return null; var s=0; acts.forEach(function(a){ s+=(a.ev==='#'?1:a.ev==='+'?0.5:a.ev==='-'?-0.5:a.ev==='='?-1:0); }); return Math.round(s/acts.length*100); }
  function effColor(e){ return e===null?'#475569':e>=40?'#22C55E':e>=15?'#84CC16':e>=0?'#EAB308':e>=-25?'#F97316':'#EF4444'; }
  function pct(n,t){ return t>0?Math.round(n/t*100):0; }

  function courtSVG(origZ,destZ,total){
    var W=180,H=218,P=5,BAND=13,CH=32,CW=(W-P*2)/3;
    var RIVAL=[[1,6,5],[9,8,7],[2,3,4]], OWN=[[4,3,2],[7,8,9],[5,6,1]];
    var maxO=Math.max.apply(null,Object.values(origZ).concat([1])), maxD=Math.max.apply(null,Object.values(destZ).concat([1]));
    var s="<svg viewBox='0 0 "+W+" "+H+"' xmlns='http://www.w3.org/2000/svg' style='width:100%;display:block'>";
    s+="<style>text{pointer-events:none}</style>";
    s+="<rect width='"+W+"' height='"+H+"' fill='rgba(13,14,26,.97)' rx='8'/>";
    s+="<rect x='"+P+"' y='"+BAND+"' width='"+(W-P*2)+"' height='"+(H/2-BAND)+"' fill='rgba(232,25,44,.04)' rx='3'/>";
    s+="<rect x='"+P+"' y='"+(H/2)+"' width='"+(W-P*2)+"' height='"+(H/2-BAND)+"' fill='rgba(34,197,94,.04)' rx='3'/>";
    s+="<rect x='"+P+"' y='"+(H/2-1.5)+"' width='"+(W-P*2)+"' height='3' fill='rgba(255,255,255,.35)' rx='1.5'/>";
    RIVAL.forEach(function(row,ri){ row.forEach(function(zone,ci){
      var cnt=origZ[zone]||0,x=P+ci*CW,y=BAND+ri*CH, op=cnt>0?0.12+(cnt/maxO)*0.78:0.03;
      s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='#E8192C' opacity='"+op+"' rx='3'"+(cnt>0?" onclick=\"verZona("+zone+",'oz')\" style=\"cursor:pointer\"":"")+"/>";
      if(cnt>0){ s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+4)+"' font-family='Bebas Neue,sans-serif' font-size='15' fill='white' text-anchor='middle'>"+cnt+"</text>";
        if(total>0)s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+13)+"' font-size='6.5' fill='rgba(255,255,255,.6)' text-anchor='middle'>"+pct(cnt,total)+"%</text>"; }
      s+="<text x='"+(x+4)+"' y='"+(y+9)+"' font-size='6' fill='rgba(255,255,255,.22)'>"+zone+"</text>";
    }); });
    OWN.forEach(function(row,ri){ row.forEach(function(zone,ci){
      var cnt=destZ[zone]||0,x=P+ci*CW,y=H/2+ri*CH, op=cnt>0?0.12+(cnt/maxD)*0.78:0.03;
      s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='#22C55E' opacity='"+op+"' rx='3'"+(cnt>0?" onclick=\"verZona("+zone+",'dz')\" style=\"cursor:pointer\"":"")+"/>";
      if(cnt>0){ s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+4)+"' font-family='Bebas Neue,sans-serif' font-size='15' fill='white' text-anchor='middle'>"+cnt+"</text>";
        if(total>0)s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+13)+"' font-size='6.5' fill='rgba(255,255,255,.6)' text-anchor='middle'>"+pct(cnt,total)+"%</text>"; }
      s+="<text x='"+(x+4)+"' y='"+(y+9)+"' font-size='6' fill='rgba(255,255,255,.18)'>"+zone+"</text>";
    }); });
    s+="<text x='"+(W/2)+"' y='10' font-size='6.5' fill='rgba(232,25,44,.7)' text-anchor='middle' font-weight='800' letter-spacing='2'>ATAQUE RIVAL</text>";
    s+="<text x='"+(W/2)+"' y='"+(H-4)+"' font-size='6.5' fill='rgba(34,197,94,.65)' text-anchor='middle' font-weight='800' letter-spacing='2'>DESTINO DEFENSA</text>";
    s+="</svg>"; return s;
  }

  function _vf(){ var s=''; if(F.rival&&F.rival!=='all')s+='&rival='+encodeURIComponent(F.rival); if(F.gi&&F.gi!=='all'){ var m=VD[F.gi]; if(m&&m.date)s+='&date='+encodeURIComponent(m.date); } return s; }
  window.verZona=function(zone,which){ if(!F.player)return; window.open('cortes.html?num='+encodeURIComponent(F.player)+'&sk=Defensa&equipo='+EQ+'&'+which+'='+zone+_vf(),'_blank'); };
  window.abrirVideo=function(){ if(!F.player){alert('Elegí un jugador primero.');return;} window.open('cortes.html?num='+encodeURIComponent(F.player)+'&sk=Defensa&equipo='+EQ+_vf(),'_blank'); };

  function render(){
    var c=$('content'), acts=filtered();
    $('cnt').textContent=acts.length;
    if(!F.player){ c.innerHTML="<div class='nodata'>Elegí un jugador para ver su defensa</div>"; return; }
    var p=PLAYERS[F.player];
    if(!acts.length){ c.innerHTML="<div class='nodata'>Sin defensas para los filtros elegidos</div>"; return; }
    var total=acts.length, rc={}; acts.forEach(function(a){rc[a.ev]=(rc[a.ev]||0)+1;});
    var e=eff(acts), perf=pct(rc['#']||0,total), good=pct((rc['#']||0)+(rc['+']||0),total), err=pct(rc['=']||0,total);
    var origZ={},destZ={}; acts.forEach(function(a){ if(a.oz)origZ[a.oz]=(origZ[a.oz]||0)+1; if(a.dz)destZ[a.dz]=(destZ[a.dz]||0)+1; });

    var html="<div class='sec'>"+p.name+" #"+parseInt(p.num,10)+" · "+total+" defensas</div>";
    html+="<div class='g4'>";
    html+="<div class='scard'><div class='big' style='color:"+effColor(e)+"'>"+(e!==null?e+'%':'--')+"</div><div class='lbl'>Eficiencia</div></div>";
    html+="<div class='scard'><div class='big' style='color:#22C55E'>"+good+"%</div><div class='lbl'>Buenas (#/+)</div></div>";
    html+="<div class='scard'><div class='big' style='color:#84CC16'>"+perf+"%</div><div class='lbl'>Perfectas (#)</div></div>";
    html+="<div class='scard'><div class='big' style='color:#EF4444'>"+err+"%</div><div class='lbl'>Errores (=)</div></div>";
    html+="</div>";

    html+="<div class='panel'><div style='display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px'>";
    RES_ORDER.forEach(function(r){ var n=rc[r]||0; if(!n)return; html+="<div style='text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:24px;line-height:1;color:"+RES_HEX[r]+"'>"+n+"</div><div style='font-size:11px;color:var(--muted);margin-top:2px'>"+RES_LABEL[r]+" ("+pct(n,total)+"%)</div></div>"; });
    html+="</div><div style='display:flex;height:8px;border-radius:4px;overflow:hidden'>";
    RES_ORDER.forEach(function(r){ var n=rc[r]||0; if(n)html+="<div style='flex:"+n+";background:"+RES_HEX[r]+"'></div>"; });
    html+="</div></div>";

    var _hasZ=Object.keys(origZ).length||Object.keys(destZ).length;
    html+="<div class='sec'>Mapa de defensa</div>";
    html+="<div class='panel' style='max-width:360px'>";
    if(_hasZ){
      html+="<div class='court-title'>Origen del ataque ↔ destino de la defensa</div>";
      html+=courtSVG(origZ,destZ,total);
      html+="<div class='legend'><div class='leg-item'><div class='leg-dot' style='background:#E8192C'></div>De dónde atacaron</div><div class='leg-item'><div class='leg-dot' style='background:#22C55E'></div>A dónde defendió</div></div>";
      html+="<div style='font-size:11px;color:var(--muted);text-align:center;margin-top:8px'>Clickeá un casillero para ver esas defensas en video 🎬</div>";
    } else {
      html+="<div class='nodata' style='padding:22px 12px;font-size:12px'>El scouting de defensa de este club todavía no tiene zonas de origen/destino cargadas (oz/dz), así que el mapa de cancha no se dibuja. El resto — eficiencia, resultados y rival — sí funciona.</div>";
    }
    html+="</div>";

    var byR={}; PLAYERS[F.player].acts.forEach(function(a){ (byR[a.opp]=byR[a.opp]||[]).push(a); });
    html+="<div class='sec'>Eficiencia por rival</div><div class='panel'>";
    Object.keys(byR).sort().forEach(function(riv){ var ee=eff(byR[riv]);
      html+="<div class='bar-row'><div style='font-size:12px;font-weight:800;color:var(--muted);width:95px;text-align:right;flex-shrink:0;text-transform:uppercase'>"+riv+"</div>";
      html+="<div style='flex:1;height:15px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden'><div style='height:100%;width:"+Math.max(3,Math.min(100,(ee||0)+50))+"%;background:"+effColor(ee)+"'></div></div>";
      html+="<div style='width:50px;font-size:13px;font-weight:800;color:"+effColor(ee)+"'>"+(ee!==null?ee+'%':'--')+"</div><div style='width:42px;font-size:12px;color:var(--muted);text-align:right'>"+byR[riv].length+"</div></div>";
    });
    html+="</div>";
    c.innerHTML=html;
  }
  render();
})();
</script>
<script src="lang.js" onerror="void 0"></script>
