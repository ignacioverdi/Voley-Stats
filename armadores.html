<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Armadores CASLA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);
  --amber:#f59e0b;--indigo:#818cf8;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;
}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 0% 0%,rgba(129,140,248,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(245,158,11,.06) 0%,transparent 50%);
  font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;
}
.page-header{
  padding:20px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.015);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.page-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;
  background:linear-gradient(120deg,#f59e0b,#fff 50%,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rival-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--amber);}
.match-info{font-size:10px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:4px 10px;
  background:rgba(245,158,11,.05);margin-top:3px;display:inline-block;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.nav-dot.on{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5);}
.main{max-width:1600px;margin:0 auto;padding:24px 32px;}

/* Jugador */
.jugador-section{margin-bottom:2px;border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:all .3s;}
.jugador-section:hover{border-color:rgba(255,255,255,.1);}
.jugador-header{
  display:grid;grid-template-columns:260px 1fr;
  background:var(--card);cursor:pointer;transition:background .2s;min-height:130px;
}
.jugador-header:hover{background:var(--card2);}
.jugador-identity{
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  border-right:1px solid var(--border);position:relative;overflow:hidden;
}
.jug-color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.jug-num-bg{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  opacity:.08;position:absolute;right:8px;bottom:-6px;letter-spacing:-2px;
}
.jug-foto{
  width:60px;height:60px;border-radius:50%;border:2px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  flex-shrink:0;position:relative;z-index:1;
  background:rgba(255,255,255,.04);
}
.jug-info{position:relative;z-index:1;}
.jug-num-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;opacity:.7;margin-bottom:1px;}
.jug-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.jug-pos{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.jugador-tactico{
  padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;align-content:start;
}
.tac-item{display:flex;align-items:flex-start;gap:7px;}
.tac-icon{
  width:16px;height:16px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;margin-top:2px;
}
.tac-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.tac-val{font-size:11px;font-weight:700;letter-spacing:.3px;line-height:1.3;}
.jug-footer{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;margin-top:4px;border-top:1px solid var(--border);
}
.tab-row{display:flex;gap:4px;}
.tab-btn{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);color:var(--mut);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.tab-btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0;}
.tab-btn.active-ataque{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:#818cf8;}
.tab-btn.active-saque{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#f59e0b;}
.toggle-arrow{color:var(--mut);font-size:11px;transition:transform .3s;}
.jugador-section.open .toggle-arrow{transform:rotate(180deg);}

/* Canchitas */
.canchitas-wrap{
  display:none;background:linear-gradient(180deg,var(--card2) 0%,rgba(7,8,15,.8) 100%);
  padding:16px 20px 20px;border-top:1px solid var(--border);
}
.jugador-section.open .canchitas-wrap{display:block;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.canchitas-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;
}
.canchita-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer;
}
.canchita-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.canchita-hdr{
  padding:7px 11px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.canchita-cod{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;}
.canchita-tipo{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.canchita-canvas-wrap{padding:6px;display:flex;justify-content:center;}
.canchita-stats{
  padding:7px 10px;display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;border-top:1px solid var(--border);
}
.cs-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.cs-val{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;}
.cs-lbl{font-size:7px;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;}
.no-data-msg{
  padding:28px;text-align:center;color:var(--mut);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  grid-column:1/-1;
}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px;max-width:480px;width:92%;
  box-shadow:0 32px 80px rgba(0,0,0,.8);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;}
.modal-close{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:var(--mut);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
}
.modal-stats-row{display:flex;gap:8px;margin-top:10px;}
.modal-stat{
  flex:1;padding:8px 6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.modal-stat-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.modal-info{font-size:10px;color:var(--mut);letter-spacing:.5px;text-align:center;margin-bottom:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.lg-dot{width:16px;height:3px;border-radius:2px;}

canvas { image-rendering: -webkit-optimize-contrast; }

/* ── MOBILE ─────────────────────────────────────────── */
@media (max-width: 768px) {

  .page-header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .page-title { font-size:18px; letter-spacing:3px; }
  .rival-name { font-size:15px; }
  .nav-dots { display:none; }

  .main { padding:12px 10px; }

  .jugador-header { grid-template-columns:1fr; min-height:unset; }
  .jugador-identity { border-right:none; border-bottom:1px solid var(--border); padding:12px 14px; }
  .jug-num-bg { font-size:40px; }
  .jug-foto { width:48px; height:48px; font-size:16px; }
  .jug-nombre { font-size:17px; }

  .jugador-tactico { grid-template-columns:1fr; padding:10px 14px; gap:6px; }

  .canchitas-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .canchitas-wrap { padding:10px 10px 14px; }

  .modal-box { width:96%; padding:16px; border-radius:12px; max-height:90vh; overflow-y:auto; }

  .tab-btn { padding:5px 10px; font-size:10px; }
}

@media (max-width: 400px) {
  .canchitas-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .page-title { font-size:15px; }
}


/* ── DROPDOWNS — texto siempre negro ── */
select, select option {
  color: #111111 !important;
  background-color: #ffffff !important;
}

.pdf-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid rgba(232,25,44,.4);
  background: rgba(232,25,44,.08);
  color: #e8192c;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.pdf-btn:hover { background: rgba(232,25,44,.18); border-color: rgba(232,25,44,.7); }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #07080f !important; color: #e2e8f0 !important; }
  .page-header { position: relative !important; }
  .back-btn, .pdf-btn, .lang-switcher, #lang-switcher, #nav-dots,
  [style*="position:fixed"], .modal-overlay { display: none !important; }
  .jugador-section { page-break-inside: avoid !important; }
  .jugador-section .canchitas-wrap { display: block !important; }
  .section-title { page-break-after: avoid !important; }
  canvas { display: block !important; }
  @page { margin: 1cm; size: A4 portrait; }
}

</style>

// ================================================================

// Estructura idéntica a ARMADOR_DATA del game plan
// Cargado por: jugador.html, dashboard.html
// ================================================================

// Datos cargados dinámicamente desde datos_casla.js
window.ARMADORES_DATA = {};

function cargarDatosCasla(){
  if(typeof CASLA_ARMADOR === 'undefined') return;

  // Setear ARMADOR_DATA que usa renderArmador() directamente
  window.ARMADOR_DATA = {
    titular: CASLA_ARMADOR.titular || null,
    suplente: CASLA_ARMADOR.suplente || null
  };

  // También llenar ARMADORES_DATA por número (por si lo usan otras funciones)
  ['titular','suplente'].forEach(function(tipo){
    var arm = CASLA_ARMADOR[tipo];
    if(!arm || !arm.nombre) return;
    var num = null;
    if(typeof CASLA_JUGADORES !== 'undefined'){
      var found = CASLA_JUGADORES.find(function(j){
        return j.nombre.indexOf(arm.nombre) >= 0 || arm.nombre.indexOf(j.nombre.split(' ').pop()) >= 0;
      });
      if(found) num = String(found.num).padStart(2,'0');
    }
    if(!num) num = tipo === 'titular' ? '04' : '09';
    window.ARMADORES_DATA[num] = {
      nombre: arm.nombre,
      numero: parseInt(num),
      rotaciones: arm.rotaciones || [],
      pills: arm.pills || [],
      recepcion: arm.recepcion || [],
      so: arm.so || {},
      tr: arm.tr || {}
    };
  });
}

  'P6': { front:[{n:'Z4',z:4},{n:'Z3',z:3},{n:'Z2',z:2}], back:[{n:'Z6',z:6}] },
  'P5': { front:[{n:'Z4',z:4},{n:'Z3',z:3},{n:'Z2',z:2}], back:[{n:'Z6',z:6}] },
  'P4': { front:[{n:'Z4',z:4},{n:'Z3',z:3},{n:'Z1',z:1}], back:[{n:'Z6',z:6}] },
  'P3': { front:[{n:'Z4',z:4},{n:'Z3',z:3},{n:'Z1',z:1}], back:[{n:'Z6',z:6}] },
  'P2': { front:[{n:'Z4',z:4},{n:'Z3',z:3},{n:'Z1',z:1}], back:[{n:'Z6',z:6}] }
};
var FORM_MODAL = {
  'P1':[{n:'Z6',z:6}],'P6':[{n:'Z6',z:6}],'P5':[{n:'Z6',z:6}],
  'P4':[{n:'Z6',z:6}],'P3':[{n:'Z6',z:6}],'P2':[{n:'Z6',z:6}]
};

function switchArm(num, btn) {
  document.querySelectorAll('.arm-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var data = window.ARMADORES_DATA[num];
  if (!data) return;
  ARMADOR_DATA = { titular: data, suplente: null };
  document.getElementById('seccion-armador').innerHTML = '';
  renderArmador();
}

// ── drawWood ──
function drawWood(ctx,x,y,w,h,c1,c2){
  var bg=ctx.createLinearGradient(x,y,x,y+h);
  bg.addColorStop(0,c1);bg.addColorStop(0.5,c2);bg.addColorStop(1,c1);
  ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);
  ctx.save();ctx.globalAlpha=0.07;ctx.strokeStyle='#3a1800';ctx.lineWidth=0.5;
  for(var iy=y+5;iy<y+h;iy+=5){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.restore();
}

// ── drawNet ──
function drawNet(ctx,CL,CW,Y){
  var ng=ctx.createLinearGradient(0,Y-3,0,Y+7);
  ng.addColorStop(0,'#2a2a3a');ng.addColorStop(0.4,'#d0d0e0');ng.addColorStop(1,'#2a2a3a');
  ctx.fillStyle=ng;ctx.fillRect(CL-3,Y-3,CW+6,8);
  ctx.fillStyle='#cc1515';ctx.fillRect(CL-3,Y-5,CW+6,3);
}

// ── redrawArmadorCourt ──
function redrawArmadorCourt(canvas,rot,color,blqData){
  var dprA=window.devicePixelRatio||2;
  var W=canvas.offsetWidth||200, H=canvas.offsetHeight||220;
  var ctx=canvas.getContext('2d');
  ctx.setTransform(dprA,0,0,dprA,0,0);
  ctx.clearRect(0,0,W,H);

  var PAD=4,CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD,CW=CR-CL,CH=CB-CT;
  // Red a 18% de la altura total — zona rival pequeña, cancha propia grande
  var NET=CT+CH*0.18, OWN=CB-NET;
  var c1=CL+CW/3, c2=CL+CW*2/3;

  // ── Fondo ────────────────────────────────────────────────────
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H);

  // ── Piso naranja ─────────────────────────────────────────────
  var bg=ctx.createLinearGradient(CL,NET,CL,CB);
  bg.addColorStop(0,'#b87428'); bg.addColorStop(0.5,'#d4893a'); bg.addColorStop(1,'#b87428');
  ctx.fillStyle=bg; ctx.fillRect(CL,NET,CW,OWN);

  // ── Red ──────────────────────────────────────────────────────
  var ng=ctx.createLinearGradient(0,NET-3,0,NET+5);
  ng.addColorStop(0,'#1a1a2e'); ng.addColorStop(0.4,'#c8c8d8'); ng.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=ng; ctx.fillRect(CL-2,NET-3,CW+4,6);
  ctx.fillStyle='#cc1515'; ctx.fillRect(CL-2,NET-5,CW+4,3);

  // ── Líneas cancha ────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1; ctx.setLineDash([]);
  ctx.strokeRect(CL,NET,CW,OWN);
  ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=0.6; ctx.setLineDash([3,3]);
  [c1,c2].forEach(function(x){
    ctx.beginPath(); ctx.moveTo(x,NET); ctx.lineTo(x,CB); ctx.stroke();
  });
  // Línea de 3m
  var L3=NET+OWN*0.33;
  ctx.beginPath(); ctx.moveTo(CL,L3); ctx.lineTo(CR,L3); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── Formación atacantes ──────────────────────────────────────
  var FORM=FORMACION_ATAQUE;
  var armDelantero=(rot.pos==='P4'||rot.pos==='P3'||rot.pos==='P2');
  var rotForm=FORM[rot.pos]||null;

  var zoneX={1:armDelantero?CR-CW/6:CL+CW/6, 2:CR-CW/6, 3:CL+CW/2, 4:CL+CW/6, 6:CL+CW/2};
  var PILL_Y = NET - (NET-CT)*0.45;  // delanteros sobre la red
  var BACK_Y = NET + OWN*0.52;       // zaguero en el medio, entre fila 1 y fila 3

  function drawPill(x,y,label,solid){
    var pw=Math.min(CW*0.28,52), ph=13;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=4;
    ctx.fillStyle=solid?'rgba(10,14,30,.95)':'rgba(6,9,20,.75)';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x-pw/2,y-ph/2,pw,ph,6);
    else ctx.rect(x-pw/2,y-ph/2,pw,ph);
    ctx.fill();
    ctx.globalAlpha=solid?1:0.55;
    ctx.shadowColor=color; ctx.shadowBlur=solid?5:0;
    ctx.strokeStyle=color; ctx.lineWidth=solid?1.2:0.8;
    if(!solid) ctx.setLineDash([2,2]);
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x-pw/2,y-ph/2,pw,ph,6);
    else ctx.rect(x-pw/2,y-ph/2,pw,ph);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha=solid?1:0.7;
    ctx.font='800 7px Inter,system-ui,sans-serif';
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=2;
    ctx.fillText(label,x,y+0.5);
    ctx.restore();
  }

  if(rotForm){
    rotForm.front.forEach(function(jug){ drawPill(zoneX[jug.z]||CL+CW/2, PILL_Y, jug.n, true); });
    rotForm.back.forEach(function(jug){  drawPill(zoneX[jug.z]||CL+CW/2, BACK_Y, jug.n, false); });
  }

  // ── Datos por zona — 1 por celda, centrados ──────────────────
  // Zonas: 4=IZQ, 3=CEN, 2=DER, 6=CEN-BAJO
  // Cada zona ocupa 1/3 del ancho. Zona 6 comparte x con zona 3.
  // Y: zona delantera a 55% del OWN, zona 6 a 75% del OWN
  // Layout: 3 columnas x 3 filas
  // Fila 1 (cuadrante superior): Z4=IZQ, Z3=CEN, Z2=DER  → y = NET + OWN*0.22
  // Fila 2 (medio): libre — nombres atacantes ya están sobre la red
  // Fila 3 (inferior): Z6=CEN, Z1=DER(opp delantero)     → y = NET + OWN*0.78

  var ROW_TOP = NET + OWN*0.26;
  var ROW_BOT = NET + OWN*0.76;

  var zonePosMap={
    4:{x:CL+CW/6,   y:ROW_TOP},
    3:{x:CL+CW/2,   y:ROW_TOP},
    // Zona 2: arriba cuando armador zaguero, abajo cuando armador delantero (opuesto ataca desde P1)
    2:{x:CL+CW*5/6, y:armDelantero ? ROW_BOT : ROW_TOP},
    6:{x:CL+CW/2,   y:ROW_BOT},
    1:{x:CL+CW*5/6, y:ROW_BOT}
  };

  var distMap={};
  if(rot.dist) rot.dist.forEach(function(d){ distMap[d.zona]=d; });

  var fs1=Math.round(OWN*0.155);
  var fs2=Math.round(OWN*0.105);

  [4,3,2,6,1].forEach(function(z){
    var d=distMap[z]; if(!d||d.pct<=0||d.tot<=0) return;
    var zp=zonePosMap[z]; if(!zp) return;

    ctx.save();

    // % distribución — blanco con outline negro
    ctx.font='bold '+fs1+'px \'Bebas Neue\',Impact,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.85)';
    ctx.shadowColor='rgba(0,0,0,1)'; ctx.shadowBlur=5;
    ctx.strokeText(d.pct+'%', zp.x, zp.y-fs1*0.35);
    ctx.fillStyle='#fff'; ctx.shadowBlur=2;
    ctx.fillText(d.pct+'%', zp.x, zp.y-fs1*0.35);

    // % puntos — coloreado con outline
    var ptCol=d.pct_p>=60?'#22c55e':d.pct_p>=40?'#fbbf24':d.pct_p>=20?'#f97316':'#ef4444';
    ctx.font='800 '+fs2+'px Inter,system-ui,sans-serif';
    ctx.lineWidth=2.5; ctx.strokeStyle='rgba(0,0,0,.9)';
    ctx.shadowBlur=4;
    ctx.strokeText(d.pct_p+'%', zp.x, zp.y+fs1*0.52);
    ctx.fillStyle=ptCol; ctx.shadowBlur=2;
    ctx.fillText(d.pct_p+'%', zp.x, zp.y+fs1*0.52);

    ctx.restore();
  });

  // ── Bloqueadores ────────────────────────────────────────────────
  if(blqData){
    var bc={'1BLQ':'#22c55e','2BLQ':'#818cf8','CIERRE':'#f97316','ABIERTO':'#fbbf24','CUERNO':'#a855f7','LECTURA':'#06b6d4','6-5':'#f59e0b','6-1':'#f59e0b',''  :'rgba(255,255,255,.07)'};
    var px={izq:CL+CW/6,cen:CL+CW/2,der:CL+CW*5/6};
    var by=CT+(NET-CT)*0.55;
    var r2=Math.min(CW/6*0.62,14);
    ['izq','cen','der'].forEach(function(side){
      var val=blqData[side]||'';var col2=bc[val]||'rgba(255,255,255,.07)';var x2=px[side];
      ctx.save();
      ctx.beginPath();ctx.arc(x2,by,r2,0,Math.PI*2);
      ctx.fillStyle=col2;ctx.globalAlpha=val?0.18:0.04;ctx.fill();
      ctx.globalAlpha=1;ctx.strokeStyle=col2;ctx.lineWidth=val?1.5:0.5;
      if(val){ctx.shadowColor=col2;ctx.shadowBlur=5;}
      ctx.stroke();
      if(val){ dibujarIconoBloqueo(ctx,x2,by,r2,val,col2); }
      ctx.restore();
    });
  }
}

// ── redrawArmadorCourtLarge ──
function redrawArmadorCourtLarge(ctx, W, H, rot, color){
  var PAD=12,CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD,CW=CR-CL,CH=CB-CT;
  var NET=CT+CH*0.20,OWN=CB-NET,c1=CL+CW/3,c2=CL+CW*2/3;

  // Background
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);

  // Piso
  var bg=ctx.createLinearGradient(CL,NET,CL,CB);
  bg.addColorStop(0,'#B87428');bg.addColorStop(0.5,'#D4893A');bg.addColorStop(1,'#B87428');
  ctx.fillStyle=bg;ctx.fillRect(CL,NET,CW,OWN);
  ctx.save();ctx.globalAlpha=0.05;ctx.strokeStyle='#000';ctx.lineWidth=0.8;
  for(var iy=NET+8;iy<CB;iy+=8){ctx.beginPath();ctx.moveTo(CL,iy);ctx.lineTo(CR,iy);ctx.stroke();}
  ctx.restore();

  // Red
  var ng=ctx.createLinearGradient(0,NET-4,0,NET+8);
  ng.addColorStop(0,'#1a1a2e');ng.addColorStop(0.4,'#d0d0e0');ng.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=ng;ctx.fillRect(CL-4,NET-4,CW+8,8);
  ctx.fillStyle='#cc1515';ctx.fillRect(CL-4,NET-7,CW+8,4);

  // Líneas
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.strokeRect(CL,NET,CW,OWN);
  ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  [c1,c2].forEach(function(x){ctx.beginPath();ctx.moveTo(x,NET);ctx.lineTo(x,CB);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(CL,NET+OWN/3);ctx.lineTo(CR,NET+OWN/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CL,NET+OWN*2/3);ctx.lineTo(CR,NET+OWN*2/3);ctx.stroke();
  ctx.restore();

  // ── Formacion ────────────────────────────────────────────────
  var FORM = FORMACION_ATAQUE;
  var armDelantero2=(rot.pos==='P4'||rot.pos==='P3'||rot.pos==='P2');
  var rotForm = FORM[rot.pos];

  var frontY = NET - (NET-CT)*0.52;
  var backY  = NET + OWN*0.58;
  var zoneX = {
    1: armDelantero2 ? CL+CW*5/6 : CL+CW/6,
    2: CL+CW*5/6,
    3: CL+CW/2,
    4: CL+CW/6,
    6: CL+CW/2
  };

  if(rotForm){
    // Delanteros — pill grande
    rotForm.front.forEach(function(jug){
      var x = zoneX[jug.z] || CL+CW/2;
      var y = frontY;
      var capsW = 72, capsH = 20;
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=8;
      var grad=ctx.createLinearGradient(x-capsW/2,y-capsH/2,x+capsW/2,y+capsH/2);
      grad.addColorStop(0,'rgba(10,15,30,.97)');grad.addColorStop(1,'rgba(20,25,45,.97)');
      ctx.fillStyle=grad;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x-capsW/2,y-capsH/2,capsW,capsH,10);
      else ctx.rect(x-capsW/2,y-capsH/2,capsW,capsH);
      ctx.fill();
      ctx.globalAlpha=1;ctx.shadowColor=color;ctx.shadowBlur=8;
      ctx.strokeStyle=color;ctx.lineWidth=1.5;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x-capsW/2,y-capsH/2,capsW,capsH,10);
      else ctx.rect(x-capsW/2,y-capsH/2,capsW,capsH);
      ctx.stroke();
      ctx.shadowBlur=3;ctx.shadowColor='rgba(0,0,0,.9)';
      ctx.font='800 10px Inter';
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(jug.n,x,y+0.5);
      ctx.restore();
    });

  }

  // ── Bubbles ───────────────────────────────────────────────────
  var zoneLabels={
    4:{x:CL+CW/6,   y:NET+OWN*0.28},
    3:{x:CL+CW/2,   y:NET+OWN*0.28},
    2:{x:CL+CW*5/6, y:armDelantero2 ? NET+OWN*0.60 : NET+OWN*0.28},
    6:{x:CL+CW/2,   y:NET+OWN*0.60}
  };

  if(rot.dist) rot.dist.forEach(function(d){
    if(d.pct<=0||d.tot<=0) return;
    var zc=zoneLabels[d.zona];if(!zc) return;
    var r=Math.max(W*0.09,22)*(0.35+d.pct/100*0.65);
    ctx.save();
    ctx.shadowColor=color;ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(zc.x,zc.y,r,0,Math.PI*2);
    ctx.fillStyle=color;ctx.globalAlpha=0.07+d.pct/100*0.13;ctx.fill();
    ctx.globalAlpha=1;ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
    ctx.shadowBlur=0;

    // % distrib grande
    ctx.font='bold '+Math.round(W*0.055)+'px \'Bebas Neue\', Impact, sans-serif';
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=6;
    ctx.fillText(d.pct+'%',zc.x,zc.y-14);

    // total ataques
    ctx.font='700 '+Math.round(W*0.022)+'px Inter';
    ctx.fillStyle='rgba(255,255,255,.65)';ctx.shadowBlur=2;
    ctx.fillText(d.tot+' ataques',zc.x,zc.y-2);

    // % puntos
    var ptCol=d.pct_p>=60?'#22c55e':d.pct_p>=40?'#fbbf24':d.pct_p>=20?'#f97316':'#ef4444';
    ctx.font='bold '+Math.round(W*0.034)+'px \'Bebas Neue\', Impact, sans-serif';
    ctx.fillStyle=ptCol;ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=4;
    ctx.fillText(d.pct_p+'% pts',zc.x,zc.y+11);

    ctx.font='700 '+Math.round(W*0.020)+'px Inter';
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.shadowBlur=2;
    ctx.fillText('('+d.pts+' puntos)',zc.x,zc.y+22);
    ctx.restore();
  });

  // ── Zaguero atacante — entre zona 3 y zona 6 ──────────────────
  if(rotForm && rotForm.back && rotForm.back.length){
    var bzX2 = CL + CW/2;
    var bzY2 = NET + OWN * 0.44;
    rotForm.back.forEach(function(jug){
      var bcapsW = Math.min(CW*0.32, 90);
      var bcapsH = 20;
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=8;
      ctx.fillStyle='rgba(8,12,28,.92)';
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(bzX2-bcapsW/2,bzY2-bcapsH/2,bcapsW,bcapsH,10);
      else ctx.rect(bzX2-bcapsW/2,bzY2-bcapsH/2,bcapsW,bcapsH);
      ctx.fill();
      ctx.shadowBlur=0;ctx.globalAlpha=0.7;ctx.setLineDash([3,3]);
      ctx.strokeStyle=color;ctx.lineWidth=1.2;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(bzX2-bcapsW/2,bzY2-bcapsH/2,bcapsW,bcapsH,10);
      else ctx.rect(bzX2-bcapsW/2,bzY2-bcapsH/2,bcapsW,bcapsH);
      ctx.stroke();ctx.setLineDash([]);
      ctx.globalAlpha=0.9;
      ctx.font='800 11px Inter';
      ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=3;
      ctx.fillText(jug.n, bzX2, bzY2);
      ctx.restore();
    });
  }
}

// ── renderArmador ──
function renderArmador(){
  var sec=document.getElementById('seccion-armador');
  if(!sec||!ARMADOR_DATA) return;
  sec.innerHTML = ''; // always clear before rendering

  // Tabs titular/suplente
  var tipos=['titular','suplente'];
  var tabsEl=document.createElement('div');
  tabsEl.style.cssText='display:flex;gap:2px;margin-bottom:0';
  var panels={};
  var activeType='titular';

  tipos.forEach(function(tipo){
    var arm=ARMADOR_DATA[tipo];
    if(!arm) return;
    var color=tipo==='titular'?'#f59e0b':'#818cf8';
    var btn=document.createElement('button');
    btn.style.cssText='padding:9px 18px;border-radius:10px 10px 0 0;border:1px solid rgba(255,255,255,.08);border-bottom:none;background:'+(tipo===activeType?'rgba(255,255,255,.04)':'rgba(255,255,255,.01)')+';color:'+(tipo===activeType?color:'#475569')+';font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;cursor:pointer;transition:all .2s;text-transform:uppercase';
    btn.textContent='#'+arm.nombre.split(' ')[0]+' '+arm.nombre.split(' ').slice(1).join(' ');
    btn.dataset.tipo=tipo;
    btn.addEventListener('click',function(){
      activeType=tipo;
      tabsEl.querySelectorAll('button').forEach(function(b){
        var t=b.dataset.tipo;
        var c2=t==='titular'?'#f59e0b':'#818cf8';
        b.style.color=t===activeType?c2:'#475569';
        b.style.background=t===activeType?'rgba(255,255,255,.04)':'rgba(255,255,255,.01)';
      });
      Object.keys(panels).forEach(function(k){
        panels[k].style.display=k===activeType?'block':'none';
      });
    });
    tabsEl.appendChild(btn);
  });
  sec.appendChild(tabsEl);

  tipos.forEach(function(tipo){
    var arm=ARMADOR_DATA[tipo];
    if(!arm) return;
    var color=tipo==='titular'?'#f59e0b':'#818cf8';
    var panel=document.createElement('div');
    panel.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:0 12px 12px 12px;overflow:hidden;display:'+(tipo===activeType?'block':'none');
    panels[tipo]=panel;

    // Header
    var hdr=document.createElement('div');
    hdr.style.cssText='padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);flex-wrap:wrap';
    var circle=document.createElement('div');
    circle.style.cssText='width:48px;height:48px;border-radius:50%;border:2px solid '+color+';background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:17px;color:'+color+';flex-shrink:0';
    circle.textContent=arm.nombre.split(' ')[0];
    var nameDiv=document.createElement('div');
    nameDiv.innerHTML='<div style="font-size:8px;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">ARMADOR '+tipo.toUpperCase()+'</div><div style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:'+color+'">'+arm.nombre+'</div>';
    hdr.appendChild(circle);hdr.appendChild(nameDiv);

    // Pills EFF por rotación
    var pillsWrap=document.createElement('div');
    pillsWrap.style.cssText='margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end';
    if(arm.pills) arm.pills.forEach(function(p){

  // Título
  var title = document.getElementById('modal-arm-title');

  if(modalBackPlayers.length){

      var p = document.createElement('div');
      p.style.cssText = 'flex:1;min-width:60px;padding:8px 6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px';
      var pv = document.createElement('div');pv.style.cssText='font-family:Bebas Neue,sans-serif;font-size:20px;color:'+effC+';line-height:1';pv.textContent=item.v;
      var pl = document.createElement('div');pl.style.cssText='font-size:8px;color:#475569;letter-spacing:1px;text-transform:uppercase';pl.textContent=item.l;
      p.appendChild(pv);p.appendChild(pl);pillsEl.appendChild(p);
    });

  // Header tabla distribución
  var hdrRow=document.createElement('div');
  hdrRow.style.cssText='display:grid;grid-template-columns:110px 1fr 48px 10px 64px 64px;gap:6px;align-items:center;margin-bottom:4px;margin-top:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)';
  ['ZONA','DISTRIBUCIÓN','DIST%','','ATAQUES','% PTS / PTS'].forEach(function(lbl){
    var h2=document.createElement('div');h2.style.cssText='font-size:7px;color:#475569;letter-spacing:1px;text-transform:uppercase;text-align:center';h2.textContent=lbl;pillsEl.appendChild(h2);
  });
  // Distribución detallada por zona
  var distInfo = document.createElement('div');
  if(rot.dist && rot.dist.length){
    var sorted = rot.dist.slice().sort(function(a,b){return b.pct-a.pct;});
    var esDelantero = (rot.pos==='P4'||rot.pos==='P3'||rot.pos==='P2');
    var labels = {4:'POS 4 — IZQ', 3:'POS 3 — CEN', 2: esDelantero ? 'POS 9 — DER MEDIO' : 'POS 2 — DER', 6:'POS 6 — CEN'};
    // Separador
    var sep=document.createElement('div');
    sep.style.cssText='grid-column:1/-1;height:1px;background:rgba(255,255,255,.06);margin:8px 0 6px';
    pillsEl.appendChild(sep);
    // Tabla con los 4 datos por zona
    sorted.forEach(function(d){
      if(d.tot<=0) return;
      var ptCol=d.pct_p>=50?'#22c55e':d.pct_p>=25?'#fbbf24':'#f97316';
      var row=document.createElement('div');
      row.style.cssText='display:grid;grid-template-columns:110px 1fr 48px 10px 64px 64px;gap:6px;align-items:center;margin-bottom:8px';

      lbl.style.cssText='font-size:10px;color:#94a3b8;letter-spacing:.5px;font-weight:700';

      bw.appendChild(bf);
      // % distribución

      pd.style.cssText='font-family:Bebas Neue,sans-serif;font-size:16px;color:'+color+';text-align:right';
      pd.textContent=d.pct+'%';
      // separador
      var sp=document.createElement('div');sp.style.cssText='color:rgba(255,255,255,.1);text-align:center;font-size:10px';sp.textContent='|';
      // cantidad atacada

      ta.innerHTML='<span style="font-family:Bebas Neue,sans-serif;font-size:15px;color:#e2e8f0">'+d.tot+'</span><span style="font-size:9px;color:#475569"> att</span>';
      // % puntos + cantidad
      var pp=document.createElement('div');
      pp.style.cssText='text-align:center';
      pp.innerHTML='<span style="font-family:Bebas Neue,sans-serif;font-size:16px;color:'+ptCol+'">'+d.pct_p+'%</span>'
        +'<span style="font-size:9px;color:#475569;display:block;margin-top:-2px">'+d.pts+' pts</span>';
      row.appendChild(lbl);row.appendChild(bw);row.appendChild(pd);row.appendChild(sp);row.appendChild(ta);row.appendChild(pp);
      pillsEl.appendChild(row);
    });
  }

  // Dibujar cancha grande
  var cv = document.getElementById('modal-arm-canvas');
  cv.width=480; cv.height=340;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0,0,480,340);
  redrawArmadorCourtLarge(ctx, 480, 340, rot, color);

// ── abrirModalSOTR ──
function abrirModalSOTR(data, tipo, color, allPills){
  var modal = document.getElementById('modal-armador');
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  var sotrColor = tipo==='SO' ? '#22c55e' : '#818cf8';
  var tipoLabel = tipo==='SO' ? 'SIDE OUT' : 'TRANSICIÓN';

  // data can be an array (so_dist/tr_dist) or object
  var distArr = Array.isArray(data) ? data : (data.dist||[]);
  var sotrPillData = Array.isArray(data) ? null : data;

  var title = document.getElementById('modal-arm-title');
  var totalAcc = sotrPillData ? (sotrPillData.total||0) : distArr.reduce(function(s,d){return s+(d.tot||0);},0);
  title.textContent = tipoLabel + ' — ' + totalAcc + ' acciones';
  title.style.color = sotrColor;

  var pillsEl = document.getElementById('modal-arm-pills');
  pillsEl.innerHTML = '';

  // ── Stats generales ─────────────────────────────────────
  var statsRow = document.createElement('div');
  statsRow.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap';
  // Calculate totals from array if needed
  var totalPts = sotrPillData ? (sotrPillData.pts||0) : distArr.reduce(function(s,d){return s+(d.pts||0);},0);
  var totalEff = sotrPillData ? (sotrPillData.eff||0) : (totalAcc>0?Math.round(totalPts/totalAcc*100):0);
  var totalPct = sotrPillData ? (sotrPillData.pts_pct||0) : (totalAcc>0?Math.round(totalPts/totalAcc*100):0);
  var effC = totalEff>=50?'#22c55e':totalEff>=25?'#fbbf24':totalEff>=0?'#f97316':'#ef4444';
  [{l:'EFF TOTAL',v:totalEff+'%',c:effC},
   {l:'ACCIONES', v:totalAcc,    c:sotrColor},
   {l:'PUNTOS',   v:totalPts,    c:'#22c55e'},
   {l:'PTS %',    v:totalPct+'%',c:'#22c55e'},
  ].forEach(function(s){
    var el = document.createElement('div');
    el.style.cssText = 'flex:1;min-width:60px;padding:8px 6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:2px';
    el.innerHTML = '<div style="font-family:Bebas Neue,sans-serif;font-size:20px;line-height:1;color:'+s.c+'">'+s.v+'</div>'
      +'<div style="font-size:7px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-top:2px">'+s.l+'</div>';
    statsRow.appendChild(el);
  });
  pillsEl.appendChild(statsRow);

  // ── Per-position breakdown ──────────────────────────────
  var cv = document.getElementById('modal-arm-canvas');
  if(cv) cv.style.display = 'none';

  if(distArr && distArr.length > 0){
    var posLbl2 = document.createElement('div');
    posLbl2.style.cssText = 'font-size:8px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin:12px 0 8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)';
    posLbl2.textContent = 'ATAQUES POR ROTACIÓN';
    pillsEl.appendChild(posLbl2);

    var distGrid = document.createElement('div');
    distGrid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px';
    var distOrder = ['P4','P3','P2','P5','P6','P1'];
    distOrder.forEach(function(pos){
      var d = distArr.find(function(x){return x.pos===pos;}) || {pos:pos,tot:0,pts:0,pct:0};
      var pctC = d.pct>=50?'#22c55e':d.pct>=30?'#fbbf24':d.pct>=0?'#f97316':'#ef4444';
      var card = document.createElement('div');
      card.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px;text-align:center';
      card.innerHTML = '<div style="font-family:Bebas Neue,sans-serif;font-size:16px;color:'+sotrColor+'">'+pos+'</div>'
        +'<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:'+pctC+'">'+d.pct+'%</div>'
        +'<div style="font-size:9px;color:#64748b">'+d.pts+'/'+d.tot+'</div>';
      distGrid.appendChild(card);
    });
    pillsEl.appendChild(distGrid);
  }

  // ── Grid P4-P3-P2 / P5-P6-P1 ───────────────────────────
  if(allPills && allPills.length){
    var rotLbl = document.createElement('div');
    rotLbl.style.cssText = 'font-size:8px;color:#475569;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;padding-top:4px;border-top:1px solid rgba(255,255,255,.06)';
    rotLbl.textContent = 'EFF POR ROTACIÓN';
    pillsEl.appendChild(rotLbl);

    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:8px';

    ['P4','P3','P2','P5','P6','P1'].forEach(function(pos){
      var p = allPills.find(function(x){ return x.label===pos; }) || {};
      var eff = (p.eff !== undefined && p.eff !== null) ? p.eff : null;
      var effC2 = eff===null?'#475569':eff>=50?'#22c55e':eff>=25?'#fbbf24':eff>=0?'#f97316':'#ef4444';
      var bgC   = eff===null?'rgba(255,255,255,.02)':
                  eff>=50?'rgba(34,197,94,.1)':eff>=25?'rgba(251,191,36,.07)':
                  eff>=0?'rgba(249,115,22,.08)':'rgba(239,68,68,.1)';

      var card = document.createElement('div');
      card.style.cssText = 'background:'+bgC+';border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px';
      card.innerHTML =
        '<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:'+sotrColor+'">'+pos+'</div>'
        +'<div style="font-family:Bebas Neue,sans-serif;font-size:28px;line-height:1;color:'+effC2+'">'+(eff!==null?eff+'%':'—')+'</div>'
        +'<div style="display:flex;gap:10px;margin-top:4px">'
        +['TOT|'+( p.tot||0)+'|#94a3b8','#|'+(p.pts||0)+'|#22c55e','ERR|'+(p.err_pct||0)+'%|#ef4444']
          .map(function(s){ var parts=s.split('|');
            return '<div style="display:flex;flex-direction:column;align-items:center;gap:1px">'
              +'<div style="font-family:Bebas Neue,sans-serif;font-size:14px;color:'+parts[2]+'">'+parts[1]+'</div>'
              +'<div style="font-size:6px;color:#475569;text-transform:uppercase;letter-spacing:.5px">'+parts[0]+'</div>'
              +'</div>';}).join('')
        +'</div>';
      grid.appendChild(card);
    });
    pillsEl.appendChild(grid);
  } else {
    var noData = document.createElement('div');
    noData.style.cssText = 'color:#475569;text-align:center;padding:20px;font-size:12px;letter-spacing:1px';
    noData.textContent = 'Sin datos de rotación disponibles';
    pillsEl.appendChild(noData);
  }
}

// ── cerrarModalArmador ──
function cerrarModalArmador(){
  document.getElementById('modal-armador').style.display='none';
  document.body.style.overflow='';
}


var currentArmPartido = 'acumulado';

function setArmPartido(nombre, btn){
  currentArmPartido = nombre;
  document.querySelectorAll('.sfbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderArmadorConFiltro();
}

function buildArmSubfiltro(){
  if(typeof PARTIDOS_META === 'undefined') return;
  var cont = document.getElementById('arm-sf-partidos');
  if(!cont) return;
  cont.innerHTML = '';
  PARTIDOS_META.forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'sfbtn';
    var label = m.rival||m.nombre;
    if(m.resultado) label += ' ('+m.resultado+')';
    btn.textContent = label;
    btn.onclick = function(){ setArmPartido(m.nombre, btn); };
    cont.appendChild(btn);
  });
}

function renderArmadorConFiltro(){
  if(currentArmPartido === 'acumulado'){
    // Restore original CASLA_ARMADOR data
    cargarDatosCasla();
    renderArmador();
  } else {
    if(typeof PARTIDOS_INDIVIDUAL === 'undefined') return;
    var pd = PARTIDOS_INDIVIDUAL.find(function(p){return p.nombre===currentArmPartido;});
    if(!pd || !pd.armadores) {
      var sec=document.getElementById('seccion-armador');
      if(sec) sec.innerHTML='<div style="padding:40px;text-align:center;color:#475569;font-size:12px;letter-spacing:1px">SIN DATOS DE ARMADOR PARA ESTE PARTIDO</div>';
      return;
    }
    // Set ARMADOR_DATA with mismo formato que CASLA_ARMADOR
    window.ARMADOR_DATA = {
      titular:  pd.armadores.titular  || null,
      suplente: pd.armadores.suplente || null
    };
    renderArmador();
  }
}

// Init subfiltro
document.fonts.ready.then(function(){
  cargarDatosCasla();
  buildArmSubfiltro();
  setTimeout(function(){ renderArmador(); }, 100);
}).catch(function(){
  cargarDatosCasla();
  buildArmSubfiltro();
  setTimeout(function(){ renderArmador(); }, 400);
});
</script>
