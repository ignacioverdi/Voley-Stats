<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Plan de Desarrollo Individual</title>
<style>
  :root{--bg:#07080f;--card:#0d0e1a;--card2:#12131f;--border:rgba(255,255,255,.07);--txt:#e2e8f0;--mut:#64748b;--r:#ef4444;--a:#f59e0b;--v:#22c55e;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:60px}
  .wrap{max-width:820px;margin:0 auto;padding:16px}
  a{color:inherit;text-decoration:none}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .back{font-size:22px;color:var(--mut);padding:4px 8px}
  h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.3px}
  .langsw{margin-left:auto;display:flex;gap:4px}
  .langsw button{background:transparent;border:1px solid var(--border);color:var(--mut);border-radius:7px;padding:4px 8px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
  .langsw button.on{background:#a78bfa;color:#0b0713;border-color:#a78bfa}
  .sub{color:var(--mut);font-size:12px;margin:2px 0 16px 42px}
  .selrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  select,input[type=text]{background:#fff;color:#111;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:13px;font-weight:600}
  .prog{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:18px}
  .prog-bar{height:9px;border-radius:6px;background:#1e2130;overflow:hidden;display:flex;margin-top:8px}
  .prog-bar span{display:block;height:100%}
  .prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--mut)}
  .skill{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden}
  .skill-head{padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);font-weight:800;font-size:15px}
  .skill-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .skill-count{margin-left:auto;font-size:11px;color:var(--mut);font-weight:600}
  .items{padding:6px 12px 12px}
  .item{display:flex;gap:10px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--border)}
  .item:last-child{border-bottom:none}
  .state{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:default;background:transparent}
  .state.ed{cursor:pointer}
  .item-body{flex:1;min-width:0}
  .item-txt{font-size:13.5px;line-height:1.4}
  .item-meta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
  .cat{font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;font-weight:700;background:rgba(255,255,255,.05);color:var(--mut)}
  .hist{display:flex;gap:3px;align-items:center}
  .hdot{width:7px;height:7px;border-radius:50%}
  .hist-lbl{font-size:9px;color:var(--mut)}
  .del{color:var(--mut);font-size:15px;padding:2px 6px;cursor:pointer;flex-shrink:0}
  .add{padding:10px 12px 4px;display:flex;flex-direction:column;gap:8px}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .add-row input{flex:1;min-width:120px}
  .btn{background:#1e2130;border:1px solid var(--border);color:var(--txt);border-radius:9px;padding:9px 13px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}
  .btn.p{background:#22c55e;color:#04120a;border-color:#22c55e}
  .lib-toggle{width:100%;text-align:left;background:#1a1d2b}
  .lib-panel{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;margin-top:8px;background:var(--card2)}
  .lib-row{display:flex;gap:9px;align-items:flex-start;padding:10px 11px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12.5px;line-height:1.4}
  .lib-row:last-child{border-bottom:none}
  .lib-row:active,.lib-row:hover{background:rgba(255,255,255,.05)}
  .lib-row .lib-txt{flex:1;min-width:0}
  .lib-row .lib-add{color:#22c55e;font-weight:800;font-size:16px;flex-shrink:0;line-height:1}
  .lib-row.dup{opacity:.42;cursor:default}
  .lib-row.dup .lib-add{color:var(--mut)}
  .lib-row .cat{flex-shrink:0;align-self:flex-start;margin-top:1px}
  .empty{color:var(--mut);font-size:12.5px;padding:10px 4px;font-style:italic}
  .roview{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:10px;color:var(--mut);display:inline-flex;gap:5px;align-items:center}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--mut);margin:0 0 16px 2px;flex-wrap:wrap}
  .legend span{display:inline-flex;gap:5px;align-items:center}
  .ldot{width:11px;height:11px;border-radius:50%;border:2px solid}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a href="index.html" class="back">‹</a><h1 id="h1">Plan de Desarrollo Individual</h1>
    <div class="langsw" id="langsw"></div>
  </div>
  <div class="sub" id="subt"></div>

  <div class="selrow">
    <select id="jugSel" onchange="if(this.value)location.href='plan_desarrollo.html?num='+this.value"></select>
    <span id="roChip"></span>
  </div>

  <div class="legend" id="legend"></div>
  <div id="prog"></div>
  <div id="skills"></div>
</div>

<script src="firebase.js" onerror="void 0"></script>
<script src="lang.js" onerror="void 0"></script>
<script src="correcciones_tecnicas.js" onerror="void 0"></script>
<script src="plantel_nafels.js" onerror="void 0"></script>
<script src="datos_casla.js" onerror="void 0"></script>
<script>
(function(){
  /* ---------- i18n ---------- */
  var LANG='es';
  try{ LANG = (typeof getLang==='function') ? getLang() : ((localStorage.getItem('vb_lang')||'es')); }catch(e){}
  if(['es','en','de'].indexOf(LANG)<0) LANG='es';

  var UI={
    es:{title:"Plan de Desarrollo Individual",subP:"Objetivos técnico-tácticos y progreso",subJ:function(n,ed){return "Jugador · "+n+(ed?"  ·  modo editor":"");},subNone:"Elegí un jugador para ver o cargar su plan",selPh:"— Elegí tu jugador —",overall:"Progreso general",consol:"consolidados",lastupd:"última actualización",noobj:"Sin objetivos cargados todavía.",obj:function(n){return n+" objetivo"+(n===1?"":"s");},libOpen:"📚 Elegir de la biblioteca",libClose:"📚 Ocultar biblioteca",custPh:"…o escribí un objetivo a mano",add:"Agregar",progress:"progreso:",remove:"¿Quitar este objetivo?",editor:"✎ modo editor",readonly:"👁 solo lectura",st:{r:"A trabajar",a:"En progreso",v:"Consolidado"}},
    en:{title:"Individual Development Plan",subP:"Technical-tactical goals and progress",subJ:function(n,ed){return "Player · "+n+(ed?"  ·  editor mode":"");},subNone:"Choose a player to view or edit their plan",selPh:"— Choose your player —",overall:"Overall progress",consol:"consolidated",lastupd:"last update",noobj:"No goals added yet.",obj:function(n){return n+" goal"+(n===1?"":"s");},libOpen:"📚 Choose from the library",libClose:"📚 Hide library",custPh:"…or type a goal by hand",add:"Add",progress:"progress:",remove:"Remove this goal?",editor:"✎ editor mode",readonly:"👁 read only",st:{r:"To work on",a:"In progress",v:"Consolidated"}},
    de:{title:"Individueller Entwicklungsplan",subP:"Technisch-taktische Ziele und Fortschritt",subJ:function(n,ed){return "Spieler · "+n+(ed?"  ·  Editor-Modus":"");},subNone:"Wähle einen Spieler, um seinen Plan zu sehen oder zu bearbeiten",selPh:"— Wähle deinen Spieler —",overall:"Gesamtfortschritt",consol:"gefestigt",lastupd:"letzte Aktualisierung",noobj:"Noch keine Ziele hinzugefügt.",obj:function(n){return n+" Ziel"+(n===1?"":"e");},libOpen:"📚 Aus der Bibliothek wählen",libClose:"📚 Bibliothek ausblenden",custPh:"…oder ein Ziel eintippen",add:"Hinzufügen",progress:"Fortschritt:",remove:"Dieses Ziel entfernen?",editor:"✎ Editor-Modus",readonly:"👁 nur Lesen",st:{r:"Zu verbessern",a:"In Arbeit",v:"Gefestigt"}}
  };
  function L(){ return UI[LANG]||UI.es; }

  var SKILLS=[
    {k:'saque',   es:'Saque',    en:'Serve',     de:'Aufschlag', ic:'🎯',col:'#f97316'},
    {k:'recepcion',es:'Recepción',en:'Reception', de:'Annahme',  ic:'🛡',col:'#818cf8'},
    {k:'armado',  es:'Armado',   en:'Setting',   de:'Zuspiel',   ic:'🎽',col:'#22c55e'},
    {k:'ataque',  es:'Ataque',   en:'Attack',    de:'Angriff',   ic:'💥',col:'#ef4444'},
    {k:'bloqueo', es:'Bloqueo',  en:'Block',     de:'Block',     ic:'🧱',col:'#2dd4bf'},
    {k:'defensa', es:'Defensa',  en:'Defense',   de:'Abwehr',    ic:'🤲',col:'#f59e0b'}
  ];
  var CATT={
    "Técnica":{en:"Technique",de:"Technik"},
    "Táctica":{en:"Tactics",de:"Taktik"},
    "Lectura":{en:"Reading",de:"Spiel lesen"},
    "Físico/Coordinación":{en:"Physical",de:"Physis"},
    "Mental":{en:"Mental",de:"Mental"},
    "Errores comunes":{en:"Common mistakes",de:"Häufige Fehler"},
    "Qué NO hacer":{en:"What NOT to do",de:"NICHT tun"}
  };
  function catL(c){ if(LANG==='es')return c; return (CATT[c]&&CATT[c][LANG])||c; }
  function corrText(c){ return c[LANG]||c.es||c.t||''; }

  /* ---------- estado ---------- */
  var ST={r:{col:'#ef4444'},a:{col:'#f59e0b'},v:{col:'#22c55e'}};
  var ORDER=['r','a','v'];
  var CORR=window.CORRECCIONES||{};
  var OPEN={};
  var ED=false; try{ ED=((localStorage.getItem('vb_role')||'').toLowerCase()==='coach'); }catch(e){}
  var QP=new URLSearchParams(location.search);
  var NUM=(QP.get('num')||'').trim();
  var NOM=QP.get('n')||'';
  var PATH='plan_desarrollo/'+NUM;
  var DATA={items:[]};

  function roster(){
    var raw=(typeof PLANTEL_NAFELS!=='undefined'&&PLANTEL_NAFELS)||window.PLANTEL_NAFELS||(typeof CASLA_JUGADORES!=='undefined'&&CASLA_JUGADORES)||window.CASLA_JUGADORES||null;
    var r=Array.isArray(raw)?raw:((raw&&(raw.jugadores||raw.lista))||[]);
    return (r||[]).map(function(p){
      var num=p.num!=null?String(p.num):String(((String(p.nombre||'').match(/^\d+/))||[''])[0]);
      var nom=p.ap?(p.ap+' '+(p.nombre||'')).trim():(p.nombre||'').replace(/^\d+\s*/,'').trim();
      nom=nom||('#'+num); return {num:num,nombre:nom};
    }).filter(function(p){return p.num;});
  }

  function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function uid(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
  function save(){ if(typeof fbSet==='function') fbSet(PATH, DATA); }

  function buildLangSw(){
    var el=document.getElementById('langsw');
    el.innerHTML=[['es','ES'],['en','EN'],['de','DE']].map(function(x){
      return '<button class="'+(LANG===x[0]?'on':'')+'" onclick="PD.lang(\''+x[0]+'\')">'+x[1]+'</button>';
    }).join('');
  }
  function buildSel(){
    var sel=document.getElementById('jugSel'); var R=roster();
    var opts='<option value="">'+L().selPh+'</option>';
    R.sort(function(a,b){return (+a.num)-(+b.num);}).forEach(function(p){
      opts+='<option value="'+p.num+'"'+(p.num===NUM?' selected':'')+'>#'+p.num+'  '+esc(p.nombre)+'</option>';
    });
    sel.innerHTML=opts;
    if(NUM && !NOM){ var f=R.filter(function(p){return p.num===NUM;})[0]; if(f) NOM=f.nombre; }
  }
  function buildLegend(){
    var s=L().st;
    document.getElementById('legend').innerHTML=
      '<span><i class="ldot" style="border-color:var(--r)"></i> '+s.r+'</span>'+
      '<span><i class="ldot" style="border-color:var(--a)"></i> '+s.a+'</span>'+
      '<span><i class="ldot" style="border-color:var(--v)"></i> '+s.v+'</span>';
  }

  function progress(){
    var all=DATA.items, n=all.length;
    var v=all.filter(function(i){return i.estado==='v';}).length;
    var a=all.filter(function(i){return i.estado==='a';}).length;
    var r=n-v-a, pct=n?Math.round(v/n*100):0, last='';
    all.forEach(function(i){(i.hist||[]).forEach(function(h){ if(h.f>last)last=h.f; });});
    document.getElementById('prog').innerHTML = n? (
      '<div class="prog"><div class="prog-lbl"><b style="color:var(--txt)">'+L().overall+'</b><span>'+v+'/'+n+' '+L().consol+' · '+pct+'%</span></div>'+
      '<div class="prog-bar"><span style="width:'+(v/n*100)+'%;background:var(--v)"></span><span style="width:'+(a/n*100)+'%;background:var(--a)"></span><span style="width:'+(r/n*100)+'%;background:var(--r)"></span></div>'+
      (last?'<div style="margin-top:8px"><span class="roview">🕑 '+L().lastupd+': '+last+'</span></div>':'')+'</div>'
    ) : '';
  }
  function histDots(i){
    var h=(i.hist||[]).slice(-8); if(!h.length) return '';
    return '<span class="hist"><span class="hist-lbl">'+L().progress+'</span>'+h.map(function(x){return '<i class="hdot" style="background:'+(ST[x.e]||ST.r).col+'" title="'+x.f+'"></i>';}).join('')+'</span>';
  }

  function render(){
    document.getElementById('h1').textContent=L().title;
    document.getElementById('subt').textContent = NUM ? L().subJ(NOM||('#'+NUM), ED) : L().subNone;
    buildLegend(); progress();
    var host=document.getElementById('skills');
    if(!NUM){ host.innerHTML=''; return; }
    host.innerHTML = SKILLS.map(function(s){
      var items=DATA.items.filter(function(i){return i.skill===s.k;});
      var body = items.length ? items.map(function(i){
        var st=ST[i.estado]||ST.r, stl=(L().st[i.estado]||L().st.r);
        return '<div class="item">'+
          '<div class="state'+(ED?' ed':'')+'" style="border-color:'+st.col+';color:'+st.col+'"'+(ED?' onclick="PD.cycle(\''+i.id+'\')"':'')+' title="'+stl+'">'+(i.estado==='v'?'✓':'')+'</div>'+
          '<div class="item-body"><div class="item-txt">'+esc(i.texto)+'</div>'+
            '<div class="item-meta">'+(i.cat?'<span class="cat">'+esc(catL(i.cat))+'</span>':'')+'<span style="font-size:10px;color:'+st.col+';font-weight:700">'+stl+'</span>'+histDots(i)+'</div>'+
          '</div>'+
          (ED?'<span class="del" onclick="PD.del(\''+i.id+'\')" title="✕">✕</span>':'')+
        '</div>';
      }).join('') : '<div class="empty">'+L().noobj+'</div>';

      var addBox='';
      if(ED){
        var lib=(CORR[s.k]||[]);
        var already={}; items.forEach(function(i){already[i.texto]=1;});
        var rows=lib.map(function(c,ix){
          var txt=corrText(c), dup=already[txt];
          return '<div class="lib-row'+(dup?' dup':'')+'"'+(dup?'':' onclick="PD.addLib(\''+s.k+'\','+ix+')"')+'>'+
            '<span class="cat">'+esc(catL(c.c))+'</span><span class="lib-txt">'+esc(txt)+'</span>'+
            '<span class="lib-add">'+(dup?'✓':'+')+'</span></div>';
        }).join('');
        addBox='<div class="add">'+
          '<button class="btn lib-toggle" onclick="PD.toggleLib(\''+s.k+'\')">'+(OPEN[s.k]?L().libClose:L().libOpen)+' ('+lib.length+')</button>'+
          '<div class="lib-panel" id="lib-'+s.k+'" style="display:'+(OPEN[s.k]?'block':'none')+'">'+rows+'</div>'+
          '<div class="add-row"><input type="text" id="cust-'+s.k+'" placeholder="'+L().custPh+'"><button class="btn p" onclick="PD.custom(\''+s.k+'\')">'+L().add+'</button></div>'+
        '</div>';
      }
      return '<div class="skill"><div class="skill-head"><div class="skill-ic" style="background:'+s.col+'22;color:'+s.col+'">'+s.ic+'</div>'+s[LANG]+'<span class="skill-count">'+L().obj(items.length)+'</span></div>'+
        '<div class="items">'+body+'</div>'+addBox+'</div>';
    }).join('');
  }

  window.PD={
    lang:function(l){ LANG=l; try{ localStorage.setItem('vb_lang',l); }catch(e){} if(typeof window.setLang==='function'){ try{ window.setLang(l); }catch(e){} } buildLangSw(); buildSel(); render(); },
    toggleLib:function(skill){ OPEN[skill]=!OPEN[skill]; render(); },
    addLib:function(skill,ix){ var c=(CORR[skill]||[])[ix]; if(!c)return; var txt=corrText(c);
      if(DATA.items.some(function(i){return i.skill===skill&&i.texto===txt;})) return;
      DATA.items.push({id:uid(),skill:skill,texto:txt,cat:c.c,estado:'r',hist:[{f:today(),e:'r'}]}); OPEN[skill]=true; save(); render(); },
    custom:function(skill){ var inp=document.getElementById('cust-'+skill); var t=(inp.value||'').trim(); if(!t)return;
      inp.value=''; DATA.items.push({id:uid(),skill:skill,texto:t,cat:'',estado:'r',hist:[{f:today(),e:'r'}]}); save(); render(); },
    cycle:function(id){ var i=DATA.items.filter(function(x){return x.id===id;})[0]; if(!i)return;
      var ni=(ORDER.indexOf(i.estado)+1)%3; i.estado=ORDER[ni]; (i.hist=i.hist||[]).push({f:today(),e:i.estado}); save(); render(); },
    del:function(id){ if(!confirm(L().remove))return; DATA.items=DATA.items.filter(function(x){return x.id!==id;}); save(); render(); }
  };

  buildLangSw(); buildSel();
  var chip=document.getElementById('roChip');
  if(chip) chip.innerHTML = ED ? '<span class="roview" style="color:#22c55e">'+L().editor+'</span>' : '<span class="roview">'+L().readonly+'</span>';

  if(NUM && typeof fbGet==='function'){
    fbGet(PATH, function(d){ if(d && d.items) DATA=d; else if(Array.isArray(d)) DATA={items:d}; render(); });
    setTimeout(render,60);
  } else { render(); }
})();
</script>
</body>
</html>
