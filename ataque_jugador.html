<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ataques — CASLA Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="datos_casla.js" onerror="void 0"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);
  --amber:#f59e0b;--indigo:#818cf8;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;
}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 0% 0%,rgba(129,140,248,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(245,158,11,.06) 0%,transparent 50%);
  font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;
}
.page-header{
  padding:20px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.015);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.page-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;
  background:linear-gradient(120deg,#f59e0b,#fff 50%,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rival-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--amber);}
.match-info{font-size:10px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:4px 10px;
  background:rgba(245,158,11,.05);margin-top:3px;display:inline-block;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.nav-dot.on{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5);}
.main{max-width:1600px;margin:0 auto;padding:24px 32px;}

/* Jugador */
.jugador-section{margin-bottom:2px;border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:all .3s;}
.jugador-section:hover{border-color:rgba(255,255,255,.1);}
.jugador-header{
  display:grid;grid-template-columns:260px 1fr;
  background:var(--card);cursor:pointer;transition:background .2s;min-height:130px;
}
.jugador-header:hover{background:var(--card2);}
.jugador-identity{
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  border-right:1px solid var(--border);position:relative;overflow:hidden;
}
.jug-color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.jug-num-bg{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  opacity:.08;position:absolute;right:8px;bottom:-6px;letter-spacing:-2px;
}
.jug-foto{
  width:60px;height:60px;border-radius:50%;border:2px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  flex-shrink:0;position:relative;z-index:1;
  background:rgba(255,255,255,.04);
}
.jug-info{position:relative;z-index:1;}
.jug-num-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;opacity:.7;margin-bottom:1px;}
.jug-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.jug-pos{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.jugador-tactico{
  padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;align-content:start;
}
.tac-item{display:flex;align-items:flex-start;gap:7px;}
.tac-icon{
  width:16px;height:16px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;margin-top:2px;
}
.tac-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.tac-val{font-size:11px;font-weight:700;letter-spacing:.3px;line-height:1.3;}
.jug-footer{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;margin-top:4px;border-top:1px solid var(--border);
}
.tab-row{display:flex;gap:4px;}
.tab-btn{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);color:var(--mut);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.tab-btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0;}
.tab-btn.active-ataque{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:#818cf8;}
.tab-btn.active-saque{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#f59e0b;}
.tab-btn.active-recepcion{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#22c55e;}
.toggle-arrow{color:var(--mut);font-size:11px;transition:transform .3s;}
.jugador-section.open .toggle-arrow{transform:rotate(180deg);}

/* Canchitas */
.canchitas-wrap{
  display:none;background:linear-gradient(180deg,var(--card2) 0%,rgba(7,8,15,.8) 100%);
  padding:16px 20px 20px;border-top:1px solid var(--border);
}
.jugador-section.open .canchitas-wrap{display:block;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.canchitas-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;
}
.canchita-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer;
}
.canchita-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.canchita-hdr{
  padding:7px 11px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.canchita-cod{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;}
.canchita-tipo{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.canchita-canvas-wrap{padding:6px;display:flex;justify-content:center;}
.canchita-stats{
  padding:7px 10px;display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;border-top:1px solid var(--border);
}
.cs-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.cs-val{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;}
.cs-lbl{font-size:7px;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;}
.no-data-msg{
  padding:28px;text-align:center;color:var(--mut);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  grid-column:1/-1;
}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px;max-width:480px;width:92%;
  box-shadow:0 32px 80px rgba(0,0,0,.8);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;}
.modal-close{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:var(--mut);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
}
.modal-stats-row{display:flex;gap:8px;margin-top:10px;}
.modal-stat{
  flex:1;padding:8px 6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.modal-stat-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.modal-info{font-size:10px;color:var(--mut);letter-spacing:.5px;text-align:center;margin-bottom:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.lg-dot{width:16px;height:3px;border-radius:2px;}

canvas { image-rendering: -webkit-optimize-contrast; }

/* ── MOBILE ─────────────────────────────────────────── */
@media (max-width: 768px) {

  .page-header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .page-title { font-size:18px; letter-spacing:3px; }
  .rival-name { font-size:15px; }
  .nav-dots { display:none; }

  .main { padding:12px 10px; }

  .jugador-header { grid-template-columns:1fr; min-height:unset; }
  .jugador-identity { border-right:none; border-bottom:1px solid var(--border); padding:12px 14px; }
  .jug-num-bg { font-size:40px; }
  .jug-foto { width:48px; height:48px; font-size:16px; }
  .jug-nombre { font-size:17px; }

  .jugador-tactico { grid-template-columns:1fr; padding:10px 14px; gap:6px; }

  .canchitas-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .canchitas-wrap { padding:10px 10px 14px; }

  .modal-box { width:96%; padding:16px; border-radius:12px; max-height:90vh; overflow-y:auto; }

  .tab-btn { padding:5px 10px; font-size:10px; }
}

@media (max-width: 400px) {
  .canchitas-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .page-title { font-size:15px; }
}


/* ── DROPDOWNS — texto siempre negro ── */
select, select option {
  color: #111111 !important;
  background-color: #ffffff !important;
}

.pdf-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid rgba(232,25,44,.4);
  background: rgba(232,25,44,.08);
  color: #e8192c;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.pdf-btn:hover { background: rgba(232,25,44,.18); border-color: rgba(232,25,44,.7); }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-sizing: border-box; }
  @page { margin: 0.8cm; size: A4 portrait; }

  body { background: #07080f !important; color: #e2e8f0 !important; font-size: 11px; }

  /* Ocultar controles y modales */
  .pdf-btn, #pdf-btn, #nav-dots, .modal-overlay,
  #modal-armador, #modal-sotr,
  [style*="position:fixed"], .page-header { display: none !important; }

  /* Mostrar sección de recepción rival y armador */
  #seccion-recepcion, #seccion-armador { display: block !important; }

  /* Abrir TODOS los jugadores */
  .jugador-section { display: block !important; page-break-inside: avoid !important; margin-bottom: 12px !important; }
  .jugador-section .canchitas-wrap { display: block !important; }
  .jugador-section.open .canchitas-wrap { display: block !important; }

  /* Mostrar TODAS las pestañas activas al mismo tiempo (ataque + saque + recepcion) */
  .tab-panel { display: block !important; margin-bottom: 8px !important; }
  .tab-row { display: none !important; } /* ocultar botones de tab */

  /* Canvas: asegurar que se renderice */
  canvas { display: block !important; max-width: 100% !important; }

  /* Links activos y visibles */
  a { color: #818cf8 !important; text-decoration: underline !important; }
  a[href]:after { content: " (" attr(href) ")"; font-size: 7px; color: #475569; word-break: break-all; }

  /* Grid de canchitas ajustado para A4 */
  .canchitas-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 6px !important; }

  /* Armador grid */
  #seccion-armador { page-break-before: always; }
  #seccion-armador > div { display: block !important; }

  /* Page breaks */
  .jugador-section { page-break-before: auto; }
  h2, .section-title { page-break-after: avoid !important; }
}

</style>

<script>
var POS_COLOR={'ARMADOR':'#f59e0b','OPUESTO':'#f97316','PUNTA':'#818cf8','CENTRAL':'#22c55e','LIBERO':'#06b6d4'};

function effColor(v){
  if(v===null||v===undefined||isNaN(v)) return '#475569';
  return v>=40?'#22c55e':v>=20?'#86efac':v>=0?'#e2e8f0':v>=-20?'#f97316':'#ef4444';
}
function calcPct(a,b){ return b>0?Math.round(a*100/b):0; }

var FORMACION_ATAQUE = {
  'P1': { front:[{n:'WAGNER',z:4},{n:'BARRIOS',z:3},{n:'CORZO',z:2}], back:[{n:'MANSILLA',z:6}] },
  'P6': { front:[{n:'MANSILLA',z:4},{n:'BARRIOS',z:3},{n:'CORZO',z:2}], back:[{n:'WAGNER',z:6}] },
  'P5': { front:[{n:'MANSILLA',z:4},{n:'GALLARDO',z:3},{n:'CORZO',z:2}], back:[{n:'WAGNER',z:6}] },
  'P4': { front:[{n:'MANSILLA',z:4},{n:'GALLARDO',z:3},{n:'CORZO',z:1}], back:[{n:'WAGNER',z:6}] },
  'P3': { front:[{n:'MANSILLA',z:4},{n:'GALLARDO',z:3},{n:'CORZO',z:1}], back:[{n:'WAGNER',z:6}] },
  'P2': { front:[{n:'WAGNER',z:4},{n:'BARRIOS',z:3},{n:'CORZO',z:1}], back:[{n:'MANSILLA',z:6}] }
};

function drawWood(ctx,x,y,w,h,c1,c2){
  var bg=ctx.createLinearGradient(x,y,x,y+h);
  bg.addColorStop(0,c1);bg.addColorStop(0.5,c2);bg.addColorStop(1,c1);
  ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);
  ctx.save();ctx.globalAlpha=0.07;ctx.strokeStyle='#3a1800';ctx.lineWidth=0.5;
  for(var iy=y+5;iy<y+h;iy+=5){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.restore();
}
function drawNet(ctx,CL,CW,Y){
  var ng=ctx.createLinearGradient(0,Y-3,0,Y+7);
  ng.addColorStop(0,'#2a2a3a');ng.addColorStop(0.4,'#d0d0e0');ng.addColorStop(1,'#2a2a3a');
  ctx.fillStyle=ng;ctx.fillRect(CL-3,Y-3,CW+6,8);
  ctx.fillStyle='#cc1515';ctx.fillRect(CL-3,Y-5,CW+6,3);
}
function drawCone(ctx,ox,oy,dx,dy,col,bw,pct,showPct,label,W){
  var ex=ox+(dx-ox)*pct, ey=oy+(dy-oy)*pct;
  var vx=dx-ox,vy=dy-oy,len=Math.sqrt(vx*vx+vy*vy);
  if(len===0) return;
  var px=-vy/len,py=vx/len;
  var bwP=bw*pct;
  var cg=ctx.createLinearGradient(ox,oy,dx,dy);
  cg.addColorStop(0,col+'08');cg.addColorStop(0.5,col+'55');cg.addColorStop(1,col+'bb');
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox,oy);
  ctx.lineTo(ex+px*bwP/2,ey+py*bwP/2);
  ctx.lineTo(ex-px*bwP/2,ey-py*bwP/2);
  ctx.closePath();
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.85;ctx.stroke();
  ctx.restore();
  if(pct>=0.85){
    var r=Math.max(bwP*0.42,8);
    ctx.save();
    ctx.beginPath();ctx.arc(dx,dy,r,0,Math.PI*2);
    ctx.fillStyle=col;ctx.globalAlpha=0.12;ctx.fill();
    ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=1.5;
    ctx.shadowColor=col;ctx.shadowBlur=8;ctx.stroke();
    if(showPct && W>140){
      ctx.font='bold '+Math.round(W*0.065)+'px Barlow Condensed';
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=4;
      ctx.fillText(label,dx,dy);
    }
    ctx.restore();
  }
}
function drawAtaqueCourt(ctx,W,H,ataque,color,pct){
  pct=pct===undefined?1:pct;
  var PAD=8,CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  var CW=CR-CL;
  var RIVAL_H=Math.round(H*0.20);
  var NET=CT+RIVAL_H;
  var OWN_H=CB-NET-4;
  var c1=CL+CW/3,c2=CL+CW*2/3;

  ctx.fillStyle='#1a2a40';ctx.fillRect(0,0,W,H);
  drawWood(ctx,CL,CT,CW,RIVAL_H,'#6B4510','#8B5A18');
  drawWood(ctx,CL,NET+4,CW,OWN_H,'#C88030','#E09840');
  drawNet(ctx,CL,CW,NET);

  ctx.save();ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.2;
  ctx.strokeRect(CL,CT,CW,RIVAL_H);
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=0.8;
  [c1,c2].forEach(function(x){ctx.beginPath();ctx.moveTo(x,CT);ctx.lineTo(x,CT+RIVAL_H);ctx.stroke();});
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.strokeRect(CL,NET+4,CW,OWN_H);
  ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=0.8;
  [c1,c2].forEach(function(x){ctx.beginPath();ctx.moveTo(x,NET+4);ctx.lineTo(x,CB);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(CL,NET+4+OWN_H/3);ctx.lineTo(CR,NET+4+OWN_H/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CL,NET+4+OWN_H*2/3);ctx.lineTo(CR,NET+4+OWN_H*2/3);ctx.stroke();
  ctx.restore();

  if(ataque.tot>0 && ataque.destinos && ataque.destinos.length>0){
    // Origen en franja rival
    var origZ=ataque.orig||8;
    var origXmap={1:CL+CW/6,9:CL+CW/6,2:CL+CW/6,6:CL+CW/2,8:CL+CW/2,3:CL+CW/2,5:CL+CW*5/6,7:CL+CW*5/6,4:CL+CW*5/6};

var DVW_MAP = {
  'J1':['X1',3],'J2':['X7',3],'J3':['X2',3],'J4':['XM',3],'JJ':['XM',3],
  'W4':['X5',4],'G4':['V5',4],'W2':['X6',2],'G2':['V6',2],
  'W3':['X6',2],'G3':['V6',2],
  'Y9':['X8',9],'G9':['V8',9],'Y8':['XP',8],'G8':['VP',8],
  'V3':['X6',2],'V4':['X8',9]
};
var COMBOS_POS={'PUNTA':['X5','V5','X6','V6','XP'],'CENTRAL':['X1','X7','XM','X2'],
  'OPUESTO':['X5','V5','X6','V6','X8','V8'],'ARMADOR':[],'LIBERO':[]};

function getPosFromData(num){
  if(typeof PARTIDOS_JUGADORES!=='undefined'){
    var j=PARTIDOS_JUGADORES.find(function(x){return x.num===num;});
    if(j&&j.pos) return j.pos.toUpperCase();
  }
  if(typeof CASLA_JUGADORES!=='undefined'){
    var j=CASLA_JUGADORES.find(function(x){return x.num===num;});
    if(j&&j.pos) return j.pos.toUpperCase();
  }
  return '';
}

function buildFromHistorial(num){
  if(typeof window.HISTORIAL_DATA==='undefined') return null;
  var sesiones=window.HISTORIAL_DATA.entrenamientos||[];
  var ataques={};
  var jNombre='';
  sesiones.forEach(function(s){
    if(s.tipo!=='E') return;
    (s.jugadores||[]).forEach(function(j){
      if(j.c!==num) return;
      jNombre=j.n;
      Object.keys(j.dv4||{}).forEach(function(dvw){
        if(!DVW_MAP[dvw]) return;
        var mapped=DVW_MAP[dvw], cod=mapped[0], orig=mapped[1];
        var v=j.dv4[dvw];
        if(!ataques[cod]) ataques[cod]={cod:cod,orig:orig,tot:0,pts:0,destCounts:{}};
        ataques[cod].tot+=v.tot||0;
        ataques[cod].pts+=v.pt||0;
        ataques[cod].orig=orig;
        if(v.destCounts&&Object.keys(v.destCounts).length){
          Object.keys(v.destCounts).forEach(function(zd){
            ataques[cod].destCounts[parseInt(zd)]=(ataques[cod].destCounts[parseInt(zd)]||0)+(v.destCounts[zd]||0);
          });
        } else if(v.dest){
          String(v.dest).replace(/,/g,' ').split(/\s+/).forEach(function(d){
            if(/^\d+$/.test(d)) ataques[cod].destCounts[parseInt(d)]=(ataques[cod].destCounts[parseInt(d)]||0)+(v.tot||0);
          });
        }
      });
    });
  });
  var pos=getPosFromData(num);
  var ordenCombos=COMBOS_POS[pos]||[];
  var ataquesArr=ordenCombos.map(function(cod){
    var a=ataques[cod]||{cod:cod,orig:8,tot:0,pts:0,destCounts:{}};
    var totDest=Object.values(a.destCounts).reduce(function(s,v){return s+v;},0)||1;
    var destinos=Object.entries(a.destCounts).filter(function(e){return e[1]>0;})
      .sort(function(a,b){return b[1]-a[1];}).slice(0,4)
      .map(function(e){return {z:parseInt(e[0]),pct:Math.round(e[1]/totDest*100)};});
    return {cod:cod,orig:a.orig||8,destinos:destinos,
      eff:a.tot>0?Math.round(a.pts/a.tot*100):null,
      tot:a.tot,pts:a.pts,slash:0,err:0,video:null,
      pts_pct:a.tot>0?Math.round(a.pts/a.tot*100):0};
  });
  if(!ataquesArr.some(function(a){return a.tot>0;})) return null;
  var color=POS_COLOR[pos]||'#818cf8';
  return {num:num,nombre:num+' '+jNombre,pos:pos,color:color,
    ataques:ataquesArr,saques:[],recepcion:{},info:{}};
}


var currentNum=0, currentFiltro='partido', currentPartido='acumulado';

function buildSubfiltro(){
  var row=document.getElementById('subfiltro-row');
  row.innerHTML='';
  if(currentFiltro!=='partido'){ row.style.display='none'; return; }
  row.style.display='flex';

  // Acumulado button
  var b=document.createElement('button');
  b.className='sfbtn'+(currentPartido==='acumulado'?' on':'');
  b.textContent='Acumulado';
  b.onclick=function(){ currentPartido='acumulado'; updateSfBtns(this); renderPage(); };
  row.appendChild(b);

  // Per match buttons
  if(typeof PARTIDOS_META!=='undefined'){
    PARTIDOS_META.forEach(function(m){
      var btn=document.createElement('button');
      btn.className='sfbtn'+(currentPartido===m.nombre?' on':'');
      var label=m.rival||m.nombre;
      if(m.resultado) label+=' ('+m.resultado+')';
      btn.textContent=label;
      btn.dataset.nombre=m.nombre;
      btn.onclick=function(){ currentPartido=m.nombre; updateSfBtns(this); renderPage(); };
      row.appendChild(btn);
    });
  }

function updateSfBtns(active){
  document.querySelectorAll('.sfbtn').forEach(function(b){ b.classList.remove('on'); });
  active.classList.add('on');
}

function setFiltro(filtro){
  currentFiltro=filtro;
  if(filtro==='partido') currentPartido='acumulado';
  document.getElementById('btn-partido').className='fbtn'+(filtro==='partido'?' active-partido':'');
  document.getElementById('btn-entrenamiento').className='fbtn'+(filtro==='entrenamiento'?' active-entrenamiento':'');
  buildSubfiltro();
  renderPage();
}

function getJugadorPartido(){
  if(currentPartido==='acumulado'){
    // Use PARTIDOS_JUGADORES (acumulado)
    if(typeof PARTIDOS_JUGADORES==='undefined') return null;
    return PARTIDOS_JUGADORES.find(function(x){return x.num===currentNum;});
  } else {
    // Find specific match
    if(typeof PARTIDOS_INDIVIDUAL==='undefined') return null;
    var partido=PARTIDOS_INDIVIDUAL.find(function(p){return p.nombre===currentPartido;});
    if(!partido) return null;
    return partido.jugadores.find(function(x){return x.num===currentNum;});
  }
}

function renderPage(){
  var cont=document.getElementById('content');
  var j=null;

  if(currentFiltro==='partido'){
    j=getJugadorPartido();
    if(!j){
      // Fallback to datos_casla
      if(typeof CASLA_JUGADORES!=='undefined')
        j=CASLA_JUGADORES.find(function(x){return x.num===currentNum;});
    }
    if(!j){cont.innerHTML='<div class="empty">Sin datos de partido</div>';return;}
    if(!j.ataques||!j.ataques.length){cont.innerHTML='<div class="empty">Sin ataques registrados</div>';return;}
  } else {
    j=buildFromHistorial(currentNum);
    if(!j){cont.innerHTML='<div class="empty">Sin ataques en entrenamientos</div>';return;}
  }

  var nm=j.nombre.replace(/^\d+\s*/,'');
  var suffix=currentFiltro==='entrenamiento'?' (ENT)':currentPartido!=='acumulado'?' ('+currentPartido+')':'';
  document.getElementById('jug-title').textContent='💥 ATAQUES — '+nm+suffix;

  cont.innerHTML='';
  var grid=document.createElement('div');
  grid.className='canchitas-grid';
  renderPanelAtaque(j,0,grid);
  cont.appendChild(grid);
  renderComparativa(j, cont);

function waitAndInit(tries){
  var ok=typeof CASLA_JUGADORES!=='undefined'||
         typeof PARTIDOS_JUGADORES!=='undefined'||
         typeof window.HISTORIAL_DATA!=='undefined';
  if(ok){
    var params=new URLSearchParams(window.location.search);
    currentNum=parseInt(params.get('num'))||0;
    buildSubfiltro();
    document.fonts.ready.then(renderPage).catch(renderPage);
  } else if(tries>0){
    setTimeout(function(){waitAndInit(tries-1);},200);
  } else {
    document.getElementById('content').innerHTML='<div class="empty">No se pudieron cargar los datos.</div>';
  }
}

// ── COMPARATIVA JUGADOR VS EQUIPO ─────────────────────────────────────
function calcTeamAtqAvg(){
  var jugs = typeof CASLA_JUGADORES !== 'undefined' ? CASLA_JUGADORES : [];
  var combos = {};
  jugs.forEach(function(j){
    (j.ataques||[]).forEach(function(a){
      if(!a.cod || !a.tot) return;
      if(!combos[a.cod]) combos[a.cod] = {tot:0, pts:0, err:0, vend:0};
      combos[a.cod].tot  += a.tot  || 0;
      combos[a.cod].pts  += a.pts  || 0;
      combos[a.cod].err  += a.err  || 0;
      combos[a.cod].vend += a.slash|| 0;
    });
  });
  var avg = {};
  Object.keys(combos).forEach(function(cod){
    var d = combos[cod];
    if(d.tot > 0) avg[cod] = Math.round((d.pts - d.err - d.vend) / d.tot * 100);
  });
  return avg;
}

function renderComparativa(j, cont){

    + '<th style="padding:6px 8px;font-size:9px;color:#818cf8;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06)">Vos</th>'

    + '<th style="padding:6px 8px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06)">Dif.</th>'

  combos.forEach(function(a){

// ── COMPARATIVA VS POSICION ────────────────────────────────────────────
function getJugadoresPosicion(currentNum){
  var casla = typeof CASLA_JUGADORES !== 'undefined' ? CASLA_JUGADORES : [];
  var curInfo = casla.find(function(c){ return c.num === currentNum; });
  if(!curInfo) return {pos:'', same:[]};
  var pos = curInfo.pos || '';
  var same = casla.filter(function(c){ return c.pos === pos && c.num !== currentNum; });
  return {pos:pos, curInfo:curInfo, same:same};
}

function effColorCmp(v, type){
  if(v===null||v===undefined) return '#475569';
  if(type==='atq') return v>=44?'#22c55e':v>=35?'#86efac':v>=20?'#fbbf24':'#ef4444';
  if(type==='sq')  return v>=3?'#22c55e':v>=0?'#86efac':v>=-5?'#fbbf24':'#ef4444';
  return '#e2e8f0';
}

function renderComparativaPosicion(cont, currentNum, type){
  // type: 'ataque' or 'saque'
  var pjugs = typeof PARTIDOS_JUGADORES !== 'undefined' ? PARTIDOS_JUGADORES : 
              typeof CASLA_JUGADORES !== 'undefined' ? CASLA_JUGADORES : [];
  if(!pjugs.length) return;

  var pd = getJugadoresPosicion(currentNum);
  if(!pd.pos || !pd.same.length) return;

  var POS_COLOR = {ARMADOR:'#F59E0B',OPUESTO:'#F97316',PUNTA:'#22C55E',CENTRAL:'#F97316',LIBERO:'#06B6D4'};
  var posCol = POS_COLOR[pd.pos] || '#64748b';

  // Build rows: current player + same position
  var allNums = [currentNum].concat(pd.same.map(function(j){return j.num;}));
  var rows = allNums.map(function(num){
    var info = [pd.curInfo].concat(pd.same).find(function(j){return j.num===num;});
    var jugData = pjugs.find(function(j){return j.num===num;});
    var nm = info ? info.nombre.replace(/^\d+\s*/,'') : '#'+num;
    var isCur = num === currentNum;

    if(type === 'ataque'){
      var ataques = jugData ? (jugData.ataques||[]) : [];
      var conDatos = ataques.filter(function(a){return a.tot>0;});
      return {num:num, nm:nm, isCur:isCur, data:conDatos};
    } else {
      var saques = jugData ? (jugData.saques||[]) : [];
      var conDatos = saques.filter(function(s){return s.tot>0;});
      return {num:num, nm:nm, isCur:isCur, data:conDatos};
    }
  }).filter(function(r){return r.data.length > 0;});

  if(rows.length < 2) return; // nothing to compare

  // Get all unique combos/tipos
  var allCodes = [];
  rows.forEach(function(r){
    r.data.forEach(function(d){
      var cod = d.cod || d.tipo || '';
      if(allCodes.indexOf(cod) < 0) allCodes.push(cod);
    });
  });

  var section = document.createElement('div');
  section.style.cssText = 'margin-top:12px;padding:14px 16px;background:rgba(13,14,26,.8);border:1px solid rgba(255,255,255,.06);border-radius:12px';
  section.innerHTML = '<div style="font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:'+posCol+';margin-bottom:12px">VS '+pd.pos+'S</div>';

  var table = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-family:Barlow Condensed,sans-serif">';
  // Header
  table += '<thead><tr><th style="padding:6px 8px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);text-align:left">Jugador</th>';
  allCodes.forEach(function(cod){
    table += '<th style="padding:6px 8px;font-size:9px;color:'+(type==='ataque'?'#F97316':'#F59E0B')+';letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);text-align:center">'+cod+'</th>';
  });
  if(type==='saque') table += '<th style="padding:6px 8px;font-size:9px;color:#22c55e;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);text-align:center">Pts</th><th style="padding:6px 8px;font-size:9px;color:#ef4444;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.06);text-align:center">Err</th>';
  table += '</tr></thead><tbody>';

  // Rows
  rows.forEach(function(r){
    var bg = r.isCur ? 'background:rgba(232,25,44,.06);' : '';
    var nameCol = r.isCur ? '#e8192c' : '#94a3b8';
    table += '<tr style="border-bottom:1px solid rgba(255,255,255,.04);'+bg+'">';
    table += '<td style="padding:8px;font-size:12px;font-weight:700;color:'+nameCol+'">'+r.nm+(r.isCur?' ←':'')+'</td>';
    allCodes.forEach(function(cod){
      var d = r.data.find(function(x){return (x.cod||x.tipo||'')=== cod;});
      var v = d ? d.eff : null;
      var col = effColorCmp(v, type==='ataque'?'atq':'sq');
      table += '<td style="padding:8px;text-align:center"><span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:'+col+'">'+(v!==null?v+'%':'—')+'</span>';
      if(d) table += '<div style="font-size:9px;color:#475569">'+d.tot+' acc</div>';
      table += '</td>';
    });
    if(type==='saque'){
      var totPts = r.data.reduce(function(s,d){return s+(d.pts||0);},0);
      var totErr = r.data.reduce(function(s,d){return s+(d.err||0);},0);
      table += '<td style="padding:8px;text-align:center;font-family:Bebas Neue,sans-serif;font-size:18px;color:#22c55e">'+totPts+'</td>';
      table += '<td style="padding:8px;text-align:center;font-family:Bebas Neue,sans-serif;font-size:18px;color:#ef4444">'+totErr+'</td>';
    }
    table += '</tr>';
  });

  table += '</tbody></table></div>';
  section.innerHTML += table;
  cont.appendChild(section);
}

</script>
</body>
</html>
