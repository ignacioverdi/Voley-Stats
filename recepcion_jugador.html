<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recepción — CASLA Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="datos_casla.js" onerror="void 0"></script>
<script src="datos_historial.js" onerror="void 0"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);
  --amber:#f59e0b;--indigo:#818cf8;--green:#22c55e;
  --red:#ef4444;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;
}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 0% 0%,rgba(129,140,248,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(245,158,11,.06) 0%,transparent 50%);
  font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;
}
.page-header{
  padding:20px 32px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.015);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.page-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:5px;
  background:linear-gradient(120deg,#f59e0b,#fff 50%,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rival-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--amber);}
.match-info{font-size:10px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;
  border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:4px 10px;
  background:rgba(245,158,11,.05);margin-top:3px;display:inline-block;}
.nav-dots{display:flex;gap:8px;align-items:center;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s;}
.nav-dot.on{background:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.5);}
.main{max-width:1600px;margin:0 auto;padding:24px 32px;}

/* Jugador */
.jugador-section{margin-bottom:2px;border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:all .3s;}
.jugador-section:hover{border-color:rgba(255,255,255,.1);}
.jugador-header{
  display:grid;grid-template-columns:260px 1fr;
  background:var(--card);cursor:pointer;transition:background .2s;min-height:130px;
}
.jugador-header:hover{background:var(--card2);}
.jugador-identity{
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  border-right:1px solid var(--border);position:relative;overflow:hidden;
}
.jug-color-bar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.jug-num-bg{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  opacity:.08;position:absolute;right:8px;bottom:-6px;letter-spacing:-2px;
}
.jug-foto{
  width:60px;height:60px;border-radius:50%;border:2px solid;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  flex-shrink:0;position:relative;z-index:1;
  background:rgba(255,255,255,.04);
}
.jug-info{position:relative;z-index:1;}
.jug-num-lbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;opacity:.7;margin-bottom:1px;}
.jug-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.jug-pos{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.jugador-tactico{
  padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;align-content:start;
}
.tac-item{display:flex;align-items:flex-start;gap:7px;}
.tac-icon{
  width:16px;height:16px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:900;flex-shrink:0;margin-top:2px;
}
.tac-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.tac-val{font-size:11px;font-weight:700;letter-spacing:.3px;line-height:1.3;}
.jug-footer{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;margin-top:4px;border-top:1px solid var(--border);
}
.tab-row{display:flex;gap:4px;}
.tab-btn{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);color:var(--mut);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.tab-btn:hover{background:rgba(255,255,255,.07);color:#e2e8f0;}
.tab-btn.active-ataque{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:#818cf8;}
.tab-btn.active-saque{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#f59e0b;}
.tab-btn.active-recepcion{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#22c55e;}
.toggle-arrow{color:var(--mut);font-size:11px;transition:transform .3s;}
.jugador-section.open .toggle-arrow{transform:rotate(180deg);}

/* Canchitas */
.canchitas-wrap{
  display:none;background:linear-gradient(180deg,var(--card2) 0%,rgba(7,8,15,.8) 100%);
  padding:16px 20px 20px;border-top:1px solid var(--border);
}
.jugador-section.open .canchitas-wrap{display:block;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.canchitas-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;
}
.canchita-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer;
}
.canchita-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.canchita-hdr{
  padding:7px 11px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.canchita-cod{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;}
.canchita-tipo{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.canchita-canvas-wrap{padding:6px;display:flex;justify-content:center;}
.canchita-stats{
  padding:7px 10px;display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;border-top:1px solid var(--border);
}
.cs-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.cs-val{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;}
.cs-lbl{font-size:7px;color:var(--mut);letter-spacing:.8px;text-transform:uppercase;}
.no-data-msg{
  padding:28px;text-align:center;color:var(--mut);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  grid-column:1/-1;
}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px;max-width:480px;width:92%;
  box-shadow:0 32px 80px rgba(0,0,0,.8);
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;}
.modal-close{
  padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:var(--mut);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;
}
.modal-stats-row{display:flex;gap:8px;margin-top:10px;}
.modal-stat{
  flex:1;padding:8px 6px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.modal-stat-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.modal-info{font-size:10px;color:var(--mut);letter-spacing:.5px;text-align:center;margin-bottom:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.lg-dot{width:16px;height:3px;border-radius:2px;}

canvas { image-rendering: -webkit-optimize-contrast; }

/* ── MOBILE ─────────────────────────────────────────── */
@media (max-width: 768px) {

  .page-header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  .page-title { font-size:18px; letter-spacing:3px; }
  .rival-name { font-size:15px; }
  .nav-dots { display:none; }

  .main { padding:12px 10px; }

  .jugador-header { grid-template-columns:1fr; min-height:unset; }
  .jugador-identity { border-right:none; border-bottom:1px solid var(--border); padding:12px 14px; }
  .jug-num-bg { font-size:40px; }
  .jug-foto { width:48px; height:48px; font-size:16px; }
  .jug-nombre { font-size:17px; }

  .jugador-tactico { grid-template-columns:1fr; padding:10px 14px; gap:6px; }

  .canchitas-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .canchitas-wrap { padding:10px 10px 14px; }

  .modal-box { width:96%; padding:16px; border-radius:12px; max-height:90vh; overflow-y:auto; }

  .tab-btn { padding:5px 10px; font-size:10px; }
}

@media (max-width: 400px) {
  .canchitas-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .page-title { font-size:15px; }
}


/* ── DROPDOWNS — texto siempre negro ── */
select, select option {
  color: #111111 !important;
  background-color: #ffffff !important;
}

.pdf-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid rgba(232,25,44,.4);
  background: rgba(232,25,44,.08);
  color: #e8192c;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.pdf-btn:hover { background: rgba(232,25,44,.18); border-color: rgba(232,25,44,.7); }
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-sizing: border-box; }
  @page { margin: 0.8cm; size: A4 portrait; }

  body { background: #07080f !important; color: #e2e8f0 !important; font-size: 11px; }

  /* Ocultar controles y modales */
  .pdf-btn, #pdf-btn, #nav-dots, .modal-overlay,
  #modal-armador, #modal-sotr,
  [style*="position:fixed"], .page-header { display: none !important; }

  /* Mostrar sección de recepción rival y armador */
  #seccion-recepcion, #seccion-armador { display: block !important; }

  /* Abrir TODOS los jugadores */
  .jugador-section { display: block !important; page-break-inside: avoid !important; margin-bottom: 12px !important; }
  .jugador-section .canchitas-wrap { display: block !important; }
  .jugador-section.open .canchitas-wrap { display: block !important; }

  /* Mostrar TODAS las pestañas activas al mismo tiempo (ataque + saque + recepcion) */
  .tab-panel { display: block !important; margin-bottom: 8px !important; }
  .tab-row { display: none !important; } /* ocultar botones de tab */

  /* Canvas: asegurar que se renderice */
  canvas { display: block !important; max-width: 100% !important; }

  /* Links activos y visibles */
  a { color: #818cf8 !important; text-decoration: underline !important; }
  a[href]:after { content: " (" attr(href) ")"; font-size: 7px; color: #475569; word-break: break-all; }

  /* Grid de canchitas ajustado para A4 */
  .canchitas-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 6px !important; }

  /* Armador grid */
  #seccion-armador { page-break-before: always; }
  #seccion-armador > div { display: block !important; }

  /* Page breaks */
  .jugador-section { page-break-before: auto; }
  h2, .section-title { page-break-after: avoid !important; }
}

</style>
<style>

.fbtn.active-partido{background:rgba(232,25,44,.12);border-color:rgba(232,25,44,.4);color:#e8192c}

<div class="hdr">
  <a href="javascript:history.back()" class="back-btn">← Volver</a>

    <div id="jug-title" style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#e2e8f0">RECEPCIÓN</div>

<script>
var POS_COLOR={'ARMADOR':'#f59e0b','OPUESTO':'#f97316','PUNTA':'#818cf8','CENTRAL':'#22c55e','LIBERO':'#06b6d4'};

var CASLA_POSICIONES_REC = {
  2:'LIBERO', 3:'CENTRAL', 4:'ARMADOR', 5:'PUNTA', 6:'OPUESTO',
  9:'ARMADOR', 10:'CENTRAL', 11:'PUNTA', 12:'LIBERO', 13:'CENTRAL',
  14:'PUNTA', 15:'PUNTA', 17:'CENTRAL', 18:'PUNTA', 19:'ARMADOR'
};

function buildRecepcionFromHistorial(num){
  if(typeof window.HISTORIAL_DATA==='undefined') return null;
  var sesiones = window.HISTORIAL_DATA.entrenamientos||[];

  // Accumulate _rdir by serve origin zone
  // _rdir: {zone: {tot, pt, pos, neg, err}}
  // Map DVW zones to P1(Z1)/P6(Z6)/P5(Z5) format
  var acum = {
    flotado: {
      desde_z1: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
      desde_z6: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
      desde_z5: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
    },
    potencia: {
      desde_z1: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
      desde_z6: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
      desde_z5: {total:{tot:0,eff:0,pos:0,neg:0}, p1:{tot:0,eff:0,pos:0,neg:0}, p6:{tot:0,eff:0,pos:0,neg:0}, p5:{tot:0,eff:0,pos:0,neg:0}},
    }
  };

  var jNombre = '';
  var hasDrDir = false;

  sesiones.forEach(function(s){
    if(s.tipo !== 'E') return;
    (s.jugadores||[]).forEach(function(j){
      if(j.c !== num) return;
      jNombre = j.n;

      // If _rdir exists (new format with zone data)
      if(j._rdir && Object.keys(j._rdir).length > 0){
        hasDrDir = true;
        // Map zone -> desde_z1/z6/z5
        var ZONE_MAP = {'1':'desde_z1','6':'desde_z6','5':'desde_z5'};
        Object.keys(j._rdir).forEach(function(zo){
          var zKey = ZONE_MAP[zo];
          if(!zKey) return;
          var rd = j._rdir[zo];
          var tipo = 'flotado'; // DVW doesn't distinguish SM/SQ in basic _rdir
          var tot2 = rd.tot||0;
          if(!tot2) return;
          var pos2 = Math.round((rd.pt+rd.pos)/tot2*100);
          var neg2 = Math.round((rd.neg+rd.err)/tot2*100);
          var eff2 = Math.round((rd.pt*1 + rd.pos*0.5 - rd.neg*0.5 - rd.err)/tot2*100);
          // Add to total
          var t = acum[tipo][zKey].total;
          var newTot = t.tot + tot2;
          t.eff = newTot>0?Math.round((t.eff*t.tot + eff2*tot2)/newTot):0;
          t.pos = newTot>0?Math.round((t.pos*t.tot + pos2*tot2)/newTot):0;
          t.neg = newTot>0?Math.round((t.neg*t.tot + neg2*tot2)/newTot):0;
          t.tot = newTot;
        });
      } else {
        // Old format: only totals available - use rT/rEff
        var tot2 = j.rT||0;
        if(!tot2) return;
        var eff2 = j.rEff||0;
        var pos2 = j.rT>0?Math.round((j.rPunto+j.rPos)/j.rT*100):0;
        var neg2 = j.rT>0?Math.round((j.rNeg+j.rErr)/j.rT*100):0;
        // Spread across zones (can't distinguish, put in all)
        ['desde_z1','desde_z6','desde_z5'].forEach(function(zk){
          var t = acum.flotado[zk].total;
          // Don't spread - put in z6 as most common
        });
        // Put totals in flotado desde_z6 as best guess
        var t = acum.flotado.desde_z6.total;
        var newTot = t.tot + tot2;
        t.eff = newTot>0?Math.round((t.eff*t.tot + eff2*tot2)/newTot):0;
        t.pos = newTot>0?Math.round((t.pos*t.tot + pos2*tot2)/newTot):0;
        t.neg = newTot>0?Math.round((t.neg*t.tot + neg2*tot2)/newTot):0;
        t.tot = newTot;
      }
    });
  });

  // Check if any data
  var hasData = Object.values(acum.flotado).some(function(z){ return z.total.tot > 0; }) ||
                Object.values(acum.potencia).some(function(z){ return z.total.tot > 0; });
  if(!hasData) return null;

  var pos = CASLA_POSICIONES_REC[num]||'';
  return {
    num: num,
    nombre: String(num)+' '+jNombre,
    pos: pos,
    color: POS_COLOR[pos]||'#64748b',
    recepcion: acum,
    _hasDrDir: hasDrDir
  };
}

function renderPanelRecepcion(j, container){
  container.innerHTML = '';
  var rec = j.recepcion;
  if(!rec || (!rec.flotado && !rec.potencia)){
    container.innerHTML='<div style="color:#475569;padding:28px;text-align:center;font-family:Barlow Condensed,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase">Sin datos de recepción</div>';
    return;
  }

  function ec(v){return v>=25?'#22c55e':v>=5?'#86efac':v>=0?'#94a3b8':v>=-15?'#f97316':'#ef4444';}
  function bgc(v){return v>=25?'rgba(34,197,94,.13)':v>=5?'rgba(134,239,172,.08)':v>=0?'rgba(148,163,184,.05)':v>=-15?'rgba(249,115,22,.15)':'rgba(239,68,68,.18)';}
  function bdc(v){return v>=25?'rgba(34,197,94,.35)':v>=5?'rgba(134,239,172,.2)':v>=0?'rgba(148,163,184,.12)':v>=-15?'rgba(249,115,22,.35)':'rgba(239,68,68,.35)';}

  function zoneCard(d, label, maxTot, typeColor){
    var vol = maxTot>0 ? Math.round((d.tot||0)/maxTot*100) : 0;
    var e = d.eff||0, p = d.pos||0, n = d.neg||0, t = d.tot||0;
    return '<div class="zone-card" style="background:'+bgc(e)+';border:1px solid '+bdc(e)+';border-radius:8px;padding:7px 5px">'
      +'<div style="font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;text-align:center;color:'+ec(e)+';margin-bottom:3px">'+label+'</div>'
      +'<div style="font-family:Bebas Neue,sans-serif;font-size:18px;font-weight:900;text-align:center;line-height:1;color:'+ec(e)+';margin-bottom:1px">'+e+'%</div>'
      +'<div style="font-size:8px;text-align:center;color:#475569;margin-bottom:3px">efectividad</div>'
      +'<div style="height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin:0 2px 4px"><div style="width:'+vol+'%;height:3px;border-radius:2px;background:'+typeColor+'"></div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px">'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px">Total</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#e2e8f0">'+t+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px"># +</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#22c55e">'+p+'%</div></div>'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px">/ =</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#ef4444">'+n+'%</div></div>'
      +'</div></div>';
  }

  function makeZonePanel(desdeKey, desdeLabel, td, typeColor){
    var desde = td[desdeKey];
    if(!desde) return document.createElement('div');
    var maxTot = Math.max((desde.p5||{}).tot||0,(desde.p6||{}).tot||0,(desde.p1||{}).tot||0,1);
    var total = desde.total||{};
    var el = document.createElement('div');
    el.style.cssText='border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.07);background:#0d0e1a';
    el.innerHTML=
      '<div style="padding:7px 12px 6px;border-bottom:1px solid '+typeColor+'22">'
      +'<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:'+typeColor+'">'+desdeLabel+'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:7px">'
      + zoneCard(desde.p1||{},'Pos 1',maxTot,typeColor)
      + zoneCard(desde.p6||{},'Pos 6',maxTot,typeColor)
      + zoneCard(desde.p5||{},'Pos 5',maxTot,typeColor)
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);padding:5px 10px 7px;border-top:1px solid rgba(255,255,255,.06)">'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#e2e8f0;font-family:Barlow Condensed,sans-serif">'+( total.tot||0)+'</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">saques</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:'+ec(total.eff||0)+';font-family:Barlow Condensed,sans-serif">'+( total.eff||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">EFF</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#22c55e;font-family:Barlow Condensed,sans-serif">'+( total.pos||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px"># +</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#ef4444;font-family:Barlow Condensed,sans-serif">'+( total.neg||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">/ =</div></div>'
      +'</div>';
    return el;
  }

  var types=[
    {key:'flotado', label:'SAQUE FLOTADO', color:'#818cf8'},
    {key:'potencia',label:'SAQUE POTENCIA', color:'#f97316'}
  ];
  var zones=[
    {key:'desde_z1',label:'Desde Zona 1'},
    {key:'desde_z6',label:'Desde Zona 6'},
    {key:'desde_z5',label:'Desde Zona 5'}
  ];

  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'padding:14px 4px 4px';

  types.forEach(function(t, ti){
    var secHdr = document.createElement('div');
    secHdr.style.cssText='display:flex;align-items:center;gap:10px;margin:0 0 10px';
    secHdr.innerHTML='<div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;background:'+t.color+'18;color:'+t.color+';border:0.5px solid '+t.color+'44">'+t.label+' — por zona de origen</div><div style="flex:1;height:.5px;background:rgba(255,255,255,.08)"></div>';
    wrapper.appendChild(secHdr);

    var row = document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px';
    zones.forEach(function(z){
      if(rec[t.key]) row.appendChild(makeZonePanel(z.key, z.label, rec[t.key], t.color));
    });
    wrapper.appendChild(row);
  });

  container.appendChild(wrapper);
}

var currentNum=0, currentFiltro='partido';

function setFiltro(filtro){
  currentFiltro=filtro;
  document.getElementById('btn-partido').className='fbtn'+(filtro==='partido'?' active-partido':'');
  document.getElementById('btn-entrenamiento').className='fbtn'+(filtro==='entrenamiento'?' active-entrenamiento':'');
  renderPage();
}

function renderPage(){
  var cont=document.getElementById('content');
  var j=null;

  if(currentFiltro==='partido'){
    if(typeof CASLA_JUGADORES==='undefined'){
      cont.innerHTML='<div class="empty">Sin datos de partidos</div>'; return;
    }
    j=CASLA_JUGADORES.find(function(x){return x.num===currentNum;});
    if(!j||!j.recepcion||!j.recepcion.flotado){
      cont.innerHTML='<div class="empty">Sin datos de recepción en partidos</div>'; return;
    }
  } else {
    j=buildRecepcionFromHistorial(currentNum);
    if(!j){
      cont.innerHTML='<div class="empty">Sin datos de recepción en entrenamientos</div>'; return;
    }
  }

  var nm=j.nombre.replace(/^\d+\s*/,'');
  document.getElementById('jug-title').textContent='🛡 RECEPCIÓN — '+nm+(currentFiltro==='entrenamiento'?' (ENT)':'');

  cont.innerHTML='';

  // Info note for entrenamiento without zone detail
  if(currentFiltro==='entrenamiento' && !j._hasDrDir){
    var note=document.createElement('div');
    note.className='info-note';
    note.textContent='ℹ️  El scout no tiene desglose por zona de origen — los datos se muestran en Z6 (zona más común). Con scouts completos aparecerá el detalle por P1/P6/P5.';
    cont.appendChild(note);
  }

  var panel=document.createElement('div');
  renderPanelRecepcion(j, panel);
  cont.appendChild(panel);
}

function waitAndInit(tries){
  if(typeof CASLA_JUGADORES!=='undefined'||typeof window.HISTORIAL_DATA!=='undefined'){
    var params=new URLSearchParams(window.location.search);
    currentNum=parseInt(params.get('num'))||0;
    document.fonts.ready.then(renderPage).catch(renderPage);
  } else if(tries>0){
    setTimeout(function(){waitAndInit(tries-1);},200);
  } else {
    document.getElementById('content').innerHTML='<div class="empty">No se pudieron cargar los datos.</div>';
  }
}
waitAndInit(25);
</script>
