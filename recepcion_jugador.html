<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recepción — Nafels Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="datos_equipo.js" onerror="void 0"></script>
<script src="datos_partidos.js" onerror="void 0"></script>
<script src="datos_historial.js" onerror="void 0"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080f;--card:#0d0e1a;--card2:#111220;--border:rgba(255,255,255,.06);--amber:#f59e0b;--indigo:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;}
body{background:#07080f;color:#e2e8f0;font-family:'Barlow Condensed',sans-serif;min-height:100vh;padding:0;margin:0}
select, select option { color: #111111 !important; background-color: #ffffff !important; }
.hdr{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;background:rgba(7,8,15,.9);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);flex-wrap:wrap}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#475569;font-size:11px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;flex-shrink:0}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.fbtn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#475569;font-size:11px;font-weight:800;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;transition:all .15s}
.fbtn.active-partido{background:rgba(232,25,44,.12);border-color:rgba(232,25,44,.4);color:#e8192c}
.fbtn.active-entrenamiento{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#22c55e}
.subfiltro-row{width:100%;display:none;gap:5px;flex-wrap:wrap;padding:6px 0 0}
.sfbtn{padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#64748b;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;transition:all .15s;font-family:'Barlow Condensed',sans-serif}
.sfbtn.on{background:rgba(232,25,44,.1);border-color:rgba(232,25,44,.35);color:#e8192c}
.main{max-width:960px;margin:0 auto;padding:20px 16px}
.empty{text-align:center;padding:60px;color:#475569;font-size:13px;letter-spacing:1px}
.info-note{font-size:10px;color:#475569;letter-spacing:1px;padding:10px 16px;background:rgba(255,255,255,.02);border-radius:6px;margin-bottom:14px;border:1px solid rgba(255,255,255,.04)}
</style>
</head>
<body>
<div class="hdr">
  <a id="back-jug" href="jugador.html" class="back-btn">← Perfil</a>
  <div style="flex-shrink:0">
    <div id="jug-title" style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#e2e8f0">RECEPCIÓN</div>
    <div style="font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase">NAFELS VOLEY</div>
  </div>
  <div class="filter-row">
    <button class="fbtn active-partido" id="btn-partido" onclick="setFiltro('partido')">🏆 PARTIDO</button>
    <button class="fbtn" id="btn-entrenamiento" onclick="setFiltro('entrenamiento')">🏋️ ENTRENAMIENTO</button>
    <div class="subfiltro-row" id="subfiltro-row"></div>
  </div>
</div>
<div class="main"><div id="content"><div class="empty">Cargando...</div></div></div>
<script>
var POS_COLOR={'ARMADOR':'#f59e0b','OPUESTO':'#f97316','PUNTA':'#818cf8','CENTRAL':'#22c55e','LIBERO':'#06b6d4'};

function buildRecepcionFromHistorial(num){
  if(typeof window.HISTORIAL_DATA==='undefined') return null;
  var sesiones=window.HISTORIAL_DATA.entrenamientos||[];
  function cv(){return {tot:0,eff:0,pos:0,neg:0,pt:0,mas:0,neu:0,med:0,ovp:0,err:0};}
  function zv(){return {P5:cv(),P6:cv(),P1:cv(),total:cv()};}
  var acum={flotado:{desde_z1:zv(),desde_z6:zv(),desde_z5:zv()},potencia:{desde_z1:zv(),desde_z6:zv(),desde_z5:zv()}};
  var jNombre='';
  // El historial de entrenamientos no trae zona; se agrupa todo en desde_z6/total como referencia.
  sesiones.forEach(function(s){
    if(s.tipo!=='E') return;
    (s.jugadores||[]).forEach(function(j){
      if(j.c!==num) return;jNombre=j.n;
      var tot2=j.rT||0; if(!tot2) return;
      var eff2=j.rEff||0;
      var pos2=tot2>0?Math.round(((j.rPunto||0)+(j.rPos||0))/tot2*100):0;
      var neg2=tot2>0?Math.round(((j.rNeg||0)+(j.rErr||0))/tot2*100):0;
      var t=acum.flotado.desde_z6.total,newTot=t.tot+tot2;
      t.eff=newTot>0?Math.round((t.eff*t.tot+eff2*tot2)/newTot):0;
      t.pos=newTot>0?Math.round((t.pos*t.tot+pos2*tot2)/newTot):0;
      t.neg=newTot>0?Math.round((t.neg*t.tot+neg2*tot2)/newTot):0;
      t.tot=newTot;
    });
  });
  var hasData=['desde_z1','desde_z6','desde_z5'].some(function(z){return acum.flotado[z].total.tot>0;});
  if(!hasData) return null;
  var pos='';
  if(typeof PARTIDOS_JUGADORES!=='undefined'){var jj=PARTIDOS_JUGADORES.find(function(x){return x.num===num;});if(jj)pos=jj.pos||'';}
  return {num:num,nombre:num+' '+jNombre,pos:pos,color:POS_COLOR[pos]||'#64748b',recepcion:acum};
}

function renderPanelRecepcion(j, container){
  container.innerHTML = '';
  var rec = j.recepcion;
  if(!rec || (!rec.flotado && !rec.potencia)){
    container.innerHTML='<div style="color:#475569;padding:28px;text-align:center;font-family:Barlow Condensed,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase">Sin datos de recepción</div>';
    return;
  }
  function ec(v){return v>=25?'#22c55e':v>=5?'#86efac':v>=0?'#94a3b8':v>=-15?'#f97316':'#ef4444';}
  function bgc(v){return v>=25?'rgba(34,197,94,.13)':v>=5?'rgba(134,239,172,.08)':v>=0?'rgba(148,163,184,.05)':v>=-15?'rgba(249,115,22,.15)':'rgba(239,68,68,.18)';}
  function bdc(v){return v>=25?'rgba(34,197,94,.35)':v>=5?'rgba(134,239,172,.2)':v>=0?'rgba(148,163,184,.12)':v>=-15?'rgba(249,115,22,.35)':'rgba(239,68,68,.35)';}
  function zoneCard(d, label, maxTot, typeColor){
    var vol = maxTot>0 ? Math.round((d.tot||0)/maxTot*100) : 0;
    var e = d.eff||0, p = d.pos||0, n = d.neg||0, t = d.tot||0;
    return '<div class="zone-card" style="background:'+bgc(e)+';border:1px solid '+bdc(e)+';border-radius:8px;padding:7px 5px">'
      +'<div style="font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;text-align:center;color:'+ec(e)+';margin-bottom:3px">'+label+'</div>'
      +'<div style="font-family:Bebas Neue,sans-serif;font-size:18px;font-weight:900;text-align:center;line-height:1;color:'+ec(e)+';margin-bottom:1px">'+e+'%</div>'
      +'<div style="font-size:8px;text-align:center;color:#475569;margin-bottom:3px">efectividad</div>'
      +'<div style="height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin:0 2px 4px"><div style="width:'+vol+'%;height:3px;border-radius:2px;background:'+typeColor+'"></div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px">'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px">Total</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#e2e8f0">'+t+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px"># +</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#22c55e">'+p+'%</div></div>'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px">/ =</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#ef4444">'+n+'%</div></div>'
      +'</div></div>';
  }
  function makeZonePanel(desdeKey, desdeLabel, td, typeColor){
    var desde = td[desdeKey];
    if(!desde) return document.createElement('div');
    var maxTot = Math.max((desde.P5||{}).tot||0,(desde.P6||{}).tot||0,(desde.P1||{}).tot||0,1);
    var total = desde.total||{};
    var el = document.createElement('div');
    el.style.cssText='border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.07);background:#0d0e1a';
    el.innerHTML=
      '<div style="padding:7px 12px 6px;border-bottom:1px solid '+typeColor+'22">'
      +'<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:'+typeColor+'">'+desdeLabel+'</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:7px">'
      // ORIENTACIÓN destino: P5 - P6 - P1
      + zoneCard(desde.P5||{},'Pos 5',maxTot,typeColor)
      + zoneCard(desde.P6||{},'Pos 6',maxTot,typeColor)
      + zoneCard(desde.P1||{},'Pos 1',maxTot,typeColor)
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);padding:5px 10px 7px;border-top:1px solid rgba(255,255,255,.06)">'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#e2e8f0;font-family:Barlow Condensed,sans-serif">'+(total.tot||0)+'</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">recep</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:'+ec(total.eff||0)+';font-family:Barlow Condensed,sans-serif">'+(total.eff||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">EFF</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#22c55e;font-family:Barlow Condensed,sans-serif">'+(total.pos||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px"># +</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#ef4444;font-family:Barlow Condensed,sans-serif">'+(total.neg||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">/ =</div></div>'
      +'</div>';
    return el;
  }
  var types=[{key:'flotado', label:'SAQUE FLOTADO', color:'#818cf8'},{key:'potencia',label:'SAQUE POTENCIA', color:'#f97316'}];
  var zones=[{key:'desde_z1',label:'Desde Zona 1'},{key:'desde_z6',label:'Desde Zona 6'},{key:'desde_z5',label:'Desde Zona 5'}];
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'padding:14px 4px 4px';
  types.forEach(function(t){
    if(!rec[t.key]) return;
    var hayDatos=zones.some(function(z){var zz=rec[t.key][z.key];return zz&&zz.total&&zz.total.tot>0;});
    if(!hayDatos) return;
    var secHdr = document.createElement('div');
    secHdr.style.cssText='display:flex;align-items:center;gap:10px;margin:0 0 10px';
    secHdr.innerHTML='<div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;background:'+t.color+'18;color:'+t.color+';border:0.5px solid '+t.color+'44">'+t.label+' — por zona de origen</div><div style="flex:1;height:.5px;background:rgba(255,255,255,.08)"></div>';
    wrapper.appendChild(secHdr);
    var row = document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px';
    zones.forEach(function(z){row.appendChild(makeZonePanel(z.key, z.label, rec[t.key], t.color));});
    wrapper.appendChild(row);
  });
  if(!wrapper.children.length){
    container.innerHTML='<div style="color:#475569;padding:28px;text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase">Sin datos de recepción</div>';
    return;
  }
  container.appendChild(wrapper);
}

var currentNum=0, currentFiltro='partido', currentPartido='acumulado';

function buildSubfiltro(){
  var row=document.getElementById('subfiltro-row');row.innerHTML='';
  if(currentFiltro!=='partido'){row.style.display='none';return;}
  row.style.display='flex';
  var b=document.createElement('button');b.className='sfbtn'+(currentPartido==='acumulado'?' on':'');b.textContent='Acumulado';
  b.onclick=function(){currentPartido='acumulado';updateSfBtns(this);renderPage();};row.appendChild(b);
  if(typeof PARTIDOS_META!=='undefined'){
    PARTIDOS_META.forEach(function(m){
      var btn=document.createElement('button');btn.className='sfbtn'+(currentPartido===m.nombre?' on':'');
      var label=m.rival||m.nombre;if(m.resultado) label+=' ('+m.resultado+')';
      btn.textContent=label;btn.onclick=function(){currentPartido=m.nombre;updateSfBtns(this);renderPage();};row.appendChild(btn);
    });
  }
}
function updateSfBtns(active){document.querySelectorAll('.sfbtn').forEach(function(b){b.classList.remove('on');});active.classList.add('on');}
function setFiltro(filtro){
  currentFiltro=filtro;if(filtro==='partido') currentPartido='acumulado';
  document.getElementById('btn-partido').className='fbtn'+(filtro==='partido'?' active-partido':'');
  document.getElementById('btn-entrenamiento').className='fbtn'+(filtro==='entrenamiento'?' active-entrenamiento':'');
  buildSubfiltro();renderPage();
}

function getJugadorPartidoRec(){
  // Por partido: buscar en PARTIDOS_INDIVIDUAL (ahora tiene recepcion por zona)
  if(currentPartido!=='acumulado'){
    if(typeof PARTIDOS_INDIVIDUAL!=='undefined'){
      var pd=PARTIDOS_INDIVIDUAL.find(function(p){return p.nombre===currentPartido;});
      if(pd&&pd.jugadores){
        var jj=pd.jugadores.find(function(x){return x.num===currentNum;});
        if(jj&&jj.recepcion&&jj.recepcion.flotado) return jj;
      }
    }
    return null;
  }
  // Acumulado: PARTIDOS_JUGADORES (recepcion por zona), fallback Nafels_JUGADORES
  if(typeof PARTIDOS_JUGADORES!=='undefined'){
    var j=PARTIDOS_JUGADORES.find(function(x){return x.num===currentNum;});
    if(j&&j.recepcion&&j.recepcion.flotado) return j;
  }
  if(typeof Nafels_JUGADORES!=='undefined'){
    var j=Nafels_JUGADORES.find(function(x){return x.num===currentNum;});
    if(j&&j.recepcion&&j.recepcion.flotado) return j;
  }
  return null;
}

function renderPage(){
  var cont=document.getElementById('content');var j=null;
  if(currentFiltro==='partido'){
    j=getJugadorPartidoRec();
    if(!j||!j.recepcion||!j.recepcion.flotado){
      cont.innerHTML='<div class="empty">Sin datos de recepción'+(currentPartido!=='acumulado'?' para '+currentPartido:'')+'</div>';return;
    }
  } else {
    j=buildRecepcionFromHistorial(currentNum);
    if(!j){cont.innerHTML='<div class="empty">Sin datos de recepción en entrenamientos</div>';return;}
  }
  // nombre: puede venir sin nombre en individual → buscar en PARTIDOS_JUGADORES
  var nombre=j.nombre;
  if(!nombre&&typeof PARTIDOS_JUGADORES!=='undefined'){var jj=PARTIDOS_JUGADORES.find(function(x){return x.num===currentNum;});if(jj)nombre=jj.nombre;}
  nombre=nombre||(currentNum+'');
  var nm=nombre.replace(/^\d+\s*/,'');
  var suffix=currentFiltro==='entrenamiento'?' (ENT)':currentPartido!=='acumulado'?' ('+currentPartido+')':'';
  document.getElementById('back-jug').href='jugador.html?num='+currentNum;
  document.getElementById('jug-title').textContent='🛡 RECEPCIÓN — '+nm+suffix;
  cont.innerHTML='';
  if(currentFiltro==='entrenamiento'&&!j._hasDrDir){
    var note=document.createElement('div');note.className='info-note';note.textContent='ℹ️  Sin desglose por zona en este scout.';cont.appendChild(note);
  }
  var panel=document.createElement('div');renderPanelRecepcion(j,panel);cont.appendChild(panel);
  renderComparativaRecepcion(j, cont, currentNum);
}

// ── EFF de recepción por tipo (flotado/potencia/total) de un jugador ──
function recEffByTipo(jug){
  if(!jug||!jug.recepcion) return null;
  function effDe(tipoKeys){
    var sumEff=0,sumTot=0;
    tipoKeys.forEach(function(tk){
      var tp=jug.recepcion[tk]; if(!tp) return;
      ['desde_z1','desde_z6','desde_z5'].forEach(function(zk){
        var z=tp[zk]; if(!z||!z.total||!z.total.tot) return;
        sumEff+=z.total.eff*z.total.tot; sumTot+=z.total.tot;
      });
    });
    return sumTot>0?{eff:Math.round(sumEff/sumTot),tot:sumTot}:null;
  }
  return {
    flotado: effDe(['flotado']),
    potencia: effDe(['potencia']),
    total: effDe(['flotado','potencia'])
  };
}

function renderComparativaRecepcion(j, cont, num){
  var JUG = typeof PARTIDOS_JUGADORES!=='undefined'&&PARTIDOS_JUGADORES.length?PARTIDOS_JUGADORES:(typeof Nafels_JUGADORES!=='undefined'?Nafels_JUGADORES:[]);
  if(!JUG.length) return;
  var mio=recEffByTipo(j);
  if(!mio||!mio.total) return;
  function colorEff(v){ if(v===null||v===undefined) return '#475569'; return v>=25?'#22c55e':v>=5?'#86efac':v>=0?'#94a3b8':v>=-15?'#f97316':'#ef4444'; }
  function cell(o){ return o?o.eff+'%':'—'; }
  function effV(o){ return o?o.eff:null; }
  var TIPOS=[{k:'flotado',l:'Flotado',c:'#818cf8'},{k:'potencia',l:'Potencia',c:'#f97316'},{k:'total',l:'Total',c:'#22c55e'}];

  // ── promedio del EQUIPO por tipo ──
  var eqAvg={};
  TIPOS.forEach(function(t){
    var vals=JUG.map(function(c){var r=recEffByTipo(c);return r&&r[t.k]?r[t.k].eff:null;}).filter(function(v){return v!==null;});
    eqAvg[t.k]=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):null;
  });

  // ── CUADRO 1: VS EQUIPO (3 filas: flotado/potencia/total) ──
  var rows1=TIPOS.map(function(t){
    var miE=effV(mio[t.k]); var eqE=eqAvg[t.k];
    var dif=(miE!==null&&eqE!==null)?miE-eqE:null;
    var difC=dif===null?'#475569':dif>=5?'#22c55e':dif>=0?'#86efac':dif>=-8?'#fbbf24':'#ef4444';
    return '<tr style="border-bottom:1px solid rgba(255,255,255,.04)">'
      +'<td style="padding:8px 10px;text-align:left;font-size:12px;font-weight:700;color:'+t.c+'">'+t.l+'</td>'
      +'<td style="padding:8px;text-align:center"><span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:'+colorEff(miE)+'">'+(miE!==null?miE+'%':'—')+'</span></td>'
      +'<td style="padding:8px;text-align:center"><span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:#94a3b8">'+(eqE!==null?eqE+'%':'—')+'</span></td>'
      +'<td style="padding:8px;text-align:center"><span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:'+difC+'">'+(dif!==null?(dif>=0?'+':'')+dif+'%':'—')+'</span></td>'
      +'</tr>';
  }).join('');
  var s1=document.createElement('div');
  s1.style.cssText='margin-top:20px;padding:16px;background:rgba(13,14,26,.8);border:1px solid rgba(255,255,255,.06);border-radius:12px';
  s1.innerHTML='<div style="font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#64748b;margin-bottom:14px">COMPARATIVA VS EQUIPO</div>'
    +'<table style="width:100%;border-collapse:collapse;font-family:Barlow Condensed,sans-serif">'
    +'<thead><tr>'
    +'<th style="padding:6px 10px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;text-align:left">Tipo</th>'
    +'<th style="padding:6px 8px;font-size:9px;color:#22c55e;letter-spacing:1.5px;text-transform:uppercase;text-align:center">Vos</th>'
    +'<th style="padding:6px 8px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;text-align:center">Equipo</th>'
    +'<th style="padding:6px 8px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;text-align:center">Dif.</th>'
    +'</tr></thead><tbody>'+rows1+'</tbody></table>';
  cont.appendChild(s1);

  // ── CUADRO 2: VS POSICIÓN (una fila por compañero, columnas flotado/potencia/total) ──
  var curInfo=JUG.find(function(c){return c.num===num;});
  var pos=curInfo?curInfo.pos:'';
  var mismaPos=JUG.filter(function(c){var r=recEffByTipo(c);return c.pos===pos && r && r.total;});
  if(pos && mismaPos.length>1){
    mismaPos.sort(function(a,b){if(a.num===num)return -1;if(b.num===num)return 1;return a.num-b.num;});
    var rows2=mismaPos.map(function(c){
      var r=recEffByTipo(c);var isCur=c.num===num;
      var nm=(c.nombre||'').replace(/^\d+\s*/,'');
      var celdas=TIPOS.map(function(t){
        var e=r&&r[t.k]?r[t.k].eff:null;
        return '<td style="padding:8px;text-align:center"><span style="font-family:Bebas Neue,sans-serif;font-size:18px;color:'+colorEff(e)+(isCur?';font-weight:800':'')+'">'+(e!==null?e+'%':'—')+'</span></td>';
      }).join('');
      return '<tr style="border-bottom:1px solid rgba(255,255,255,.04);'+(isCur?'background:rgba(232,25,44,.06);':'')+'">'
        +'<td style="padding:8px;font-size:12px;font-weight:'+(isCur?'800':'600')+';color:'+(isCur?'#e8192c':'#94a3b8')+'">'+nm+(isCur?' ←':'')+'</td>'
        +celdas+'</tr>';
    }).join('');
    var s2=document.createElement('div');
    s2.style.cssText='margin-top:12px;padding:14px 16px;background:rgba(13,14,26,.8);border:1px solid rgba(255,255,255,.06);border-radius:12px';
    s2.innerHTML='<div style="font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#818cf8;margin-bottom:12px">VS '+pos+'S</div>'
      +'<table style="width:100%;border-collapse:collapse;font-family:Barlow Condensed,sans-serif">'
      +'<thead><tr><th style="padding:6px 8px;font-size:9px;color:#64748b;letter-spacing:1.5px;text-transform:uppercase;text-align:left">Jugador</th>'
      +TIPOS.map(function(t){return '<th style="padding:6px 8px;font-size:9px;color:'+t.c+';letter-spacing:1.5px;text-transform:uppercase;text-align:center">'+t.l+'</th>';}).join('')
      +'</tr></thead><tbody>'+rows2+'</tbody></table>';
    cont.appendChild(s2);
  }
}

function waitAndInit(tries){
  var ok=typeof Nafels_JUGADORES!=='undefined'||typeof PARTIDOS_JUGADORES!=='undefined'||typeof window.HISTORIAL_DATA!=='undefined';
  if(ok){var params=new URLSearchParams(window.location.search);currentNum=parseInt(params.get('num'))||0;buildSubfiltro();document.fonts.ready.then(renderPage).catch(renderPage);}
  else if(tries>0){setTimeout(function(){waitAndInit(tries-1);},200);}
  else {document.getElementById('content').innerHTML='<div class="empty">No se pudieron cargar los datos.</div>';}
}
waitAndInit(25);
</script>
