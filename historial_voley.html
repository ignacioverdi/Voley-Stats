<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Voley — Historial</title>
<script src="datos_historial.js"><
<script>
// ================================================================
// CASLA VOLEY — Utils compartidos
// Cargado por todas las páginas
// ================================================================

// ── Eficiencias ──────────────────────────────────────────────
function effSaque(j){
  return j.sT>0 ? Math.round((j.sPunto+0.5*j.sVend+0.25*j.sPos-j.sErr)/j.sT*100) : null;
}
function effRecepcion(j){
  return j.rT>0 ? Math.round((j.rPunto+0.5*j.rPos-0.5*j.rVend-j.rErr)/j.rT*100) : null;
}
function effAtaque(j){
  return j.aT>0 ? Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100) : null;
}
function effBloqueo(j){
  return j.bT>0 ? Math.round((j.bPt+j.bPtPos)/j.bT*100) : null;
}
function effColor(v){
  if(v===null||v===undefined||isNaN(v)) return 'var(--mut,#475569)';
  return v>=40?'#22c55e':v>=20?'#86efac':v>=0?'var(--txt,#e2e8f0)':v>=-20?'#f97316':'#ef4444';
}
function fmtEff(v){ return (v<0?'-':'')+Math.abs(v)+'%'; }

// ── Acumular jugadores de múltiples sesiones ─────────────────
function acumJugadores(sesiones){
  var acum={};
  (sesiones||[]).forEach(function(s){
    (s.jugadores||[]).forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(!acum[j.c]) acum[j.c]={c:j.c,n:j.n,PJ:0,
        sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sOrig:'',sDest:'',
        rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,
        aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,
        bT:0,bPt:0,bPtPos:0,dv4:{}};
      var a=acum[j.c];
      if((j.sT||0)+(j.rT||0)+(j.aT||0)+(j.bT||0)>0) a.PJ++;
      ['sT','sPunto','sPos','sOvp','sNeg','sVend','sErr',
       'rT','rPunto','rPos','rOvp','rNeg','rVend','rErr',
       'aT','aPunto','aPos','aOvp','aNeg','aVend','aErr',
       'bT','bPt','bPtPos'].forEach(function(k){ a[k]+=(j[k]||0); });
      if(j.dv4) Object.keys(j.dv4).forEach(function(cod){
        if(!a.dv4[cod]) a.dv4[cod]={tot:0,pt:0,err:0,orig:j.dv4[cod].orig||0};
        a.dv4[cod].tot+=j.dv4[cod].tot||0;
        a.dv4[cod].pt +=j.dv4[cod].pt ||0;
        a.dv4[cod].err+=j.dv4[cod].err||0;
      });
    });
  });
  return Object.values(acum).sort(function(a,b){return a.c-b.c;});
}

// ── Filtrar historial ────────────────────────────────────────
function filtrarSesiones(sesiones, tipo){
  if(!tipo||tipo==='todos') return sesiones||[];
  return (sesiones||[]).filter(function(s){ return (s.tipo||'P')===tipo; });
}

// ── Pos colors ───────────────────────────────────────────────
var POS_COLOR={
  'ARMADOR':'#f59e0b','CENTRAL':'#f97316',
  'PUNTA':'#22c55e','OPUESTO':'#818cf8','LIBERO':'#06b6d4'
};

// ── Objetivos config ─────────────────────────────────────────
window.OBJETIVOS_CONFIG={metas:{
  sq:   {label:'% Saque',   obj:3,  min:-12,max:8,  g2:3,  g1:-3, y:-8},
  rec:  {label:'% Recep.',  obj:36, min:20, max:44, g2:36, g1:30, y:25},
  bqpos:{label:'Blq #+',    obj:43, min:25, max:52, g2:43, g1:37, y:30},
  bqpt: {label:'% Blq #',   obj:23, min:12, max:28, g2:23, g1:20, y:17},
  atqq: {label:'Atq Quick', obj:48, min:35, max:56, g2:48, g1:44, y:40},
  atqhb:{label:'Atq HB',    obj:20, min:8,  max:26, g2:20, g1:16, y:12},
  atqx: {label:'Atq X',     obj:42, min:28, max:50, g2:42, g1:38, y:34},
  atqrp:{label:'Atq R#+',   obj:50, min:32, max:58, g2:50, g1:44, y:38},
  atqri:{label:'Atq R!',    obj:36, min:22, max:44, g2:36, g1:32, y:28},
  atqrm:{label:'Atq R-',    obj:26, min:14, max:34, g2:26, g1:22, y:18},
  atqtr:{label:'Atq TR',    obj:34, min:22, max:42, g2:34, g1:30, y:26}
}};

function objClassify(id,val){
  var m=window.OBJETIVOS_CONFIG.metas[id];
  if(val>=m.g2) return{color:'#22c55e',bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',  label:'Objetivo'};
  if(val>=m.g1) return{color:'#86efac',bg:'rgba(134,239,172,.08)',border:'rgba(134,239,172,.3)', label:'Cerca'};
  if(val>=m.y)  return{color:'#fbbf24',bg:'rgba(251,191,36,.1)',  border:'rgba(251,191,36,.3)',  label:'Neutro'};
  return              {color:'#ef4444',bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.3)',   label:'Lejos'};
}
function objClassifyVsTeam(val,teamVal){
  if(teamVal===null||teamVal===undefined) return{color:'#64748b',bg:'rgba(100,116,139,.08)',border:'rgba(100,116,139,.2)',label:'—'};
  var d=val-teamVal;
  if(d>=5)  return{color:'#22c55e',bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',  label:'Sobre equipo'};
  if(d>=0)  return{color:'#86efac',bg:'rgba(134,239,172,.08)',border:'rgba(134,239,172,.3)', label:'Cerca equipo'};
  if(d>=-8) return{color:'#fbbf24',bg:'rgba(251,191,36,.1)',  border:'rgba(251,191,36,.3)',  label:'Neutro'};
  return         {color:'#ef4444',bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.3)',   label:'Bajo equipo'};
}
function objPct(v,mn,mx){return Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100));}

function objCalcVals(nombreJugador){
  var D=window.HISTORIAL_DATA;
  if(!D){
    // Demo values when no data loaded
    if(nombreJugador) return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:41,atqhb:14,atqx:34,atqrp:42,atqri:27,atqrm:19,atqtr:28};
    return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:null,atqhb:14,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
  var a={sT:0,sPunto:0,sPos:0,sVend:0,sErr:0,rT:0,rPunto:0,rPos:0,rVend:0,rErr:0,
         aT:0,aPunto:0,aVend:0,aErr:0,bT:0,bPt:0,bPtPos:0,mbT:0,mbPt:0,mbVnd:0,mbErr:0};
  var CENT=[2,10,15,17];
  D.entrenamientos.forEach(function(s){
    s.jugadores.forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(nombreJugador&&j.n!==nombreJugador) return;
      a.sT+=j.sT||0;a.sPunto+=j.sPunto||0;a.sPos+=j.sPos||0;a.sVend+=j.sVend||0;a.sErr+=j.sErr||0;
      a.rT+=j.rT||0;a.rPunto+=j.rPunto||0;a.rPos+=j.rPos||0;a.rVend+=j.rVend||0;a.rErr+=j.rErr||0;
      a.aT+=j.aT||0;a.aPunto+=j.aPunto||0;a.aVend+=j.aVend||0;a.aErr+=j.aErr||0;
      a.bT+=j.bT||0;a.bPt+=j.bPt||0;a.bPtPos+=j.bPtPos||0;
      if(!nombreJugador&&CENT.indexOf(j.c)>=0){a.mbT+=j.aT||0;a.mbPt+=j.aPunto||0;a.mbVnd+=j.aVend||0;a.mbErr+=j.aErr||0;}
    });
  });
  var v={};
  v.sq   =a.sT>0?Math.round((a.sPunto+0.5*a.sVend+0.25*a.sPos-a.sErr)/a.sT*100):null;
  v.rec  =a.rT>0?Math.round((a.rPunto+0.5*a.rPos-0.5*a.rVend-a.rErr)/a.rT*100):null;
  v.bqpos=a.bT>0?Math.round((a.bPt+a.bPtPos)/a.bT*100):null;
  v.bqpt =a.bT>0?Math.round(a.bPt/a.bT*100):null;
  v.atqhb=a.mbT>0?Math.round((a.mbPt-a.mbVnd-a.mbErr)/a.mbT*100):null;
  return v;
}

function objSingleBat(id,val,meta,cls,objLine){
  var fh=val!==null?objPct(val,meta.min,meta.max):0;
  var oh=objPct(objLine,meta.min,meta.max);
  var txt=val!==null?fmtEff(val):'—';
  return '<div style="flex:1;min-width:60px;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px 8px;border:0.5px solid '+cls.border+';border-radius:10px;background:'+cls.bg+';position:relative;overflow:hidden;font-family:Barlow Condensed,sans-serif">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+cls.color+';border-radius:10px 10px 0 0"></div>'
    +'<div style="font-size:22px;font-weight:900;line-height:1;color:'+cls.color+'">'+txt+'</div>'
    +'<div style="width:32px;height:68px;display:flex;flex-direction:column;align-items:center">'
      +'<div style="width:14px;height:5px;border-radius:2px 2px 0 0;background:'+cls.color+';opacity:.7;flex-shrink:0"></div>'
      +'<div style="position:relative;width:32px;flex:1;border-radius:3px;overflow:hidden;border:2px solid '+cls.color+'">'
        +'<div style="position:absolute;inset:0;background:#07080f"></div>'
        +(val!==null?'<div style="position:absolute;bottom:0;left:0;right:0;height:'+fh+'%;background:'+cls.color+'"></div>':'')
        +'<div style="position:absolute;bottom:25%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:50%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:75%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:'+oh+'%;left:-2px;right:-2px;display:flex;align-items:center;z-index:3">'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-right:4px solid rgba(255,255,255,.9)"></div>'
          +'<div style="flex:1;height:2px;background:rgba(255,255,255,.9);border-radius:1px"></div>'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:4px solid rgba(255,255,255,.9)"></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div style="font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 5px;border-radius:20px;background:'+cls.color+'22;color:'+cls.color+'">'+cls.label+'</div>'
    +'</div>';
}

function renderObjetivos(cid,extra){
  var el=document.getElementById(cid); if(!el) return;
  var metas=window.OBJETIVOS_CONFIG.metas;
  var vals=Object.assign({},objCalcVals(null),extra||{});
  var html='<div style="font-family:Barlow Condensed,sans-serif;padding:4px 0 8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#64748b">OBJETIVOS DEL EQUIPO · 2026</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +[['#22c55e','Objetivo'],['#86efac','Cerca'],['#fbbf24','Neutro'],['#ef4444','Lejos']].map(function(x){
      return'<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#64748b"><div style="width:7px;height:7px;border-radius:50%;background:'+x[0]+'"></div>'+x[1]+'</div>';
    }).join('')+'</div></div>'
    +'<div style="display:flex;gap:8px;width:100%;margin-bottom:4px">'
    +Object.keys(metas).map(function(id){return'<div style="flex:1;min-width:60px;max-width:110px;text-align:center;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#64748b">'+metas[id].label+'</div>';}).join('')
    +'</div><div style="display:flex;gap:8px;width:100%">'
    +Object.keys(metas).map(function(id){
      var m=metas[id],val=vals[id]!==undefined?vals[id]:null;
      var cls=val!==null?objClassify(id,val):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
      return objSingleBat(id,val,m,cls,m.obj);
    }).join('')+'</div></div>';
  el.innerHTML=html;
}

function renderObjetivosJugador(cid,nombre,extra){
  var el=document.getElementById(cid); if(!el) return;
  var metas=window.OBJETIVOS_CONFIG.metas;
  var jugVals=Object.assign({},objCalcVals(nombre),extra||{});
  var eqVals=objCalcVals(null);
  var rows=[{label:'Jugador',vals:jugVals,isJug:true},{label:'Equipo',vals:eqVals,isJug:false}];
  var html='<div style="font-family:Barlow Condensed,sans-serif;padding:4px 0 8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#64748b">MI PERFORMANCE VS EQUIPO</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +[['#22c55e','Sobre equipo'],['#86efac','Cerca'],['#fbbf24','Neutro'],['#ef4444','Bajo equipo']].map(function(x){
      return'<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#64748b"><div style="width:7px;height:7px;border-radius:50%;background:'+x[0]+'"></div>'+x[1]+'</div>';
    }).join('')+'</div></div>'
    +'<div style="display:flex;gap:8px;width:100%;margin-bottom:4px">'
    +'<div style="width:64px;flex-shrink:0"></div>'
    +Object.keys(metas).map(function(id){return'<div style="flex:1;min-width:60px;max-width:110px;text-align:center;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#64748b">'+metas[id].label+'</div>';}).join('')
    +'</div>';
  rows.forEach(function(row){
    html+='<div style="display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px">'
      +'<div style="width:64px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;text-align:right;padding-right:8px">'+row.label+'</div>'
      +Object.keys(metas).map(function(id){
        var m=metas[id],val=row.vals[id]!==undefined?row.vals[id]:null;
        var cls,objLine;
        if(row.isJug){
          var eq=eqVals[id]!==undefined?eqVals[id]:null;
          cls=val!==null?objClassifyVsTeam(val,eq):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
          objLine=eq!==null?eq:m.obj;
        } else {
          cls=val!==null?objClassify(id,val):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
          objLine=m.obj;
        }
        return objSingleBat(id,val,m,cls,objLine);
      }).join('')+'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

</script>/script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--sur:#0f0f1a;--card:#13131f;--card2:#16162a;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);
  --txt:#eeeef5;--mut:#5a5a72;--dim:#1e1e2e;
  --green:#22c55e;--lgreen:#86efac;--amber:#fbbf24;--orange:#f97316;
  --red:#ef4444;--dred:#991b1b;--purple:#a78bfa;--blue:#38bdf8;--indigo:#818cf8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 15% 0%,rgba(99,102,241,.1) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 100%,rgba(34,197,94,.06) 0%,transparent 55%);
  pointer-events:none;z-index:0}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,16,.97);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--b);
  padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:58px}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;
  letter-spacing:4px;text-transform:uppercase;white-space:nowrap}
.nav-logo span{color:var(--indigo)}
.nav-tabs{display:flex;gap:4px;margin-left:1rem}
.nav-tab{padding:6px 16px;border-radius:8px;border:1px solid transparent;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--mut)}
.nav-tab:hover{color:var(--txt);border-color:var(--b2)}
.nav-tab.on{background:rgba(99,102,241,.15);border-color:var(--indigo);color:var(--indigo)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-gen{font-size:10px;color:var(--mut)}
.back-btn{padding:5px 14px;background:rgba(255,255,255,.05);border:1px solid var(--b2);
  border-radius:7px;color:var(--mut);font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;text-decoration:none;transition:all .2s}
.back-btn:hover{color:var(--txt);border-color:var(--b3)}

/* MAIN */
.main{position:relative;z-index:1;padding:1.5rem 2rem 4rem}

/* VIEWS */
.view{display:none}.view.on{display:block}

/* ═══════════════════════════════════════════
   VISTA EQUIPO
═══════════════════════════════════════════ */
.eq-hero{background:linear-gradient(135deg,var(--sur),var(--card2));
  border:1px solid var(--b);border-radius:16px;padding:2rem;
  margin-bottom:1.5rem;display:flex;gap:2rem;flex-wrap:wrap;align-items:center}
.eq-hero-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;
  font-weight:900;letter-spacing:3px;text-transform:uppercase}
.eq-hero-title span{color:var(--indigo)}
.eq-hero-sub{font-size:11px;color:var(--mut);letter-spacing:1px;margin-top:4px}
.eq-kpis{display:flex;gap:1rem;flex-wrap:wrap;margin-left:auto}
.eq-kpi{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 20px;background:rgba(255,255,255,.03);border:1px solid var(--b);
  border-radius:10px;min-width:80px}
.eq-kpi-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1}
.eq-kpi-l{font-size:8px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase}

/* Trend chart */
.trend-section{margin-bottom:1.5rem}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--mut);
  margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--b)}

.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.trend-card{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:1.25rem;overflow:hidden}
.trend-card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem}
.trend-chart{height:80px;position:relative;overflow:hidden}
.trend-svg{width:100%;height:100%}

/* Ranking table */
.rank-table{background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.rank-table table{width:100%;border-collapse:collapse}
.rank-table th{padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--b);
  text-align:center;background:var(--sur)}
.rank-table th:first-child{text-align:left}
.rank-table td{padding:10px 16px;font-size:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:rgba(255,255,255,.02)}
.rank-table .t-name{text-align:left;display:flex;align-items:center;gap:10px}
.rank-cam{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;
  font-weight:900;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);

<script>
const C={green:'#22c55e',lgreen:'#86efac',amber:'#fbbf24',orange:'#f97316',red:'#ef4444',dred:'#7f1d1d',purple:'#a78bfa',blue:'#38bdf8',indigo:'#818cf8',mut:'#5a5a72'};
const FUNDS=[
  {k:'s',l:'SAQUE',   color:C.amber,  eff:'sEff', tot:'sT'},
  {k:'r',l:'RECEPCION',color:C.green, eff:'rEff', tot:'rT'},
  {k:'a',l:'ATAQUE',  color:C.indigo, eff:'aEff', tot:'aT'},
  {k:'b',l:'BLOQUEO', color:C.purple, eff:null,   tot:'bT', special:'bPtPos'},
];

let currentPlayer=null;

function setView(v,btn){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  btn.classList.add('on');
}

function ec(v){if(v===null||v===undefined)return C.indigo;if(v>=60)return C.green;if(v>=30)return C.amber;if(v>=0)return C.orange;return C.red;}
function trendArrow(vals){
  if(vals.length<2)return{sym:'—',c:C.mut,delta:0};
  const last=vals[vals.length-1],prev=vals[vals.length-2];
  const d=last-prev;
  if(d>3)return{sym:'▲',c:C.green,delta:d};
  if(d<-3)return{sym:'▼',c:C.red,delta:d};
  return{sym:'→',c:C.amber,delta:d};
}

function sparkline(vals, color, w=260, h=70){
  if(!vals||vals.length===0)return '<text x="50%" y="50%" text-anchor="middle" fill="'+C.mut+'" font-size="10" font-family="Barlow Condensed">Sin datos</text>';
  if(vals.length===1){
    // Single bar
    const pct=Math.min(100,Math.max(0,(vals[0]+100)/2));
    const bh=pct/100*h;
    const id='g'+Math.random().toString(36).substr(2,6);
    return '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".6"/><stop offset="100%" stop-color="'+color+'" stop-opacity=".1"/></linearGradient></defs>'
      +'<rect x="'+(w/2-20)+'" y="'+(h-bh)+'" width="40" height="'+bh+'" fill="url(#'+id+')" rx="4"/>'
      +'<text x="'+(w/2)+'" y="'+(h-bh-6)+'" text-anchor="middle" fill="'+color+'" font-size="13" font-weight="bold" font-family="Barlow Condensed">'+vals[0]+'%</text>';
  }
  const mn=Math.min(...vals)-5, mx=Math.max(...vals)+5;
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=i/(vals.length-1)*w;
    const y=h-(v-mn)/range*h;
    return `${x},${y}`;
  });
  const area='M'+pts[0]+' '+pts.map(p=>'L'+p).join(' ')+` L${w},${h} L0,${h} Z`;
  const line='M'+pts[0]+' '+pts.map(p=>'L'+p).join(' ');
  const lastX=parseFloat(pts[pts.length-1].split(',')[0]);
  const lastY=parseFloat(pts[pts.length-1].split(',')[1]);
  const id='g'+Math.random().toString(36).substr(2,6);
  return `<defs>
    <linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="${area}" fill="url(#${id})"/>
  <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>`;
}


// ═══ FILTROS GLOBALES ═══
var filtroActivo = {periodo: 'all', tipo: 'all', fecha: 'all'};

// Poblar dropdown de fecha con las fechas del historial
function poblarFechas(){
  var D=window.HISTORIAL_DATA;
  if(!D||!D.entrenamientos) return;
  var fechas=[];
  D.entrenamientos.forEach(function(e){
    if(fechas.indexOf(e.fecha)<0) fechas.push(e.fecha);
  });
  // Ordenar descendente
  fechas.sort(function(a,b){
    var pa=a.split('/'),pb=b.split('/');
    var da=new Date(pa[2],pa[1]-1,pa[0]);
    var db=new Date(pb[2],pb[1]-1,pb[0]);
    return db-da;
  });
  var menu=document.getElementById('dd-fecha-menu');
  if(!menu) return;
  // Limpiar opciones anteriores excepto la primera (Todas las fechas)
  var items=menu.querySelectorAll('.dd-item.dinamico');
  items.forEach(function(i){i.remove();});
  // Agrupar por mes
  var meses={};
  fechas.forEach(function(f){
    var p=f.split('/');
    var mesKey=p[1]+'/'+p[2];
    var mesNombres=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    var mesLabel=mesNombres[parseInt(p[1])]+' '+p[2];
    if(!meses[mesKey]) meses[mesKey]={label:mesLabel,fechas:[]};
    meses[mesKey].fechas.push(f);
  });
  // Botón por mes + botones por día
  Object.keys(meses).sort().reverse().forEach(function(mk){
    var m=meses[mk];
    // Separador mes
    var sep=document.createElement('div');
    sep.className='dd-item dinamico';
    sep.style.cssText='font-size:9px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px 2px;cursor:default;pointer-events:none;font-weight:700;';
    sep.textContent='📅 '+m.label;
    menu.appendChild(sep);
    // Botón todo el mes
    var btnMes=document.createElement('button');
    btnMes.className='dd-item dinamico';
    btnMes.style.paddingLeft='20px';
    btnMes.textContent='Todo '+m.label;
    btnMes.onclick=(function(mv,ml){
      return function(){
        // Filtro especial: todo el mes
        filtroActivo.fecha='mes:'+mv;
        document.getElementById('dd-fecha-label').textContent=ml;
        document.getElementById('dd-fecha-menu').style.display='none';
        reRenderActive();
      };
    })(mk,m.label);
    menu.appendChild(btnMes);
    // Botón por día
    m.fechas.forEach(function(f){
      var p=f.split('/');
      var btn=document.createElement('button');
      btn.className='dd-item dinamico';
      btn.style.paddingLeft='32px';
      btn.textContent=p[0]+' de '+['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(p[1])];
      btn.onclick=(function(fv,ft){
        return function(){
          selectDD('fecha',fv,ft,btn);

      })(f,f);
      menu.appendChild(btn);
    });
  });
}

function toggleDD(key){

  ['periodo','tipo','fecha'].forEach(function(k){

function selectDD(key, val, label, btn){
  filtroActivo[key] = val;
  document.getElementById('dd-'+key+'-label').textContent = label.replace('🏐 ','').replace('🏆 ','');
  // Actualizar clases del menú
  btn.parentElement.querySelectorAll('.dd-item').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  // Cerrar menú
  document.getElementById('dd-'+key+'-menu').style.display='none';
  // Mostrar tag si hay filtro activo
  updateFiltroTag();
  // Re-renderizar
  reRenderActive();
}

function updateFiltroTag(){
  var tag = document.getElementById('filtro-tag');
  if(!tag) return;
  var parts = [];
  if(filtroActivo.periodo !== 'all') parts.push(document.getElementById('dd-periodo-label').textContent);
  if(filtroActivo.tipo !== 'all') parts.push(document.getElementById('dd-tipo-label').textContent);
  if(parts.length > 0){
    tag.style.display='block';
    tag.textContent = parts.join(' · ');
  } else {
    tag.style.display='none';
  }
}

function reRenderActive(){
  var views = document.querySelectorAll('.view');
  var activeId = '';
  views.forEach(function(v){ if(v.classList.contains('on')) activeId = v.id; });
  if(activeId === 'view-equipo') renderEquipo();
  else if(activeId === 'view-individual' && currentPlayer) renderIndividual(currentPlayer.nom, currentPlayer.cam);
  else if(activeId === 'view-comparar') renderComparison();
}

function filtrarHistorial(entrenamientos){
  var hoy = new Date();
  return entrenamientos.filter(function(e){
    // Filtro tipo
    if(filtroActivo.tipo !== 'all'){
      if((e.tipo||'E') !== filtroActivo.tipo) return false;
    }
    // Filtro período
    if(filtroActivo.periodo !== 'all'){
      var dias = parseInt(filtroActivo.periodo);
      var partes = e.fecha.split('/');
      var fechaE = new Date(partes[2], partes[1]-1, partes[0]);
      var diffDias = (hoy - fechaE) / (1000*60*60*24);
      if(diffDias > dias) return false;
    }
    // Filtro fecha específica
    if(filtroActivo.fecha !== 'all'){
      if(filtroActivo.fecha.indexOf('mes:')===0){
        // Filtro por mes completo
        var mesKey=filtroActivo.fecha.replace('mes:','');
        var partes=e.fecha.split('/');
        var eMesKey=partes[1]+'/'+partes[2];
        if(eMesKey !== mesKey) return false;
      } else {
        if(e.fecha !== filtroActivo.fecha) return false;
      }
    }
    return true;
  });
}

var _getPlayerHistoryOrig = getPlayerHistory;
function getPlayerHistory(nom){
  var D = window.HISTORIAL_DATA;
  if(!D) return [];
  var entrenamientosFiltrados = filtrarHistorial(D.entrenamientos);
  return entrenamientosFiltrados.map(function(e){
    var j = e.jugadores.find(function(x){ return x.n === nom; });
    return j ? Object.assign({fecha: e.fecha, tipo: e.tipo||'E', rival: e.rival||'', resultado: e.resultado||null}, j) : null;
  }).filter(Boolean);
}

// Sobrescribir getTeamByDate para aplicar filtros
var _getTeamByDateOrig = getTeamByDate;
function getTeamByDate(){
  var D = window.HISTORIAL_DATA;
  if(!D) return [];
  var entrenamientosFiltrados = filtrarHistorial(D.entrenamientos);
  return entrenamientosFiltrados.map(function(e){
    var teamRow = e.jugadores.find(function(j){ return j.c === 0; });
    if(teamRow){
      return Object.assign({fecha: e.fecha, tipo: e.tipo||'E', n: e.jugadores.filter(function(j){return j.c>0;}).length}, teamRow);
    }
    var tot={sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sEff:0,
             rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,rEff:0,
             aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,aTCQ:0,aEff:0,
             bT:0,bPtPos:0};
    e.jugadores.filter(function(j){return j.c>0;}).forEach(function(j){
      Object.keys(tot).forEach(function(k){ if(j[k]!==undefined) tot[k]+=(j[k]||0); });
    });
    return Object.assign({fecha:e.fecha,tipo:e.tipo||'E',n:e.jugadores.filter(function(j){return j.c>0;}).length},tot);
  });
}

function getAllPlayers(){
  const D=window.HISTORIAL_DATA;
  if(!D)return[];
  const set=new Set();
  const arr=[];
  filtrarHistorial(D.entrenamientos).forEach(e=>e.jugadores.forEach(j=>{
    if(!set.has(j.n)){set.add(j.n);arr.push({c:j.c,n:j.n});}
  }));

function _getTeamByDateBase(){
  const D=window.HISTORIAL_DATA;
  if(!D)return[];
  return D.entrenamientos.map(e=>{
    // Usar fila TOTALES EQUIPO (c=0) si existe, sino sumar jugadores reales (c>0)
    const teamRow=e.jugadores.find(j=>j.c===0);
    if(teamRow){
      return{
        fecha:e.fecha,
        sT:teamRow.sT||0, sEff:teamRow.sEff||0,
        sPunto:teamRow.sPunto||0, sPos:teamRow.sPos||0,
        sOvp:teamRow.sOvp||0, sNeg:teamRow.sNeg||0,
        sVend:teamRow.sVend||0, sErr:teamRow.sErr||0,
        rT:teamRow.rT||0, rEff:teamRow.rEff||0,
        rPunto:teamRow.rPunto||0, rPos:teamRow.rPos||0,
        rOvp:teamRow.rOvp||0, rNeg:teamRow.rNeg||0,
        rVend:teamRow.rVend||0, rErr:teamRow.rErr||0,
        aT:teamRow.aT||0, aEff:teamRow.aEff||0,
        aPunto:teamRow.aPunto||0, aPos:teamRow.aPos||0,
        aOvp:teamRow.aOvp||0, aNeg:teamRow.aNeg||0,
        aVend:teamRow.aVend||0, aErr:teamRow.aErr||0,
        aTCQ:teamRow.aTCQ||0,
        bT:teamRow.bT||0, bPtPos:teamRow.bPtPos||0,
        n:e.jugadores.filter(j=>j.c>0).length
      };
    }
    // Fallback: sumar solo jugadores reales (c>0)
    const tot={sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sEff:[],
               rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,rEff:[],
               aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,aTCQ:0,aEff:[],
               bT:0,bPtPos:[]};
    e.jugadores.filter(j=>j.c>0).forEach(j=>{
      tot.sT+=j.sT||0; tot.sPunto+=(j.sPunto||0); tot.sPos+=(j.sPos||0);
      tot.sOvp+=(j.sOvp||0); tot.sNeg+=(j.sNeg||0);
      tot.sVend+=(j.sVend||0); tot.sErr+=(j.sErr||0);
      if(j.sT>0)tot.sEff.push(j.sEff);
      tot.rT+=j.rT||0; tot.rPunto+=(j.rPunto||0); tot.rPos+=(j.rPos||0);
      tot.rOvp+=(j.rOvp||0); tot.rNeg+=(j.rNeg||0);
      tot.rVend+=(j.rVend||0); tot.rErr+=(j.rErr||0);
      if(j.rT>0)tot.rEff.push(j.rEff);
      tot.aT+=j.aT||0; tot.aPunto+=(j.aPunto||0); tot.aPos+=(j.aPos||0);
      tot.aOvp+=(j.aOvp||0); tot.aNeg+=(j.aNeg||0);
      tot.aVend+=(j.aVend||0); tot.aErr+=(j.aErr||0); tot.aTCQ+=(j.aTCQ||0);
      if(j.aT>0)tot.aEff.push(j.aEff);
      tot.bT+=j.bT||0; if(j.bT>0)tot.bPtPos.push(j.bPtPos||0);
    });
    const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;
    return{fecha:e.fecha,...tot,sEff:avg(tot.sEff),rEff:avg(tot.rEff),aEff:avg(tot.aEff),bPtPos:avg(tot.bPtPos),n:e.jugadores.filter(j=>j.c>0).length};
  });
}

function renderTeamDV4Historial(){
  const D=window.HISTORIAL_DATA;
  if(!D)return'';

  // Acumular DV4 de todas las sesiones y todos los jugadores
  const totals={};
  var _ses=D.entrenamientos.filter(function(s){
    return typeof HS_FILTRO==='undefined'||HS_FILTRO==='todos'||(s.tipo||'P')===HS_FILTRO;
  });
  _ses.forEach(e=>{
    e.jugadores.forEach(j=>{
      if(!j.dv4)return;
      if(j.n==='TOTALES EQUIPO')return;
      Object.keys(j.dv4).forEach(cod=>{
        const d=j.dv4[cod];
        if(!d||!d.tot)return;
        if(!totals[cod])totals[cod]={tot:0,pt:0,err:0};
        totals[cod].tot+=d.tot||0;
        totals[cod].pt +=d.pt ||0;
        totals[cod].err+=d.err||0;
      });
    });
  });

  const hasDV4=Object.values(totals).some(v=>v.tot>0);
  if(!hasDV4)return`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:2rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px;margin-bottom:1.5rem">Sin datos DV4 registrados aún</div>`;

  const DV4G={
    'CENTRAL':['X1','XM','XG','XC','XD','X7','CB','CF','CD','J1','J4','J2','J3','J5'],
    'ALTA':   ['G4','G2','G8','G9','V5','V0','V6','V8','VB','VP','VR','V4','V3','V2'],
    'RAPIDA': ['W4','W2','Y9','Y8','PR','JJ','PP','C5','C0','C6','C8','X5','X0','X6','X8','XB','XP','XR','XT','X3','X4']

      .sort((a,b)=>totals[b].tot-totals[a].tot);
    if(!conDatos.length)return;

    const color=DV4C[grupo];
    const totGrupo=conDatos.reduce((s,c)=>s+totals[c].tot,0);
    const ptGrupo =conDatos.reduce((s,c)=>s+totals[c].pt, 0);
    const errGrupo=conDatos.reduce((s,c)=>s+totals[c].err,0);
    const effGrupo=totGrupo?Math.round(ptGrupo/totGrupo*100):0;

    const filas=conDatos.map(cod=>{
      const d=totals[cod];
      const eff=d.tot?Math.round(d.pt/d.tot*100):0;
      const barW=eff;
      return `
        <div style="display:grid;grid-template-columns:56px 1fr 60px 80px 60px;

            font-size:13px;font-weight:700;color:var(--red)">${d.err}</div>

    }).join('');

    html+=`

        <div style="padding:10px 16px;display:flex;align-items:center;gap:16px;

function renderEquipo(){
  const D=window.HISTORIAL_DATA;
  if(!D){document.getElementById('eq-content').innerHTML='<div class=empty-msg>Sin datos. Ejecuta GuardarEntrenamiento primero.</div>';return;}
  const byDate=getTeamByDate();
  const totalSess=byDate.length;
  const totalAcc=byDate.reduce((s,d)=>s+(d.sT+d.rT+d.aT+d.bT),0);
  const lastDate=byDate[byDate.length-1]?.fecha||'--';
  const avgSEff=byDate.filter(d=>d.sEff!==null).map(d=>d.sEff);
  const avgREff=byDate.filter(d=>d.rEff!==null).map(d=>d.rEff);
  const avgAEff=byDate.filter(d=>d.aEff!==null).map(d=>d.aEff);
  const lastSEff=avgSEff[avgSEff.length-1]??'--';
  const lastREff=avgREff[avgREff.length-1]??'--';
  const lastAEff=avgAEff[avgAEff.length-1]??'--';

  // Cards de stats por fundamento (última sesión del equipo)
  const lastD=byDate[byDate.length-1]||{};
  const prevD=byDate[byDate.length-2]||null;

  function fundCard(titulo, color, tot, pills, extra){
    if(!tot) return '';
    const wrap=document.createElement('div');
    wrap.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden';
    // Header
    const hdr=document.createElement('div');
    hdr.style.cssText='padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)';

    ttl.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;color:'+color;
    ttl.textContent=titulo;
    const totEl=document.createElement('div');
    totEl.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:12px;color:var(--mut);letter-spacing:1px';
    totEl.textContent=tot+' acciones';
    hdr.appendChild(ttl); hdr.appendChild(totEl);
    wrap.appendChild(hdr);
    // Pills grid
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat('+pills.length+',1fr);gap:1px;background:rgba(255,255,255,.04)';
    pills.forEach(function(p){
      const cell=document.createElement('div');
      cell.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:var(--card)';
      const val=document.createElement('div');
      val.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900;color:'+p.c;
      val.textContent=p.v;
      const lbl=document.createElement('div');
      lbl.style.cssText='font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase';
      lbl.textContent=p.l;
      cell.appendChild(val); cell.appendChild(lbl);
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
    if(extra){
      const ft=document.createElement('div');
      ft.style.cssText='padding:6px 16px;font-size:10px;color:var(--mut);letter-spacing:.5px;border-top:1px solid rgba(255,255,255,.03)';
      ft.textContent=extra;
      wrap.appendChild(ft);
    }
    return wrap.outerHTML;
  }

  // Saque
  const sEff=lastD.sEff||0;
  const sCard=fundCard('SAQUE', C.amber, lastD.sT,
    [
      {l:'EFF',  v:lastD.sT>0?sEff+'%':'--',     c:ec(sEff)},
      {l:'TOT',  v:lastD.sT||0,                   c:C.amber},
      {l:'#',    v:lastD.sPunto||0,                c:'#22c55e'},
      {l:'/',    v:lastD.sVend||0,                 c:'#fb923c'},
      {l:'+',    v:lastD.sPos||0,                  c:'#86efac'},
      {l:'-',    v:lastD.sNeg||0,                  c:'#f97316'},
      {l:'=',    v:lastD.sErr||0,                  c:'#ef4444'},
    ],
    prevD&&prevD.sT>0?'Sesión anterior: '+prevD.sEff+'% EFF':null
  );
  // Recepción
  const rEff=lastD.rEff||0;
  const rCard=fundCard('RECEPCIÓN', C.green, lastD.rT,
    [
      {l:'EFF',  v:lastD.rT>0?rEff+'%':'--',      c:ec(rEff)},
      {l:'TOT',  v:lastD.rT||0,                    c:C.green},
      {l:'#',    v:lastD.rPunto||0,                c:'#22c55e'},
      {l:'+',    v:lastD.rPos||0,                  c:'#86efac'},
      {l:'!',    v:lastD.rOvp||0,                  c:'#fbbf24'},
      {l:'-',    v:lastD.rNeg||0,                  c:'#f97316'},
      {l:'/',    v:lastD.rVend||0,                 c:'#fb923c'},
      {l:'=',    v:lastD.rErr||0,                  c:'#ef4444'},
    ],
    prevD&&prevD.rT>0?'Sesión anterior: '+prevD.rEff+'% EFF':null
  );
  // Ataque
  const aEff=lastD.aEff||0;
  const aCard=fundCard('ATAQUE', C.indigo, lastD.aT,
    [
      {l:'EFF',  v:lastD.aT>0?aEff+'%':'--',      c:ec(aEff)},
      {l:'TOT',  v:lastD.aT||0,                    c:C.indigo},
      {l:'#',    v:lastD.aPunto||0,                c:'#22c55e'},
      {l:'+',    v:lastD.aPos||0,                  c:'#86efac'},
      {l:'!',    v:lastD.aOvp||0,                  c:'#fbbf24'},
      {l:'-',    v:lastD.aNeg||0,                  c:'#f97316'},
      {l:'/',    v:lastD.aVend||0,                 c:'#fb923c'},
      {l:'=',    v:lastD.aErr||0,                  c:'#ef4444'},
    ],
    prevD&&prevD.aT>0?'Sesión anterior: '+prevD.aEff+'% EFF':null
  );

  const trendsHTML=[sCard,rCard,aCard].filter(Boolean).join('');

  // Player ranking (last entrenamiento)
  const lastE=D.entrenamientos[D.entrenamientos.length-1];
  const players=getAllPlayers();
  const rankRows=players.map(p=>{
    const hist=getPlayerHistory(p.n);
    if(!hist.length)return null;
    const last=hist[hist.length-1];
    const sEffVals=hist.filter(h=>h.sT>0).map(h=>h.sEff);
    const rEffVals=hist.filter(h=>h.rT>0).map(h=>h.rEff);
    const aEffVals=hist.filter(h=>h.aT>0).map(h=>h.aEff);
    const sT=trendArrow(sEffVals),rT=trendArrow(rEffVals),aT=trendArrow(aEffVals);
    return{p,last,sEffVals,rEffVals,aEffVals,sT,rT,aT,sessions:hist.length};
  }).filter(Boolean).sort((a,b)=>(b.last.rEff||0)-(a.last.rEff||0));

  const rankHTML=rankRows.map((row,i)=>`<tr>
    <td><div class=t-name>
      <div class=rank-cam>${row.p.c}</div>
      <div class=rank-nom>${row.p.n}</div>
    </div></td>
    <td style="font-size:11px;color:var(--mut)">${row.sessions}</td>
    <td><span class=eff-val style="color:${ec(row.last.sEff)}">${row.last.sT>0?row.last.sEff+'%':'--'}</span>
        <span class=trend-badge style="color:${row.sT.c}"> ${row.sT.sym}</span></td>
    <td><span class=eff-val style="color:${ec(row.last.rEff)}">${row.last.rT>0?row.last.rEff+'%':'--'}</span>
        <span class=trend-badge style="color:${row.rT.c}"> ${row.rT.sym}</span></td>
    <td><span class=eff-val style="color:${ec(row.last.aEff)}">${row.last.aT>0?row.last.aEff+'%':'--'}</span>
        <span class=trend-badge style="color:${row.aT.c}"> ${row.aT.sym}</span></td>
    <td>${row.last.bT>0?row.last.bPtPos+'%':'--'}</td>
    <td>${row.last.aTCQ||0}</td>
    <td>${row.last.bT>0?row.last.bPt:'--'}</td>
  </tr>`).join('');

  document.getElementById('eq-content').innerHTML=`
    <div class=eq-hero>
      <div>
        <div class=eq-hero-title>Evolucion del <span>Equipo</span></div>
        <div class=eq-hero-sub>ULTIMO ENTRENAMIENTO: ${lastDate} &nbsp;·&nbsp; ${totalSess} SESIONES REGISTRADAS</div>
      </div>
      <div class=eq-kpis>
        <div class=eq-kpi>
          <div class=eq-kpi-n style="color:${ec(lastSEff)}">${lastSEff!=='--'?lastSEff+'%':'--'}</div>
          <div class=eq-kpi-l>Eff Saque</div>
        </div>
        <div class=eq-kpi>
          <div class=eq-kpi-n style="color:${ec(lastREff)}">${lastREff!=='--'?lastREff+'%':'--'}</div>
          <div class=eq-kpi-l>Eff Recep.</div>
        </div>
        <div class=eq-kpi>
          <div class=eq-kpi-n style="color:${ec(lastAEff)}">${lastAEff!=='--'?lastAEff+'%':'--'}</div>
          <div class=eq-kpi-l>Eff Ataque</div>
        </div>
        <div class=eq-kpi>
          <div class=eq-kpi-n>${totalAcc}</div>
          <div class=eq-kpi-l>Acciones tot.</div>
        </div>
      </div>
    </div>

    <div class=section-title>STATS DEL EQUIPO — ÚLTIMA SESIÓN</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;margin-bottom:1.5rem">${trendsHTML}</div>

    <div class=section-title>RANKING DE MEJORA RECIENTE</div>

          <th style="color:${C.green}">EFF REC.</th>

function renderPlayerSelect(){
  const players=getAllPlayers();
  document.getElementById('player-select').innerHTML=players.map(p=>
    `<button class="player-btn" onclick="selectPlayer('${p.n}',${p.c},this)">${p.n}</button>`
  ).join('');

function selectPlayer(nom,cam,btn){
  currentPlayer={nom,cam};
  document.querySelectorAll('.player-btn').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  renderIndividual(nom,cam);
  setTimeout(()=>loadCoachNote(nom),50);
}

function renderIndividual(nom,cam){
  const hist=getPlayerHistory(nom);
  if(!hist.length){
    document.getElementById('ind-content').innerHTML='<div class=empty-msg>Sin datos para '+nom+'</div>';
    return;
  }

  const sessions=hist.length;
  const totalAcc=hist.reduce((s,h)=>s+(h.sT+h.rT+h.aT+h.bT),0);
  const lastH=hist[hist.length-1];

  // Hero stats
  const heroStats=[
    {n:sessions,l:t('sesiones')},
    {n:totalAcc,l:t('acciones')},
    {n:lastH.sT>0?lastH.sEff+'%':'--',l:'Eff Saque',c:ec(lastH.sEff)},
    {n:lastH.rT>0?lastH.rEff+'%':'--',l:'Eff Recep.',c:ec(lastH.rEff)},
    {n:lastH.aT>0?lastH.aEff+'%':'--',l:'Eff Ataque',c:ec(lastH.aEff)},
  ].map(s=>`<div class=player-stat>
    <div class=player-stat-n style="color:${s.c||'var(--txt)'}">${s.n}</div>
    <div class=player-stat-l>${s.l}</div>
  </div>`).join('');

  // Fund cards con stats acumulados del jugador
  function indFundCard(titulo, color, sessions, pills, effVals){
    if(!sessions) return '';
    const wrap=document.createElement('div');
    wrap.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden';
    const hdr=document.createElement('div');
    hdr.style.cssText='padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)';
    const ttl=document.createElement('div');
    ttl.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;color:'+color;
    ttl.textContent=titulo;
    // Tendencia EFF
    var effTxt='';
    if(effVals.length>0){
      var last=effVals[effVals.length-1];
      var tr=trendArrow(effVals);
      var tSpan=document.createElement('span');
      tSpan.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:13px;color:'+tr.c+';margin-left:6px';
      tSpan.textContent=tr.sym+(tr.delta?Math.abs(tr.delta)+'%':'');
      var eSpan=document.createElement('span');
      eSpan.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;color:'+ec(last)+';margin-left:auto;margin-right:4px';
      eSpan.textContent=last+'%';
      hdr.appendChild(ttl); hdr.appendChild(eSpan); hdr.appendChild(tSpan);
    } else {
      hdr.appendChild(ttl);
    }
    wrap.appendChild(hdr);
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat('+pills.length+',1fr);gap:1px;background:rgba(255,255,255,.04)';
    pills.forEach(function(p){
      const cell=document.createElement('div');
      cell.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:var(--card)';
      const val=document.createElement('div');
      val.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900;color:'+p.c;
      val.textContent=p.v;
      const lbl=document.createElement('div');
      lbl.style.cssText='font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase';
      lbl.textContent=p.l;
      cell.appendChild(val); cell.appendChild(lbl);
      grid.appendChild(cell);
    });
    wrap.appendChild(grid);
    return wrap.outerHTML;
  }

  // Acumular stats del jugador a lo largo de todas las sesiones
  var sTot=0,sPt=0,sPos=0,sOvp=0,sNeg=0,sVend=0,sErr=0;
  var rTot=0,rPt=0,rPos=0,rOvp=0,rNeg=0,rVend=0,rErr=0;
  var aTot=0,aPt=0,aPos=0,aOvp=0,aNeg=0,aVend=0,aErr=0,aTcq=0;
  var sEffVals=[],rEffVals=[],aEffVals=[];
  hist.forEach(function(s){
    if(s.sT>0){sTot+=s.sT;sPt+=(s.sPunto||0);sPos+=(s.sPos||0);sOvp+=(s.sOvp||0);sNeg+=(s.sNeg||0);sVend+=(s.sVend||0);sErr+=(s.sErr||0);sEffVals.push(s.sEff);}
    if(s.rT>0){rTot+=s.rT;rPt+=(s.rPunto||0);rPos+=(s.rPos||0);rOvp+=(s.rOvp||0);rNeg+=(s.rNeg||0);rVend+=(s.rVend||0);rErr+=(s.rErr||0);rEffVals.push(s.rEff);}
    if(s.aT>0){aTot+=s.aT;aPt+=(s.aPunto||0);aPos+=(s.aPos||0);aOvp+=(s.aOvp||0);aNeg+=(s.aNeg||0);aVend+=(s.aVend||0);aErr+=(s.aErr||0);aTcq+=(s.aTCQ||0);aEffVals.push(s.aEff);}
  });
  var sEffAcum=sTot>0?Math.round((sPt-sVend-sErr)/sTot*100):0;
  var rEffAcum=rTot>0?Math.round((rPt+rPos*0.5+rOvp*0.25-rVend*0.5-rErr)/rTot*100):0;
  var aEffAcum=aTot>0?Math.round((aPt-aVend-aErr)/aTot*100):0;

  const sCardInd=indFundCard('SAQUE', C.amber, sTot, [
    {l:'EFF',v:sTot>0?sEffAcum+'%':'--',c:ec(sEffAcum)},
    {l:'TOT',v:sTot,c:C.amber},
    {l:'#',v:sPt,c:'#22c55e'},
    {l:'/',v:sVend,c:'#fb923c'},
    {l:'+',v:sPos,c:'#86efac'},
    {l:'-',v:sNeg,c:'#f97316'},
    {l:'=',v:sErr,c:'#ef4444'},
  ], sEffVals);
  const rCardInd=indFundCard('RECEPCIÓN', C.green, rTot, [
    {l:'EFF',v:rTot>0?rEffAcum+'%':'--',c:ec(rEffAcum)},
    {l:'TOT',v:rTot,c:C.green},
    {l:'#',v:rPt,c:'#22c55e'},
    {l:'+',v:rPos,c:'#86efac'},
    {l:'!',v:rOvp,c:'#fbbf24'},
    {l:'-',v:rNeg,c:'#f97316'},
    {l:'/',v:rVend,c:'#fb923c'},
    {l:'=',v:rErr,c:'#ef4444'},
  ], rEffVals);
  const aCardInd=indFundCard('ATAQUE', C.indigo, aTot, [
    {l:'EFF',v:aTot>0?aEffAcum+'%':'--',c:ec(aEffAcum)},
    {l:'TOT',v:aTot,c:C.indigo},
    {l:'#',v:aPt,c:'#22c55e'},
    {l:'+',v:aPos,c:'#86efac'},
    {l:'!',v:aOvp,c:'#fbbf24'},
    {l:'-',v:aNeg,c:'#f97316'},
    {l:'/',v:aVend,c:'#fb923c'},
    {l:'=',v:aErr,c:'#ef4444'},
  ], aEffVals);
  const fundCards=[sCardInd,rCardInd,aCardInd].filter(Boolean).join('');

  // Best / worst session
  renderBestWorst(hist);

  // Feedback
  const feedback=generateFeedback(hist,nom);
  const fbHTML=feedback.map(fb=>`<div class=feedback-item style="background:${fb.bg};border-color:${fb.bc}">
    <div class=feedback-icon>${fb.icon}</div>
    <div class=feedback-text><strong style="color:${fb.color}">${fb.title}</strong>${fb.text}</div>
  </div>`).join('');

  // Daily log
  const logRows=[...hist].reverse().map(h=>`<tr>
    <td style="color:var(--mut)">${h.fecha}</td>
    <td style="color:var(--txt)">${h.sT||0}</td>
    <td style="color:${ec(h.sEff)}">${h.sT>0?h.sEff+'%':'--'}</td>
    <td style="color:var(--txt)">${h.rT||0}</td>
    <td style="color:${ec(h.rEff)}">${h.rT>0?h.rEff+'%':'--'}</td>
    <td style="color:var(--txt)">${h.aT||0}</td>
    <td style="color:${ec(h.aEff)}">${h.aT>0?h.aEff+'%':'--'}</td>
    <td style="color:var(--txt)">${h.bT||0}</td>
    <td style="color:${C.purple}">${h.aTCQ||0}</td>
    <td style="color:${C.red}">${h.bPt||0}</td>
  </tr>`).join('');

  document.getElementById('ind-content').innerHTML=`
    <div class=player-hero>
      <div class=player-nb>${cam}</div>
      <div class=player-info>
        <div class=player-name>${nom}</div>
        <div class=player-sub>${sessions} ENTRENAMIENTOS REGISTRADOS &nbsp;·&nbsp; ULTIMO: ${lastH.fecha}</div>
      </div>
      <div class=player-stats>${heroStats}</div>
    </div>

    <div class=section-title>STATS ACUMULADOS</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;margin-bottom:1rem">${fundCards}</div>

    <div class=section-title>NOTA DEL ENTRENADOR</div>
    <div class=coach-note-wrap id="coach-note-wrap">
      <div class=coach-note-header>
        <div class=coach-note-title>Mensaje para ${nom}</div>
        <div class=coach-note-saved id="note-saved">✓ Guardado</div>
      </div>
      <textarea class=coach-note-input id="coach-note-input"
        placeholder="Escribí una nota personalizada para el jugador — se guarda automáticamente..."
        oninput="saveCoachNote('${nom}',this.value)"></textarea>
    </div>

    <div class=section-title>MEJOR Y PEOR SESION</div>
    <div id="best-worst-wrap"></div>

    <div class=section-title>ANALISIS DE RENDIMIENTO</div>
    <div class=feedback-strip>
      <div class=feedback-title>FEEDBACK AUTOMATICO</div>
      <div class=feedback-items>${fbHTML}</div>
    </div>

    <div class=section-title>RECEPCIÓN — DETALLE</div>
    ${renderRecepcionBlock(hist)}

    <div class=section-title>ATAQUE — DETALLE</div>
    ${renderAtaqueBlock(hist)}

    <div class=section-title>DIRECCIÓN DE SAQUE</div>
    ${renderSaqueBlock(hist, nom)}

    <div class=section-title>DETALLE POR COMBINACION DE ATAQUE</div>
    ${renderDV4Block(hist)}

    <div class=section-title>REGISTRO POR SESION</div>
    <div class=daily-log>
      <table>
        <thead><tr>
          <th>FECHA</th>
          <th style="color:${C.amber}">SAQ</th><th style="color:${C.amber}">EFF</th>
          <th style="color:${C.green}">REC</th><th style="color:${C.green}">EFF</th>
          <th style="color:${C.indigo}">ATA</th><th style="color:${C.indigo}">EFF</th>
          <th style="color:${C.purple}">BLQ</th>
          <th style="color:${C.purple}">TCQ</th>
          <th style="color:${C.red}">BLOCK OUT</th>
        </tr></thead>
        <tbody>${logRows}</tbody>
      </table>
    </div>`;
}

const DV4_GRUPOS = {
  'CENTRAL': ['X1','XM','XG','XC','XD','X7','CB','CF','CD','J1','J4','J2','J3','J5'],
  'ALTA':    ['G4','G2','G8','G9','V5','V0','V6','V8','VB','VP','VR','V4','V3','V2'],
  'RAPIDA':  ['W4','W2','Y9','Y8','PR','JJ','PP','C5','C0','C6','C8','X5','X0','X6','X8','XB','XP','XR','XT','X3','X4']
};
const DV4_GRUPO_COLOR = {'CENTRAL': '#818cf8', 'ALTA': '#22c55e', 'RAPIDA': '#f97316'};



function statBlock(titulo, color, pills, extra){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:0';
  
  const hdr = document.createElement('div');
  hdr.style.cssText = 'padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.05)';
  
  const ttl = document.createElement('div');
  ttl.style.cssText = "font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;color:"+color;
  ttl.textContent = titulo;
  hdr.appendChild(ttl);
  
  if(extra){
    const ext = document.createElement('div');
    ext.style.cssText = 'font-size:10px;color:var(--mut);letter-spacing:.8px;margin-top:1px';
    ext.textContent = extra;
    hdr.appendChild(ext);
  }
  wrap.appendChild(hdr);
  
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat('+pills.length+',1fr);gap:1px;background:rgba(255,255,255,.04)';
  
  pills.forEach(function(p){
    const cell = document.createElement('div');
    cell.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:var(--card)';
    const val = document.createElement('div');
    val.style.cssText = "font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:"+p.c;
    val.textContent = p.v;
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase';
    lbl.textContent = p.l;
    cell.appendChild(val);
    cell.appendChild(lbl);
    grid.appendChild(cell);
  });
  wrap.appendChild(grid);
  return wrap.outerHTML;
}


function renderRecepcionBlock(hist){
  let tot=0,pt=0,pos=0,adm=0,neg=0,vend=0,err=0;
  hist.forEach(function(s){
    tot  +=(parseInt(s.rT)     ||0);
    pt   +=(parseInt(s.rPunto) ||0);
    pos  +=(parseInt(s.rPos)   ||0);
    adm  +=(parseInt(s.rOvp)   ||0);
    neg  +=(parseInt(s.rNeg)   ||0);
    vend +=(parseInt(s.rVend)  ||0);
    err  +=(parseInt(s.rErr)   ||0);
  });
  if(tot===0){
    var d=document.createElement('div');
    d.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;padding:1.5rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px';
    d.textContent='Sin datos de recepción registrados';
    return d.outerHTML;
  }
  var eff=Math.round((pt*1+pos*0.5+adm*0.25-vend*0.5-err*1)/tot*100);
  var effColor=eff>=50?'#22c55e':eff>=30?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  var RC='#22c55e';
  return statBlock('RECEPCIÓN', RC, [
    {l:'EFF',v:eff+'%',c:effColor},
    {l:'TOT',v:tot,    c:RC},
    {l:'#',  v:pt,     c:'#22c55e'},
    {l:'+',  v:pos,    c:'#86efac'},
    {l:'!',  v:adm,    c:'#fbbf24'},
    {l:'-',  v:neg,    c:'#f97316'},
    {l:'/',  v:vend,   c:'#fb923c'},
    {l:'=',  v:err,    c:'#ef4444'},
  ], tot+' recepciones totales');
}


function renderAtaqueBlock(hist){
  let tot=0,pt=0,pos=0,adm=0,neg=0,vend=0,err=0,tcq=0;
  hist.forEach(function(s){
    tot  +=(parseInt(s.aT)     ||0);
    pt   +=(parseInt(s.aPunto) ||0);
    pos  +=(parseInt(s.aPos)   ||0);
    adm  +=(parseInt(s.aOvp)   ||0);
    neg  +=(parseInt(s.aNeg)   ||0);
    vend +=(parseInt(s.aVend)  ||0);
    err  +=(parseInt(s.aErr)   ||0);
    tcq  +=(parseInt(s.aTCQ)   ||0);
  });
  if(tot===0){
    var d=document.createElement('div');
    d.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:12px;padding:1.5rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px';
    d.textContent='Sin datos de ataque registrados';
    return d.outerHTML;
  }
  var eff=Math.round((pt-vend-err)/tot*100);
  var effColor=eff>=50?'#22c55e':eff>=25?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  var AC='#818cf8';
  var extra=tot+' ataques totales'+(tcq>0?' · '+tcq+' toques':'');
  return statBlock('ATAQUE', AC, [
    {l:'EFF',v:eff+'%',c:effColor},
    {l:'TOT',v:tot,    c:AC},
    {l:'#',  v:pt,     c:'#22c55e'},
    {l:'+',  v:pos,    c:'#86efac'},
    {l:'!',  v:adm,    c:'#fbbf24'},
    {l:'-',  v:neg,    c:'#f97316'},
    {l:'/',  v:vend,   c:'#fb923c'},
    {l:'=',  v:err,    c:'#ef4444'},
  ], extra);
}


function renderSaqueBlock(hist, playerName){
  const origMap={}, destMap={};
  let totSaque=0, ptSaque=0, posS=0, admS=0, negS=0, vendSaque=0, errSaque=0;
  hist.forEach(function(s){
    const t=parseInt(s.sT)||0;
    totSaque  += t;
    ptSaque   += (parseInt(s.sPunto)||0);
    posS      += (parseInt(s.sPos)  ||0);
    admS      += (parseInt(s.sOvp)  ||0);
    negS      += (parseInt(s.sNeg)  ||0);
    vendSaque += (parseInt(s.sVend) ||0);
    errSaque  += (parseInt(s.sErr)  ||0);
    if(s.sOrig && String(s.sOrig).trim()!==''){
      String(s.sOrig).split(',').forEach(function(z){
        var zi=parseInt(z); if(!zi)return; origMap[zi]=(origMap[zi]||0)+1;
      });
    }
    if(s.sDest && String(s.sDest).trim()!==''){
      String(s.sDest).split(',').forEach(function(z){
        var zi=parseInt(z); if(!zi)return; destMap[zi]=(destMap[zi]||0)+1;
      });
    }
  });
  const totalDests=Object.values(destMap).reduce(function(a,b){return a+b;},0);
  const totalOrigs=Object.values(origMap).reduce(function(a,b){return a+b;},0);
  const topDests=Object.entries(destMap).sort(function(a,b){return b[1]-a[1];}).slice(0,2)
    .map(function(x){return {z:parseInt(x[0]),pct:totalDests>0?Math.round(x[1]/totalDests*100):0};});
  const topOrig=Object.entries(origMap).sort(function(a,b){return b[1]-a[1];})[0];
  const origZone=topOrig?parseInt(topOrig[0]):0;

  const SC='#f59e0b';
  const eff=totSaque>0?Math.round((ptSaque-vendSaque-errSaque)/totSaque*100):null;
  const effColor=eff===null?'#64748b':eff>=40?'#22c55e':eff>=20?'#fbbf24':eff>=0?'#f97316':'#ef4444';
  const hasDests=topDests.length>0;
  const destsEncoded=hasDests?encodeURIComponent(JSON.stringify(topDests)):'';
  const statsEncoded=encodeURIComponent(JSON.stringify({
    tot:totSaque,pt:ptSaque,err:errSaque,vend:vendSaque,
    pct:totSaque>0?Math.round(ptSaque/totSaque*100):0

  // Construir con createElement para evitar problemas de escaping

  hdrTitle.textContent='DIRECCIÓN DE SAQUE';
  const hdrSub=document.createElement('div');
  hdrSub.style.cssText='font-size:11px;color:var(--mut);letter-spacing:.8px;margin-top:2px';
  hdrSub.textContent=totalOrigs+' saques con zona registrada'+(origZone?' · Origen más frecuente: zona '+origZone:'');
  hdrLeft.appendChild(hdrTitle);
  hdrLeft.appendChild(hdrSub);
  hdr.appendChild(hdrLeft);

  if(hasDests){
    const btn=document.createElement('button');
    btn.setAttribute('data-saque-dests',destsEncoded);
    btn.setAttribute('data-saque-orig',origZone);
    btn.setAttribute('data-saque-stats',statsEncoded);
    btn.setAttribute('onclick','saqueClickCancha(this)');
    btn.style.cssText='display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1.5px solid '+SC+';background:rgba(245,158,11,.1);color:'+SC+';font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase';
    btn.textContent='📍 Ver en cancha';
    hdr.appendChild(btn);

  const pills=[
    {l:'EFF', v:eff!==null?eff+'%':'--', c:effColor},
    {l:'TOT', v:totSaque,   c:SC},
    {l:'#',   v:ptSaque,    c:'#22c55e'},
    {l:'/',   v:vendSaque,  c:'#fb923c'},
    {l:'+',   v:posS,       c:'#86efac'},
    {l:'!',   v:admS,       c:'#fbbf24'},
    {l:'-',   v:negS,       c:'#f97316'},
    {l:'=',   v:errSaque,   c:'#ef4444'},
  ];
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat('+pills.length+',1fr);gap:1px;background:rgba(255,255,255,.04)';
  pills.forEach(function(p){
    const cell=document.createElement('div');

    const val=document.createElement('div');
    val.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900;color:'+p.c;
    val.textContent=p.v;
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase';

  wrap.appendChild(grid);

    foot.innerHTML='Top destinos: '+topDests.map(function(d,i){
      return '<span style="color:'+(i===0?'#ff8c00':'#a855f7')+'">zona '+d.z+' ('+d.pct+'%)</span>';
    }).join(' · ');
    wrap.appendChild(foot);
  }

  return wrap.outerHTML;
}
