<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi Performance — CASLA Voley</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<script src="datos_casla.js" onerror="void 0"></script>
<script src="datos_partidos.js" onerror="void 0"></script>
<script src="datos_entrenamientos.js" onerror="void 0"></script>
<script src="datos_historial.js" onerror="void 0"></script>
<script src="objetivos_config.js" onerror="void 0"></script>
<script src="firebase.js" onerror="void 0"></script>
<script src="lang.js" onerror="void 0"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080F; --card:#0D0E1A; --card2:#111220;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.10);
  --red:#E8192C; --amber:#F59E0B; --green:#22C55E; --blue:#3B82F6;
  --indigo:#818CF8; --cyan:#06B6D4;
  --text:#E2E8F0; --muted:#64748B; --subtle:#475569;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh}

/* ── HEADER ── */
.hdr{
  background:rgba(7,8,15,.95);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);
}
.hdr-top{
  display:flex;align-items:center;gap:12px;padding:10px 20px;flex-wrap:wrap;
}
.back-btn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border2);
  background:rgba(255,255,255,.04);color:var(--subtle);font-size:11px;
  font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;flex-shrink:0;
}
.jug-selector{
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:auto;
}
.jug-btn{
  padding:5px 12px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--muted);font-size:10px;
  font-weight:800;letter-spacing:1px;cursor:pointer;text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;transition:all .15s;
}
.jug-btn.on{border-color:var(--red);background:rgba(232,25,44,.1);color:var(--red)}

/* ── PLAYER CARD ── */
.player-hero{
  padding:16px 20px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.player-num{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;
  color:rgba(255,255,255,.08);letter-spacing:-2px;flex-shrink:0;
}
.player-info{flex:1}
.player-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
.player-pos{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.player-stats{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px}
.stat-chip{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);
  min-width:60px;
}
.stat-chip-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.stat-chip-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* ── TIPO FILTER ── */
.tipo-row{
  display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;align-items:center;
}
.tipo-btn{
  padding:5px 16px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--subtle);font-size:11px;
  font-weight:800;letter-spacing:1.5px;cursor:pointer;text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;transition:all .15s;
}
.tipo-btn.on-p{background:rgba(232,25,44,.12);border-color:rgba(232,25,44,.4);color:var(--red)}
.tipo-btn.on-e{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:var(--green)}
.sesion-row{
  display:none;gap:4px;flex-wrap:wrap;padding:6px 20px 10px;
  border-bottom:1px solid var(--border);
}
.ses-btn{
  padding:3px 10px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:var(--muted);font-size:9px;
  font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;transition:all .15s;
}
.ses-btn.on{background:rgba(232,25,44,.1);border-color:rgba(232,25,44,.35);color:var(--red)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto}
.tab-btn{
  padding:12px 20px;font-size:11px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;
  background:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;
}
.tab-btn.on{color:var(--red);border-bottom-color:var(--red)}

/* ── MAIN ── */
.main{max-width:1000px;margin:0 auto;padding:20px 16px}
.section-title{
  font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.empty-msg{
  text-align:center;padding:60px;color:var(--muted);font-size:12px;letter-spacing:2px;
}

/* ── SESION CARDS (calendario) ── */
.ses-grid{display:flex;flex-direction:column;gap:8px}
.ses-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:border-color .15s;
}
.ses-card:hover{border-color:var(--border2)}
.ses-tipo{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.ses-info{flex:1}
.ses-rival{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.ses-fecha{font-size:10px;color:var(--muted);letter-spacing:1px}
.ses-resultado{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
}
.ses-stats{display:flex;gap:12px;margin-top:6px}
.ses-stat{font-size:10px;color:var(--muted)}
.ses-stat span{color:var(--text);font-weight:700}

/* ── EVOLUCIÓN CHART ── */
.evol-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.evol-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.evol-title{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.evol-bars{display:flex;gap:6px;align-items:flex-end;height:80px}
.evol-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.evol-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.evol-label{font-size:8px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden}
.evol-val{font-size:9px;font-weight:700;text-align:center}

/* ── CANCHA WRAPPER ── */
.canchas-grid{display:flex;flex-wrap:wrap;gap:12px}
.cancha-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.cancha-title{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* ── BATERIAS inline ── */
#baterias-panel{padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px">MI PERFORMANCE</div>
    <div class="jug-selector" id="jug-selector"></div>
  </div>
</div>

<!-- PLAYER HERO -->
<div class="player-hero" id="player-hero" style="display:none">
  <div class="player-num" id="hero-num">14</div>
  <div class="player-info">
    <div class="player-name" id="hero-name">NIELSON</div>
    <div class="player-pos" id="hero-pos">PUNTA</div>
    <div class="player-stats" id="hero-stats"></div>
  </div>
</div>

<!-- BATERIAS -->
<div id="baterias-panel" style="display:none">
  <div id="obj-tipo-row" style="display:flex;gap:6px;margin-bottom:8px">
    <button class="tipo-btn on-p" id="obj-tbtn-partido" onclick="objSetTipo('partido',this)">🏆 PARTIDO</button>
    <button class="tipo-btn" id="obj-tbtn-entrenamiento" onclick="objSetTipo('entrenamiento',this)">🏋️ ENTRENAMIENTO</button>
  </div>
  <div id="obj-partido-row" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px"></div>
  <div id="objetivos-jugador"></div>
</div>

<!-- TIPO FILTER -->
<div class="tipo-row" id="tipo-row" style="display:none">
  <button class="tipo-btn on-p" id="tbtn-p" onclick="setTipo('partido',this)">🏆 PARTIDO</button>
  <button class="tipo-btn" id="tbtn-e" onclick="setTipo('entrenamiento',this)">🏋️ ENTRENAMIENTO</button>
</div>
<div class="sesion-row" id="sesion-row"></div>

<!-- TABS -->
<div class="tabs" id="tabs" style="display:none">
  <button class="tab-btn on" onclick="setTab('calendario',this)">📅 CALENDARIO</button>
  <button class="tab-btn" onclick="setTab('rendimiento',this)">📈 RENDIMIENTO</button>
  <button class="tab-btn" onclick="setTab('ataque',this)">💥 ATAQUE</button>
  <button class="tab-btn" onclick="setTab('saque',this)">⚡ SAQUE</button>
  <button class="tab-btn" onclick="setTab('recepcion',this)">🛡 RECEPCIÓN</button>
</div>

<div class="main" id="main-content">
  <div class="empty-msg">Seleccioná un jugador para ver su performance</div>
</div>

<script>
// ── GLOBAL STATE ──────────────────────────────────────────────────────
var G = {
  num: 0,
  jugador: null,    // from CASLA_JUGADORES
  partJug: null,    // from PARTIDOS_JUGADORES
  entJug: null,     // from ENTRENAMIENTOS_JUGADORES
  tipo: 'partido',  // 'partido' or 'entrenamiento'
  sesion: 'acumulado',
  tab: 'calendario',
};

var POS_COLOR = {
  ARMADOR:'#F59E0B',OPUESTO:'#F97316',PUNTA:'#22C55E',
  CENTRAL:'#F97316',LIBERO:'#06B6D4'
};

// ── INIT ──────────────────────────────────────────────────────────────
document.fonts.ready.then(function(){
  buildJugSelector();
  // Check URL param
  var params = new URLSearchParams(window.location.search);
  var num = parseInt(params.get('num')) || 0;
  if(num) selectJugador(num);
}).catch(function(){
  buildJugSelector();
});

function buildJugSelector(){
  var sel = document.getElementById('jug-selector');
  if(!sel) return;
  var jugs = typeof CASLA_JUGADORES !== 'undefined' ? CASLA_JUGADORES : [];
  sel.innerHTML = '';
  jugs.forEach(function(j){
    if(!j.num) return;
    var b = document.createElement('button');
    b.className = 'jug-btn';
    b.textContent = '#'+j.num+' '+j.nombre.replace(/^\d+\s*/,'').split(' ')[0];
    b.onclick = function(){ selectJugador(j.num); };
    sel.appendChild(b);
  });
}

function selectJugador(num){
  G.num = num;
  G.tipo = 'partido';
  G.sesion = 'acumulado';
  G.tab = 'calendario';

  // Load jugador data
  var jugs = typeof CASLA_JUGADORES !== 'undefined' ? CASLA_JUGADORES : [];
  G.jugador = jugs.find(function(j){ return j.num === num; }) || null;

  var pjugs = typeof PARTIDOS_JUGADORES !== 'undefined' ? PARTIDOS_JUGADORES : [];
  G.partJug = pjugs.find(function(j){ return j.num === num; }) || null;

  var ejugs = typeof ENTRENAMIENTOS_JUGADORES !== 'undefined' ? ENTRENAMIENTOS_JUGADORES : [];
  G.entJug = ejugs.find(function(j){ return j.num === num; }) || null;

  // Update selector
  document.querySelectorAll('.jug-btn').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.jug-btn').forEach(function(b){
    if(b.textContent.indexOf('#'+num+' ')===0) b.classList.add('on');
  });

  // Show sections
  renderHero();
  renderBaterias();
  renderTipoRow();
  renderTabs();
  renderContent();
}

// ── HERO ─────────────────────────────────────────────────────────────
function renderHero(){
  var j = G.jugador;
  if(!j){ document.getElementById('player-hero').style.display='none'; return; }
  document.getElementById('player-hero').style.display='flex';
  document.getElementById('hero-num').textContent = j.num;
  var nm = j.nombre.replace(/^\d+\s*/,'');
  document.getElementById('hero-name').textContent = nm.toUpperCase();
  var posEl = document.getElementById('hero-pos');
  posEl.textContent = j.pos||'';
  posEl.style.color = POS_COLOR[j.pos]||'#64748b';

  // Quick stats from partJug
  var pj = G.partJug || j;
  var stats = [];
  var saques = pj.saques||[];
  var sq = saques.find(function(s){return s.cod==='SQ';})||saques[0];
  if(sq&&sq.tot) stats.push({val:(sq.eff||0)+'%',lbl:'EFF Saque'});
  var ataques = pj.ataques||[];
  var totAtq = ataques.reduce(function(s,a){return s+(a.tot||0);},0);
  if(totAtq) stats.push({val:totAtq,lbl:'Ataques'});
  var partCount = (typeof PARTIDOS_META!=='undefined'?PARTIDOS_META:[]).length;
  if(partCount) stats.push({val:partCount,lbl:'Partidos'});
  var entCount = (typeof ENTRENAMIENTOS_META!=='undefined'?ENTRENAMIENTOS_META:[]).length;
  if(entCount) stats.push({val:entCount,lbl:'Entrenos'});

  var statsEl = document.getElementById('hero-stats');
  statsEl.innerHTML = stats.map(function(s){
    return '<div class="stat-chip"><div class="stat-chip-val">'+s.val+'</div><div class="stat-chip-lbl">'+s.lbl+'</div></div>';
  }).join('');
}

// ── BATERIAS ─────────────────────────────────────────────────────────
function renderBaterias(){
  if(!G.jugador){ document.getElementById('baterias-panel').style.display='none'; return; }
  document.getElementById('baterias-panel').style.display='block';
  window._objTipo = G.tipo;
  window._objPartido = G.sesion;
  window._objNombre = G.jugador.nombre;
  buildObjSubfiltro && buildObjSubfiltro();
  objRenderBaterias && objRenderBaterias();
}

function objSetTipo(tipo, btn){
  G.tipo = tipo;
  G.sesion = 'acumulado';
  window._objTipo = tipo;
  window._objPartido = 'acumulado';
  document.querySelectorAll('#obj-tbtn-partido,#obj-tbtn-entrenamiento').forEach(function(b){
    b.className='tipo-btn';
  });
  btn.className = 'tipo-btn '+(tipo==='partido'?'on-p':'on-e');
  buildObjSubfiltro && buildObjSubfiltro();
  objRenderBaterias && objRenderBaterias();
}

// ── TIPO FILTER ──────────────────────────────────────────────────────
function renderTipoRow(){
  if(!G.jugador){ document.getElementById('tipo-row').style.display='none'; return; }
  document.getElementById('tipo-row').style.display='flex';
  document.getElementById('tbtn-p').className='tipo-btn on-p';
  document.getElementById('tbtn-e').className='tipo-btn';
  buildSesionRow();
}

function setTipo(tipo, btn){
  G.tipo = tipo;
  G.sesion = 'acumulado';
  document.getElementById('tbtn-p').className='tipo-btn'+(tipo==='partido'?' on-p':'');
  document.getElementById('tbtn-e').className='tipo-btn'+(tipo==='entrenamiento'?' on-e':'');
  buildSesionRow();
  renderContent();
}

function buildSesionRow(){
  var row = document.getElementById('sesion-row');
  row.innerHTML='';
  var meta = G.tipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_META!=='undefined'?ENTRENAMIENTOS_META:[])
    : (typeof PARTIDOS_META!=='undefined'?PARTIDOS_META:[]);
  if(!meta.length){row.style.display='none';return;}
  row.style.display='flex';

  function makeBtn(label,nombre){
    var b=document.createElement('button');
    b.className='ses-btn'+(G.sesion===nombre?' on':'');
    b.textContent=label;
    b.onclick=function(){
      G.sesion=nombre;
      row.querySelectorAll('.ses-btn').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      renderContent();
    };
    return b;
  }
  row.appendChild(makeBtn('Acumulado','acumulado'));
  meta.forEach(function(m){
    var lbl = G.tipo==='entrenamiento'
      ? (m.fecha||m.nombre)
      : ((m.rival||m.nombre)+(m.resultado?' ('+m.resultado+')':''));
    row.appendChild(makeBtn(lbl,m.nombre));
  });
}

// ── TABS ─────────────────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('tabs').style.display = G.jugador ? 'flex' : 'none';
}

function setTab(tab,btn){
  G.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderContent();
}

// ── CONTENT ROUTER ───────────────────────────────────────────────────
function renderContent(){
  var c = document.getElementById('main-content');
  c.innerHTML='<div class="empty-msg" style="padding:20px">Cargando...</div>';
  if(!G.jugador){c.innerHTML='<div class="empty-msg">Seleccioná un jugador</div>';return;}

  // Get sesion data
  var sesData = getSesionData();

  switch(G.tab){
    case 'calendario': renderCalendario(c, sesData); break;
    case 'rendimiento': renderRendimiento(c); break;
    case 'ataque': renderAtaque(c, sesData); break;
    case 'saque': renderSaque(c, sesData); break;
    case 'recepcion': renderRecepcion(c, sesData); break;
    default: c.innerHTML='<div class="empty-msg">Tab no disponible</div>';
  }
}

function getSesionData(){
  // Get the jugador data for current tipo/sesion
  if(G.sesion==='acumulado'){
    return G.tipo==='entrenamiento' ? G.entJug : G.partJug;
  }
  // Per-sesion
  var INDIV = G.tipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_INDIVIDUAL!=='undefined'?ENTRENAMIENTOS_INDIVIDUAL:null)
    : (typeof PARTIDOS_INDIVIDUAL!=='undefined'?PARTIDOS_INDIVIDUAL:null);
  if(!INDIV) return null;
  var pd = INDIV.find(function(p){return p.nombre===G.sesion;});
  if(!pd||!pd.jugadores) return null;
  var nm = G.jugador.nombre.replace(/^\d+\s*/,'').toLowerCase();
  return pd.jugadores.find(function(j){
    return j.nombre && j.nombre.replace(/^\d+\s*/,'').toLowerCase().split(' ')[0]===nm.split(' ')[0];
  })||null;
}

// ── TAB: CALENDARIO ──────────────────────────────────────────────────
function renderCalendario(c, sesData){
  var D = window.HISTORIAL_DATA;
  if(!D||!D.entrenamientos){c.innerHTML='<div class="empty-msg">Sin datos de historial</div>';return;}

  var sessions = D.entrenamientos.filter(function(e){
    if(G.tipo==='partido') return e.tipo==='P';
    if(G.tipo==='entrenamiento') return e.tipo==='E';
    return true;
  });

  var html = '<div class="section-title">'+sessions.length+' SESIONES — '+
    (G.tipo==='partido'?'PARTIDOS':'ENTRENAMIENTOS')+'</div>';
  html += '<div class="ses-grid">';

  sessions.forEach(function(s){
    var jug = (s.jugadores||[]).find(function(j){return j.c===G.num;});
    if(!jug) return;

    var isP = s.tipo==='P';
    var color = isP ? '#E8192C' : '#22C55E';
    var icon = isP ? '🏆' : '🏋️';
    var res = s.resultado||'';
    var resColor = res==='V'?'#22C55E':res==='D'?'#EF4444':'#64748B';

    html += '<div class="ses-card" onclick="selectSesion(\''+s.fecha+'\',\''+s.rival+'\')">';
    html += '<div class="ses-tipo" style="background:'+color+'22;color:'+color+'">'+icon+'</div>';
    html += '<div class="ses-info">';
    html += '<div class="ses-rival" style="color:'+color+'">'+(isP?s.rival||'Rival':'Entrenamiento')+'</div>';
    html += '<div class="ses-fecha">'+s.fecha+'</div>';
    html += '<div class="ses-stats">';
    if(jug.aT) html += '<div class="ses-stat">ATQ <span>'+jug.aEff+'%</span> ('+jug.aT+')</div>';
    if(jug.sT) html += '<div class="ses-stat">SQ <span>'+jug.sEff+'%</span> ('+jug.sT+')</div>';
    if(jug.rT) html += '<div class="ses-stat">REC <span>'+jug.rEff+'%</span> ('+jug.rT+')</div>';
    if(jug.bT) html += '<div class="ses-stat">BLQ <span>'+jug.bPt+'/'+jug.bT+'</div>';
    html += '</div></div>';
    if(isP&&res) html += '<div class="ses-resultado" style="color:'+resColor+'">'+res+'</div>';
    html += '</div>';
  });

  html += '</div>';
  c.innerHTML = html;
}

// ── TAB: RENDIMIENTO ─────────────────────────────────────────────────
function renderRendimiento(c){
  var D = window.HISTORIAL_DATA;
  if(!D){c.innerHTML='<div class="empty-msg">Sin datos</div>';return;}

  var sessions = D.entrenamientos.filter(function(e){
    return G.tipo==='partido' ? e.tipo==='P' : e.tipo==='E';
  });

  var metricas = [
    {key:'aEff', label:'EFF Ataque', color:'#F97316', min:-50, max:100},
    {key:'sEff', label:'EFF Saque',  color:'#F59E0B', min:-30, max:30},
    {key:'rEff', label:'EFF Recep.', color:'#22C55E', min:-20, max:80},
    {key:'bPt',  label:'Pts Bloq.',  color:'#818CF8', min:0,   max:8},
  ];

  var html = '<div class="evol-grid">';

  metricas.forEach(function(m){
    var vals = sessions.map(function(s){
      var jug=(s.jugadores||[]).find(function(j){return j.c===G.num;});
      return jug ? (jug[m.key]||0) : null;
    }).filter(function(v){return v!==null;});

    if(!vals.length) return;

    var maxV = Math.max.apply(null,vals.map(Math.abs))||1;
    html += '<div class="evol-card">';
    html += '<div class="evol-title">'+m.label+'</div>';
    html += '<div class="evol-bars">';

    var sesLabels = sessions.filter(function(s){
      return (s.jugadores||[]).find(function(j){return j.c===G.num;});
    });

    vals.forEach(function(v,i){
      var pct = Math.abs(v)/maxV*100;
      var barColor = v>=0 ? m.color : '#EF4444';
      var lbl = sesLabels[i] ? (sesLabels[i].rival||sesLabels[i].fecha||'').substring(0,4) : '';
      html += '<div class="evol-bar-wrap">';
      html += '<div class="evol-val" style="color:'+barColor+'">'+v+'</div>';
      html += '<div class="evol-bar" style="height:'+pct+'%;background:'+barColor+'22;border:1px solid '+barColor+'44"></div>';
      html += '<div class="evol-label">'+lbl+'</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  html += '</div>';
  c.innerHTML = html;
}

// ── TAB: ATAQUE ──────────────────────────────────────────────────────
function renderAtaque(c, sesData){
  var D = window.HISTORIAL_DATA;
  var html = '';

  // From HISTORIAL (dv4) - per session attack directions
  if(D){
    var sessions = D.entrenamientos.filter(function(e){
      return G.tipo==='partido' ? e.tipo==='P' : e.tipo==='E';
    });

    // Aggregate dv4 by combo
    var combos = {};
    sessions.forEach(function(s){
      var jug=(s.jugadores||[]).find(function(j){return j.c===G.num;});
      if(!jug||!jug.dv4) return;
      Object.keys(jug.dv4).forEach(function(cod){
        if(!combos[cod]) combos[cod]={tot:0,pt:0,destCounts:{}};
        var d=jug.dv4[cod];
        combos[cod].tot+=d.tot||0;
        combos[cod].pt+=d.pt||0;
        var dest=String(d.dest||'');
        if(dest) combos[cod].destCounts[dest]=(combos[cod].destCounts[dest]||0)+(d.tot||0);
      });
    });

    if(Object.keys(combos).length){
      html += '<div class="section-title">ATAQUE POR COMBINACIÓN</div>';
      html += '<div class="canchas-grid">';
      Object.keys(combos).sort().forEach(function(cod){
        var combo=combos[cod];
        if(combo.tot<1) return;
        var eff=combo.tot>0?Math.round(combo.pt/combo.tot*100):0;
        var item={cod:cod,orig:3,tot:combo.tot,eff:eff,pts:combo.pt,pts_pct:eff,
          destinos:Object.keys(combo.destCounts).map(function(z){
            return {z:parseInt(z),pct:Math.round(combo.destCounts[z]/combo.tot*100)};
          }).sort(function(a,b){return b.pct-a.pct;})
        };
        html+='<div class="cancha-wrap">';
        html+='<div class="cancha-title">'+cod+'</div>';
        html+=buildCanchita(item,'#F97316');
        html+='</div>';
      });
      html+='</div>';
    }
  }

  // From PARTIDOS_JUGADORES ataques
  var pj = G.tipo==='partido' ? (sesData||G.partJug) : (sesData||G.entJug);
  if(pj&&pj.ataques&&pj.ataques.length){
    html+='<div class="section-title" style="margin-top:20px">ATAQUES (Excel)</div>';
    html+='<div class="canchas-grid">';
    pj.ataques.forEach(function(a){
      if(!a.tot) return;
      html+='<div class="cancha-wrap">';
      html+='<div class="cancha-title">'+a.cod+'</div>';
      html+=buildCanchita(a,'#F97316');
      html+='</div>';
    });
    html+='</div>';
  }

  c.innerHTML = html||'<div class="empty-msg">Sin datos de ataque</div>';
}

// ── TAB: SAQUE ───────────────────────────────────────────────────────
function renderSaque(c, sesData){
  var pj = G.tipo==='partido' ? (sesData||G.partJug) : (sesData||G.entJug);
  var html='';

  if(pj&&pj.saques&&pj.saques.length){
    html+='<div class="section-title">SAQUE</div>';
    html+='<div class="canchas-grid">';
    pj.saques.forEach(function(s){
      if(!s.tot) return;
      html+='<div class="cancha-wrap">';
      html+='<div class="cancha-title">'+(s.tipo||s.cod)+' — '+(s.eff||0)+'% EFF</div>';
      html+=buildCanchita(s,'#F59E0B');
      html+='</div>';
    });
    html+='</div>';
  }
  c.innerHTML = html||'<div class="empty-msg">Sin datos de saque</div>';
}

// ── TAB: RECEPCIÓN ───────────────────────────────────────────────────
function renderRecepcion(c, sesData){
  var pj = G.tipo==='partido' ? (sesData||G.partJug) : (sesData||G.entJug);
  if(!pj||!pj.recepcion||!pj.recepcion.flotado){
    c.innerHTML='<div class="empty-msg">Sin datos de recepción</div>';return;
  }
  var panel=document.createElement('div');
  if(typeof renderPanelRecepcion==='function'){
    renderPanelRecepcion(pj,panel);
    c.innerHTML='';c.appendChild(panel);
  } else {
    c.innerHTML='<div class="empty-msg">Función de recepción no disponible</div>';
  }
}

function selectSesion(fecha, rival){
  // When clicking a calendar session, switch to that sesion
  G.sesion = rival||fecha;
  // Try to find matching sesion nombre in meta
  var meta = G.tipo==='partido'
    ? (typeof PARTIDOS_META!=='undefined'?PARTIDOS_META:[])
    : (typeof ENTRENAMIENTOS_META!=='undefined'?ENTRENAMIENTOS_META:[]);
  var m = meta.find(function(x){return x.rival===rival||x.fecha===fecha;});
  if(m) G.sesion=m.nombre;
  // Update sesion row
  var row=document.getElementById('sesion-row');
  if(row) row.querySelectorAll('.ses-btn').forEach(function(b){
    b.classList.remove('on');
    if(b.textContent.indexOf(rival||fecha)>=0) b.classList.add('on');
  });
}

  function zoneCard(d, label, maxTot, typeColor){
    var vol = maxTot>0 ? Math.round((d.tot||0)/maxTot*100) : 0;

      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px"># +</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#22c55e">'+p+'%</div></div>'
      +'<div style="text-align:center"><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px">/ =</div><div style="font-size:10px;font-weight:800;line-height:1.3;color:#ef4444">'+n+'%</div></div>'
      +'</div></div>';

  function makeZonePanel(desdeKey, desdeLabel, td, typeColor){
    var desde = td[desdeKey];

      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#22c55e;font-family:Barlow Condensed,sans-serif">'+( total.pos||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px"># +</div></div>'
      +'<div style="text-align:center"><div style="font-size:15px;font-weight:900;color:#ef4444;font-family:Barlow Condensed,sans-serif">'+( total.neg||0)+'%</div><div style="font-size:7px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:1px">/ =</div></div>'

    return el;

  var types=[

  ];
  var zones=[
    {key:'desde_z1',label:'Desde Zona 1'},
    {key:'desde_z6',label:'Desde Zona 6'},
    {key:'desde_z5',label:'Desde Zona 5'}
  ];

  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'padding:14px 4px 4px';

  types.forEach(function(t, ti){
    var secHdr = document.createElement('div');
    secHdr.style.cssText='display:flex;align-items:center;gap:10px;margin:0 0 10px';
    secHdr.innerHTML='<div style="font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;background:'+t.color+'18;color:'+t.color+';border:0.5px solid '+t.color+'44">'+t.label+' — por zona de origen</div><div style="flex:1;height:.5px;background:rgba(255,255,255,.08)"></div>';
    wrapper.appendChild(secHdr);

    var row = document.createElement('div');

    zones.forEach(function(z){
      if(rec[t.key]) row.appendChild(makeZonePanel(z.key, z.label, rec[t.key], t.color));

  container.appendChild(wrapper);
}

function objCalcVals(nombreJugador){
  // Use per-partido data if selected
  if(false){ // handled above with INDIVIDUAL_SRC
    var pd = null;
    if(pd){
      if(nombreJugador){
        // Find jugador in this partido by name
        var nmC2 = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();
        var pj2 = pd.jugadores ? pd.jugadores.find(function(x){
          if(!x.nombre) return false;
          var xC2 = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
          return xC2 === nmC2 || xC2.split(' ')[0] === nmC2.split(' ')[0];
        }) : null;
        if(pj2 && pj2.objetivos && Object.keys(pj2.objetivos).length > 0) return pj2.objetivos;
      } else {
        // Equipo for this partido
        if(pd.equipo_obj && Object.keys(pd.equipo_obj).length > 0) return pd.equipo_obj;
        if(pd.objetivos && pd.objetivos['__equipo__']) return pd.objetivos['__equipo__'];
      }

  }
  // Acumulado - use entrenamientos or partidos based on tipo
  var JUGADORES_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_JUGADORES!=='undefined' ? ENTRENAMIENTOS_JUGADORES : null)

  var INDIVIDUAL_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_INDIVIDUAL!=='undefined' ? ENTRENAMIENTOS_INDIVIDUAL : null)
    : (typeof PARTIDOS_INDIVIDUAL!=='undefined' ? PARTIDOS_INDIVIDUAL : null);
  var EQUIPO_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_EQUIPO_OBJ!=='undefined' ? ENTRENAMIENTOS_EQUIPO_OBJ : null)
    : (typeof PARTIDOS_EQUIPO_OBJ!=='undefined' ? PARTIDOS_EQUIPO_OBJ : null);

  // Per-sesion if selected
  if(INDIVIDUAL_SRC && window.currentObjPartido !== 'acumulado'){
    var pd2 = INDIVIDUAL_SRC.find(function(p){ return p.nombre === currentObjPartido; });
    if(pd2){
      if(nombreJugador){
        var nmC3 = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();

          if(!x.nombre) return false;
          var xC3 = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
          return xC3 === nmC3 || xC3.split(' ')[0] === nmC3.split(' ')[0];
        }) : null;
        if(pj3 && pj3.objetivos && Object.keys(pj3.objetivos).length>0) return pj3.objetivos;
      } else {
        if(pd2.equipo_obj && Object.keys(pd2.equipo_obj).length>0) return pd2.equipo_obj;
      }
    }
  }

  // Acumulado from datos_partidos.js or datos_entrenamientos.js
  if(JUGADORES_SRC && nombreJugador){
    var nmClean = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();
    var pj = JUGADORES_SRC.find(function(x){
      if(!x.nombre) return false;
      var xClean = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
      var nmApellido = nmClean.split(' ')[0];
      var xApellido  = xClean.split(' ')[0];
      return xClean === nmClean || nmApellido === xApellido;
    });
    if(pj && pj.objetivos && Object.keys(pj.objetivos).length > 0){
      return pj.objetivos;
    }
    // Found source but no data for this jugador — return nulls instead of falling to DVW
    if(window.currentObjTipo === 'entrenamiento'){
      return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,
              atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
    }
  }
  // Equipo acumulado
  if(EQUIPO_SRC && !nombreJugador && Object.keys(EQUIPO_SRC).length > 0){
    return EQUIPO_SRC;
  }
  // If entrenamiento mode and no data found, return nulls (don't show fake data)
  if(window.currentObjTipo === 'entrenamiento'){
    return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,
            atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
  // Fallback: calculate from HISTORIAL_DATA (DVW)
  var D=window.HISTORIAL_DATA;
  if(!D){
    if(nombreJugador) return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:41,atqhb:14,atqx:34,atqrp:42,atqri:27,atqrm:19,atqtr:28};
    return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:null,atqhb:14,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
  var a={sT:0,sPunto:0,sPos:0,sVend:0,sErr:0,rT:0,rPunto:0,rPos:0,rVend:0,rErr:0,
         aT:0,aPunto:0,aVend:0,aErr:0,bT:0,bPt:0,bPtPos:0,mbT:0,mbPt:0,mbVnd:0,mbErr:0};
  var CENT=[2,10,15,17];
  D.entrenamientos.forEach(function(s){
    s.jugadores.forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(nombreJugador&&j.n!==nombreJugador) return;
      a.sT+=j.sT||0;a.sPunto+=j.sPunto||0;a.sPos+=j.sPos||0;a.sVend+=j.sVend||0;a.sErr+=j.sErr||0;
      a.rT+=j.rT||0;a.rPunto+=j.rPunto||0;a.rPos+=j.rPos||0;a.rVend+=j.rVend||0;a.rErr+=j.rErr||0;
      a.aT+=j.aT||0;a.aPunto+=j.aPunto||0;a.aVend+=j.aVend||0;a.aErr+=j.aErr||0;
      a.bT+=j.bT||0;a.bPt+=j.bPt||0;a.bPtPos+=j.bPtPos||0;
      if(!nombreJugador&&CENT.indexOf(j.c)>=0){a.mbT+=j.aT||0;a.mbPt+=j.aPunto||0;a.mbVnd+=j.aVend||0;a.mbErr+=j.aErr||0;}
    });
  });
  var v={};
  v.sq   =a.sT>0?Math.round((a.sPunto+0.5*a.sVend+0.25*a.sPos-a.sErr)/a.sT*100):null;
  v.rec  =a.rT>0?Math.round((a.rPunto+0.5*a.rPos-0.5*a.rVend-a.rErr)/a.rT*100):null;
  v.bqpos=a.bT>0?Math.round((a.bPt+a.bPtPos)/a.bT*100):null;
  v.bqpt =a.bT>0?Math.round(a.bPt/a.bT*100):null;
  v.atqhb=a.mbT>0?Math.round((a.mbPt-a.mbVnd-a.mbErr)/a.mbT*100):null;
  return v;
}

function buildObjSubfiltro(nombreJugador){
  var row = document.getElementById('obj-partido-row');
  if(!row) return;
  if(typeof PARTIDOS_META === 'undefined'){ row.style.display='none'; return; }
  row.innerHTML = '';
  row.style.display = 'flex';

  // Label
  var lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;align-self:center;margin-right:4px';
  lbl.textContent = 'VER:';
  row.appendChild(lbl);

  // Acumulado button
  var b = document.createElement('button');
  b.className = 'obj-sfbtn' + (currentObjPartido==='acumulado'?' on':'');
  b.textContent = 'Acumulado';
  b.onclick = function(){
    window.window.currentObjPartido = 'acumulado';
    document.querySelectorAll('.obj-sfbtn').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    renderObjetivosJugador('objetivos-jugador', nombreJugador);
  };
  row.appendChild(b);

  // Per-partido buttons
  PARTIDOS_META.forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'obj-sfbtn' + (window.currentObjPartido===m.nombre?' on':'');
    var label = m.rival||m.nombre;
    if(m.resultado) label += ' ('+m.resultado+')';
    btn.textContent = label;
    btn.onclick = function(){
      window.currentObjPartido = m.nombre;
      document.querySelectorAll('.obj-sfbtn').forEach(function(x){x.classList.remove('on');});
      btn.classList.add('on');
      renderObjetivosJugador('objetivos-jugador', nombreJugador);
    };
    row.appendChild(btn);
  });
}
function setObjTipo(tipo, btn){
  window.currentObjTipo = tipo;
  window.window.currentObjPartido = 'acumulado';
  document.querySelectorAll('.obj-tfbtn').forEach(function(b){
    b.classList.remove('on','partido','ent');
  });
  btn.classList.add('on', tipo==='partido'?'partido':'ent');
  // Rebuild subfiltro for this tipo
  var currentJugNombre = null;
  var titleEl = document.querySelector('.player-name-title');
  if(titleEl) currentJugNombre = titleEl.dataset.nombre;
  buildObjSubfiltro(currentJugNombre || '');
  renderObjetivosJugador('objetivos-jugador', currentJugNombre || '');
}
