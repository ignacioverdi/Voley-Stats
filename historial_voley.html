function openSaqueCanchaModal(destinos,origZone,stats){
  document.getElementById('cancha-modal').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('cancha-modal-title').textContent='Dirección de Saque';
  let info=(origZone?'Origen zona '+origZone+' \u00b7 ':'');
  info+='Top destinos: '+destinos.map(d=>'zona '+d.z+' ('+d.pct+'%)').join(' \u00b7 ');
  document.getElementById('cancha-modal-info').textContent=info;
  const sw=document.getElementById('cancha-stats-wrap');
  const SC='#f59e0b';
  if(sw&&stats&&stats.tot>0){
    const eff=Math.round((stats.pt-(stats.vend||0)-stats.err)/stats.tot*100);
    const effColor=eff>=40?'#22c55e':eff>=20?'#fbbf24':eff>=0?'#f97316':'#ef4444';
    sw.style.display='flex'; sw.style.justifyContent='center';
    sw.innerHTML='<div style="display:flex;gap:8px;flex-wrap:nowrap;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;width:100%;max-width:420px">'
      +statPill('EFF',eff+'%',effColor,'Eficiencia')
      +statPill('TOT',stats.tot,SC,'Total saques')
      +statPill('#',stats.pt,'#22c55e','Puntos')
      +statPill('#%',(stats.pct||0)+'%','#22c55e','% Puntos')
      +statPill('/',stats.vend||0,'#f97316','Vendidas')
      +statPill('=',stats.err,'#ef4444','Errores')
      +'</div>';
  } else if(sw){ sw.style.display='none'; }
  const canvas=document.getElementById('cancha-canvas');
  const ctx=canvas.getContext('2d');
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  canchaAnimStart=null;
  function step(ts){
    if(!canchaAnimStart)canchaAnimStart=ts;
    const raw=Math.min((ts-canchaAnimStart)/520,1);
    const eased=1-Math.pow(1-raw,3);
    canchaDrawCourt(ctx);
    canchaDrawSaque(ctx,origZone,destinos,eased);
    if(raw<1)canchaAnimFrame=requestAnimationFrame(step);
  }
  canchaAnimFrame=requestAnimationFrame(step);
}

function canchaDrawSaque(ctx,origZone,destinos,pct){
  const SC='#f59e0b';
  const CONE_COLS=['#ff8c00','#a855f7'];
  pct=pct===undefined?1:pct;
  const orig=origZone>0?canchaRivalZone(origZone):canchaRivalZone(1);
  destinos.forEach(function(d,i){
    const col=CONE_COLS[i];
    const dest=canchaOwnZone(d.z);
    const baseW=i===0?64:48;
    const ex=orig.x+(dest.x-orig.x)*pct;
    const ey=orig.y+(dest.y-orig.y)*pct;
    const vx=dest.x-orig.x, vy=dest.y-orig.y;
    const len=Math.sqrt(vx*vx+vy*vy);
    const px=-vy/len, py=vx/len;
    const bw=baseW*pct;
    const b1x=ex+px*bw/2, b1y=ey+py*bw/2;
    const b2x=ex-px*bw/2, b2y=ey-py*bw/2;
    const cg=ctx.createLinearGradient(orig.x,orig.y,dest.x,dest.y);
    cg.addColorStop(0,col+'08'); cg.addColorStop(0.4,col+'55'); cg.addColorStop(1,col+'bb');
    ctx.save();
    ctx.beginPath(); ctx.moveTo(orig.x,orig.y); ctx.lineTo(b1x,b1y); ctx.lineTo(b2x,b2y); ctx.closePath();
    ctx.fillStyle=cg; ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=i===0?2.5:1.8; ctx.globalAlpha=0.88; ctx.stroke();
    ctx.restore();
    if(pct>=0.88){
      const r=bw*0.38;
      ctx.save();
      ctx.beginPath(); ctx.arc(dest.x,dest.y,r,0,Math.PI*2);
      ctx.fillStyle=col; ctx.globalAlpha=0.14; ctx.fill();
      ctx.globalAlpha=1; ctx.strokeStyle=col; ctx.lineWidth=2.5;
      ctx.shadowColor=col; ctx.shadowBlur=16; ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font="bold 15px 'Barlow Condensed',Arial";
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=6;
      ctx.fillText(d.pct+'%',dest.x,dest.y);
      ctx.restore();
    }
  });
  ctx.save();
  ctx.beginPath(); ctx.arc(orig.x,orig.y,18,0,Math.PI*2);
  ctx.fillStyle=SC; ctx.globalAlpha=0.18; ctx.fill();
  ctx.globalAlpha=1; ctx.strokeStyle=SC; ctx.lineWidth=2.5;
  ctx.shadowColor=SC; ctx.shadowBlur=16; ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle=SC; ctx.fillStyle=SC; ctx.lineWidth=3; ctx.shadowColor=SC; ctx.shadowBlur=10;
  const ay1=orig.y+19, ay2=orig.y+35;
  ctx.beginPath(); ctx.moveTo(orig.x,ay1); ctx.lineTo(orig.x,ay2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(orig.x-8,ay2-7); ctx.lineTo(orig.x,ay2+6); ctx.lineTo(orig.x+8,ay2-7);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.font="bold 11px 'Barlow Condensed',Arial";
  ctx.fillStyle=SC; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.95)'; ctx.shadowBlur=5;
  ctx.fillText('Z'+(origZone||'?'),orig.x,orig.y);
  ctx.restore();
}

function renderDV4Block(hist) {
  // Acumular totales DV4 de todas las sesiones del jugador
  const totals = {}; // { cod: {tot, pt, err} }
  hist.forEach(h => {
    if (!h.dv4) return;
    Object.keys(h.dv4).forEach(cod => {
      if (!totals[cod]) totals[cod] = {tot:0, pt:0, err:0, vend:0};
      totals[cod].tot  += h.dv4[cod].tot  || 0;
      totals[cod].pt   += h.dv4[cod].pt   || 0;
      totals[cod].err  += h.dv4[cod].err  || 0;
      totals[cod].vend += h.dv4[cod].vend || 0;
    });
  });

  // Verificar si hay algún dato
  const hasDV4 = Object.values(totals).some(v => v.tot > 0);
  if (!hasDV4) {
    return `<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;
      padding:2rem;text-align:center;color:var(--mut);font-size:12px;letter-spacing:1px">
      Sin datos de combinaciones DV4 registrados aún
    </div>`;
  }

  // Construir secciones por grupo
  let html = `<div style="display:flex;flex-direction:column;gap:1rem">`;

  Object.entries(DV4_GRUPOS).forEach(([grupo, codigos]) => {
    // Filtrar solo los que tienen datos
    const conDatos = codigos.filter(c => totals[c] && totals[c].tot > 0)
      .sort((a,b) => totals[b].tot - totals[a].tot);
    if (!conDatos.length) return;

    const color = DV4_GRUPO_COLOR[grupo];
    const totalGrupo = conDatos.reduce((s,c) => s + totals[c].tot, 0);
    const ptGrupo    = conDatos.reduce((s,c) => s + totals[c].pt,  0);

    const filas = conDatos.map(cod => {
      const d = totals[cod];
      const pct = d.tot > 0 ? Math.round(d.pt / d.tot * 100) : 0;
      const barW = d.tot > 0 ? Math.round(d.pt / d.tot * 100) : 0;
      const errPct = d.tot > 0 ? Math.round(d.err / d.tot * 100) : 0;
      // Calcular destinos desde el historial para abrir la cancha
      const destMap = {};
      hist.forEach(s => {
        if(s.dv4 && s.dv4[cod] && s.dv4[cod].dest){
          String(s.dv4[cod].dest).split(',').forEach(z => {
            const zi=parseInt(z); if(!zi)return;
            destMap[zi]=(destMap[zi]||0)+1;
          });
        }
      });
      const totalDests=Object.values(destMap).reduce((a,b)=>a+b,0);
      const destsArr=Object.entries(destMap).sort((a,b)=>b[1]-a[1]).slice(0,2)
        .map(([z,n])=>({z:parseInt(z),pct:totalDests>0?Math.round(n/totalDests*100):0}));
      const hasDests=destsArr.length>0;
      // Codificar destinos como data attribute para evitar problemas con JSON en innerHTML
      const destsEncoded=hasDests?encodeURIComponent(JSON.stringify(destsArr)):'';
      return `
        <div style="display:grid;grid-template-columns:52px 1fr 50px 50px 50px;
          align-items:center;gap:10px;padding:8px 14px;
          border-bottom:1px solid rgba(255,255,255,.03)">
          <div ${hasDests?`data-dv4cod="${cod}" data-dv4dests="${destsEncoded}" data-dv4stats="${encodeURIComponent(JSON.stringify({tot:d.tot,pt:d.pt,err:d.err,vend:d.vend||0,pct:pct}))}" onclick="dv4ClickCancha(this)"`:''}
            style="font-family:'Barlow Condensed',sans-serif;font-size:15px;
            font-weight:900;color:${color};letter-spacing:1px;
            cursor:${hasDests?'pointer':'default'};padding:3px 8px;border-radius:5px;
            border:1px solid ${hasDests?color:'transparent'};transition:all .15s;
            display:inline-flex;align-items:center;gap:3px;white-space:nowrap;" title="${hasDests?'Ver en cancha táctica':''}">${cod}${hasDests?'<span style="font-size:9px;opacity:.7;line-height:1">📍</span>':''}</div>
          <div>
            <div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${barW}%;background:${color};
                border-radius:3px;transition:width .4s ease"></div>
            </div>
          </div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:14px;font-weight:800;color:var(--mut)">${d.tot}</div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:14px;font-weight:800;color:${color}">${d.pt}
            <span style="font-size:10px;font-weight:600">(${pct}%)</span>
          </div>
          <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;
            font-size:13px;font-weight:700;color:var(--red)">${d.err}</div>
        </div>`;
    }).join('');

    html += `
      <div style="background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden">
        <div style="padding:10px 14px;display:flex;align-items:center;gap:12px;
          background:linear-gradient(135deg,var(--sur),var(--card2));
          border-bottom:1px solid var(--b)">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;
            font-weight:800;letter-spacing:2px;text-transform:uppercase;
            color:${color}">${grupo}</div>
          <div style="margin-left:auto;display:flex;gap:16px;align-items:center">
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:var(--txt);line-height:1">${totalGrupo}</div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">TOTAL</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:${color};line-height:1">${ptGrupo}</div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">PUNTOS</div>
            </div>
            <div style="text-align:center">
              <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;
                font-weight:900;color:${color};line-height:1">
                ${totalGrupo > 0 ? Math.round(ptGrupo/totalGrupo*100) : 0}%
              </div>
              <div style="font-size:8px;color:var(--mut);letter-spacing:1px">EFF</div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:52px 1fr 50px 50px 50px;
          gap:10px;padding:6px 14px;border-bottom:1px solid rgba(255,255,255,.05)">
          <div style="font-size:8px;color:var(--mut);letter-spacing:1px">COD</div>
          <div style="font-size:8px;color:var(--mut);letter-spacing:1px">DIST</div>
          <div style="text-align:center;font-size:8px;color:var(--mut);letter-spacing:1px">TOT</div>
          <div style="text-align:center;font-size:8px;color:${color};letter-spacing:1px">PTS</div>
          <div style="text-align:center;font-size:8px;color:var(--red);letter-spacing:1px">ERR</div>
        </div>
        ${filas}
      </div>`;
  });

  html += `</div>`;
  return html;
}

function generateFeedback(hist,nom){
  const fb=[];
  if(!hist.length)return[{icon:'ℹ️',title:'Sin datos',text:'No hay entrenamientos registrados aún.',bg:'rgba(255,255,255,.03)',bc:'rgba(255,255,255,.08)',color:'var(--txt)'}];
  const last=hist[hist.length-1];
  const multi=hist.length>=2;

  // RECEPCION
  const recVals=hist.filter(h=>h.rT>0).map(h=>h.rEff);
  if(recVals.length>=1){
    const lastR=recVals[recVals.length-1];
    const tr=multi?trendArrow(recVals):null;
    const recTot=hist[hist.length-1].rT||0;
    if(tr&&tr.sym==='▲')
      fb.push({icon:'▲',title:'Recepción — Línea ascendente',
        text:`Eficiencia subió ${tr.delta}% respecto a la sesión anterior (${lastR}%). La lectura del saque y la posición de plataforma están mejorando. Mantené la concentración en el primer toque — es la base de todo el sistema ofensivo.`,
        bg:'rgba(34,197,94,.05)',bc:'rgba(34,197,94,.18)',color:C.green});
    else if(tr&&tr.sym==='▼')
      fb.push({icon:'▼',title:'Recepción — Ajuste necesario',
        text:`Eficiencia bajó ${Math.abs(tr.delta)}% (${lastR}%). Revisá la posición inicial de antebrazos y el trabajo de pies previo al contacto. En voleibol de alto rendimiento, la recepción perfecta no es el objetivo — es el estándar mínimo.`,
        bg:'rgba(239,68,68,.05)',bc:'rgba(239,68,68,.18)',color:C.red});
    else if(lastR>=60)
      fb.push({icon:'◆',title:'Recepción — Nivel élite',
        text:`${lastR}% de eficiencia en ${recTot} acciones. Plataforma de alta calidad que habilita el juego de setter. Índice que permite desplegar el sistema ofensivo completo sin restricciones.`,
        bg:'rgba(34,197,94,.05)',bc:'rgba(34,197,94,.18)',color:C.green});
    else if(lastR>=35)
      fb.push({icon:'◆',title:'Recepción — Rendimiento sólido',
        text:`${lastR}% en ${recTot} acciones. Recepción funcional que sostiene el juego. El objetivo es elevar el porcentaje de recepciones perfectas (#) para ampliar las opciones del setter y aumentar la imprevisibilidad ofensiva.`,
        bg:'rgba(34,197,94,.05)',bc:'rgba(34,197,94,.15)',color:C.green});
    else if(lastR>=10)
      fb.push({icon:'→',title:'Recepción — En desarrollo',
        text:`${lastR}% en ${recTot} acciones. El índice indica que la recepción está limitando las opciones ofensivas. Trabajá la anticipación al saque rival y la firmeza de plataforma. La recepción es la primera decisión táctica del equipo.`,
        bg:'rgba(251,191,36,.05)',bc:'rgba(251,191,36,.18)',color:C.amber});
    else if(lastR>=0)
      fb.push({icon:'!',title:'Recepción — Zona de trabajo',
        text:`${lastR}% en ${recTot} acciones. Índice que requiere atención técnica inmediata. Priorizá la posición de base defensiva y la lectura de la trayectoria del saque antes del impacto. El control de la recepción es la piedra angular del rendimiento colectivo.`,
        bg:'rgba(249,115,22,.05)',bc:'rgba(249,115,22,.18)',color:C.orange});
    else
      fb.push({icon:'▼',title:'Recepción — Intervención prioritaria',
        text:`${lastR}% en ${recTot} acciones. El saldo negativo indica que los errores no forzados están superando los aciertos. Reducí la ambición en recepción y priorizá el control. La consistencia primero, la agresividad después.`,
        bg:'rgba(239,68,68,.05)',bc:'rgba(239,68,68,.18)',color:C.red});
  }

  // ATAQUE
  const ataVals=hist.filter(h=>h.aT>0).map(h=>h.aEff);
  if(ataVals.length>=1){
    const lastA=ataVals[ataVals.length-1];
    const tr=multi?trendArrow(ataVals):null;
    const ataTot=hist[hist.length-1].aT||0;
    const tcq=hist[hist.length-1].aTCQ||0;
    const altaEff=hist[hist.length-1].aEffAlta;
    if(lastA>=55)
      fb.push({icon:'◆',title:'Ataque — Alto impacto ofensivo',
        text:`${lastA}% de eficiencia en ${ataTot} ataques. Índice de primer nivel internacional. Estás convirtiendo las oportunidades ofensivas en puntos de manera contundente. ${tcq>0?'Los '+tcq+' toques registrados reflejan inteligencia táctica sobre el bloqueador.':''}`,
        bg:'rgba(99,102,241,.05)',bc:'rgba(99,102,241,.18)',color:C.indigo});
    else if(lastA>=30){
      if(tr&&tr.sym==='▲')
        fb.push({icon:'▲',title:'Ataque — Progresión positiva',
          text:`${lastA}% (+${tr.delta}% vs sesión anterior). El juego ofensivo está encontrando su ritmo. Seguí trabajando la variedad de zonas de ataque — la imprevisibilidad es tan valiosa como la potencia en el alto rendimiento.`,
          bg:'rgba(99,102,241,.05)',bc:'rgba(99,102,241,.18)',color:C.indigo});
      else
        fb.push({icon:'→',title:'Ataque — Rendimiento competitivo',
          text:`${lastA}% en ${ataTot} ataques. Saldo positivo que contribuye al juego del equipo. El siguiente escalón es la optimización de la selección de golpe según el tipo de set y el bloqueo rival.`,
          bg:'rgba(99,102,241,.05)',bc:'rgba(99,102,241,.15)',color:C.indigo});
    }
    else if(lastA>=0)
      fb.push({icon:'→',title:'Ataque — Ajuste táctico necesario',
        text:`${lastA}% en ${ataTot} ataques. El índice indica que el ataque está siendo neutralizado. Revisá la lectura del bloqueo rival y la selección de dirección. ${altaEff!==null&&altaEff!==0?'Tu eficiencia en pelota alta fue de '+altaEff+'% — analizá si ese es el recurso más efectivo en este contexto.':''}`,
        bg:'rgba(251,191,36,.05)',bc:'rgba(251,191,36,.18)',color:C.amber});
    else
      fb.push({icon:'▼',title:'Ataque — Revisión técnica urgente',
        text:`${lastA}% en ${ataTot} ataques. Saldo negativo — los errores no forzados y los ataques bloqueados superan los puntos. Un ataque seguro hacia zona libre vale más que un remate fallido hacia el bloqueo. Priorizá la continuidad del rally.`,
        bg:'rgba(239,68,68,.05)',bc:'rgba(239,68,68,.18)',color:C.red});
  }

  // SAQUE
  const saqVals=hist.filter(h=>h.sT>0).map(h=>h.sEff);
  if(saqVals.length>=1){
    const lastS=saqVals[saqVals.length-1];
    const tr=multi?trendArrow(saqVals):null;
    const saqTot=hist[hist.length-1].sT||0;
    if(lastS>=45)
      fb.push({icon:'◆',title:'Saque — Arma táctica de primer nivel',
        text:`${lastS}% de eficiencia en ${saqTot} saques. Tu saque está generando presión sistemática sobre el receptor rival y condicionando su sistema ofensivo. Mantené la agresividad con criterio — la presión sostenida es más valiosa que el ace aislado.`,
        bg:'rgba(251,191,36,.05)',bc:'rgba(251,191,36,.18)',color:C.amber});
    else if(lastS>=20)
      fb.push({icon:'→',title:'Saque — Eficiente y consistente',
        text:`${lastS}% en ${saqTot} saques. Buen equilibrio entre agresividad y control. El saque flotante con variación de zona y velocidad es tan efectivo como el salto potente. Explorá la variación táctica.`,
        bg:'rgba(251,191,36,.05)',bc:'rgba(251,191,36,.15)',color:C.amber});
    else if(lastS>=0){
      if(tr&&tr.sym==='▼')
        fb.push({icon:'▼',title:'Saque — Tendencia descendente',
          text:`${lastS}% (-${Math.abs(tr.delta)}% vs sesión anterior). El saque está perdiendo efectividad. Revisá si el error viene de la agresividad excesiva o de la falta de precisión en la zona objetivo. El saque controlado al 70% de intensidad bien dirigido es superior al saque al límite con error.`,
          bg:'rgba(249,115,22,.05)',bc:'rgba(249,115,22,.18)',color:C.orange});
      else
        fb.push({icon:'→',title:'Saque — Margen de desarrollo',
          text:`${lastS}% en ${saqTot} saques. El índice indica un saque que no genera presión suficiente sobre el rival. Trabajá la definición de zona objetivo antes de cada saque y la consistencia del ritual de preparación. El saque es el único fundamento donde tenés control total.`,
          bg:'rgba(249,115,22,.05)',bc:'rgba(249,115,22,.15)',color:C.orange});
    }
    else
      fb.push({icon:'▼',title:'Saque — Control antes que agresividad',
        text:`${lastS}% en ${saqTot} saques. Los errores directos están regalando puntos al rival. En esta fase, priorizá la consistencia: saque dentro del campo con zona definida. La agresividad se construye sobre una base de control consolidada.`,
        bg:'rgba(239,68,68,.05)',bc:'rgba(239,68,68,.18)',color:C.red});
  }

  // BLOQUEO
  const blqVals=hist.filter(h=>h.bT>0).map(h=>h.bPtPos);
  if(blqVals.length>=1){
    const lastB=blqVals[blqVals.length-1];
    const blqTot=hist[hist.length-1].bT||0;
    const blockOut=hist[hist.length-1].bPt||0;
    if(lastB>=60)
      fb.push({icon:'◆',title:'Bloqueo — Muro efectivo',
        text:`${lastB}% de acciones positivas en ${blqTot} bloqueos. ${blockOut>0?blockOut+' manos y afuera registradas — esto indica excelente lectura de la dirección del ataque rival y timing preciso en el salto.':'Índice de bloqueo defensivo sólido.'} El bloqueo bien ejecutado es la primera línea de presión sobre el atacante.`,
        bg:'rgba(167,139,250,.05)',bc:'rgba(167,139,250,.18)',color:C.purple});
    else if(lastB>=35)
      fb.push({icon:'→',title:'Bloqueo — Presencia defensiva activa',
        text:`${lastB}% de acciones positivas en ${blqTot} bloqueos. Bloqueo funcional que condiciona las opciones del atacante. Trabajá la lectura temprana del set rival y el cierre de manos en el punto de impacto para incrementar el porcentaje de bloqueos directos.`,
        bg:'rgba(167,139,250,.05)',bc:'rgba(167,139,250,.15)',color:C.purple});
    else if(blqTot>0)
      fb.push({icon:'→',title:'Bloqueo — Trabajo técnico en proceso',
        text:`${lastB}% de efectividad en ${blqTot} bloqueos. El índice indica que el timing o la lectura del ataque rival necesitan ajuste. Priorizá la posición de manos en la red y la coordinación con el sistema defensivo de segunda línea.`,
        bg:'rgba(251,191,36,.05)',bc:'rgba(251,191,36,.15)',color:C.amber});
  }

  // TCQ
  const tcqTotal=hist.reduce((s,h)=>s+(h.aTCQ||0),0);
  if(tcqTotal>0){
    const avg=Math.round(tcqTotal/hist.filter(h=>h.aT>0).length);
    fb.push({icon:'🤙',title:'Toques TCQ',text:`Promedio de ${avg} toque(s) por entrenamiento. Total acumulado: ${tcqTotal}.`,bg:'rgba(167,139,250,.06)',bc:'rgba(167,139,250,.2)',color:C.purple});
  }

  // Block out
  const myaTotal=hist.reduce((s,h)=>s+(h.bPt||0),0);
  if(myaTotal>0)fb.push({icon:'🏆',title:'Block Out',text:`${myaTotal} manos y afuera acumulados. Seguí atacando con inteligencia los brazos del bloqueador.`,bg:'rgba(239,68,68,.06)',bc:'rgba(239,68,68,.2)',color:C.red});

  if(!fb.length)fb.push({icon:'ℹ️',title:'Sin suficientes datos',text:'Completá más entrenamientos para recibir análisis de tendencia.',bg:'rgba(255,255,255,.03)',bc:'rgba(255,255,255,.08)',color:'var(--txt)'});
  return fb;
}

// ═══ COMPARACION ═══
function populateCompareSelects(){
  const players=getAllPlayers();
  const opts=players.map(p=>`<option value="${p.n}">${p.c} — ${p.n}</option>`).join('');
  ['cmp-p1','cmp-p2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const first=el.options[0].outerHTML;el.innerHTML=first+opts;}
  });
}

function renderComparison(){
  const p1=document.getElementById('cmp-p1')?.value;
  const p2=document.getElementById('cmp-p2')?.value;
  const el=document.getElementById('cmp-content');
  if(!el)return;
  if(!p1||!p2||p1===p2){
    el.innerHTML='<div class=empty-msg>Selecciona dos jugadores diferentes</div>';return;
  }
  const h1=getPlayerHistory(p1);
  const h2=getPlayerHistory(p2);
  if(!h1.length||!h2.length){el.innerHTML='<div class=empty-msg>Sin sesiones registradas para comparar. Guardá al menos una sesión por jugador.</div>';return;}

  const l1=h1[h1.length-1];
  const l2=h2[h2.length-1];
  const pl1=getAllPlayers().find(p=>p.n===p1);
  const pl2=getAllPlayers().find(p=>p.n===p2);

  // Acumular stats totales
  function acumPlayer(hist){
    var r={sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,
           rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,
           aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,aTCQ:0,
           bT:0,bPt:0,sEffVals:[],rEffVals:[],aEffVals:[]};
    hist.forEach(function(s){
      r.sT+=(s.sT||0);r.sPunto+=(s.sPunto||0);r.sPos+=(s.sPos||0);
      r.sOvp+=(s.sOvp||0);r.sNeg+=(s.sNeg||0);r.sVend+=(s.sVend||0);r.sErr+=(s.sErr||0);
      if(s.sT>0)r.sEffVals.push(s.sEff);
      r.rT+=(s.rT||0);r.rPunto+=(s.rPunto||0);r.rPos+=(s.rPos||0);
      r.rOvp+=(s.rOvp||0);r.rNeg+=(s.rNeg||0);r.rVend+=(s.rVend||0);r.rErr+=(s.rErr||0);
      if(s.rT>0)r.rEffVals.push(s.rEff);
      r.aT+=(s.aT||0);r.aPunto+=(s.aPunto||0);r.aPos+=(s.aPos||0);
      r.aOvp+=(s.aOvp||0);r.aNeg+=(s.aNeg||0);r.aVend+=(s.aVend||0);r.aErr+=(s.aErr||0);
      r.aTCQ+=(s.aTCQ||0);if(s.aT>0)r.aEffVals.push(s.aEff);
      r.bT+=(s.bT||0);r.bPt+=(s.bPt||0);
    });
    r.sEff=r.sT>0?Math.round((r.sPunto-r.sVend-r.sErr)/r.sT*100):null;
    r.rEff=r.rT>0?Math.round((r.rPunto+r.rPos*0.5+r.rOvp*0.25-r.rVend*0.5-r.rErr)/r.rT*100):null;
    r.aEff=r.aT>0?Math.round((r.aPunto-r.aVend-r.aErr)/r.aT*100):null;
    return r;
  }
  const a1=acumPlayer(h1), a2=acumPlayer(h2);
  const avg1=a1.aEff, avg2=a2.aEff;

  function sectionHdr(label,color){
    return '<tr><td colspan="3" style="padding:8px 14px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:'+color+';background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.03);text-transform:uppercase">'+label+'</td></tr>';
  }

  function row(label,v1,v2,unit,higherBetter){
    unit=unit===undefined?'%':unit;
    higherBetter=higherBetter===undefined?true:higherBetter;
    var n1=parseFloat(v1),n2=parseFloat(v2);
    var hasData=!isNaN(n1)&&!isNaN(n2)&&v1!==null&&v2!==null;
    var w1=hasData&&(higherBetter?n1>n2:n1<n2)?'font-weight:900;':'';
    var w2=hasData&&(higherBetter?n2>n1:n2<n1)?'font-weight:900;':'';
    var c1=hasData?ec(n1):'var(--mut)';
    var c2=hasData?ec(n2):'var(--mut)';
    var fmt=function(v){return v!==null&&v!==undefined?v+unit:'--';};
    return '<tr>'
      +'<td style="padding:10px 14px;font-family:Barlow Condensed,sans-serif;font-size:15px;color:'+c1+';text-align:center;border-bottom:1px solid rgba(255,255,255,.03);'+w1+'">'+fmt(v1)+'</td>'
      +'<td style="padding:10px 14px;font-size:10px;color:var(--mut);text-align:center;border-bottom:1px solid rgba(255,255,255,.03);letter-spacing:.5px;text-transform:uppercase">'+label+'</td>'
      +'<td style="padding:10px 14px;font-family:Barlow Condensed,sans-serif;font-size:15px;color:'+c2+';text-align:center;border-bottom:1px solid rgba(255,255,255,.03);'+w2+'">'+fmt(v2)+'</td>'
      +'</tr>';
  }

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:center;margin-bottom:1.5rem">
      <div style="background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:1.25rem;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--indigo);line-height:1">${pl1?.c||'?'}</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px">${p1}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:4px">${h1.length} sesiones</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:${ec(avg1)};margin-top:8px">${avg1!==null?avg1+'%':'--'}</div>
        <div style="font-size:9px;color:var(--mut);letter-spacing:1px">EFF PROMEDIO</div>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--mut)">VS</div>
      <div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:1.25rem;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--green);line-height:1">${pl2?.c||'?'}</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px">${p2}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:4px">${h2.length} sesiones</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:${ec(avg2)};margin-top:8px">${avg2!==null?avg2+'%':'--'}</div>
        <div style="font-size:9px;color:var(--mut);letter-spacing:1px">EFF PROMEDIO</div>
      </div>
    </div>

    <div style="background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="padding:10px 14px;background:var(--sur);border-bottom:1px solid var(--b);font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;color:var(--indigo);text-align:center;letter-spacing:1px">${p1}</th>
          <th style="padding:10px 14px;background:var(--sur);border-bottom:1px solid var(--b);font-size:9px;font-weight:700;color:var(--mut);text-align:center;letter-spacing:2px;text-transform:uppercase">KPI</th>
          <th style="padding:10px 14px;background:var(--sur);border-bottom:1px solid var(--b);font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;color:var(--green);text-align:center;letter-spacing:1px">${p2}</th>
        </tr></thead>
        <tbody>
          ${sectionHdr('SAQUE','#f59e0b')}
          ${row('EFF Saque',a1.sEff,a2.sEff)}
          ${row('Total',a1.sT,a2.sT,'')}
          ${row('#  Puntos',a1.sPunto,a2.sPunto,'')}
          ${row('+  Positivos',a1.sPos,a2.sPos,'')}
          ${row('-  Negativos',a1.sNeg,a2.sNeg,'',false)}
          ${row('=  Errores',a1.sErr,a2.sErr,'',false)}
          ${sectionHdr('RECEPCIÓN','#22c55e')}
          ${row('EFF Recepción',a1.rEff,a2.rEff)}
          ${row('Total',a1.rT,a2.rT,'')}
          ${row('#  Perfectas',a1.rPunto,a2.rPunto,'')}
          ${row('+  Positivas',a1.rPos,a2.rPos,'')}
          ${row('!  Admiración',a1.rOvp,a2.rOvp,'')}
          ${row('-  Negativas',a1.rNeg,a2.rNeg,'',false)}
          ${row('=  Errores',a1.rErr,a2.rErr,'',false)}
          ${sectionHdr('ATAQUE','#818cf8')}
          ${row('EFF Ataque',a1.aEff,a2.aEff)}
          ${row('Total',a1.aT,a2.aT,'')}
          ${row('#  Puntos',a1.aPunto,a2.aPunto,'')}
          ${row('+  Positivos',a1.aPos,a2.aPos,'')}
          ${row('/  Bloqueados',a1.aVend,a2.aVend,'',false)}
          ${row('=  Errores',a1.aErr,a2.aErr,'',false)}
          ${row('TCQ Toques',a1.aTCQ,a2.aTCQ,'')}
        </tbody>
      </table>
    </div>`;
}

function saveCoachNote(nom, val){
  sessionStorage.setItem('coach-note-'+nom, val);
  const el=document.getElementById('note-saved');
  if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);}
}

function loadCoachNote(nom){
  const saved=sessionStorage.getItem('coach-note-'+nom)||'';
  const el=document.getElementById('coach-note-input');
  if(el)el.value=saved;
}

// ═══ BEST / WORST SESSION ═══
function renderBestWorst(hist){
  const el=document.getElementById('best-worst-wrap');
  if(!el)return;
  if(hist.length<1){el.innerHTML='';return;}

  // Score each session by combined efficiency
  const scored=hist.map(h=>{
    let score=0, count=0;
    if(h.sT>0){score+=h.sEff;count++;}
    if(h.rT>0){score+=h.rEff;count++;}
    if(h.aT>0){score+=h.aEff;count++;}
    const avg=count?Math.round(score/count):null;
    const total=(h.sT||0)+(h.rT||0)+(h.aT||0)+(h.bT||0);
    return{...h,avg,total};
  }).filter(h=>h.avg!==null);

  if(!scored.length){el.innerHTML='';return;}
  const best=scored.reduce((a,b)=>b.avg>a.avg?b:a);
  const worst=scored.reduce((a,b)=>b.avg<a.avg?b:a);

  // Regression check: last 3 sessions declining?
  const effVals=hist.filter(h=>h.rT>0||h.aT>0).slice(-4).map(h=>{
    let s=0,c=0;
    if(h.rT>0){s+=h.rEff;c++;}if(h.aT>0){s+=h.aEff;c++;}
    return c?Math.round(s/c):null;
  }).filter(v=>v!==null);
  const isRegressing=effVals.length>=3&&effVals[effVals.length-1]<effVals[effVals.length-2]&&effVals[effVals.length-2]<effVals[effVals.length-3];

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:${isRegressing?'0.75rem':'1.5rem'}">
      <div style="background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:12px;padding:1rem 1.25rem">
        <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:6px">◆ Mejor sesión</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--green);line-height:1">${best.avg}%</div>
        <div style="font-size:11px;color:var(--mut);margin-top:4px">${best.fecha} &nbsp;·&nbsp; ${best.total} acciones</div>
      </div>
      <div style="background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);border-radius:12px;padding:1rem 1.25rem">
        <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:6px">▼ Peor sesión</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--red);line-height:1">${worst.avg}%</div>
        <div style="font-size:11px;color:var(--mut);margin-top:4px">${worst.fecha} &nbsp;·&nbsp; ${worst.total} acciones</div>
      </div>
    </div>
    ${isRegressing?`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">⚠️</span>
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:var(--red);letter-spacing:1px">TENDENCIA DESCENDENTE — 3 sesiones consecutivas a la baja</div>
        <div style="font-size:11px;color:var(--mut);margin-top:2px">El rendimiento viene declinando. Revisá carga de entrenamiento y recuperación.</div>
      </div>
    </div>`:''}
  `;
}

// ═══ MONTHLY RANKING (team view) ═══
function getMonthlyImprovement(){
  const D=window.HISTORIAL_DATA;
  if(!D||D.entrenamientos.length<2)return[];
  const players=getAllPlayers();
  return players.map(p=>{
    const hist=getPlayerHistory(p.n);
    if(hist.length<2)return null;
    const recent=hist.slice(-3);
    const old=hist.slice(0,Math.max(1,hist.length-3));
    function avgEff(arr){
      const vals=arr.filter(h=>h.rT>0||h.aT>0).map(h=>{
        let s=0,c=0;
        if(h.rT>0){s+=h.rEff;c++;}if(h.aT>0){s+=h.aEff;c++;}
        return c?s/c:null;
      }).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
    }
    const recentAvg=avgEff(recent);
    const oldAvg=avgEff(old);
    if(recentAvg===null||oldAvg===null)return null;
    const delta=recentAvg-oldAvg;
    return{...p,recentAvg,oldAvg,delta,sessions:hist.length};
  }).filter(Boolean).sort((a,b)=>b.delta-a.delta);
}

// CANCHA TÁCTICA — Motor de dibujo
// ═══════════════════════════════════════════════════════
const DV4_CAT_MAP={
  X1:'C',XM:'C',XG:'C',XC:'C',XD:'C',X7:'C',CB:'C',CF:'C',CD:'C',J1:'C',J4:'C',J2:'C',J3:'C',J5:'C',
  G4:'V',G2:'V',G8:'V',G9:'V',V5:'V',V0:'V',V6:'V',V8:'V',VB:'V',VP:'V',VR:'V',V4:'V',V3:'V',V2:'V',
  W4:'X',W2:'X',Y9:'X',Y8:'X',PR:'X',JJ:'X',PP:'X',C5:'X',C0:'X',C6:'X',C8:'X',
  X5:'X',X0:'X',X6:'X',X8:'X',XB:'X',XP:'X',XR:'X',XT:'X',X3:'X',X4:'X'
};
const DV4_ORIG_MAP={
  X1:3,XM:3,XG:3,XC:3,XD:3,X7:3,CB:3,CF:3,CD:3,J1:3,J4:3,J2:3,J3:3,J5:3,
  G4:4,V5:4,W4:4,X9:4,X2:4,X5:4,X0:4,C5:4,V0:4,V4:4,
  XB:8,XP:8,XR:8,VB:8,VP:8,VR:8,Y8:8,G8:8,
  X3:2,X4:2,X6:2,C6:2,V6:2,W2:2,G2:2,V2:2,
  X8:9,C8:9,V8:9,Y9:9,G9:9
};
const CC_CAT_COLOR={C:'#ff8c00',V:'#ff3030',X:'#00bfff'};
const CC_CONE_COLS=['#ff8c00','#a855f7'];

let canchaAnimFrame=null, canchaAnimStart=null;

function canchaRivalZone(z){
  const cv=document.getElementById('cancha-canvas');const W=cv?cv.width:380,H=cv?cv.height:560,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478,RIVAL_H=NET-CT;
  const xs={1:CL+CW/6,6:CL+CW/2,5:CL+CW*5/6,9:CL+CW/6,8:CL+CW/2,7:CL+CW*5/6,2:CL+CW/6,3:CL+CW/2,4:CL+CW*5/6};
  const ys={1:CT+RIVAL_H/6,6:CT+RIVAL_H/6,5:CT+RIVAL_H/6,9:CT+RIVAL_H/2,8:CT+RIVAL_H/2,7:CT+RIVAL_H/2,2:CT+RIVAL_H*5/6,3:CT+RIVAL_H*5/6,4:CT+RIVAL_H*5/6};
  return{x:xs[z],y:ys[z]};
}
function canchaOwnZone(z){
  const cv=document.getElementById('cancha-canvas');const W=cv?cv.width:380,H=cv?cv.height:560,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478,OWN_H=CB-NET;
  const xs={4:CL+CW/6,3:CL+CW/2,2:CL+CW*5/6,7:CL+CW/6,8:CL+CW/2,9:CL+CW*5/6,5:CL+CW/6,6:CL+CW/2,1:CL+CW*5/6};
  const ys={4:NET+OWN_H/6,3:NET+OWN_H/6,2:NET+OWN_H/6,7:NET+OWN_H/2,8:NET+OWN_H/2,9:NET+OWN_H/2,5:NET+OWN_H*5/6,6:NET+OWN_H*5/6,1:NET+OWN_H*5/6};
  return{x:xs[z],y:ys[z]};
}

function canchaDrawCourt(ctx){
  const W=ctx.canvas.width,H=ctx.canvas.height,PAD=18;
  const CL=PAD,CR=W-PAD,CT=PAD,CB=H-PAD;
  const CW=CR-CL,CH=CB-CT;
  const NET=CT+CH*0.478;
  const RIVAL_H=NET-CT,OWN_H=CB-NET;
  const c1=CL+CW/3,c2=CL+CW*2/3;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#2563a8';ctx.fillRect(0,0,W,H);
  canchaDrawWood(ctx,CL,CT,CW,RIVAL_H,false);
  canchaDrawWood(ctx,CL,NET,CW,OWN_H,true);
  // Sombra red
  const shG=ctx.createLinearGradient(0,NET-6,0,NET+18);
  shG.addColorStop(0,'rgba(0,0,0,.35)');shG.addColorStop(1,'transparent');
  ctx.fillStyle=shG;ctx.fillRect(CL,NET-6,CW,24);
  // Malla
  ctx.save();ctx.globalAlpha=0.25;ctx.strokeStyle='#444';ctx.lineWidth=0.7;
  for(let x=CL;x<=CR;x+=5){ctx.beginPath();ctx.moveTo(x,NET-10);ctx.lineTo(x,NET+10);ctx.stroke();}
  for(let y=NET-9;y<=NET+9;y+=4){ctx.beginPath();ctx.moveTo(CL,y);ctx.lineTo(CR,y);ctx.stroke();}
  ctx.restore();
  // Barra red
  const netG=ctx.createLinearGradient(0,NET-8,0,NET+8);
  netG.addColorStop(0,'#2a2a3a');netG.addColorStop(0.15,'#8888a0');
  netG.addColorStop(0.42,'#e8e8f5');netG.addColorStop(0.58,'#c8c8e0');
  netG.addColorStop(0.85,'#7070a0');netG.addColorStop(1,'#2a2a3a');
  ctx.fillStyle=netG;ctx.beginPath();ctx.roundRect(CL-6,NET-8,CW+12,16,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.roundRect(CL-4,NET-7,CW+8,5,2);ctx.fill();
  ctx.fillStyle='#cc1515';ctx.beginPath();ctx.roundRect(CL-6,NET-11,CW+12,4,2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillRect(CL-5,NET+9,CW+10,2);
  // Líneas cancha
  ctx.save();ctx.setLineDash([]);ctx.strokeStyle='#fff';ctx.lineWidth=3;
  ctx.shadowColor='rgba(255,255,255,.5)';ctx.shadowBlur=3;
  ctx.strokeRect(CL,CT,CW,RIVAL_H);ctx.strokeRect(CL,NET,CW,OWN_H);
  ctx.lineWidth=2.5;ctx.shadowBlur=2;
  ctx.beginPath();ctx.moveTo(CL,NET+OWN_H/3);ctx.lineTo(CR,NET+OWN_H/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CL,CT+RIVAL_H*2/3);ctx.lineTo(CR,CT+RIVAL_H*2/3);ctx.stroke();
  ctx.restore();
  ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1.2;ctx.shadowBlur=0;
  [[c1,CT+2,c1,NET-2],[c2,CT+2,c2,NET-2],[CL+2,CT+RIVAL_H/3,CR-2,CT+RIVAL_H/3],
   [c1,NET+2,c1,CB-2],[c2,NET+2,c2,CB-2],[CL+2,NET+OWN_H*2/3,CR-2,NET+OWN_H*2/3]
  ].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.restore();
  // Postes
  [[CL-12],[CR+3]].forEach(([px])=>{
    const pg=ctx.createLinearGradient(px,0,px+10,0);
    pg.addColorStop(0,'#0a0a0a');pg.addColorStop(0.25,'#3a3a3a');pg.addColorStop(0.5,'#606060');pg.addColorStop(0.75,'#2a2a2a');pg.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(px,NET-44,10,88,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(px+2,NET-40,3,80,2);ctx.fill();
    const hg=ctx.createRadialGradient(px+5,NET-44,1,px+5,NET-44,7);
    hg.addColorStop(0,'#888');hg.addColorStop(1,'#333');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(px+5,NET-44,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc1515';ctx.fillRect(px+3,NET-70,4,14);
    ctx.fillStyle='#fff';ctx.fillRect(px+3,NET-56,4,8);
  });
}

function canchaDrawWood(ctx,x,y,w,h,brighter){
  const base=brighter?'#e8a95a':'#dfa04e';
  const light=brighter?'#f0b868':'#e8ac5c';
  const dark=brighter?'#d0944a':'#c88040';
  const bg=ctx.createLinearGradient(x,y,x+w,y+h);
  bg.addColorStop(0,dark);bg.addColorStop(0.25,light);bg.addColorStop(0.5,base);bg.addColorStop(0.75,light);bg.addColorStop(1,dark);
  ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);
  ctx.save();
  ctx.globalAlpha=0.1;ctx.strokeStyle='#7a4a10';ctx.lineWidth=0.8;
  for(let iy=y+7;iy<y+h;iy+=7){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.globalAlpha=0.17;ctx.lineWidth=1.5;
  for(let iy=y+14;iy<y+h;iy+=28){ctx.beginPath();ctx.moveTo(x,iy);ctx.lineTo(x+w,iy);ctx.stroke();}
  ctx.globalAlpha=0.04;ctx.strokeStyle='#5a3010';ctx.lineWidth=4;
  for(let ix=x-h;ix<x+w+h;ix+=20){ctx.beginPath();ctx.moveTo(ix,y);ctx.lineTo(ix+h*0.2,y+h);ctx.stroke();}
  const shine=ctx.createLinearGradient(x,y,x,y+h);
  shine.addColorStop(0,'transparent');shine.addColorStop(0.4,'rgba(255,255,255,.06)');
  shine.addColorStop(0.55,'rgba(255,255,255,.1)');shine.addColorStop(1,'transparent');
  ctx.globalAlpha=1;ctx.fillStyle=shine;ctx.fillRect(x,y,w,h);
  ctx.restore();
}

function canchaDrawAttack(ctx,cod,destinos,pct){
  const cat=DV4_CAT_MAP[cod]||'C';
  const origZone=DV4_ORIG_MAP[cod]||3;
  const arrowCol=CC_CAT_COLOR[cat];
  const orig=canchaRivalZone(origZone);
  pct=pct===undefined?1:pct;

  destinos.forEach((d,i)=>{
    const col=CC_CONE_COLS[i];
    const dest=canchaOwnZone(d.z);
    const baseW=i===0?64:48;
    const ex=orig.x+(dest.x-orig.x)*pct;
    const ey=orig.y+(dest.y-orig.y)*pct;
    const vx=dest.x-orig.x,vy=dest.y-orig.y;
    const len=Math.sqrt(vx*vx+vy*vy);
    const px=-vy/len,py=vx/len;
    const bw=baseW*pct;
    const b1x=ex+px*bw/2,b1y=ey+py*bw/2;
    const b2x=ex-px*bw/2,b2y=ey-py*bw/2;
    const cg=ctx.createLinearGradient(orig.x,orig.y,dest.x,dest.y);
    cg.addColorStop(0,col+'08');cg.addColorStop(0.4,col+'55');cg.addColorStop(1,col+'bb');
    ctx.save();
    ctx.beginPath();ctx.moveTo(orig.x,orig.y);ctx.lineTo(b1x,b1y);ctx.lineTo(b2x,b2y);ctx.closePath();
    ctx.fillStyle=cg;ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=i===0?2.5:1.8;ctx.globalAlpha=0.88;ctx.stroke();
    ctx.restore();
    if(pct>=0.88){
      const r=bw*0.38;
      ctx.save();
      ctx.beginPath();ctx.arc(dest.x,dest.y,r,0,Math.PI*2);
      ctx.fillStyle=col;ctx.globalAlpha=0.14;ctx.fill();
      ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=2.5;
      ctx.shadowColor=col;ctx.shadowBlur=16;ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font="bold 15px 'Barlow Condensed',Arial";
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=6;
      ctx.fillText(d.pct+'%',dest.x,dest.y);
      ctx.restore();
    }
  });
  // Origen
  ctx.save();
  ctx.beginPath();ctx.arc(orig.x,orig.y,18,0,Math.PI*2);
  ctx.fillStyle=arrowCol;ctx.globalAlpha=0.18;ctx.fill();
  ctx.globalAlpha=1;ctx.strokeStyle=arrowCol;ctx.lineWidth=2.5;
  ctx.shadowColor=arrowCol;ctx.shadowBlur=16;ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.strokeStyle=arrowCol;ctx.fillStyle=arrowCol;ctx.lineWidth=3;
  ctx.shadowColor=arrowCol;ctx.shadowBlur=10;
  const ay1=orig.y+19,ay2=orig.y+35;
  ctx.beginPath();ctx.moveTo(orig.x,ay1);ctx.lineTo(orig.x,ay2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(orig.x-8,ay2-7);ctx.lineTo(orig.x,ay2+6);ctx.lineTo(orig.x+8,ay2-7);
  ctx.closePath();ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.font="bold 13px 'Barlow Condensed',Arial";
  ctx.fillStyle=arrowCol;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=5;
  ctx.fillText(cod,orig.x,orig.y);
  ctx.restore();
}

// Abrir modal de cancha
function statPill(label,value,color,title){
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;
    min-width:52px;flex:1;padding:7px 6px;background:rgba(255,255,255,.04);
    border-radius:7px;border:1px solid rgba(255,255,255,.07)" title="${title}">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;
      line-height:1;color:${color}">${value}</div>
    <div style="font-size:9px;color:#64748b;letter-spacing:1px;text-transform:uppercase">${label}</div>
  </div>`;
}

function dv4ClickCancha(el){
  const cod=el.dataset.dv4cod;
  const dests=JSON.parse(decodeURIComponent(el.dataset.dv4dests||'[]'));
  const stats=el.dataset.dv4stats?JSON.parse(decodeURIComponent(el.dataset.dv4stats)):{};
  if(cod) openCanchaModal(cod,dests,'',stats);
}

function openCanchaModal(cod, destinos, playerName, stats){
  document.getElementById('cancha-modal').classList.add('open');
  document.body.style.overflow='hidden';
  const cat=DV4_CAT_MAP[cod]||'C';
  const catNom={C:'Central',V:'Alta',X:'Rápida'}[cat];
  const origZ=DV4_ORIG_MAP[cod]||0;
  const arrowCol=CC_CAT_COLOR[cat]||'#ff8c00';
  document.getElementById('cancha-modal-title').textContent=cod+' — '+catNom;
  document.getElementById('cancha-modal-info').textContent=
    (playerName?playerName+' · ':'')+
    (origZ?'Origen zona '+origZ+' · ':'')+
    (destinos.length?'Top destinos: '+destinos.map(d=>'zona '+d.z+' ('+d.pct+'%)').join(' · '):'Sin datos de dirección');
  // Bloque de stats de la combinación
  const statsWrap=document.getElementById('cancha-stats-wrap');
  if(statsWrap && stats && stats.tot>0){
    const tot=stats.tot||0, pt=stats.pt||0, err=stats.err||0, vend=stats.vend||0;
    const pctPt=tot>0?Math.round(pt/tot*100):0;
    const eff=tot>0?Math.round((pt-vend-err)/tot*100):null;
    const effColor=eff===null?'#64748b':eff>=50?'#22c55e':eff>=25?'#fbbf24':eff>=0?'#f97316':'#ef4444';
    statsWrap.style.display='flex';
    statsWrap.innerHTML=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
        background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
        border-radius:10px;padding:10px 12px;width:100%;max-width:420px;display:flex;gap:8px">
        ${statPill('EFF',eff!==null?eff+'%':'--',effColor,'Eficiencia')}
        ${statPill('TOT',tot,arrowCol,'Total ataques')}
        ${statPill('#',pt,'#22c55e','Puntos')}
        ${statPill('#%',pctPt+'%','#22c55e','% Puntos')}
        ${statPill('/',vend,'#f97316','Vendidas')}
        ${statPill('=',err,'#ef4444','Errores')}
      </div>`;
  } else if(statsWrap){
    statsWrap.style.display='none';
  }
  const canvas=document.getElementById('cancha-canvas');
  const ctx=canvas.getContext('2d');
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  canchaAnimStart=null;
  function step(ts){
    if(!canchaAnimStart)canchaAnimStart=ts;
    const raw=Math.min((ts-canchaAnimStart)/520,1);
    const eased=1-Math.pow(1-raw,3);
    canchaDrawCourt(ctx);
    canchaDrawAttack(ctx,cod,destinos,eased);
    if(raw<1)canchaAnimFrame=requestAnimationFrame(step);
  }
  canchaAnimFrame=requestAnimationFrame(step);
}

function closeCanchaModal(){
  document.getElementById('cancha-modal').classList.remove('open');
  document.body.style.overflow='';
  if(canchaAnimFrame)cancelAnimationFrame(canchaAnimFrame);
  const sw=document.getElementById('cancha-stats-wrap');
  if(sw)sw.style.display='none';
}
document.getElementById('cancha-modal').addEventListener('click',function(e){
  if(e.target===this)closeCanchaModal();
});
