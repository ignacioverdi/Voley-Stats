<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EQUIPO — CASL VOLEY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<script src="lang.js" onerror="void 0"></script>
<script src="utils.js" onerror="void 0"></script>
<script src="datos_equipo.js" onerror="window.EQUIPO_DATA=null"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.06);
  --red:#e8192c;--green:#22c55e;--amber:#f59e0b;
  --indigo:#818cf8;--mut:#475569;--txt:#e2e8f0;
}
body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,rgba(232,25,44,.05) 0%,transparent 50%);font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;}

.page-header{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.015);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:5px;background:linear-gradient(120deg,#e8192c,#fff 50%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;transition:all .15s;}
.back-btn:hover{color:var(--txt);border-color:rgba(255,255,255,.15);}

.main{max-width:1200px;margin:0 auto;padding:32px;}
.section-lbl{font-size:10px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* GRID JUGADORES */
.jugadores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:40px;}

.jug-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--txt);display:block;}
.jug-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15);box-shadow:0 12px 32px rgba(0,0,0,.5);}
.jug-card.active{border-color:var(--red);box-shadow:0 0 20px rgba(232,25,44,.2);}

.jug-foto-wrap{position:relative;height:180px;overflow:hidden;background:var(--card2);}
.jug-foto-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;}
.jug-foto-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:64px;opacity:.15;}
.jug-num-overlay{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);border-radius:6px;padding:2px 8px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;}
.jug-pos-overlay{position:absolute;top:10px;right:10px;font-size:8px;padding:3px 7px;border-radius:4px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

.jug-card-body{padding:12px 14px;}
.jug-card-nombre{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;line-height:1.1;margin-bottom:4px;}
.jug-card-meta{font-size:10px;color:var(--mut);letter-spacing:.5px;}
.jug-card-links{display:flex;gap:6px;margin-top:10px;}
.jug-link{flex:1;padding:5px 4px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--mut);font-size:9px;font-weight:700;letter-spacing:.8px;text-align:center;cursor:pointer;transition:all .15s;text-decoration:none;text-transform:uppercase;}
.jug-link:hover{background:rgba(255,255,255,.08);color:var(--txt);}
.jug-link.red{border-color:rgba(232,25,44,.2);color:var(--red);background:rgba(232,25,44,.05);}
.jug-link.red:hover{background:rgba(232,25,44,.12);}

/* STAFF */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.staff-avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.05);}
.staff-nombre{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;margin-bottom:2px;}
.staff-rol{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}

@media(max-width:768px){
  .page-header{padding:12px 16px;}
  .main{padding:16px;}
  .jugadores-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .jug-foto-wrap{height:140px;}
}
</style>
</head>
<body>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="back-btn">← Inicio</a>
    <button onclick="showHeatmapMenu()" style="background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:#F97316;padding:6px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;cursor:pointer;letter-spacing:1px">🔥 HEAT MAPS</button>
    <div>
      <div class="page-title">🏐 <span data-t="equipo">Equipo</span></div>
      <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;">CASLA VOLEY · División de Honor 2026</div>
    </div>
  </div>
  <div id="lang-wrap" style="display:flex;align-items:center;gap:4px"></div>
</div>

<div class="main">
  <div class="section-lbl">Plantel 2026</div>
  <div class="jugadores-grid" id="jugadores-grid"></div>

  <div class="section-lbl" style="margin-top:8px;">Cuerpo Técnico</div>
  <div class="staff-grid" id="staff-grid"></div>
</div>

<script>
// ── DATOS POR DEFECTO (reemplazados por datos_equipo.js) ─────────
var EQUIPO_DEMO = {
  jugadores: [
    {num:2, nombre:"OJUEZ", pos:"CENTRAL", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:3, nombre:"WINER", pos:"LIBERO", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:4, nombre:"VAZQUEZ", pos:"ARMADOR", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:5, nombre:"RAMOS", pos:"OPUESTO", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:6, nombre:"VILLARRUEL", pos:"PUNTA", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:9, nombre:"GODOY", pos:"ARMADOR", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:10, nombre:"VIERA", pos:"CENTRAL", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:11, nombre:"DURDOS", pos:"PUNTA", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:12, nombre:"ZANOTTI", pos:"LIBERO", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:13, nombre:"ROJAS CARUSO", pos:"PUNTA", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:14, nombre:"NIELSON", pos:"PUNTA", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:15, nombre:"ROTEZZI", pos:"CENTRAL", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:17, nombre:"HERBSOMMER", pos:"CENTRAL", foto:null, pais:"🇩🇪", altura:"", edad:0},
    {num:18, nombre:"ACOSTA", pos:"OPUESTO", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:19, nombre:"DIAZ BOLLI", pos:"ARMADOR", foto:null, pais:"🇦🇷", altura:"", edad:0},
    {num:20, nombre:"FREDDIE", pos:"PUNTA", foto:null, pais:"🇦🇷", altura:"", edad:0}
  ],
  staff: [
    {nombre:"ENTRENADOR", rol:"Head Coach", icon:"📋"},
    {nombre:"PREP. FÍSICO", rol:"Strength & Conditioning", icon:"💪"}
  ]
};

var DATA = window.EQUIPO_DATA || EQUIPO_DEMO;

var POS_COLOR = {
  'ARMADOR':'#f59e0b','CENTRAL':'#f97316',
  'PUNTA':'#22c55e','OPUESTO':'#818cf8','LIBERO':'#06b6d4'
};

function render(){
  var grid = document.getElementById('jugadores-grid');
  grid.innerHTML = '';

  DATA.jugadores.forEach(function(j){
    var color = POS_COLOR[j.pos] || '#64748b';
    var card = document.createElement('a');
    card.className = 'jug-card';
    card.href = 'jugador.html?num=' + j.num;

    // Foto o placeholder
    var fotoWrap = document.createElement('div');
    fotoWrap.className = 'jug-foto-wrap';
    fotoWrap.style.borderBottom = '2px solid ' + color;

    if(j.foto){
      var img = document.createElement('img');
      img.src = j.foto;
      img.alt = j.nombre;
      img.onerror = function(){ this.parentElement.innerHTML = '<div class="jug-foto-placeholder">' + j.num + '</div>'; };
      fotoWrap.appendChild(img);
    } else {
      fotoWrap.innerHTML = '<div class="jug-foto-placeholder">' + j.num + '</div>';
    }

    fotoWrap.innerHTML += '<div class="jug-num-overlay" style="color:' + color + '">#' + j.num + '</div>';
    fotoWrap.innerHTML += '<div class="jug-pos-overlay" style="background:rgba(0,0,0,.6);color:' + color + ';border:1px solid ' + color + '33">' + j.pos + '</div>';

    card.appendChild(fotoWrap);

    // Info
    var body = document.createElement('div');
    body.className = 'jug-card-body';
    body.innerHTML =
      '<div class="jug-card-nombre">' + j.nombre + '</div>' +
      '<div class="jug-card-meta">' + (j.pais||'') + ' · ' + (j.altura||'') + '</div>';

    // Links rápidos
    var links = document.createElement('div');
    links.className = 'jug-card-links';
    links.innerHTML =
      '<a class="jug-link" href="historial_voley.html?player=' + encodeURIComponent(j.nombre) + '">📈 Stats</a>' +
      '<a class="jug-link" href="prep_fisica.html?player=' + encodeURIComponent(j.nombre) + '">💪 Rutina</a>' +
      '<a class="jug-link red" href="jugador.html?num=' + j.num + '">👤 Perfil</a>';

    body.appendChild(links);
    card.appendChild(body);
    grid.appendChild(card);
  });

  // Staff
  var staffGrid = document.getElementById('staff-grid');
  staffGrid.innerHTML = '';
  (DATA.staff||[]).forEach(function(s){
    var card = document.createElement('div');
    card.className = 'staff-card';
    card.innerHTML =
      '<div class="staff-avatar">' + (s.icon||'👤') + '</div>' +
      '<div class="staff-nombre">' + s.nombre + '</div>' +
      '<div class="staff-rol">' + s.rol + '</div>';
    staffGrid.appendChild(card);
  });
}

render();
</script>

<style>
#hm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center}
#hm-overlay.open{display:flex}
.hm-box{background:#0D0E1A;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px;width:min(380px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.6)}
.hm-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.hm-close{background:rgba(255,255,255,.08);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px}
.hm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hm-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 10px;border-radius:14px;text-decoration:none;color:#fff;transition:all .18s;border:1px solid}
.hm-card:hover{transform:translateY(-2px);filter:brightness(1.15)}
.hm-icon{font-size:28px}.hm-lbl{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px}
.hm-sub{font-size:9px;color:#64748b;text-align:center}
</style>
<div id="hm-overlay" onclick="if(event.target===this)closeHeatmapMenu()">
  <div class="hm-box">
    <div class="hm-title"><span>🔥 HEAT MAPS</span><button class="hm-close" onclick="closeHeatmapMenu()">✕</button></div>
    <div class="hm-grid">
      <a class="hm-card" href="ataque_casla.html"    style="background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3)"><span class="hm-icon">⚡</span><span class="hm-lbl" style="color:#F97316">ATAQUE</span><span class="hm-sub">EFF · SO/TR · Zonas</span></a>
      <a class="hm-card" href="saque_casla.html"     style="background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)"><span class="hm-icon">🎯</span><span class="hm-lbl" style="color:#22C55E">SAQUE</span><span class="hm-sub">EFF · Zonas origen/destino</span></a>
      <a class="hm-card" href="recepcion_casla.html" style="background:rgba(129,140,248,.08);border-color:rgba(129,140,248,.3)"><span class="hm-icon">🛡️</span><span class="hm-lbl" style="color:#818CF8">RECEPCION</span><span class="hm-sub">EFF · Calidad · Zonas</span></a>
      <a class="hm-card" href="armador_casla.html"   style="background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)"><span class="hm-icon">🎱</span><span class="hm-lbl" style="color:#F59E0B">ARMADO</span><span class="hm-sub">Llamadas · Pos · EFF</span></a>
    </div>
    <div style="margin-top:14px;font-size:10px;color:#475569;text-align:center">División de Honor 2026 · 7 partidos analizados</div>
  </div>
</div>
<script>
function showHeatmapMenu(){ document.getElementById('hm-overlay').classList.add('open'); }
function closeHeatmapMenu(){ document.getElementById('hm-overlay').classList.remove('open'); }
</script>
</body>
</html>
