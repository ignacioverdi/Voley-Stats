<script>
// Inline fallback for preview/offline
if(typeof window.OBJETIVOS_CONFIG === 'undefined'){
// objetivos_config.js — CASLA Voley
// Configuracion compartida de baterias y objetivos
// Importar en: jugador.html, dashboard.html, historial_voley.html

window.OBJETIVOS_CONFIG={metas:{
  sq:   {label:'% Saque (3%)',   obj:3,  min:-12,max:8,  g2:3,  g1:-3, y:-8},
  rec:  {label:'% Recepción (36%)',  obj:36, min:20, max:44, g2:36, g1:30, y:25},
  bqpos:{label:'% Blq #+ (43%)',    obj:43, min:25, max:52, g2:43, g1:37, y:30},
  bqpt: {label:'% Blq # (23%)',   obj:23, min:12, max:28, g2:23, g1:20, y:17},
  atqq: {label:'% Atq Central (48%)', obj:48, min:35, max:56, g2:48, g1:44, y:40},
  atqhb:{label:'% Atq Alta (20%)',    obj:20, min:8,  max:26, g2:20, g1:16, y:12},
  atqx: {label:'% Atq Rápida (42%)',     obj:42, min:28, max:50, g2:42, g1:38, y:34},
  atqrp:{label:'% Atq R #+ (50%)',   obj:50, min:32, max:58, g2:50, g1:44, y:38},
  atqri:{label:'% Atq R ! (36%)',    obj:36, min:22, max:44, g2:36, g1:32, y:28},
  atqrm:{label:'% Atq R - (26%)',    obj:26, min:14, max:34, g2:26, g1:22, y:18},
  atqtr:{label:'% Transición (34%)',    obj:34, min:22, max:42, g2:34, g1:30, y:26}
}};

window.currentObjPartido = window.currentObjPartido || 'acumulado';
window.currentObjTipo = window.currentObjTipo || 'partido'; // 'partido' or 'entrenamiento'

function objClassify(id,val){
  var m=window.OBJETIVOS_CONFIG.metas[id];
  if(val>=m.g2) return{color:'#22c55e',bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',  label:'Objetivo'};
  if(val>=m.g1) return{color:'#86efac',bg:'rgba(134,239,172,.08)',border:'rgba(134,239,172,.3)', label:'Cerca'};
  if(val>=m.y)  return{color:'#fbbf24',bg:'rgba(251,191,36,.1)',  border:'rgba(251,191,36,.3)',  label:'Neutro'};
  return              {color:'#ef4444',bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.3)',   label:'Lejos'};
}

function objClassifyVsTeam(val,teamVal){
  if(teamVal===null||teamVal===undefined) return{color:'#64748b',bg:'rgba(100,116,139,.08)',border:'rgba(100,116,139,.2)',label:'—'};
  var d=val-teamVal;
  if(d>=5)  return{color:'#22c55e',bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',  label:'Sobre equipo'};
  if(d>=0)  return{color:'#86efac',bg:'rgba(134,239,172,.08)',border:'rgba(134,239,172,.3)', label:'Cerca equipo'};
  if(d>=-8) return{color:'#fbbf24',bg:'rgba(251,191,36,.1)',  border:'rgba(251,191,36,.3)',  label:'Neutro'};
  return         {color:'#ef4444',bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.3)',   label:'Bajo equipo'};
}
function objCalcVals(nombreJugador){
  // Use per-partido data if selected
  if(false){ // handled above with INDIVIDUAL_SRC
    var pd = null;
    if(pd){
      if(nombreJugador){
        // Find jugador in this partido by name
        var nmC2 = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();
        var pj2 = pd.jugadores ? pd.jugadores.find(function(x){
          if(!x.nombre) return false;
          var xC2 = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
          return xC2 === nmC2 || xC2.split(' ')[0] === nmC2.split(' ')[0];
        }) : null;
        if(pj2 && pj2.objetivos && Object.keys(pj2.objetivos).length > 0) return pj2.objetivos;
      } else {
        // Equipo for this partido
        if(pd.equipo_obj && Object.keys(pd.equipo_obj).length > 0) return pd.equipo_obj;
        if(pd.objetivos && pd.objetivos['__equipo__']) return pd.objetivos['__equipo__'];
      }
    }
  }
  // Acumulado - use entrenamientos or partidos based on tipo
  var JUGADORES_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_JUGADORES!=='undefined' ? ENTRENAMIENTOS_JUGADORES : null)
    : (typeof PARTIDOS_JUGADORES!=='undefined' ? PARTIDOS_JUGADORES : null);
  var INDIVIDUAL_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_INDIVIDUAL!=='undefined' ? ENTRENAMIENTOS_INDIVIDUAL : null)
    : (typeof PARTIDOS_INDIVIDUAL!=='undefined' ? PARTIDOS_INDIVIDUAL : null);
  var EQUIPO_SRC = window.currentObjTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_EQUIPO_OBJ!=='undefined' ? ENTRENAMIENTOS_EQUIPO_OBJ : null)
    : (typeof PARTIDOS_EQUIPO_OBJ!=='undefined' ? PARTIDOS_EQUIPO_OBJ : null);

  // Per-sesion if selected
  if(INDIVIDUAL_SRC && window.currentObjPartido !== 'acumulado'){
    var pd2 = INDIVIDUAL_SRC.find(function(p){ return p.nombre === currentObjPartido; });
    if(pd2){
      if(nombreJugador){
        var nmC3 = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();
        var pj3 = pd2.jugadores ? pd2.jugadores.find(function(x){
          if(!x.nombre) return false;
          var xC3 = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
          return xC3 === nmC3 || xC3.split(' ')[0] === nmC3.split(' ')[0];
        }) : null;
        if(pj3 && pj3.objetivos && Object.keys(pj3.objetivos).length>0) return pj3.objetivos;
      } else {
        if(pd2.equipo_obj && Object.keys(pd2.equipo_obj).length>0) return pd2.equipo_obj;
      }
    }
  }

  // Acumulado from datos_partidos.js or datos_entrenamientos.js
  if(JUGADORES_SRC && nombreJugador){
    var nmClean = nombreJugador.replace(/^\d+\s*/,'').toLowerCase();
    var pj = JUGADORES_SRC.find(function(x){
      if(!x.nombre) return false;
      var xClean = x.nombre.replace(/^\d+\s*/,'').toLowerCase();
      var nmApellido = nmClean.split(' ')[0];
      var xApellido  = xClean.split(' ')[0];
      return xClean === nmClean || nmApellido === xApellido;
    });
    if(pj && pj.objetivos && Object.keys(pj.objetivos).length > 0){
      return pj.objetivos;
    }
    // Found source but no data for this jugador — return nulls instead of falling to DVW
    if(window.currentObjTipo === 'entrenamiento'){
      return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,
              atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
    }
  }
  // Equipo acumulado
  if(EQUIPO_SRC && !nombreJugador && Object.keys(EQUIPO_SRC).length > 0){
    return EQUIPO_SRC;
  }
  // If entrenamiento mode and no data found, return nulls (don't show fake data)
  if(window.currentObjTipo === 'entrenamiento'){
    return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,
            atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
  // Fallback: calculate from HISTORIAL_DATA (DVW)
  var D=window.HISTORIAL_DATA;
  if(!D){
    if(nombreJugador) return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:41,atqhb:14,atqx:34,atqrp:42,atqri:27,atqrm:19,atqtr:28};
    return {sq:-5,rec:29,bqpos:38,bqpt:18,atqq:null,atqhb:14,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
  var a={sT:0,sPunto:0,sPos:0,sVend:0,sErr:0,rT:0,rPunto:0,rPos:0,rVend:0,rErr:0,
         aT:0,aPunto:0,aVend:0,aErr:0,bT:0,bPt:0,bPtPos:0,mbT:0,mbPt:0,mbVnd:0,mbErr:0};
  var CENT=[2,10,15,17];
  D.entrenamientos.forEach(function(s){
    s.jugadores.forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(nombreJugador&&j.n!==nombreJugador) return;
      a.sT+=j.sT||0;a.sPunto+=j.sPunto||0;a.sPos+=j.sPos||0;a.sVend+=j.sVend||0;a.sErr+=j.sErr||0;
      a.rT+=j.rT||0;a.rPunto+=j.rPunto||0;a.rPos+=j.rPos||0;a.rVend+=j.rVend||0;a.rErr+=j.rErr||0;
      a.aT+=j.aT||0;a.aPunto+=j.aPunto||0;a.aVend+=j.aVend||0;a.aErr+=j.aErr||0;
      a.bT+=j.bT||0;a.bPt+=j.bPt||0;a.bPtPos+=j.bPtPos||0;
      if(!nombreJugador&&CENT.indexOf(j.c)>=0){a.mbT+=j.aT||0;a.mbPt+=j.aPunto||0;a.mbVnd+=j.aVend||0;a.mbErr+=j.aErr||0;}
    });
  });
  var v={};
  v.sq   =a.sT>0?Math.round((a.sPunto+0.5*a.sVend+0.25*a.sPos-a.sErr)/a.sT*100):null;
  v.rec  =a.rT>0?Math.round((a.rPunto+0.5*a.rPos-0.5*a.rVend-a.rErr)/a.rT*100):null;
  v.bqpos=a.bT>0?Math.round((a.bPt+a.bPtPos)/a.bT*100):null;
  v.bqpt =a.bT>0?Math.round(a.bPt/a.bT*100):null;
  v.atqhb=a.mbT>0?Math.round((a.mbPt-a.mbVnd-a.mbErr)/a.mbT*100):null;
  return v;
}
function renderObjetivos(cid,extra){
  var el=document.getElementById(cid); if(!el) return;
  var metas=window.OBJETIVOS_CONFIG.metas;
  var vals=Object.assign({},objCalcVals(null),extra||{});
  var html='<div style="font-family:Barlow Condensed,sans-serif;padding:4px 0 8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#64748b">OBJETIVOS DEL EQUIPO · 2026</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +[['#22c55e','Objetivo'],['#86efac','Cerca'],['#fbbf24','Neutro'],['#ef4444','Lejos']].map(function(x){
      return'<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#64748b"><div style="width:7px;height:7px;border-radius:50%;background:'+x[0]+'"></div>'+x[1]+'</div>';
    }).join('')+'</div></div>'
    +'<div style="display:flex;gap:8px;width:100%;margin-bottom:4px">'
    +Object.keys(metas).map(function(id){
      return '<div style="flex:1;min-width:60px;text-align:center;padding:4px 2px">'
        +'<div style="font-size:10px;font-weight:800;color:#e2e8f0;letter-spacing:0.5px;text-transform:uppercase;line-height:1.3;word-break:break-word">'+metas[id].label+'</div>'
        +'<div style="font-size:10px;color:#22c55e;font-weight:700;margin-top:3px">'+metas[id].obj+'%</div>'
        +'</div>';
    }).join('')
    +'</div><div style="display:flex;gap:8px;width:100%">'
    +Object.keys(metas).map(function(id){
      var m=metas[id],val=vals[id]!==undefined?vals[id]:null;
      var cls=val!==null?objClassify(id,val):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
      return objSingleBat(id,val,m,cls,m.obj);
    }).join('')+'</div></div>';
  el.innerHTML=html;
}
function objPct(v,mn,mx){return Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100));}
function fmtEff(v){ return (v<0?'-':'')+Math.abs(v)+'%'; }
function objSingleBat(id,val,meta,cls,objLine){
  var fh=val!==null?objPct(val,meta.min,meta.max):0;
  var oh=objPct(objLine,meta.min,meta.max);
  var txt=val!==null?fmtEff(val):'—';
  return '<div style="flex:1;min-width:60px;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px 8px;border:0.5px solid '+cls.border+';border-radius:10px;background:'+cls.bg+';position:relative;overflow:hidden;font-family:Barlow Condensed,sans-serif">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+cls.color+';border-radius:10px 10px 0 0"></div>'
    +'<div style="font-size:22px;font-weight:900;line-height:1;color:'+cls.color+'">'+txt+'</div>'
    +'<div style="width:32px;height:68px;display:flex;flex-direction:column;align-items:center">'
      +'<div style="width:14px;height:5px;border-radius:2px 2px 0 0;background:'+cls.color+';opacity:.7;flex-shrink:0"></div>'
      +'<div style="position:relative;width:32px;flex:1;border-radius:3px;overflow:hidden;border:2px solid '+cls.color+'">'
        +'<div style="position:absolute;inset:0;background:#07080f"></div>'
        +(val!==null?'<div style="position:absolute;bottom:0;left:0;right:0;height:'+fh+'%;background:'+cls.color+'"></div>':'')
        +'<div style="position:absolute;bottom:25%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:50%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:75%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:'+oh+'%;left:-2px;right:-2px;display:flex;align-items:center;z-index:3">'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-right:4px solid rgba(255,255,255,.9)"></div>'
          +'<div style="flex:1;height:2px;background:rgba(255,255,255,.9);border-radius:1px"></div>'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:4px solid rgba(255,255,255,.9)"></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div style="font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 5px;border-radius:20px;background:'+cls.color+'22;color:'+cls.color+'">'+cls.label+'</div>'
    +'</div>';
}

  var el=document.getElementById(cid); if(!el) return;
  var metas=window.OBJETIVOS_CONFIG.metas;
  var vals=Object.assign({},typeof objGetVals!=="undefined"?objGetVals(null):objCalcVals(null),extra||{});
  var html='<div style="font-family:Barlow Condensed,sans-serif;padding:4px 0 8px">'

      return objSingleBat(id,val,m,cls,m.obj);
    }).join('')+'</div></div>';

function renderObjetivosJugador(cid,nombre,jugValsArg,eqValsArg){
  var el=document.getElementById(cid); if(!el) return;
  var metas=window.OBJETIVOS_CONFIG.metas;
  // Usar los valores que llegan por parámetro (calculados por objGetVals según el filtro).
  // Si no llegan, recurrir a objGetVals si existe, sino a objCalcVals (fallback).
  var jugVals = jugValsArg || (typeof objGetVals!=='undefined'?objGetVals(nombre):objCalcVals(nombre));
  var eqVals  = eqValsArg  || (typeof objGetVals!=='undefined'?objGetVals(null):objCalcVals(null));
  var rows=[{label:'Jugador',vals:jugVals,isJug:true},{label:'Equipo',vals:eqVals,isJug:false}];
  var html='<div style="font-family:Barlow Condensed,sans-serif;padding:4px 0 8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#64748b">MI PERFORMANCE VS EQUIPO</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'
    +[['#22c55e','Sobre equipo'],['#86efac','Cerca'],['#fbbf24','Neutro'],['#ef4444','Bajo equipo']].map(function(x){
      return'<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:#64748b"><div style="width:7px;height:7px;border-radius:50%;background:'+x[0]+'"></div>'+x[1]+'</div>';
    }).join('')+'</div></div>'
    +'<div style="display:flex;gap:8px;width:100%;margin-bottom:4px">'
    +'<div style="width:64px;flex-shrink:0"></div>'
    +Object.keys(metas).map(function(id){
      return '<div style="flex:1;min-width:60px;text-align:center;padding:4px 2px">'
        +'<div style="font-size:10px;font-weight:800;color:#e2e8f0;letter-spacing:0.5px;text-transform:uppercase;line-height:1.3;word-break:break-word">'+metas[id].label+'</div>'
        +'<div style="font-size:10px;color:#22c55e;font-weight:700;margin-top:3px">'+metas[id].obj+'%</div>'
        +'</div>';
    }).join('')
    +'</div>';
  rows.forEach(function(row){
    html+='<div style="display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px">'
      +'<div style="width:64px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;text-align:right;padding-right:8px">'+row.label+'</div>'
      +Object.keys(metas).map(function(id){
        var m=metas[id],val=row.vals[id]!==undefined?row.vals[id]:null;
        var cls,objLine;
        if(row.isJug){
          var eq=eqVals[id]!==undefined?eqVals[id]:null;
          cls=val!==null?objClassifyVsTeam(val,eq):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
          objLine=eq!==null?eq:m.obj;
        } else {
          cls=val!==null?objClassify(id,val):{color:'#334155',bg:'rgba(51,65,85,.08)',border:'rgba(51,65,85,.2)',label:'—'};
          objLine=m.obj;
        }
        return objSingleBat(id,val,m,cls,objLine);
      }).join('')+'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}
function buildObjSubfiltro(nombreJugador){
  var row = document.getElementById('obj-partido-row');
  if(!row) return;
  if(typeof PARTIDOS_META === 'undefined'){ row.style.display='none'; return; }
  row.innerHTML = '';
  row.style.display = 'flex';

  // Label
  var lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:9px;color:#475569;letter-spacing:2px;text-transform:uppercase;align-self:center;margin-right:4px';
  lbl.textContent = 'VER:';
  row.appendChild(lbl);

  // Acumulado button
  var b = document.createElement('button');
  b.className = 'obj-sfbtn' + (currentObjPartido==='acumulado'?' on':'');
  b.textContent = 'Acumulado';
  b.onclick = function(){
    window.window.currentObjPartido = 'acumulado';
    document.querySelectorAll('.obj-sfbtn').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    renderObjetivosJugador('objetivos-jugador', nombreJugador);
  };
  row.appendChild(b);

  // Per-partido buttons
  PARTIDOS_META.forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'obj-sfbtn' + (window.currentObjPartido===m.nombre?' on':'');
    var label = m.rival||m.nombre;
    if(m.resultado) label += ' ('+m.resultado+')';
    btn.textContent = label;
    btn.onclick = function(){
      window.currentObjPartido = m.nombre;
      document.querySelectorAll('.obj-sfbtn').forEach(function(x){x.classList.remove('on');});
      btn.classList.add('on');
      renderObjetivosJugador('objetivos-jugador', nombreJugador);
    };
    row.appendChild(btn);
  });
}
function setObjTipo(tipo, btn){
  window.currentObjTipo = tipo;
  window.window.currentObjPartido = 'acumulado';
  document.querySelectorAll('.obj-tfbtn').forEach(function(b){
    b.classList.remove('on','partido','ent');

  btn.classList.add('on', tipo==='partido'?'partido':'ent');

  var currentJugNombre = null;
  var titleEl = document.querySelector('.player-name-title');
  if(titleEl) currentJugNombre = titleEl.dataset.nombre;
  buildObjSubfiltro(currentJugNombre || '');

}

<script>
// ================================================================
// CASLA VOLEY — Utils compartidos
// Cargado por todas las páginas
// ================================================================

// ── Eficiencias ──────────────────────────────────────────────
function effSaque(j){
  return j.sT>0 ? Math.round((j.sPunto+0.5*j.sVend+0.25*j.sPos-j.sErr)/j.sT*100) : null;
}
function effRecepcion(j){
  return j.rT>0 ? Math.round((j.rPunto+0.5*j.rPos-0.5*j.rVend-j.rErr)/j.rT*100) : null;
}
function effAtaque(j){
  return j.aT>0 ? Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100) : null;
}
function effBloqueo(j){
  return j.bT>0 ? Math.round((j.bPt+j.bPtPos)/j.bT*100) : null;
}
function effColor(v){
  if(v===null||v===undefined||isNaN(v)) return 'var(--mut,#475569)';
  return v>=40?'#22c55e':v>=20?'#86efac':v>=0?'var(--txt,#e2e8f0)':v>=-20?'#f97316':'#ef4444';
}
function fmtEff(v){ return (v<0?'-':'')+Math.abs(v)+'%'; }

// ── Acumular jugadores de múltiples sesiones ─────────────────
function acumJugadores(sesiones){
  var acum={};
  (sesiones||[]).forEach(function(s){
    (s.jugadores||[]).forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(!acum[j.c]) acum[j.c]={c:j.c,n:j.n,PJ:0,
        sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sOrig:'',sDest:'',
        rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,
        aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,
        bT:0,bPt:0,bPtPos:0,dv4:{}};
      var a=acum[j.c];
      if((j.sT||0)+(j.rT||0)+(j.aT||0)+(j.bT||0)>0) a.PJ++;
      ['sT','sPunto','sPos','sOvp','sNeg','sVend','sErr',
       'rT','rPunto','rPos','rOvp','rNeg','rVend','rErr',
       'aT','aPunto','aPos','aOvp','aNeg','aVend','aErr',
       'bT','bPt','bPtPos'].forEach(function(k){ a[k]+=(j[k]||0); });
      if(j.dv4) Object.keys(j.dv4).forEach(function(cod){
        if(!a.dv4[cod]) a.dv4[cod]={tot:0,pt:0,err:0,orig:j.dv4[cod].orig||0};
        a.dv4[cod].tot+=j.dv4[cod].tot||0;
        a.dv4[cod].pt +=j.dv4[cod].pt ||0;
        a.dv4[cod].err+=j.dv4[cod].err||0;
      });
    });
  });
  return Object.values(acum).sort(function(a,b){return a.c-b.c;});
}

// ── Filtrar historial ────────────────────────────────────────
function filtrarSesiones(sesiones, tipo){
  if(!tipo||tipo==='todos') return sesiones||[];
  return (sesiones||[]).filter(function(s){ return (s.tipo||'P')===tipo; });
}

// ── Pos colors ───────────────────────────────────────────────
var POS_COLOR={
  'ARMADOR':'#f59e0b','CENTRAL':'#f97316',

};

// ── Objetivos config ─────────────────────────────────────────




function objPct(v,mn,mx){return Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100));}








function objSingleBat(id,val,meta,cls,objLine){
  var fh=val!==null?objPct(val,meta.min,meta.max):0;
  var oh=objPct(objLine,meta.min,meta.max);
  var txt=val!==null?fmtEff(val):'—';
  return '<div style="flex:1;min-width:60px;max-width:110px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 5px 8px;border:0.5px solid '+cls.border+';border-radius:10px;background:'+cls.bg+';position:relative;overflow:hidden;font-family:Barlow Condensed,sans-serif">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+cls.color+';border-radius:10px 10px 0 0"></div>'
    +'<div style="font-size:22px;font-weight:900;line-height:1;color:'+cls.color+'">'+txt+'</div>'
    +'<div style="width:32px;height:68px;display:flex;flex-direction:column;align-items:center">'
      +'<div style="width:14px;height:5px;border-radius:2px 2px 0 0;background:'+cls.color+';opacity:.7;flex-shrink:0"></div>'
      +'<div style="position:relative;width:32px;flex:1;border-radius:3px;overflow:hidden;border:2px solid '+cls.color+'">'
        +'<div style="position:absolute;inset:0;background:#07080f"></div>'
        +(val!==null?'<div style="position:absolute;bottom:0;left:0;right:0;height:'+fh+'%;background:'+cls.color+'"></div>':'')
        +'<div style="position:absolute;bottom:25%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:50%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:75%;left:0;right:0;height:1px;background:#fff;opacity:.15"></div>'
        +'<div style="position:absolute;bottom:'+oh+'%;left:-2px;right:-2px;display:flex;align-items:center;z-index:3">'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-right:4px solid rgba(255,255,255,.9)"></div>'
          +'<div style="flex:1;height:2px;background:rgba(255,255,255,.9);border-radius:1px"></div>'
          +'<div style="width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:4px solid rgba(255,255,255,.9)"></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div style="font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 5px;border-radius:20px;background:'+cls.color+'22;color:'+cls.color+'">'+cls.label+'</div>'
    +'</div>';
}





</script>

function renderQuickStats(j){

  var totSaque=0,totRecep=0,totAtaque=0,effAtq=null;

  // Leer de PARTIDOS_JUGADORES (datos actuales con baterías)
  if(typeof PARTIDOS_JUGADORES!=='undefined'){
    var nmC=(j.nombre||'').replace(/^\d+\s*/,'').toLowerCase().split(' ')[0];
    var pj=PARTIDOS_JUGADORES.find(function(x){
      return x.nombre && x.nombre.replace(/^\d+\s*/,'').toLowerCase().split(' ')[0]===nmC;
    });
    if(pj){
      totSaque  = pj.tot_saques||0;
      totRecep  = pj.tot_recep||0;
      totAtaque = pj.tot_ataques||0;
      // eff ataque: promedio de las 3 baterías de ataque por tipo si existen
      if(pj.objetivos){
        var o=pj.objetivos, vals=[o.atqq,o.atqhb,o.atqx].filter(function(v){return v!==null&&v!==undefined;});
        if(vals.length) effAtq=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
      }
    }
  }

  qs.style.display='grid';
  qs.innerHTML = [
    {lbl:'Saques',     val:totSaque||'—',  c:color},

// ── STATS ──────────────────────────────────────────────────────────
function renderStats(j){
  var grid = document.getElementById('stats-grid');
  if(!window.HISTORIAL_DATA) return;

  // Accumulate separately for Partidos (P) and Entrenamientos (E)
  var acc = {
    P: {sT:0,sEff:0,rT:0,rEff:0,aT:0,aEff:0,aPunto:0,count:0},
    E: {sT:0,sEff:0,rT:0,rEff:0,aT:0,aEff:0,aPunto:0,count:0}
  };
  window.HISTORIAL_DATA.entrenamientos.forEach(function(e){
    var t = e.tipo||'P';
    if(!acc[t]) return;
    e.jugadores.forEach(function(jh){
      if(jh.n===j.nombre){
        acc[t].sT+=jh.sT||0; acc[t].sEff+=(jh.sEff||0)*(jh.sT||0);
        acc[t].rT+=jh.rT||0; acc[t].rEff+=(jh.rEff||0)*(jh.rT||0);
        acc[t].aT+=jh.aT||0; acc[t].aEff+=(jh.aEff||0)*(jh.aT||0);
        acc[t].aPunto+=jh.aPunto||0; acc[t].count++;
      }
    });
  });

  if(acc.P.count===0 && acc.E.count===0) return;

  var color = POS_COLOR[j.pos]||'#64748b';

  function makeCards(a, label, labelColor){
    if(a.count===0) return '';
    return '<div style="grid-column:1/-1;font-size:9px;font-weight:800;letter-spacing:2px;color:'+labelColor+';text-transform:uppercase;padding:4px 0 2px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:2px">'+label+'</div>'+
    '<div class="stat-card">' +
      '<div class="stat-card-title" style="color:'+color+'">⬆️ Saque</div>' +
      '<div class="stat-row"><span class="stat-row-lbl">Total</span><span class="stat-row-val" style="color:'+color+'">'+a.sT+'</span></div>' +
      '<div class="stat-row"><span class="stat-row-lbl">EFF</span><span class="stat-row-val">'+(a.sT>0?Math.round(a.sEff/a.sT)+'%':'—')+'</span></div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-title" style="color:#22c55e">🛡 Recepción</div>' +
      '<div class="stat-row"><span class="stat-row-lbl">Total</span><span class="stat-row-val" style="color:#22c55e">'+a.rT+'</span></div>' +
      '<div class="stat-row"><span class="stat-row-lbl">EFF</span><span class="stat-row-val">'+(a.rT>0?Math.round(a.rEff/a.rT)+'%':'—')+'</span></div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="stat-card-title" style="color:#818cf8">⚡ Ataque</div>' +
      '<div class="stat-row"><span class="stat-row-lbl">Total</span><span class="stat-row-val" style="color:#818cf8">'+a.aT+'</span></div>' +
      '<div class="stat-row"><span class="stat-row-lbl">Puntos</span><span class="stat-row-val" style="color:#22c55e">'+a.aPunto+'</span></div>' +
      '<div class="stat-row"><span class="stat-row-lbl">EFF</span><span class="stat-row-val">'+(a.aT>0?Math.round(a.aEff/a.aT)+'%':'—')+'</span></div>' +
    '</div>';
  }

  grid.innerHTML =
    makeCards(acc.P, '🏆 PARTIDOS', '#e8192c') +
    makeCards(acc.E, '🏋️ ENTRENAMIENTOS', '#22c55e');
}

// ── RUTINA ─────────────────────────────────────────────────────────
function renderRutina(j){
  var card = document.getElementById('rutina-card');
  if(!window.PREP_DATA) return;
  var jugPrep = window.PREP_DATA.jugadores.find(function(jp){ return jp.num===j.num; });
  if(!jugPrep||!jugPrep.semanas||jugPrep.semanas.length===0) return;
  var semana = jugPrep.semanas[0];
  if(!semana.bloques||semana.bloques.length===0) return;
  var html='<div style="font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">'+semana.label+'</div>';
  var ejCount=0;
  semana.bloques.forEach(function(b){
    (b.ejercicios||[]).forEach(function(ej){
      if(ejCount>=5) return;
      html+='<div class="rutina-ej"><div class="rutina-ej-num">'+(ejCount+1)+'</div><div class="rutina-ej-nombre">'+ej.nombre+'</div><div class="rutina-ej-meta">'+ej.series+'×'+ej.reps+'</div></div>';
      ejCount++;
    });
  });
  if(ejCount>0){
    html+='<a href="prep_fisica.html?player='+encodeURIComponent(j.nombre)+'" style="display:block;text-align:center;margin-top:12px;font-size:10px;color:var(--red);letter-spacing:1px;text-decoration:none;">VER RUTINA COMPLETA →</a>';
    card.innerHTML=html;
  }
}

<script>

// ── CONFIGURACION BATERIAS ─────────────────────────────────────────
window.OBJETIVOS_CONFIG = {metas:{
  sq:   {label:'% Saque',     obj:3,  min:-12,max:8,  g2:3,  g1:-3, y:-8},

  atqrp:{label:'Atq R#+',     obj:50, min:32, max:58, g2:50, g1:44, y:38},

  atqrm:{label:'Atq R-',      obj:26, min:14, max:34, g2:26, g1:22, y:18},
  atqtr:{label:'Atq TR',      obj:34, min:22, max:42, g2:34, g1:30, y:26}
}};

// Estado global — UNA SOLA VARIABLE
window._objTipo    = 'partido';
window._objPartido = 'acumulado';
window._objNombre  = '';



function objClassifyVsTeam(val, teamVal){
  if(teamVal === null || teamVal === undefined)
    return {color:'#64748b',bg:'rgba(100,116,139,.08)',border:'rgba(100,116,139,.2)',label:'—'};
  var d = val - teamVal;
  if(d >= 5)  return {color:'#22c55e',bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',  label:'Sobre equipo'};
  if(d >= 0)  return {color:'#86efac',bg:'rgba(134,239,172,.08)',border:'rgba(134,239,172,.3)', label:'Cerca equipo'};
  if(d >= -8) return {color:'#fbbf24',bg:'rgba(251,191,36,.1)',  border:'rgba(251,191,36,.3)',  label:'Neutro'};
  return             {color:'#ef4444',bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.3)',   label:'Bajo equipo'};
}

function objGetVals(nombre){
  var tipo    = window._objTipo;
  var partido = window._objPartido;

  // Per-sesion
  if(partido !== 'acumulado'){
    var INDIV = tipo==='entrenamiento'
      ? (typeof ENTRENAMIENTOS_INDIVIDUAL!=='undefined' ? ENTRENAMIENTOS_INDIVIDUAL : null)
      : (typeof PARTIDOS_INDIVIDUAL!=='undefined' ? PARTIDOS_INDIVIDUAL : null);
    if(INDIV){
      var pd = INDIV.find(function(p){ return p.nombre===partido; });
      if(pd && pd.jugadores && nombre){
        var nmC = nombre.replace(/^\d+\s*/,'').toLowerCase();
        var pj = pd.jugadores.find(function(x){
          return x.nombre && x.nombre.replace(/^\d+\s*/,'').toLowerCase().split(' ')[0] === nmC.split(' ')[0];
        });
        if(pj && pj.objetivos && Object.keys(pj.objetivos).length > 0) return pj.objetivos;
      }
      if(!nombre && pd && pd.equipo_obj && Object.keys(pd.equipo_obj).length > 0) return pd.equipo_obj;
    }
    // No data for this sesion
    return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }

  // Acumulado
  if(nombre){
    var SRC = tipo==='entrenamiento'
      ? (typeof ENTRENAMIENTOS_JUGADORES!=='undefined' ? ENTRENAMIENTOS_JUGADORES : null)
      : (typeof PARTIDOS_JUGADORES!=='undefined' ? PARTIDOS_JUGADORES : null);
    if(SRC){
      var nmC2 = nombre.replace(/^\d+\s*/,'').toLowerCase();
      var pj2 = SRC.find(function(x){
        return x.nombre && x.nombre.replace(/^\d+\s*/,'').toLowerCase().split(' ')[0] === nmC2.split(' ')[0];
      });
      if(pj2 && pj2.objetivos && Object.keys(pj2.objetivos).length > 0) return pj2.objetivos;
    }
    // No data found
    return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  } else {
    // Equipo
    var EQ = tipo==='entrenamiento'
      ? (typeof ENTRENAMIENTOS_EQUIPO_OBJ!=='undefined' ? ENTRENAMIENTOS_EQUIPO_OBJ : null)
      : (typeof PARTIDOS_EQUIPO_OBJ!=='undefined' ? PARTIDOS_EQUIPO_OBJ : null);
    if(EQ && Object.keys(EQ).length > 0) return EQ;
    return {sq:null,rec:null,bqpos:null,bqpt:null,atqq:null,atqhb:null,atqx:null,atqrp:null,atqri:null,atqrm:null,atqtr:null};
  }
}

function objSetTipo(tipo, btn){
  window._objTipo    = tipo;
  window._objPartido = 'acumulado';
  document.querySelectorAll('.obj-tfbtn').forEach(function(b){
    b.style.background  = 'rgba(255,255,255,.04)';
    b.style.borderColor = 'rgba(255,255,255,.08)';
    b.style.color       = '#475569';
  });
  if(btn){
    btn.style.background  = tipo==='partido' ? 'rgba(232,25,44,.12)' : 'rgba(34,197,94,.12)';
    btn.style.borderColor = tipo==='partido' ? 'rgba(232,25,44,.4)'  : 'rgba(34,197,94,.4)';
    btn.style.color       = tipo==='partido' ? '#e8192c'             : '#22c55e';
  }
  objBuildSubfiltro();
  objRenderBaterias();
}

function objBuildSubfiltro(){
  var row = document.getElementById('obj-partido-row');
  if(!row) return;
  row.innerHTML = '';
  row.style.display = 'flex';
  var meta = window._objTipo==='entrenamiento'
    ? (typeof ENTRENAMIENTOS_META!=='undefined' ? ENTRENAMIENTOS_META : [])
    : (typeof PARTIDOS_META!=='undefined' ? PARTIDOS_META : []);

  var ba = document.createElement('button');
  ba.className = 'obj-sfbtn' + (window._objPartido==='acumulado' ? ' on' : '');
  ba.textContent = 'Acumulado';
  ba.onclick = function(){
    window._objPartido = 'acumulado';
    document.querySelectorAll('.obj-sfbtn').forEach(function(b){ b.classList.remove('on'); });
    ba.classList.add('on');
    objRenderBaterias();
  };
  row.appendChild(ba);

  meta.forEach(function(m){
    var btn2 = document.createElement('button');
    btn2.className = 'obj-sfbtn' + (window._objPartido===m.nombre ? ' on' : '');
    var label = window._objTipo==='entrenamiento' ? (m.fecha||m.nombre) : (m.rival||m.nombre);
    if(m.resultado && window._objTipo==='partido') label += ' ('+m.resultado+')';
    btn2.textContent = label;
    btn2.onclick = function(){
      window._objPartido = m.nombre;
      document.querySelectorAll('.obj-sfbtn').forEach(function(b){ b.classList.remove('on'); });
      btn2.classList.add('on');
      objRenderBaterias();
    };
    row.appendChild(btn2);
  });
}

function objRenderBaterias(){
  var nombre = window._objNombre;
  var jugVals = objGetVals(nombre);
  var eqVals  = objGetVals(null);
  renderObjetivosJugador('objetivos-jugador', nombre, jugVals, eqVals);
  renderEvolucion(jugador);
  renderFeedback(jugador);
  renderComparativaJugador(jugador);
}





// ── FEEDBACK ──────────────────────────────────────────────────────────
function renderFeedback(jugador){

  if(!section || !container) return;
  
  if(typeof PARTIDOS_FEEDBACK === 'undefined') return;

    return f.jugador === apellido;
  });
  
  if(!feedbacks.length){ section.style.display='none'; return; }
  
  section.style.display='block';
  
  var CAT_COLORS = {

    'RECEPCION': {c:'#22C55E', bg:'rgba(34,197,94,.08)',   border:'rgba(34,197,94,.2)',   icon:'🛡'},
    'BLOQUEO':   {c:'#06B6D4', bg:'rgba(6,182,212,.08)',   border:'rgba(6,182,212,.2)',   icon:'🧱'},
    'GENERAL':   {c:'#818CF8', bg:'rgba(129,140,248,.08)', border:'rgba(129,140,248,.2)', icon:'⭐'},
    'MENTAL':    {c:'#EC4899', bg:'rgba(236,72,153,.08)',  border:'rgba(236,72,153,.2)',  icon:'🧠'},
    'FISICO':    {c:'#8B5CF6', bg:'rgba(139,92,246,.08)',  border:'rgba(139,92,246,.2)',  icon:'💪'},
  };

  // Sort: most recent first
  feedbacks.sort(function(a,b){ return (b.fecha||'') > (a.fecha||'') ? 1 : -1; });
  
  container.innerHTML = feedbacks.map(function(f){
    var cat = f.categoria || 'GENERAL';
    var col = CAT_COLORS[cat] || CAT_COLORS['GENERAL'];
    return '<div style="background:'+col.bg+';border:1px solid '+col.border+';border-radius:10px;padding:12px 14px">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<span style="font-size:14px">'+col.icon+'</span>'
      + '<span style="font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:'+col.c+'">'+cat+'</span>'
      + '<span style="font-size:9px;color:#64748b;margin-left:auto">'+f.partido+' · '+f.fecha+'</span>'
      + '</div>'
      + '<div style="font-size:13px;color:#e2e8f0;line-height:1.5;font-family:Barlow Condensed,sans-serif">'+f.texto+'</div>'
      + '</div>';
  }).join('');
}



// ── COMPARATIVA VS EQUIPO Y POSICION ─────────────────────────────────
function renderComparativaJugador(jugador){
  var section = document.getElementById('comparativa-section');
  var cont = document.getElementById('comparativa-content');
  if(!section || !cont) return;
  var jugs = typeof PARTIDOS_JUGADORES!=='undefined' ? PARTIDOS_JUGADORES : [];
  if(!jugs.length){ section.style.display='none'; return; }
  var cur = jugs.find(function(j){ return j.num===jugador.num; });
  if(!cur || !cur.objetivos){ section.style.display='none'; return; }
  var eq = typeof PARTIDOS_EQUIPO_OBJ!=='undefined' ? PARTIDOS_EQUIPO_OBJ : {};
  var pos = jugador.pos||cur.pos||'';
  // compañeros de misma posición (excluyendo al jugador)
  var samePos = jugs.filter(function(j){ return j.num!==jugador.num && (j.pos||'')===pos && j.objetivos; });
  function avgPos(key){
    var vals=samePos.map(function(j){return j.objetivos[key];}).filter(function(v){return v!==null&&v!==undefined;});
    if(!vals.length) return null;
    return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
  }
  var METR=[
    {k:'sq',l:'Saque'},{k:'rec',l:'Recepción'},{k:'bqpos',l:'Bloqueo #+'},
    {k:'atqq',l:'Atq Central'},{k:'atqhb',l:'Atq Alta'},{k:'atqx',l:'Atq Rápida'},
    {k:'atqrp',l:'Atq R#+'},{k:'atqri',l:'Atq R!'},{k:'atqrm',l:'Atq R-'},{k:'atqtr',l:'Transición'}
  ];
  function cell(v){ return v===null||v===undefined?'<span style="color:#475569">—</span>':(v+'%'); }
  function diffBadge(a,b){
    if(a===null||a===undefined||b===null||b===undefined) return '<span style="color:#475569">—</span>';
    var d=a-b; var col=d>=5?'#22c55e':d>=0?'#86efac':d>=-8?'#fbbf24':'#ef4444';
    return '<span style="color:'+col+';font-weight:800">'+(d>0?'+':'')+d+'</span>';
  }
  var rows=METR.map(function(m){
    var jv=cur.objetivos[m.k], ev=eq[m.k], pv=avgPos(m.k);
    return '<tr style="border-bottom:1px solid rgba(255,255,255,.04)">'
      +'<td style="padding:7px 10px;text-align:left;font-size:11px;color:#cbd5e1">'+m.l+'</td>'
      +'<td style="padding:7px 10px;font-weight:800;color:#818cf8">'+cell(jv)+'</td>'
      +'<td style="padding:7px 10px;color:#94a3b8">'+cell(ev)+'</td>'
      +'<td style="padding:7px 10px">'+diffBadge(jv,ev)+'</td>'
      +'<td style="padding:7px 10px;color:#94a3b8">'+cell(pv)+'</td>'
      +'<td style="padding:7px 10px">'+diffBadge(jv,pv)+'</td>'
      +'</tr>';
  }).join('');
  cont.innerHTML='<div class="tabla-wrap" style="background:#0d0e1a;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden">'
    +'<table style="width:100%;border-collapse:collapse;font-family:Barlow Condensed,sans-serif">'
    +'<thead><tr style="background:#0f1020">'
    +'<th style="padding:9px 10px;text-align:left;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase">Fundamento</th>'
    +'<th style="padding:9px 10px;font-size:9px;letter-spacing:1px;color:#818cf8;text-transform:uppercase">Jugador</th>'
    +'<th style="padding:9px 10px;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase">Equipo</th>'
    +'<th style="padding:9px 10px;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase">vs Eq</th>'
    +'<th style="padding:9px 10px;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase">'+(pos||'Pos')+'</th>'
    +'<th style="padding:9px 10px;font-size:9px;letter-spacing:1px;color:#64748b;text-transform:uppercase">vs Pos</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  section.style.display='block';
}

// ── EVOLUCIÓN DEL RENDIMIENTO ─────────────────────────────────────────
function renderEvolucion(jugador){
  var section = document.getElementById('evolucion-section');
  var cont    = document.getElementById('evolucion-content');
  if(!section || !cont) return;

  var D = window.HISTORIAL_DATA;
  if(!D || !D.entrenamientos){ section.style.display='none'; return; }

  var parts = D.entrenamientos.filter(function(e){ return e.tipo==='P'; });
  if(!parts.length){ section.style.display='none'; return; }

  // Get stats per partido for this player
  var data = [];
  parts.forEach(function(p){
    var jug = (p.jugadores||[]).find(function(j){ return j.c === jugador.num; });
    if(!jug) return;
    data.push({
      rival:  p.rival || p.fecha,
      fecha:  p.fecha || '',
      aEff:   jug.aEff  !== undefined ? jug.aEff  : null,
      sEff:   jug.sEff  !== undefined ? jug.sEff  : null,
      rEff:   jug.rEff  !== undefined ? jug.rEff  : null,
      bPt:    jug.bPt   !== undefined ? jug.bPt   : null,
      bT:     jug.bT    !== undefined ? jug.bT    : null,
    });
  });

  if(!data.length){ section.style.display='none'; return; }
  section.style.display = 'block';

  var metrics = [
    {key:'aEff', lbl:'Ataque',    color:'#F97316', obj:44},
    {key:'sEff', lbl:'Saque',     color:'#F59E0B', obj:3},
    {key:'rEff', lbl:'Recepción', color:'#22C55E', obj:36},
  ];

  var html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">';

  metrics.forEach(function(m){
    var vals = data.map(function(d){ return d[m.key]; }).filter(function(v){ return v !== null; });
    if(!vals.length) return;

    var avg = Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length);
    var trend = vals.length >= 2 ? vals[vals.length-1] - vals[vals.length-2] : 0;
    var trendStr = trend === 0 ? '→' : trend > 0 ? '↑ +'+trend+'%' : '↓ '+trend+'%';
    var trendCol = trend > 0 ? '#22c55e' : trend < 0 ? '#ef4444' : '#64748b';
    var maxVal = Math.max.apply(null, vals);
    var minVal = Math.min.apply(null, vals);
    var scaleCeil  = Math.max(maxVal, m.obj) + 10;
    var scaleFloor = Math.min(minVal, 0);
    var scaleRange = scaleCeil - scaleFloor;
    if(scaleRange === 0) scaleRange = 1;

    html += '<div style="background:rgba(13,14,26,.8);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    html += '<div style="font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:'+m.color+'">'+m.lbl+'</div>';
    html += '<div style="font-size:11px;color:'+trendCol+';font-weight:700">'+trendStr+'</div>';
    html += '</div>';

    var objPct = Math.round((m.obj - scaleFloor) / scaleRange * 100);
    html += '<div style="position:relative;height:160px;margin-bottom:4px">';
    html += '<div style="position:absolute;left:0;right:0;bottom:'+objPct+'%;border-top:1px dashed rgba(255,255,255,.25)">';
    html += '<span style="position:absolute;right:2px;top:-12px;font-size:8px;color:rgba(255,255,255,.3)">'+m.obj+'%</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:6px;align-items:flex-end;height:100%">';
    data.forEach(function(d, i){
      var v = d[m.key];
      if(v === null){
        html += '<div style="flex:1"></div>';
        return;
      }
      var barH   = Math.max(4, Math.round((v - scaleFloor) / scaleRange * 100));
      var barCol = v >= m.obj ? m.color : v >= (m.obj - 8) ? '#fbbf24' : '#ef4444';
      var isLast = i === data.length - 1;
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">';
      html += '<div style="font-size:11px;font-weight:800;color:'+barCol+';margin-bottom:3px">'+v+'%</div>';
      html += '<div style="width:100%;height:'+barH+'%;background:'+barCol+';opacity:'+(isLast?'1':'0.5')+';border-radius:5px 5px 0 0;min-height:4px"></div>';
      html += '<div style="font-size:9px;color:#475569;margin-top:4px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%">'+d.rival.substring(0,5)+'</div>';
      html += '</div>';
    });
    html += '</div></div>';

    html += '<div style="display:flex;justify-content:space-between;font-size:9px;color:#64748b;border-top:1px solid rgba(255,255,255,.05);padding-top:8px;margin-top:4px">';
    html += '<span>Promedio: <b style="color:'+(avg>=m.obj?'#22c55e':'#f59e0b')+'">'+avg+'%</b></span>';
    html += '<span>Objetivo: '+m.obj+'%</span>';
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';
  cont.innerHTML = html;
}

</script>
