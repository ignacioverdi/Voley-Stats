<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PIZARRÓN — CASL VOLEY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="datos_equipo.js" onerror="void 0"></script>
<script src="datos_prep_fisica.js" onerror="void 0"></script>
<script src="firebase.js" onerror="void 0"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--card:#0d0e1a;--card2:#111220;
  --border:rgba(255,255,255,.08);
  --red:#e8192c;--green:#22c55e;--amber:#f59e0b;
  --indigo:#818cf8;--orange:#f97316;--mut:#475569;--txt:#e2e8f0;
}
body{background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;}
select,select option{color:#111!important;background:#fff!important;}

/* HEADER */
.header{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.01);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;background:linear-gradient(120deg,#e8192c,#fff 50%,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-right{display:flex;align-items:center;gap:12px;}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;}
.back-btn:hover{color:var(--txt);}

/* CONTROLES */
.controles{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.01);}
.ctrl-label{font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;}
.ctrl-sel{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;outline:none;}
.ctrl-sel:focus{border-color:rgba(232,25,44,.4);}
.btn-fullscreen{padding:7px 16px;border-radius:8px;border:1px solid rgba(129,140,248,.3);background:rgba(129,140,248,.08);color:#818cf8;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.btn-fullscreen:hover{background:rgba(129,140,248,.2);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.5);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{padding:20px 28px;max-width:1800px;margin:0 auto;}
.dia-titulo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;margin-bottom:20px;color:var(--red);display:flex;align-items:center;gap:12px;}
.dia-titulo::after{content:'';flex:1;height:1px;background:rgba(232,25,44,.2);}

/* BLOQUE */
.bloque{margin-bottom:24px;}
.bloque-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.bloque-icon{font-size:18px;}
.bloque-nombre{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}

/* TABLA EJERCICIO */
.ejercicio-wrap{margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ejercicio-titulo{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--card2);}
.ej-num{width:24px;height:24px;border-radius:6px;background:rgba(232,25,44,.1);border:1px solid rgba(232,25,44,.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--red);flex-shrink:0;}
.ej-nombre{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;flex:1;}
.ej-badges{display:flex;gap:6px;}
.ej-badge{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.badge-s{background:rgba(129,140,248,.1);color:#818cf8;border:1px solid rgba(129,140,248,.2);}
.badge-r{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2);}
.badge-d{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2);}
.ej-video-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(129,140,248,.2);background:rgba(129,140,248,.08);color:#818cf8;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none;}
.ej-video-btn:hover{background:rgba(129,140,248,.2);}
.ej-video-btn.off{opacity:.3;pointer-events:none;}

/* TABLA JUGADORES */
.tabla-jugadores{width:100%;border-collapse:collapse;}
.tabla-jugadores th{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--border);text-align:left;}
.tabla-jugadores th.center{text-align:center;}
.tabla-jugadores td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;}
.tabla-jugadores tr:last-child td{border-bottom:none;}
.tabla-jugadores tr:hover td{background:rgba(255,255,255,.02);}

.jug-num{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--mut);width:32px;}
.jug-nombre{font-weight:700;letter-spacing:.5px;}
.jug-pos{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;}
.pos-CENTRAL{background:rgba(249,115,22,.1);color:#f97316;}
.pos-PUNTA{background:rgba(34,197,94,.1);color:#22c55e;}
.pos-ARMADOR{background:rgba(245,158,11,.1);color:#f59e0b;}
.pos-OPUESTO{background:rgba(129,140,248,.1);color:#818cf8;}
.pos-LIBERO{background:rgba(6,182,212,.1);color:#06b6d4;}

/* INPUT DE PESO EN LA TABLA */
.peso-cell{text-align:center;}
.peso-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.serie-lbl{font-size:8px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}
.peso-inp{width:58px;padding:5px 4px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt);font-family:'Bebas Neue',sans-serif;font-size:17px;text-align:center;outline:none;transition:all .15s;}
.peso-inp:focus{border-color:rgba(232,25,44,.4);background:rgba(232,25,44,.05);}
.peso-inp::placeholder{color:var(--mut);font-size:11px;}
.peso-inp.filled{border-color:rgba(34,197,94,.3);color:var(--green);}
.series-grid{display:flex;gap:6px;justify-content:center;}

/* PANTALLA VACÍA */
.empty{text-align:center;padding:60px;color:var(--mut);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;}
.empty-sub{font-size:12px;margin-top:6px;}

/* FULLSCREEN */
body.fullscreen .header{display:none;}
body.fullscreen .controles{display:none;}
body.fullscreen .main{padding:16px;max-width:100%;}
body.fullscreen{background:#000;}

@media(max-width:768px){
  .controles{padding:10px 16px;}
  .main{padding:12px 16px;}
  .tabla-jugadores{font-size:12px;}
  .peso-inp{width:48px;font-size:14px;}
  .series-grid{gap:3px;}
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="back-btn">← Inicio</a>
    <div class="logo">🏐 Pizarrón</div>
    <div style="font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;">CASLA VOLEY · Rutina del día</div>
  </div>
  <div class="header-right">
    <div class="live-dot" title="Sincronizado con Firebase"></div>
    <span style="font-size:10px;color:var(--green);letter-spacing:1px;">LIVE</span>
    <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ Pantalla completa</button>
    <a href="prep_fisica.html" class="back-btn">💪 Individual</a>
  </div>
</div>

<!-- CONTROLES -->
<div class="controles">
  <div>
    <div class="ctrl-label">Día de rutina</div>
    <select class="ctrl-sel" id="sel-dia" onchange="renderPizarron()">
      <option value="">— Elegí el día —</option>
    </select>
  </div>
  <div>
    <div class="ctrl-label">Posición</div>
    <select class="ctrl-sel" id="sel-pos" onchange="renderPizarron()">
      <option value="TODOS">Todas las posiciones</option>
      <option value="CENTRAL">Centrales</option>
      <option value="PUNTA">Puntas</option>
      <option value="ARMADOR">Armadores</option>
      <option value="OPUESTO">Opuestos</option>
      <option value="LIBERO">Liberos</option>
    </select>
  </div>
  <div style="font-size:10px;color:var(--mut);margin-left:auto;letter-spacing:.5px;" id="last-update"></div>
</div>

<!-- CONTENIDO -->
<div class="main" id="main-content">
  <div class="empty">
    <div class="empty-icon">🏋️</div>
    <div class="empty-txt">Elegí el día de rutina</div>
    <div class="empty-sub">Seleccioná el día arriba para ver la rutina completa</div>
  </div>
</div>

<script>
var PREP_DATA_LOCAL = window.PREP_DATA || null;
var EQUIPO_DATA_LOCAL = window.EQUIPO_DATA || null;

// ── Construir mapa de días únicos ─────────────────────────────────
function getDias(){
  if(!PREP_DATA_LOCAL) return [];
  var dias = {};
  PREP_DATA_LOCAL.jugadores.forEach(function(j){
    (j.semanas||[]).forEach(function(s){
      if(!dias[s.label]) dias[s.label] = {label:s.label, bloques:{}};
      (s.bloques||[]).forEach(function(b){
        if(!dias[s.label].bloques[b.nombre]){
          dias[s.label].bloques[b.nombre] = {
            nombre:b.nombre, icon:b.icon, color:b.color, ejercicios:{}
          };
        }
        (b.ejercicios||[]).forEach(function(e){
          if(!dias[s.label].bloques[b.nombre].ejercicios[e.id]){
            dias[s.label].bloques[b.nombre].ejercicios[e.id] = {
              id:e.id, nombre:e.nombre, series:e.series,
              reps:e.reps, descanso:e.descanso, video:e.video
            };
          }
        });
      });
    });
  });
  return Object.values(dias);
}

// ── Poblar selector de días ───────────────────────────────────────
function poblarDias(){
  var dias = getDias();
  var sel = document.getElementById('sel-dia');
  sel.innerHTML = '<option value="">— Elegí el día —</option>';
  dias.forEach(function(d){
    var o = document.createElement('option');
    o.value = d.label;
    o.textContent = d.label;
    sel.appendChild(o);
  });
  // Auto-seleccionar primero
  if(dias.length > 0){
    sel.value = dias[0].label;
    renderPizarron();
  }
}

// ── Storage key ───────────────────────────────────────────────────
function sk(jugNum, ejId, serie){ return 'prep_'+jugNum+'_'+ejId+'_s'+serie; }
function fbSk(jugNum, ejId, serie){ return 'pesos/prep_'+jugNum+'_'+ejId+'_s'+serie; }

// ── Render principal ──────────────────────────────────────────────
function renderPizarron(){
  var diaLabel = document.getElementById('sel-dia').value;
  var posFilter = document.getElementById('sel-pos').value;
  var cont = document.getElementById('main-content');

  if(!diaLabel || !PREP_DATA_LOCAL){
    cont.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-txt">Elegí el día de rutina</div><div class="empty-sub">Seleccioná el día arriba para ver la rutina completa</div></div>';
    return;
  }

  // Filtrar jugadores por posición
  var jugadores = PREP_DATA_LOCAL.jugadores.filter(function(j){
    return posFilter === 'TODOS' || j.pos === posFilter;
  });

  // Recolectar bloques y ejercicios del día
  var bloques = {};
  jugadores.forEach(function(j){
    (j.semanas||[]).forEach(function(s){
      if(s.label !== diaLabel) return;
      (s.bloques||[]).forEach(function(b){
        if(!bloques[b.nombre]) bloques[b.nombre]={nombre:b.nombre,icon:b.icon,color:b.color,ejercicios:{}};
        (b.ejercicios||[]).forEach(function(e){
          if(!bloques[b.nombre].ejercicios[e.id])
            bloques[b.nombre].ejercicios[e.id]={id:e.id,nombre:e.nombre,series:e.series,reps:e.reps,descanso:e.descanso,video:e.video};
        });
      });
    });
  });

  if(Object.keys(bloques).length === 0){
    cont.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">Sin rutina para este día</div><div class="empty-sub">Este día no tiene ejercicios cargados aún</div></div>';
    return;
  }

  cont.innerHTML = '';

  // Título del día
  var titulo = document.createElement('div');
  titulo.className = 'dia-titulo';
  titulo.textContent = '📅 ' + diaLabel;
  cont.appendChild(titulo);

  // Render por bloque
  Object.values(bloques).forEach(function(bloque, bi){
    var bDiv = document.createElement('div');
    bDiv.className = 'bloque';

    var bHdr = document.createElement('div');
    bHdr.className = 'bloque-header';
    bHdr.innerHTML = '<span class="bloque-icon">' + (bloque.icon||'💪') + '</span>' +
      '<span class="bloque-nombre" style="color:' + (bloque.color||'#fff') + '">' + bloque.nombre + '</span>';
    bDiv.appendChild(bHdr);

    // Render por ejercicio
    Object.values(bloque.ejercicios).forEach(function(ej, ei){
      var ejWrap = document.createElement('div');
      ejWrap.className = 'ejercicio-wrap';

      // Título ejercicio
      var tieneVideo = ej.video && ej.video !== 'null' && ej.video !== '';
      var ejTit = document.createElement('div');
      ejTit.className = 'ejercicio-titulo';
      ejTit.innerHTML =
        '<div class="ej-num">' + (ei+1) + '</div>' +
        '<div class="ej-nombre">' + ej.nombre + '</div>' +
        '<div class="ej-badges">' +
          '<span class="ej-badge badge-s">' + ej.series + ' SERIES</span>' +
          '<span class="ej-badge badge-r">' + ej.reps + ' REPS</span>' +
          (ej.descanso ? '<span class="ej-badge badge-d">⏱ ' + ej.descanso + '</span>' : '') +
        '</div>' +
        (tieneVideo ? '<button class="ej-video-btn" onclick="window.open(\''+ej.video+'\',\'_blank\')" type="button">🎬 VIDEO</button>' : '<button class="ej-video-btn off" disabled>🎬 VIDEO</button>');
      ejWrap.appendChild(ejTit);

      // Tabla de jugadores
      var tabla = document.createElement('table');
      tabla.className = 'tabla-jugadores';
      var thead = '<thead><tr><th>#</th><th>Jugador</th><th>Posición</th>';
      for(var s=1; s<=ej.series; s++) thead += '<th class="center">SERIE '+s+'</th>';
      thead += '</tr></thead>';
      tabla.innerHTML = thead;

      var tbody = document.createElement('tbody');

      jugadores.forEach(function(j){
        // Verificar que este jugador tiene este ejercicio en este día
        var tieneEj = false;
        (j.semanas||[]).forEach(function(sem){
          if(sem.label !== diaLabel) return;
          (sem.bloques||[]).forEach(function(b){
            (b.ejercicios||[]).forEach(function(e){
              if(e.id === ej.id) tieneEj = true;
            });
          });
        });
        if(!tieneEj) return;

        var tr = document.createElement('tr');
        var posClass = 'pos-' + (j.pos||'');

        var tdNum = document.createElement('td');
        tdNum.className = 'jug-num';
        tdNum.textContent = '#' + j.num;

        var tdNom = document.createElement('td');
        tdNom.className = 'jug-nombre';
        tdNom.textContent = j.nombre;

        var tdPos = document.createElement('td');
        tdPos.innerHTML = '<span class="jug-pos ' + posClass + '">' + (j.pos||'') + '</span>';

        tr.appendChild(tdNum);
        tr.appendChild(tdNom);
        tr.appendChild(tdPos);

        // Series editables
        for(var serie=1; serie<=ej.series; serie++){
          var td = document.createElement('td');
          td.className = 'peso-cell';
          var storKey = sk(j.num, ej.id, serie);
          var saved = localStorage.getItem(storKey) || '';

          var inp = document.createElement('input');
          inp.type = 'number';
          inp.className = 'peso-inp' + (saved ? ' filled' : '');
          inp.placeholder = '—';
          inp.value = saved;
          inp.min = 0; inp.max = 500; inp.step = 0.5;

          // Cargar desde Firebase
          if(typeof fbGet !== 'undefined'){
            (function(k, input){
              fbGet('pesos/'+k, function(val){
                if(val !== null && val !== ''){
                  input.value = val;
                  input.classList.add('filled');
                  localStorage.setItem(k, val);
                }
              });
            })(storKey, inp);
          }

          inp.addEventListener('input', (function(k, input){
            return function(){
              var v = this.value;
              localStorage.setItem(k, v);
              input.classList.toggle('filled', v !== '');
              if(typeof fbSet !== 'undefined') fbSet('pesos/'+k, v);
              updateLastUpdate();
            };
          })(storKey, inp));

          td.appendChild(inp);
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      });

      tabla.appendChild(tbody);
      ejWrap.appendChild(tabla);
      bDiv.appendChild(ejWrap);
    });

    cont.appendChild(bDiv);
  });

  updateLastUpdate();
}

function updateLastUpdate(){
  var d = new Date();
  var h = String(d.getHours()).padStart(2,'0');
  var m = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('last-update').textContent = 'Actualizado ' + h + ':' + m;
}

// ── Fullscreen ────────────────────────────────────────────────────
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(function(){});
    document.body.classList.add('fullscreen');
  } else {
    document.exitFullscreen();
    document.body.classList.remove('fullscreen');
  }
}
document.addEventListener('fullscreenchange', function(){
  if(!document.fullscreenElement) document.body.classList.remove('fullscreen');
});

// ── Escuchar cambios de Firebase en tiempo real ───────────────────
function listenFirebase(){
  if(typeof fbGet === 'undefined') return;
  // Re-cargar pesos cada 30 segundos
  setInterval(function(){
    var inputs = document.querySelectorAll('.peso-inp');
    inputs.forEach(function(inp){
      // Ya tienen listeners individuales — solo re-render si hay cambios
    });
  }, 30000);
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('load', function(){
  setTimeout(function(){
    PREP_DATA_LOCAL = window.PREP_DATA || null;
    EQUIPO_DATA_LOCAL = window.EQUIPO_DATA || null;
    poblarDias();
    listenFirebase();
  }, 200);
});
</script>
</body>
</html>
