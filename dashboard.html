<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--sur:#0d0e1a;--card:#0f1020;--card2:#12132a;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);
  --red:#e8192c;--green:#22c55e;--amber:#f59e0b;
  --indigo:#818cf8;--mut:#475569;--txt:#e2e8f0;
  --cyan:#06b6d4;--orange:#f97316;--purple:#a78bfa;
}
body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 0%,rgba(232,25,44,.05) 0%,transparent 50%);font-family:'Barlow Condensed',sans-serif;color:var(--txt);min-height:100vh;}

/* ── HEADER ─────────────────────────────────────────────────────── */
.hdr{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);background:rgba(7,8,15,.85);}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;background:linear-gradient(120deg,var(--red),#fff 60%,var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--b);background:rgba(255,255,255,.04);color:var(--mut);font-size:12px;font-weight:700;letter-spacing:1px;text-decoration:none;text-transform:uppercase;transition:all .15s;}
.back-btn:hover{color:var(--txt);}

/* ── MAIN TABS ───────────────────────────────────────────────────── */
.main-tabs{display:flex;gap:3px;padding:8px 20px;border-bottom:1px solid var(--b);background:rgba(255,255,255,.01);overflow-x:auto;flex-wrap:nowrap;}
.mtab{padding:6px 13px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;}
.mtab:hover{color:var(--txt);background:rgba(255,255,255,.04);}
.mtab.on{color:var(--txt);background:rgba(255,255,255,.07);border-color:var(--b2);}

/* ── MAIN CONTENT ────────────────────────────────────────────────── */
.main{max-width:1400px;margin:0 auto;padding:24px 28px;}
.view{display:none;}
.view.on{display:block;}

/* ── SECTION LABEL ───────────────────────────────────────────────── */
.sec-lbl{font-size:9px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--b);}

/* ── SUB TABS ────────────────────────────────────────────────────── */
.sub-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.stab{padding:7px 16px;border-radius:8px;border:1px solid var(--b);background:rgba(255,255,255,.03);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.stab:hover{color:var(--txt);}
.stab.on{color:var(--txt);background:rgba(255,255,255,.08);border-color:var(--b2);}

/* ── STAT CARDS ──────────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:8px 12px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.stat-lbl{font-size:9px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}

/* ── TABLA ───────────────────────────────────────────────────────── */
.tabla-wrap{background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.tabla-wrap table{width:100%;border-collapse:collapse;}
.tabla-wrap th{padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--b);background:var(--sur);text-align:center;}
.tabla-wrap th:first-child{text-align:left;}
.tabla-wrap td{padding:10px 14px;font-size:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03);}
.tabla-wrap td:first-child{text-align:left;}
.tabla-wrap tr:last-child td{border-bottom:none;}
.tabla-wrap tr:hover td{background:rgba(255,255,255,.02);}
.t-name{display:flex;align-items:center;gap:10px;}
.t-cam{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);color:var(--indigo);flex-shrink:0;}

/* ── PLAYER GRID ─────────────────────────────────────────────────── */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.player-btn{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:12px;cursor:pointer;text-align:left;font-family:'Barlow Condensed',sans-serif;color:var(--txt);transition:all .15s;}
.player-btn:hover{border-color:var(--b2);background:var(--card2);}
.player-btn.on{border-color:var(--indigo);background:rgba(129,140,248,.08);}
.pb-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.pb-name{font-size:12px;font-weight:700;letter-spacing:.5px;margin-top:2px;}
.pb-pos{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;}

/* ── SESION GRID ─────────────────────────────────────────────────── */
.ses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:20px;}
.ses-btn{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:10px 12px;cursor:pointer;text-align:left;font-family:'Barlow Condensed',sans-serif;color:var(--txt);transition:all .15s;}
.ses-btn:hover{border-color:var(--b2);}
.ses-btn.on{border-color:rgba(129,140,248,.6);background:rgba(129,140,248,.1);}
.ses-fecha{font-size:8px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;}
.ses-label{font-size:14px;font-weight:800;letter-spacing:1px;margin-top:2px;}
.ses-res{font-size:10px;margin-top:2px;}

/* ── EFF COLORS ──────────────────────────────────────────────────── */
.eff-pos{color:var(--green);}
.eff-ok{color:#86efac;}
.eff-neu{color:var(--txt);}
.eff-neg{color:var(--orange);}
.eff-bad{color:var(--red);}

/* ── FILTER BAR ──────────────────────────────────────────────────── */
.fbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;background:var(--sur);border:1px solid var(--b);border-radius:10px;margin-bottom:18px;}
.fbar-lbl{font-size:9px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;}
.ftag{padding:5px 12px;border-radius:20px;border:1px solid var(--b);background:rgba(255,255,255,.03);color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;}
.ftag:hover{color:var(--txt);}
.ftag.on{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:var(--indigo);}
.fbar select{background:var(--card);border:1px solid var(--b2);border-radius:8px;padding:6px 12px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;outline:none;cursor:pointer;min-width:240px;}

/* ── EMPTY ───────────────────────────────────────────────────────── */
.empty{text-align:center;padding:40px;color:var(--mut);font-size:13px;letter-spacing:1px;}
</style>
<script>
// ================================================================
// CASLA VOLEY — Utils compartidos
// Cargado por todas las páginas
// ================================================================

// ── Eficiencias ──────────────────────────────────────────────
function effSaque(j){
  return j.sT>0 ? Math.round((j.sPunto+0.5*j.sVend+0.25*j.sPos-j.sErr)/j.sT*100) : null;
}
function effRecepcion(j){
  return j.rT>0 ? Math.round((j.rPunto+0.5*j.rPos-0.5*j.rVend-j.rErr)/j.rT*100) : null;
}
function effAtaque(j){
  return j.aT>0 ? Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100) : null;
}
function effBloqueo(j){
  return j.bT>0 ? Math.round((j.bPt+j.bPtPos)/j.bT*100) : null;
}
function effColor(v){
  if(v===null||v===undefined||isNaN(v)) return 'var(--mut,#475569)';
  return v>=40?'#22c55e':v>=20?'#86efac':v>=0?'var(--txt,#e2e8f0)':v>=-20?'#f97316':'#ef4444';
}


// ── Acumular jugadores de múltiples sesiones ─────────────────
function acumJugadores(sesiones){
  var acum={};
  (sesiones||[]).forEach(function(s){
    (s.jugadores||[]).forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(!acum[j.c]) acum[j.c]={c:j.c,n:j.n,PJ:0,
        sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sOrig:'',sDest:'',
        rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,
        aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,
        bT:0,bPt:0,bPtPos:0,dv4:{}};
      var a=acum[j.c];
      if((j.sT||0)+(j.rT||0)+(j.aT||0)+(j.bT||0)>0) a.PJ++;
      ['sT','sPunto','sPos','sOvp','sNeg','sVend','sErr',
       'rT','rPunto','rPos','rOvp','rNeg','rVend','rErr',
       'aT','aPunto','aPos','aOvp','aNeg','aVend','aErr',
       'bT','bPt','bPtPos'].forEach(function(k){ a[k]+=(j[k]||0); });
      if(j.dv4) Object.keys(j.dv4).forEach(function(cod){
        if(!a.dv4[cod]) a.dv4[cod]={tot:0,pt:0,err:0,orig:j.dv4[cod].orig||0};
        a.dv4[cod].tot+=j.dv4[cod].tot||0;
        a.dv4[cod].pt +=j.dv4[cod].pt ||0;
        a.dv4[cod].err+=j.dv4[cod].err||0;
      });
    });
  });
  return Object.values(acum).sort(function(a,b){return a.c-b.c;});
}

// ── Filtrar historial ────────────────────────────────────────
function filtrarSesiones(sesiones, tipo){
  if(!tipo||tipo==='todos') return sesiones||[];
  return (sesiones||[]).filter(function(s){ return (s.tipo||'P')===tipo; });
}

// ── Pos colors ───────────────────────────────────────────────
var POS_COLOR={
  'ARMADOR':'#f59e0b','CENTRAL':'#f97316',
  'PUNTA':'#22c55e','OPUESTO':'#818cf8','LIBERO':'#06b6d4'
};

// ── Objetivos config ─────────────────────────────────────────
window.OBJETIVOS_CONFIG={metas:{
  sq:   {label:'% Saque',   obj:3,  min:-12,max:8,  g2:3,  g1:-3, y:-8},
  rec:  {label:'% Recep.',  obj:36, min:20, max:44, g2:36, g1:30, y:25},
  bqpos:{label:'Blq #+',    obj:43, min:25, max:52, g2:43, g1:37, y:30},
  bqpt: {label:'% Blq #',   obj:23, min:12, max:28, g2:23, g1:20, y:17},
  atqq: {label:'Atq Quick', obj:48, min:35, max:56, g2:48, g1:44, y:40},
  atqhb:{label:'Atq HB',    obj:20, min:8,  max:26, g2:20, g1:16, y:12},
  atqx: {label:'Atq X',     obj:42, min:28, max:50, g2:42, g1:38, y:34},
  atqrp:{label:'Atq R#+',   obj:50, min:32, max:58, g2:50, g1:44, y:38},
  atqri:{label:'Atq R!',    obj:36, min:22, max:44, g2:36, g1:32, y:28},
  atqrm:{label:'Atq R-',    obj:26, min:14, max:34, g2:26, g1:22, y:18},
  atqtr:{label:'Atq TR',    obj:34, min:22, max:42, g2:34, g1:30, y:26}
}};













</script>
</head>

// ════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════════════════════
var EQ_FILTRO    = 'todos';
var EQ_SESION    = -2;   // -2 = acumulado
var EQ_TAB       = 'saque';
var AN_FILTRO    = 'todos';
var AN_SESION    = null;

  'ARMADOR':'#f59e0b','CENTRAL':'#f97316',

function effColor(v){
  if(v===null||v===undefined) return 'var(--mut)';
  return v>=40?'#22c55e':v>=20?'#86efac':v>=0?'var(--txt)':v>=-20?'#f97316':'#ef4444';
}
function fmt(v){ return (v<0?'-':'')+Math.abs(v)+'%'; }

function getSesiones(filtro){
  if(!DATA) return [];
  filtro = filtro||'todos';
  return DATA.entrenamientos.filter(function(s){
    return filtro==='todos'||(s.tipo||'P')===filtro;
  });
}

function getJugadoresAcum(sesiones){
  var acum = {};
  sesiones.forEach(function(s){
    s.jugadores.forEach(function(j){
      if(j.n==='TOTALES EQUIPO') return;
      if(!acum[j.c]) acum[j.c]={c:j.c,n:j.n,PJ:0,
        sT:0,sPunto:0,sPos:0,sOvp:0,sNeg:0,sVend:0,sErr:0,sOrig:'',sDest:'',
        rT:0,rPunto:0,rPos:0,rOvp:0,rNeg:0,rVend:0,rErr:0,
        aT:0,aPunto:0,aPos:0,aOvp:0,aNeg:0,aVend:0,aErr:0,
        bT:0,bPt:0,bPtPos:0,dv4:{}};
      var a=acum[j.c];
      if(j.sT+j.rT+j.aT+j.bT>0) a.PJ++;
      ['sT','sPunto','sPos','sOvp','sNeg','sVend','sErr',
       'rT','rPunto','rPos','rOvp','rNeg','rVend','rErr',
       'aT','aPunto','aPos','aOvp','aNeg','aVend','aErr',
       'bT','bPt','bPtPos'].forEach(function(k){ a[k]+=(j[k]||0); });
      if(j.dv4) Object.keys(j.dv4).forEach(function(cod){
        if(!a.dv4[cod]) a.dv4[cod]={tot:0,pt:0,err:0,orig:j.dv4[cod].orig||0};
        a.dv4[cod].tot+=j.dv4[cod].tot||0;
        a.dv4[cod].pt +=j.dv4[cod].pt ||0;
        a.dv4[cod].err+=j.dv4[cod].err||0;
      });
    });
  });
  Object.values(acum).forEach(function(a){
    if(a.sT>0) a.sEff=Math.round((a.sPunto+0.5*a.sVend+0.25*a.sPos-a.sErr)/a.sT*100);
    if(a.rT>0) a.rEff=Math.round((a.rPunto+0.5*a.rPos-0.5*a.rVend-a.rErr)/a.rT*100);
    if(a.aT>0) a.aEff=Math.round((a.aPunto-a.aVend-a.aErr)/a.aT*100);
    if(a.bT>0) a.bEff=Math.round((a.bPt+a.bPtPos)/a.bT*100);
  });
  return Object.values(acum).sort(function(a,b){return a.c-b.c;});
}

function getEqSesiones(){
  var all = getSesiones(EQ_FILTRO);
  if(EQ_SESION>=0) return [all[EQ_SESION]].filter(Boolean);
  return all;
}

function renderEqStats(){
  var ses=getEqSesiones();
  var jugs=getJugadoresAcum(ses);
  var sT=0,rT=0,aT=0,bT=0,bPt=0,bPtPos=0,sPt=0,rPt=0,aPt=0;
  var sPunto=0,sVend=0,sPos=0,sErr=0,rPunto=0,rPos=0,rVend=0,rErr=0,aPunto=0,aVend=0,aErr=0;
  jugs.forEach(function(j){
    sT+=j.sT;rT+=j.rT;aT+=j.aT;bT+=j.bT;
    sPunto+=j.sPunto;sVend+=j.sVend;sPos+=j.sPos;sErr+=j.sErr;
    rPunto+=j.rPunto;rPos+=j.rPos;rVend+=j.rVend;rErr+=j.rErr;
    aPunto+=j.aPunto;aVend+=j.aVend;aErr+=j.aErr;
    bPt+=(j.bPt||0);bPtPos+=(j.bPtPos||0);
  });
  var sEff=sT>0?Math.round((sPunto+0.5*sVend+0.25*sPos-sErr)/sT*100):null;
  var rEff=rT>0?Math.round((rPunto+0.5*rPos-0.5*rVend-rErr)/rT*100):null;
  var aEff=aT>0?Math.round((aPunto-aVend-aErr)/aT*100):null;
  // Build 4 rectangles
  var sEff_str  = sEff!==null ? fmt(sEff)+'%' : '—';
  var aEff_str  = aEff!==null ? fmt(aEff)+'%' : '—';
  var rEff_str  = rEff!==null ? fmt(rEff)+'%' : '—';
  var bEff_str  = bT>0 ? fmt(Math.round((bPt+bPtPos)/bT*100))+'%' : '—';
  var rPos_str  = rT>0 ? fmt(Math.round((rPunto+rPos)/rT*100))+'%' : '—';
  var rNeg_str  = rT>0 ? fmt(Math.round((rVend+rErr)/rT*100))+'%' : '—';

  function mkRect(color, title, stats){
    var html = '<div style="background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden;min-width:0;flex:1;min-width:180px">';
    html += '<div style="padding:7px 16px;background:'+color+'11;border-bottom:1px solid '+color+'22;display:flex;align-items:center;gap:6px">';
    html += '<div style="width:5px;height:5px;border-radius:50%;background:'+color+'"></div>';
    html += '<span style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:'+color+'">'+title+'</span>';
    html += '</div>';
    html += '<div style="padding:12px 16px;display:flex;gap:20px;align-items:center">';
    stats.forEach(function(s){
      html += '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:26px;line-height:1;color:'+(s.c||'var(--text)')+'">'+s.v+'</div>';
      html += '<div style="font-size:9px;color:var(--mut);letter-spacing:1px;white-space:nowrap">'+s.l+'</div>';
      html += '</div>';
    });
    html += '</div></div>';
    return html;
  }

  var rectHTML = '<div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto">';
  rectHTML += mkRect('#F59E0B','Saque',[
    {v:sEff_str, l:'EFF', c:'#F59E0B'},
    {v:sT,       l:'Total'},
    {v:sPunto||0,l:'Puntos'},
    {v:sErr||0,  l:'Errores'},
  ]);
  rectHTML += mkRect('#F97316','Ataque',[
    {v:aEff_str, l:'EFF', c:'#F97316'},
    {v:aPunto||0,l:'Puntos'},
    {v:aVend||0, l:'Bloqueados'},
    {v:aErr||0,  l:'Errores'},
  ]);
  rectHTML += mkRect('#22C55E','Recepción',[
    {v:rEff_str, l:'EFF', c:'#22C55E'},
    {v:rT,       l:'Total'},
    {v:rPos_str, l:'Rec. #+'},
    {v:rNeg_str, l:'Rec. /='},
  ]);
  rectHTML += mkRect('#06B6D4','Bloqueo',[
    {v:bEff_str, l:'EFF #+', c:'#06B6D4'},
    {v:bT,       l:'Total'},
  ]);
  rectHTML += '</div>';

  document.getElementById('eq-stats-row').innerHTML = rectHTML;
}

function renderDV4(sesiones){
  var totals={};
  sesiones.forEach(function(s){
    s.jugadores.forEach(function(j){
      if(j.n==='TOTALES EQUIPO')return;
      if(!j.dv4)return;
      Object.keys(j.dv4).forEach(function(cod){
        var d=j.dv4[cod];
        if(!totals[cod])totals[cod]={tot:0,pt:0,err:0};
        totals[cod].tot+=d.tot||0;
        totals[cod].pt +=d.pt ||0;
        totals[cod].err+=d.err||0;
      });
    });
  });
  var sorted=Object.entries(totals).filter(function(x){return x[1].tot>0;}).sort(function(a,b){return b[1].tot-a[1].tot;});
  if(!sorted.length)return'<div class="empty">Sin datos DV4</div>';
  var max=sorted[0][1].tot;
  var html='<div class="tabla-wrap"><table><thead><tr>'
    +'<th style="text-align:left">Combo</th><th>Distribución</th><th>TOT</th><th style="color:#22c55e">PTS</th><th style="color:#22c55e">PTS%</th><th style="color:#ef4444">ERR</th>'
    +'</tr></thead><tbody>';
  sorted.forEach(function(x,ri){
    var cod=x[0],d=x[1];
    var pct=d.tot>0?Math.round(d.pt/d.tot*100):0;
    var barW=Math.round(d.tot/max*100);
    var bg=ri%2?'rgba(255,255,255,.015)':'transparent';
    html+='<tr style="background:'+bg+'">'
      +'<td style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;letter-spacing:1px;color:var(--indigo)">'+cod+'</td>'
      +'<td style="min-width:120px"><div style="background:rgba(129,140,248,.15);border-radius:3px;overflow:hidden;height:6px"><div style="width:'+barW+'%;background:var(--indigo);height:100%;border-radius:3px"></div></div></td>'
      +'<td style="font-weight:800">'+d.tot+'</td>'
      +'<td style="color:#22c55e;font-weight:800">'+d.pt+'</td>'
      +'<td style="color:'+effColor(pct)+';font-size:15px;font-weight:900">'+pct+'%</td>'
      +'<td style="color:#ef4444">'+d.err+'</td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

function renderJugGrid(){
  var grid=document.getElementById('jug-grid');
  if(!EQUIPO){grid.innerHTML='<div class="empty">Sin datos de equipo</div>';return;}
  grid.innerHTML=EQUIPO.jugadores.map(function(j){
    var col=POS_COLOR[j.pos]||'#64748b';
    return'<button class="player-btn'+(JUG_ACTUAL&&JUG_ACTUAL.num===j.num?' on':'')+'" onclick="selectJugador('+j.num+',this)">'
      +'<div class="pb-num" style="color:'+col+'">#'+j.num+'</div>'
      +'<div class="pb-name">'+j.nombre+'</div>'
      +'<div class="pb-pos" style="color:'+col+'">'+j.pos+'</div>'
      +'</button>';
  }).join('');
}

function selectJugador(num,btn){
  document.querySelectorAll('.player-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(!EQUIPO)return;
  JUG_ACTUAL=EQUIPO.jugadores.find(j=>j.num===num)||null;
  if(!JUG_ACTUAL)return;
  document.getElementById('jug-detail').style.display='block';
  document.getElementById('jug-hero-num').textContent='#'+JUG_ACTUAL.num;
  document.getElementById('jug-hero-name').textContent=JUG_ACTUAL.nombre;
  document.getElementById('jug-hero-pos').textContent=JUG_ACTUAL.pos;
  var col=POS_COLOR[JUG_ACTUAL.pos]||'#64748b';
  document.getElementById('jug-hero-num').style.color=col;
  document.getElementById('jug-hero-num').style.borderColor=col+'44';
  document.getElementById('jug-hero-num').style.background=col+'18';
  JUG_TAB='acum';
  document.querySelectorAll('#view-jugador .stab').forEach(function(b,i){b.classList.toggle('on',i===0);});
  renderJugContent();
}

function showJugTab(tab,btn){
  JUG_TAB=tab;
  document.querySelectorAll('#view-jugador .stab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderJugContent();
}

function renderJugContent(){
  var cont=document.getElementById('jug-tab-content');
  if(!JUG_ACTUAL||!DATA){cont.innerHTML='<div class="empty">Seleccioná un jugador</div>';return;}
  var nombre=JUG_ACTUAL.nombre;
  if(JUG_TAB==='objetivos'){
    cont.innerHTML='<div id="jug-obj-panel"></div>';
    if(typeof renderObjetivosJugador!=='undefined')
      renderObjetivosJugador('jug-obj-panel',nombre);
    return;
  }
  // Get player sessions
  var todasSes=DATA.entrenamientos;
  if(JUG_TAB==='acum'){
    // Accumulated
    var jugs=getJugadoresAcum(todasSes);
    var j=jugs.find(function(x){return x.n===nombre;});
    if(!j){cont.innerHTML='<div class="empty">Sin datos para este jugador</div>';return;}
    cont.innerHTML=renderJugTabla(j,true);
  } else if(JUG_TAB==='sesiones'){
    // Per session
    var rows=todasSes.map(function(s,i){
      var jd=s.jugadores.find(function(x){return x.n===nombre;});
      if(!jd||jd.sT+jd.rT+jd.aT+jd.bT===0)return null;
      var esP=(s.tipo||'P')==='P';
      return{fecha:s.fecha,tipo:s.tipo,rival:s.rival,esP:esP,j:jd};
    }).filter(Boolean);
    if(!rows.length){cont.innerHTML='<div class="empty">Sin sesiones para este jugador</div>';return;}
    cont.innerHTML='<div class="tabla-wrap"><table><thead><tr>'
      +'<th style="text-align:left">Sesión</th>'
      +'<th style="color:#f59e0b">S EFF</th><th style="color:#f59e0b">S TOT</th>'
      +'<th style="color:#22c55e">R EFF</th><th style="color:#22c55e">R TOT</th>'
      +'<th style="color:#818cf8">A EFF</th><th style="color:#818cf8">A TOT</th>'
      +'<th style="color:#06b6d4">B TOT</th>'
      +'</tr></thead><tbody>'
      +rows.map(function(r,ri){
        var j=r.j;
        var se=j.sT>0?Math.round((j.sPunto+0.5*j.sVend+0.25*j.sPos-j.sErr)/j.sT*100):null;
        var re=j.rT>0?Math.round((j.rPunto+0.5*j.rPos-0.5*j.rVend-j.rErr)/j.rT*100):null;
        var ae=j.aT>0?Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100):null;
        var bg=ri%2?'rgba(255,255,255,.015)':'transparent';
        return'<tr style="background:'+bg+'">'
          +'<td><span style="font-size:8px;color:var(--mut);margin-right:6px">'+(r.esP?'🏆':'🏋️')+' '+r.fecha+'</span>'+(r.esP?'vs '+r.rival:'Entrenamiento')+'</td>'
          +'<td style="font-size:15px;font-weight:900;color:'+effColor(se)+'">'+(se!==null?fmt(se):'—')+'</td><td style="color:#f59e0b">'+(j.sT||'—')+'</td>'
          +'<td style="font-size:15px;font-weight:900;color:'+effColor(re)+'">'+(re!==null?fmt(re):'—')+'</td><td style="color:#22c55e">'+(j.rT||'—')+'</td>'
          +'<td style="font-size:15px;font-weight:900;color:'+effColor(ae)+'">'+(ae!==null?fmt(ae):'—')+'</td><td style="color:#818cf8">'+(j.aT||'—')+'</td>'
          +'<td style="color:#06b6d4">'+(j.bT||'—')+'</td>'
          +'</tr>';
      }).join('')
      +'</tbody></table></div>';
  }
}

function renderJugTabla(j,showPJ){
  var se=j.sT>0?Math.round((j.sPunto+0.5*j.sVend+0.25*j.sPos-j.sErr)/j.sT*100):null;
  var re=j.rT>0?Math.round((j.rPunto+0.5*j.rPos-0.5*j.rVend-j.rErr)/j.rT*100):null;
  var ae=j.aT>0?Math.round((j.aPunto-j.aVend-j.aErr)/j.aT*100):null;
  var be=j.bT>0?Math.round((j.bPt+j.bPtPos)/j.bT*100):null;
  return'<div class="stats-row">'
    +[{v:se!==null?fmt(se):'—',l:'Eff. Saque',c:effColor(se)},{v:re!==null?fmt(re):'—',l:'Eff. Recep.',c:effColor(re)},
      {v:ae!==null?fmt(ae):'—',l:'Eff. Ataque',c:effColor(ae)},{v:be!==null?fmt(be):'—',l:'Eff. Bloqueo',c:effColor(be)},
      {v:j.bT>0?fmt(Math.round(((j.bPt||0)+(j.bPtPos||0))/j.bT*100))+'%':'—',l:'Eff Blq #+',c:'#06b6d4'},
      {v:j.sT,l:'Saques',c:'#f59e0b'},{v:j.rT,l:'Recepciones',c:'#22c55e'},{v:j.aT,l:'Ataques',c:'#818cf8'},{v:j.bT,l:'Bloqueos',c:'#06b6d4'}]
    .map(function(x){return'<div class="stat-card"><div class="stat-val" style="color:'+x.c+'">'+x.v+'</div><div class="stat-lbl">'+x.l+'</div></div>';}).join('')
    +'</div>';
}

// ════════════════════════════════════════════════════════════
// TAB: GAME PLANS
// ════════════════════════════════════════════════════════════
function renderGamePlans(){
  var cont = document.getElementById('gp-list');
  if(!cont) return;
  var plans = typeof GAME_PLANS !== 'undefined' ? GAME_PLANS : [];
  if(!plans.length){
    cont.innerHTML='<div class="empty">Todavía no hay game plans cargados. Subí game_plans.js al repo.</div>';
    return;
  }
  var sorted = plans.slice().sort(function(a,b){
    return (b.fecha||'') > (a.fecha||'') ? 1 : -1;
  });
  cont.innerHTML = '';
  sorted.forEach(function(gp){
    var done = !!gp.resultado;
    var card = document.createElement('a');
    card.href = gp.archivo;
    card.style.cssText = 'display:block;background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s';
    card.onmouseover = function(){ this.style.borderColor='var(--red)'; this.style.transform='translateY(-2px)'; };
    card.onmouseout  = function(){ this.style.borderColor=''; this.style.transform=''; };

    var meses=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var fp = (gp.fecha||'').split('-');
    var fechaFmt = fp.length===3 ? fp[2]+' '+meses[parseInt(fp[1])]+' '+fp[0] : gp.fecha||'';

    var resHtml = '';
    if(gp.resultado){
      var win = gp.resultado.casla > gp.resultado.rival;
      var col = win ? '#22c55e' : '#ef4444';
      resHtml = '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:7px;margin-bottom:10px">'
        +'<div style="font-family:Bebas Neue,sans-serif;font-size:20px;color:'+col+'">'+gp.resultado.casla+' — '+gp.resultado.rival+'</div>'
        +'<div style="font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:1px">'+(win?'✓ Victoria':'✗ Derrota')+'</div>'
        +'</div>';
    }

    card.innerHTML =
      '<div style="height:3px;background:linear-gradient(90deg,var(--red),transparent)"></div>'
      +'<div style="padding:14px 16px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      +'<div style="font-family:Bebas Neue,sans-serif;font-size:22px;letter-spacing:2px">vs '+gp.rival+'</div>'
      +'<div style="font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;'
      +(done?'background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#22c55e':'background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b')
      +'">'+( done?'Jugado':'Próximo')+'</div>'
      +'</div>'
      +'<div style="font-size:10px;color:#475569;margin-bottom:10px">'+gp.torneo+' · '+fechaFmt+'</div>'
      +resHtml
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--b)">'
      +'<span style="font-size:9px;color:#475569;letter-spacing:1px;text-transform:uppercase">Ver Game Plan</span>'
      +'<span style="color:var(--red);font-size:14px">→</span>'
      +'</div></div>';
    cont.appendChild(card);
  });
}
