<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANALISIS DE RECEPCION — Nafels 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080F;--card:#0D0E1A;--card2:#111220;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);--red:#E8192C;--amber:#F59E0B;--green:#22C55E;--cyan:#06B6D4;--indigo:#818CF8;--text:#E2E8F0;--muted:#64748B;--subtle:#475569}
html,body{background:var(--bg);color:var(--text);font-family:"Barlow Condensed",sans-serif;min-height:100vh}
.hdr{background:rgba(7,8,15,.97);border-bottom:1px solid var(--border);padding:11px 20px;position:sticky;top:0;z-index:100}
.hdr-t{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:3px}
.hdr-s{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 48px)}
.sidebar{background:rgba(13,14,26,.8);border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px)}
.content{padding:18px 20px;overflow-y:auto}
.flabel{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:12px}
.flabel:first-child{margin-top:0}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}
.chip{padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-weight:700;cursor:pointer;font-family:"Barlow Condensed",sans-serif;transition:all .12s;text-transform:uppercase}
.chip:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
.chip.on{background:rgba(232,25,44,.12);border-color:rgba(232,25,44,.4);color:var(--red)}
.chip.on-g{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);color:var(--green)}
.chip.on-a{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--amber)}
.chip.on-i{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.35);color:var(--indigo)}
.chip.on-c{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.35);color:var(--cyan)}
.psel{width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:2px}
.psel option{background:#0D0E1A}
.counter{margin-top:10px;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border);text-align:center}
.counter-n{font-family:"Bebas Neue",sans-serif;font-size:32px}
.counter-l{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.reset-btn{width:100%;margin-top:10px;padding:7px;background:rgba(232,25,44,.07);border:1px solid rgba(232,25,44,.2);color:var(--red);border-radius:7px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:"Barlow Condensed",sans-serif}
.sec{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;text-align:center}
.big{font-family:"Bebas Neue",sans-serif;font-size:36px;line-height:1}
.lbl{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.court-row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;margin-bottom:18px}
.court-block{text-align:center}
.court-title{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;font-weight:800}
.nodata{color:var(--muted);font-size:11px;padding:30px;text-align:center}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}</style>
</head>

function calcEff(acts){
  if(!acts.length) return null;
  var t=acts.length,k=0,sl=0,p=0,e=0;
  acts.forEach(function(a){
    if(a.result=='#') k++;
    else if(a.result=='/') sl++;

    else if(a.result=='=') e++;
  });
  return Math.round(((k+0.5*p-0.5*sl-e)/t)*100);
}

  return p.actions.filter(function(a){

    if(F.moment!=='all'&&a.moment!==F.moment) return false;

function uniq(arr){var s={},r=[];arr.forEach(function(v){if(!s[v]){s[v]=1;r.push(v);}});return r;}
function buildChips(){
  if(!F.player) return;
  var acts=PLAYERS[F.player].actions;
  buildCG('f-type',[['all','Todos'],[T1K,'Flotado'],[T2K,'Potencia']],'stype','on');
  var rivals=['all'].concat(uniq(acts.map(function(a){return a.rival;})).sort());
  buildCG('f-rival',rivals.map(function(r){return [r,r==='all'?'Todos':r.split(' ').pop().substring(0,7)];}),'rival','on-i');
  var sets=['all'].concat(uniq(acts.map(function(a){return a.set;})).sort(function(a,b){return a-b;}));
  buildCG('f-set',sets.map(function(s){return [s,s==='all'?'Todos':'S'+s];}),'set','on');
  buildCG('f-moment',[['all','Todos'],['early','0-8'],['mid','9-16'],['late','17+']],'moment','on-a');
  var ress=['all'].concat(uniq(acts.map(function(a){return a.result;})).filter(Boolean).sort());
  buildCG('f-result',ress.map(function(r){return [r,r==='all'?'Todos':(RES_LABEL[r]||r)];}),'result','on-g');
  var origs=['all'].concat(uniq(acts.map(function(a){return a.origin;})).filter(Boolean).sort(function(a,b){return a-b;}));
  buildCG('f-origin',origs.map(function(o){return [o,o==='all'?'Todas':'Zona '+o];}),'origin','on-c');

function buildCG(id,opts,key,cls){
  var el=document.getElementById(id); if(!el) return;
  el.innerHTML='';
  opts.forEach(function(opt){
    var val=opt[0],lbl=opt[1];
    var btn=document.createElement('button');
    btn.className='chip'+((F[key]===val||F[key]===String(val))?' '+cls:'');
    btn.textContent=lbl;
    btn.onclick=(function(v){return function(){setF(key,v);};})(val);
    el.appendChild(btn);
  });
}

// Single court SVG: shows both origin and destination on correct halves
// RIVAL field (top): zones [[1,6,5],[9,8,7],[2,3,4]]
// OWN field (bottom): zones [[4,3,2],[7,8,9],[5,6,1]]
function singleCourtSVG(origZones, destZones, origColor, destColor, total){
  var RIVAL=[[1,6,5],[9,8,7],[2,3,4]];
  var OWN=[[4,3,2],[7,8,9],[5,6,1]];
  var maxO=Math.max.apply(null,Object.values(origZones))||1;
  var maxD=Math.max.apply(null,Object.values(destZones))||1;
  var W=160,H=220,P=4,CW=(W-P*2)/3,CH=(H/2-P)/3;
  var s="<svg viewBox='0 0 "+W+" "+H+"' xmlns='http://www.w3.org/2000/svg' style='width:100%;max-width:170px;display:block;margin:0 auto'>";
  s+="<rect width='"+W+"' height='"+H+"' fill='rgba(13,14,26,.97)' rx='8'/>";
  // Rival field background
  s+="<rect x='"+P+"' y='"+P+"' width='"+(W-P*2)+"' height='"+(H/2-P)+"' fill='rgba(232,25,44,.03)' rx='3'/>";
  // Own field background
  s+="<rect x='"+P+"' y='"+(H/2)+"' width='"+(W-P*2)+"' height='"+(H/2-P)+"' fill='rgba(129,140,248,.03)' rx='3'/>";
  // Net
  s+="<rect x='"+P+"' y='"+(H/2-1.5)+"' width='"+(W-P*2)+"' height='3' fill='rgba(255,255,255,.35)' rx='1.5'/>";
  // Grid lines
  for(var i=1;i<3;i++){
    s+="<line x1='"+(P+CW*i)+"' y1='"+P+"' x2='"+(P+CW*i)+"' y2='"+(H-P)+"' stroke='rgba(255,255,255,.06)' stroke-width='0.5'/>";
    s+="<line x1='"+P+"' y1='"+(P+CH*i)+"' x2='"+(W-P)+"' y2='"+(P+CH*i)+"' stroke='rgba(255,255,255,.06)' stroke-width='0.5'/>";
    s+="<line x1='"+P+"' y1='"+(H/2+CH*i)+"' x2='"+(W-P)+"' y2='"+(H/2+CH*i)+"' stroke='rgba(255,255,255,.06)' stroke-width='0.5'/>";
  }
  // ORIGIN zones (on ORIG_SIDE)
  var origLayout = ORIG_SIDE==='rival' ? RIVAL : OWN;
  var origYOff   = ORIG_SIDE==='rival' ? P : H/2;
  origLayout.forEach(function(row,ri){
    row.forEach(function(zone,ci){
      var cnt=origZones[zone]||0,x=P+ci*CW,y=origYOff+ri*CH;
      if(cnt>0){
        var op=0.08+(cnt/maxO)*0.7;
        s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='"+origColor+"' opacity='"+op+"' rx='3'/>";
        s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+5)+"' font-family='Bebas Neue,sans-serif' font-size='11' fill='white' text-anchor='middle'>"+cnt+"</text>";
        if(total>0) s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+15)+"' font-size='6' fill='rgba(255,255,255,.5)' text-anchor='middle'>"+Math.round(cnt/total*100)+"%</text>";
      }
      s+="<text x='"+(x+5)+"' y='"+(y+11)+"' font-size='6' fill='rgba(255,255,255,.2)' font-family='Bebas Neue,sans-serif'>"+zone+"</text>";
    });
  });
  // DEST zones (on DEST_SIDE)
  var destLayout = DEST_SIDE==='rival' ? RIVAL : OWN;
  var destYOff   = DEST_SIDE==='rival' ? P : H/2;
  destLayout.forEach(function(row,ri){
    row.forEach(function(zone,ci){
      var cnt=destZones[zone]||0,x=P+ci*CW,y=destYOff+ri*CH;
      if(cnt>0){
        var op=0.08+(cnt/maxD)*0.7;
        s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='"+destColor+"' opacity='"+op+"' rx='3'/>";
        s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+5)+"' font-family='Bebas Neue,sans-serif' font-size='11' fill='white' text-anchor='middle'>"+cnt+"</text>";
        if(total>0) s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+15)+"' font-size='6' fill='rgba(255,255,255,.5)' text-anchor='middle'>"+Math.round(cnt/total*100)+"%</text>";
      }
      s+="<text x='"+(x+5)+"' y='"+(y+11)+"' font-size='6' fill='rgba(255,255,255,.2)' font-family='Bebas Neue,sans-serif'>"+zone+"</text>";
    });
  });
  s+="<text x='"+(W/2)+"' y='"+(P+9)+"' font-size='6' fill='rgba(232,25,44,.5)' text-anchor='middle' font-family='Barlow Condensed,sans-serif' font-weight='800' letter-spacing='2'>CAMPO RIVAL</text>";
  s+="<text x='"+(W/2)+"' y='"+(H-3)+"' font-size='6' fill='rgba(129,140,248,.35)' text-anchor='middle' font-family='Barlow Condensed,sans-serif' font-weight='800' letter-spacing='2'>NUESTRO CAMPO</text>";
  s+='</svg>';
  return s;
}

  ['#','+','-','/','!','='].forEach(function(r){
    var cnt=rc[r]||0; if(!cnt) return;
    html+="<div style='text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:22px;color:"+(RES_COLOR[r]||'#475569')+"'>"+cnt+"</div><div style='font-size:8px;color:var(--muted)'>"+( RES_LABEL[r]||r)+' ('+Math.round(cnt/total*100)+'%)</div></div>';
  });
  html+="</div><div style='display:flex;height:8px;border-radius:4px;overflow:hidden'>";
  ['#','+','-','/','!','='].forEach(function(r){var cnt=rc[r]||0;if(cnt) html+="<div style='flex:"+cnt+";background:"+(RES_COLOR[r]||'#475569')+"'></div>";});
  html+='</div></div>';
  // Heatmap courts - all in one flex row
  html+="<div class='sec'>Mapa de cancha</div>";
  html+="<div style='background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px'>";
  html+="<div style='display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start'>";
  var wO=acts.filter(function(a){return a.origin;}),wD=acts.filter(function(a){return a.dest;});
  // Court 1: All actions (origin + dest)
  if(wO.length>0||wD.length>0){
    var origZ=buildZonesFrom(wO,'origin'),destZones=buildZonesFrom(wD,'dest');
    html+="<div style='text-align:center'>";
    html+="<div class='court-title' style='color:#94a3b8'>Todos ("+total+")</div>";
    html+=singleCourtSVG(origZ,destZones,'#818CF8','#F97316',Math.max(wO.length,wD.length));
    html+="<div class='legend' style='justify-content:center'>";
    html+="<div class='leg-item'><div class='leg-dot' style='background:#818CF8'></div>Origen</div>";
    html+="<div class='leg-item'><div class='leg-dot' style='background:#F97316'></div>Destino</div>";
    html+='</div></div>';
  }
  // Courts per result - each one in same row
  var resOrder=['#','/','!','-','='];
  resOrder.forEach(function(r){
    var rA=acts.filter(function(a){return a.result===r;}); if(rA.length<2) return;
    var rO=buildZonesFrom(rA.filter(function(a){return a.origin;}),'origin');
    var rD=buildZonesFrom(rA.filter(function(a){return a.dest;}),'dest');
    html+="<div style='text-align:center'>";
    html+="<div class='court-title' style='color:"+(RES_COLOR[r]||'#94a3b8')+"'>"+(RES_LABEL[r]||r)+' ('+rA.length+")</div>";
    html+=singleCourtSVG(rO,rD,'rgba(129,140,248,0.5)',RES_COLOR[r]||'#F97316',rA.length);
    html+='</div>';
  });
  html+='</div></div>';
  // EFF by rival
  var allRivals=uniq(acts.map(function(a){return a.rival;})).sort();
  if(allRivals.length>1){
    html+="<div class='sec'>EFF por rival</div><div style='background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px'>";
    allRivals.forEach(function(riv){
      var rA=acts.filter(function(a){return a.rival===riv;}),e=calcEff(rA);
      var rivS=riv.split(' ').pop().substring(0,10).toUpperCase();
      html+="<div class='bar-row'><div style='font-size:10px;font-weight:800;color:var(--muted);width:80px;text-align:right;flex-shrink:0'>"+rivS+"</div>";
      html+="<div style='flex:1;height:16px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden'><div style='height:100%;width:"+Math.max(2,Math.min(100,e!==null?(e+30):2))+"%;background:"+(e!==null?effColor(e):'#475569')+"'></div></div>";
      html+="<div style='font-family:Bebas Neue,sans-serif;font-size:15px;color:"+(e!==null?effColor(e):'#475569')+";width:40px;text-align:right'>"+(e!==null?(e+'%'):'--')+"</div>";
      html+="<div style='font-size:8px;color:var(--subtle);margin-left:4px;width:24px'>"+rA.length+"</div></div>";
    });
    html+='</div>';
  }
  // Trend
  var gMap={};
  acts.forEach(function(a){if(!gMap[a.gi])gMap[a.gi]={gi:a.gi,rival:a.rival,acts:[]};gMap[a.gi].acts.push(a);});
  var gList=Object.values(gMap).sort(function(a,b){return a.gi-b.gi;});
  if(gList.length>=3){
    html+="<div class='sec'>Evolucion partido a partido</div><div style='background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px'>";
    var gE=gList.map(function(g){return {v:calcEff(g.acts),riv:g.rival.split(' ').pop().substring(0,4).toUpperCase()};});
    var vals=gE.map(function(x){return x.v;}).filter(function(v){return v!==null;});
    if(vals.length>=2){
      var ceil=Math.max(Math.max.apply(null,vals.map(function(v){return Math.abs(v)||1;})),OBJ_VAL+20)+10;
      var oH=Math.round(OBJ_VAL/ceil*100);
      html+="<div style='position:relative;height:120px;margin-bottom:6px'>";
      html+="<div style='position:absolute;left:0;right:0;bottom:"+oH+"%;border-top:1px dashed rgba(255,255,255,.18)'><span style='position:absolute;right:2px;top:-11px;font-size:8px;color:rgba(255,255,255,.3)'>"+OBJ_VAL+"%</span></div>";
      html+="<div style='display:flex;gap:3px;align-items:flex-end;height:100%'>";
      gE.forEach(function(g){
        if(g.v===null){html+="<div style='flex:1'></div>";return;}
        var bH=Math.max(3,Math.abs(g.v)/ceil*100),col=effColor(g.v);
        html+="<div style='flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%'>";
        html+="<div style='font-size:8px;color:"+col+";margin-bottom:1px'>"+g.v+"%</div>";
        html+="<div style='width:100%;height:"+bH+"%;background:"+col+";opacity:0.65;border-radius:3px 3px 0 0;min-height:3px'></div>";
        html+="<div style='font-size:6px;color:var(--muted);margin-top:2px;text-align:center;overflow:hidden;white-space:nowrap;width:100%'>"+g.riv+"</div></div>";
      });
      html+="</div></div>";
      var half=Math.floor(vals.length/2);
      var avgF=Math.round(vals.slice(0,half).reduce(function(s,v){return s+v;},0)/half);
      var avgL=Math.round(vals.slice(-half).reduce(function(s,v){return s+v;},0)/half);
      var diff=avgL-avgF;
      html+="<div style='display:flex;gap:14px;font-size:11px;color:var(--muted)'>";
      html+="<span>Inicio: <b style='color:#94a3b8'>"+avgF+"%</b></span>";
      html+="<span>Final: <b style='color:"+(diff>=0?'#22c55e':'#ef4444')+"'>"+avgL+"%</b></span>";
      html+="<span style='font-weight:700;color:"+(diff>=0?'#22c55e':'#ef4444')+"'>"+(diff>=0?'Mejorando +':'Bajando ')+diff+"%</span></div>";
    }
    html+='</div>';
  }
  content.innerHTML=html;
}
window.onload=function(){
  if(pNums.length){
    document.getElementById('psel').value=pNums[0];
    onPlayerChange(String(pNums[0]));
  }
};

</script>
</body>
</html>
